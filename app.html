  // Wire up reimport button
  var reimportBtn=document.getElementById('res-reimport-btn');
  if(reimportBtn){
    var reimportInp=document.createElement('input');
    reimportInp.type='file'; reimportInp.accept='.xlsx,.xls,.txt,.csv';
    reimportInp.addEventListener('change',function(e){
      var f=e.target.files[0]; if(f) handleResultsFile(f);
    });
    reimportBtn.addEventListener('click',function(){ reimportInp.click(); });
  }

  // Wire up score sheet multi-file loader

  var sheetsBtn=document.getElementById('res-load-sheets-btn');

  if(sheetsBtn){

    var sheetsInp=document.createElement('input');

    sheetsInp.type='file'; sheetsInp.accept='.pdf'; sheetsInp.multiple=true;

    sheetsInp.addEventListener('change',function(e){

      var files=Array.from(e.target.files);

      var matched=0;

      files.forEach(function(f){

        // Normalize: lowercase, strip extension, replace punctuation/underscores with spaces

        var base=f.name.replace(/\.pdf$/i,'').toLowerCase().replace(/[_\-]+/g,' ').replace(/\s+/g,' ').trim();

        var url=URL.createObjectURL(f);



        // Collect unique org+div+disc combos from activeResults

        var seen={};

        var candidates=[];

        activeResults.forEach(function(r){

          if(!r.org||!r.division||!r.discipline) return;

          var k=r.org+'|'+r.division+'|'+r.discipline;

          if(seen[k]) return; seen[k]=1;

          candidates.push({k:k, org:r.org, div:r.division, disc:r.discipline});

        });



        // Score each candidate. Naming convention examples:

        //   "CoWN Open-.pdf"                    → org + div only

        //   "Fall Fest   CoWN Open Results.pdf" → show + org + div (results PDF)

        //   "Amateur Ranch Riding Jackpot.pdf"  → div + disc only

        var bestScore=0, bestKeys=[];

        candidates.forEach(function(c){

          var orgLow=c.org.toLowerCase().replace(/[^a-z0-9 ]/g,' ');

          var divLow=c.div.toLowerCase().replace(/[^a-z0-9 ]/g,' ');

          var discLow=c.disc.toLowerCase().replace(/[^a-z0-9 ]/g,' ');

          var s=0;

          if(base.indexOf(discLow)>=0) s+=4;

          if(base.indexOf(divLow)>=0) s+=2;

          if(base.indexOf(orgLow)>=0) s+=1;

          if(s>bestScore){ bestScore=s; bestKeys=[c.k]; }

          else if(s===bestScore&&s>0) bestKeys.push(c.k);

        });



        // Accept if we matched at least division (score ≥ 2)

        if(bestScore>=2){

          // If only org+div matched (no discipline, score is 2 or 3):

          //   assign same PDF to ALL disciplines in that org+div

          var keys = bestScore<4

            ? candidates.filter(function(c){

                var divLow=c.div.toLowerCase().replace(/[^a-z0-9 ]/g,' ');

                return base.indexOf(divLow)>=0;

              }).map(function(c){ return c.k; })

            : bestKeys;



          keys.forEach(function(k){ G.scoreLinks[k]=url; });

          if(keys.length) matched++;

        }

      });

      saveResultsToStorage();

      pgResults();

      if(matched<files.length){

        alert('Matched '+matched+' of '+files.length+' PDFs. Use the ✎ Edit button on unmatched classes to link manually.');

      }

    });

    sheetsBtn.addEventListener('click',function(e){ e.stopPropagation(); sheetsInp.click(); });

  }



  // ── Score detail modal (manually entered scores) ─────────────

  window.showScoreDetail=function(ri2){

    var r=clsRows[ri2];

    if(!r||!r._scoreDetail) return;

    var sd=r._scoreDetail;

    var rows=sd.maneuvers.map(function(name,i){

      var m=sd.m[i]||{score:0,pen:0};

      var sc=m.score; var pen=m.pen;

      var scStr=sc===0?'0':(sc>0?'+'+sc:''+sc);

      var scColor=sc>0?'#2ecc71':sc<0?'#e74c3c':'var(--muted)';

      return '<tr>'

        +'<td style="color:var(--muted);font-size:.82rem">'+esc(name)+'</td>'

        +'<td style="text-align:right;font-weight:700;color:'+scColor+'">'+scStr+'</td>'

        +'<td style="text-align:right;color:'+(pen>0?'#e74c3c':'var(--muted)')+'">'+(pen>0?'−'+pen:'—')+'</td>'

        +'<td style="text-align:right;font-size:.8rem;color:var(--accent)">'+(Math.round((70/(sd.maneuvers.length||1)+sc-pen)*1000)/1000)+'</td>'

        +'</tr>';

    }).join('');

    var ms=sd.m.reduce(function(a,x){return a+x.score;},0);

    var ps=sd.m.reduce(function(a,x){return a+x.pen;},0);

    var total=Math.round((70+ms-ps)*1000)/1000;

    var detail=(sd.nrha?'<div style="font-size:.8rem;color:var(--muted);margin-top:.5rem">NRHA: '+(sd.nrha>0?'+':'')+sd.nrha+'</div>':'')

      +(sd.comments?'<div style="font-size:.8rem;color:var(--muted)">'+esc(sd.comments)+'</div>':'');

    var mr2=document.getElementById('modal-root');

    mr2.innerHTML='<div class="modal-overlay" onclick="closeModal()">'

      +'<div class="modal" onclick="event.stopPropagation()" style="max-width:420px">'

      +'<div class="modal-head"><span style="font-family:Oswald;font-size:1rem;color:var(--accent)">'+esc(r.rider)+' — '+esc(r.discipline)+'</span>'

      +'<button class="modal-x" onclick="closeModal()">✕</button></div>'

      +'<div class="modal-body">'

      +'<div style="font-size:.78rem;color:var(--muted);margin-bottom:.6rem">'+esc(r.horse)+'</div>'

      +'<div class="tbl-wrap"><table><thead><tr>'

      +'<th>Maneuver</th><th style="text-align:right">Score</th><th style="text-align:right">Penalty</th><th style="text-align:right">Net</th>'

      +'</tr></thead><tbody>'+rows+'</tbody>'

      +'<tfoot><tr style="border-top:2px solid var(--accent)">'

      +'<td style="font-weight:700">Total</td>'

      +'<td style="text-align:right;color:'+(ms>=0?'#2ecc71':'#e74c3c')+';font-weight:700">'+(ms>0?'+':'')+ms+'</td>'

      +'<td style="text-align:right;color:'+(ps>0?'#e74c3c':'var(--muted)')+'">'+( ps>0?'−'+ps:'—')+'</td>'

      +'<td style="text-align:right;font-family:Oswald;font-size:1.1rem;color:var(--accent);font-weight:700">'+total.toFixed(3)+'</td>'

      +'</tr></tfoot></table></div>'

      +detail

      +'</div></div></div>';

  };



  // ── Inline score editing ──────────────────────────────────────

  pg.addEventListener('click', function(ev){

    var cell=ev.target.closest('.score-cell');

    if(!cell||cell.querySelector('input')) return;

    var ridx=parseInt(cell.dataset.ridx);

    var row=G.results[ridx];

    if(!row) return;

    var cur=row.score||'';

    var inp=document.createElement('input');

    inp.type='number'; inp.step='0.001'; inp.value=cur||'';

    inp.style.cssText='width:75px;background:var(--bg);border:1px solid var(--accent);border-radius:4px;color:var(--text);padding:2px 5px;font-size:.83rem;text-align:right';

    cell.innerHTML='';

    cell.appendChild(inp);

    inp.focus(); inp.select();

    function commit(){

      var val=parseFloat(inp.value);

      if(!isNaN(val)){ row.score=val; } else { row.score=0; }

      saveResultsToStorage();

      pgResults();

    }

    inp.addEventListener('blur', commit);

    inp.addEventListener('keydown', function(e){

      if(e.key==='Enter') inp.blur();

      if(e.key==='Escape'){ inp.removeEventListener('blur',commit); pgResults(); }

    });

  });

}

window.pushToSeasonHub=async function(){

  var c1=document.getElementById('pub-check1');

  var c2=document.getElementById('pub-check2');

  var c3=document.getElementById('pub-check3');

  if(!c1.checked||!c2.checked||!c3.checked){

    document.getElementById('pub-status').innerHTML='<span style="color:var(--red);font-size:.83rem">Please check all boxes to confirm results are ready.</span>';

    return;

  }

  var btn=document.getElementById('pub-btn');

  btn.disabled=true; btn.textContent='Publishing…';

  document.getElementById('pub-status').innerHTML='<span style="color:var(--muted);font-size:.83rem">Writing to Season Hub…</span>';

  try{

    // Upsert all result rows to season_results table

    var payload=G.results.map(function(r){

      return {

        show_id: G.showId,

        association_id: G.assocId||null,

        show_name: r.showName||G.cfg.showName||'',

        org: r.org, division: r.division, discipline: r.discipline,

        raw_class: r.rawClass||'',

        horse: r.horse, rider: r.rider, owner: r.owner||'',

        score: r.score||null, place: r.place||null,

        pts: r.pts||null, money: r.money||null,

        published_at: new Date().toISOString()

      };

    });

    // Build payload first, then delete, then insert — so a build failure never deletes live data
    // Delete existing rows for this show
    await sbDelete('season_results?show_id=eq.'+G.showId);

    // Insert in batches of 200
    for(var i=0;i<payload.length;i+=200){

      await sbFetch('season_results',{method:'POST',body:JSON.stringify(payload.slice(i,i+200))});

    }

    G.publishedAt=new Date().toISOString();

    document.getElementById('pub-status').innerHTML='<span style="color:var(--green);font-size:.83rem">&#10003; '+G.results.length+' rows published to Season Hub.</span>';

    btn.textContent='&#8679; Re-Publish';

    btn.disabled=false;

  } catch(err){

    document.getElementById('pub-status').innerHTML='<span style="color:var(--red);font-size:.83rem">Error: '+esc(err.message)+'</span>';

    btn.textContent='&#8679; Push to Season Hub';

    btn.disabled=false;

    console.error(err);

  }

};

function _wizRender(){

  var stepFns = [_wizS0,_wizS1,_wizS2,_wizS3,_wizS4,_wizS5,_wizS6,_wizS7,_wizS8];
  var labels = ['Show Basics','Hosting Organization','Associations Offered','Per-Org Settings','Class Selection','Fees','Stalling & RV','Extras','Review & Publish'];
  var html = '<div class="wiz-progress"><div class="wiz-progress-bar" style="width:'+pct+'%"></div></div>';
  html += '<div class="wiz-step-label">Step '+(WIZ.step+1)+' of '+WIZ.totalSteps+' — '+labels[WIZ.step]+'</div>';
  el.innerHTML = html;
  el.innerHTML += stepFns[WIZ.step]();

}

function _wizNav(){
  var back = WIZ.step > 0 ? '<button class="btn btn-dark" onclick="wizBack()">&#8592; Back</button>' : '<span></span>';
  var next = WIZ.step < WIZ.totalSteps - 1
    ? '<button class="btn btn-accent" onclick="wizNext()">Next &#8594;</button>'
    : '<button class="btn btn-accent" onclick="commitWizard()">&#10003; Publish Show</button>';
  return '<div class="wiz-nav">'+back+next+'</div>';
}

window.wizBack = function(){ _wizSave(); WIZ.step = Math.max(0, WIZ.step-1); _wizRender(); window.scrollTo(0,0); };
window.wizNext = function(){ _wizSave(); if(!_wizValidate()) return; WIZ.step = Math.min(WIZ.totalSteps-1, WIZ.step+1); _wizRender(); window.scrollTo(0,0); };

function _wizValidate(){

  if(WIZ.step === 0 && !d.showName){ alert('Show name is required.'); return false; }
  if(WIZ.step === 0 && !d.showDate){ alert('Start date is required.'); return false; }
  if(WIZ.step === 2 && d.selectedOrgs.length === 0){ alert('Select at least one association.'); return false; }
  return true;
}

function _wizSave(){

  var d = WIZ.data;

  if(WIZ.step === 0){

      +'</label></div>';

        +'<input class="wiz-inp" style="width:52px" value="'+esc(c.num||'')+'" placeholder="#" onchange="wizClassField('+i+',\'num\',this.value)">'
        +'<input class="wiz-inp" style="flex:1;min-width:120px" value="'+esc(c.name||'')+'" onchange="wizClassField('+i+',\'name\',this.value)">'
        +'<span style="font-size:.75rem;color:var(--muted);white-space:nowrap">'+esc(c.division||'')+'</span>'
        +'<label style="font-size:.75rem;color:var(--muted);display:flex;align-items:center;gap:.2rem;white-space:nowrap">'

  html += '<button class="btn btn-dark btn-sm" style="margin-top:.5rem" onclick="wizRegenClasses()">&#8635; Regenerate from org selections</button>';
  html += '</div>';

}

function _wizGenerateClasses(){
  var d=WIZ.data;
  var classes=[];
  var globalNum=100;
  d.selectedOrgs.forEach(function(org){
    var cfg=d.orgConfig[org]||{};
    var orgLabel=(org==='Jackpot'&&cfg.customName)?cfg.customName:org;
    var numStart=cfg.classNumStart!=null?(parseInt(cfg.classNumStart)||100):null;
    var num=numStart!=null?numStart:globalNum;
    var divs,discs;
    if(org==='Jackpot'){
      divs=(cfg.customDivisions||[]).filter(function(v){return v&&v.trim();});
      if(!divs.length) divs=['Open','Amateur','Youth'];
      discs=cfg.selectedDisciplines||ORG_DISCIPLINES['Jackpot']||[];
    } else {
      divs=cfg.selectedDivisions||ORG_DIVISIONS[org]||[];
      discs=cfg.selectedDisciplines||ORG_DISCIPLINES[org]||[];
    }
    var count=0;
    divs.forEach(function(div){
      discs.forEach(function(disc){
        var isCow=/\b(cut|cow|boxing|box.?drive|working)\b/i.test(disc);
        classes.push({org:orgLabel,division:div,discipline:disc,num:String(num++),name:div+' '+disc,isCow:isCow,enabled:true});
        count++;
      });
    });
    if(numStart==null) globalNum=num;
    else globalNum+=count;
  });
  d.generatedClasses=classes;
}


window.wizRegenClasses = function(){
  WIZ.data.generatedClasses = null;

};
window.wizOrgNumStart = function(org,val){

};
window.wizClassToggle = function(i, val){ if(WIZ.data.generatedClasses[i]) WIZ.data.generatedClasses[i].enabled = val; };
window.wizClassField  = function(i, field, val){
  if(!WIZ.data.generatedClasses[i]) return;
  WIZ.data.generatedClasses[i][field] = (field==='isCow') ? val : val;
};

  var rvLines    = (d.rvPackages||[]).filter(function(p){ return p.label; }).map(function(p){ return esc(p.label)+' — '+fmtAmt(p.price); });
  var allExtras=(d.practiceSessions||[]).concat(d.clinics||[]);
  (d.customSections||[]).forEach(function(sect,si){ allExtras=allExtras.concat(d['customSection_'+si]||sect.items||[]); });
  var extLines=allExtras.filter(function(e){ return e.label; }).map(function(e){ return esc(e.label)+' — '+fmtAmt(e.price)+(e.capacity?' (max '+e.capacity+')':''); });

    +sect('Hosting Org', [esc(d.hostingOrg||'—'), 'Office fee: '+fmtAmt(d.officeAmt)+' ('+esc(d.officeNote)+')'])
    +sect('Associations ('+d.selectedOrgs.length+')', orgLines.length ? orgLines : ['None selected'])
    +sect('Classes ('+clsEnabled.length+' enabled)', clsEnabled.length > 0 ? [clsEnabled.slice(0,6).map(function(c){ return '#'+c.num+' '+esc(c.name); }).join(', ')+(clsEnabled.length>6?' … and '+(clsEnabled.length-6)+' more':'')] : ['No classes generated'])
    +sect('Fees', ['Base: '+fmtAmt(d.fees.classBase)+' / Cattle: '+fmtAmt(d.fees.cowSurcharge)+' / Cutting: '+fmtAmt(d.fees.cuttingSurcharge), d.fees.lateAmt > 0 ? 'Late fee: '+fmtAmt(d.fees.lateAmt)+' after '+esc(d.fees.lateDueDate) : 'No late fee'])
    +(stallLines.length||rvLines.length ? sect('Stalling', stallLines.concat(rvLines)) : '')
    +(extLines.length ? sect('Extras', extLines) : '')

// ── Commit wizard → build G.cfg and save ────────────────────────
window.commitWizard = function(){
  _wizSave();
  var d = WIZ.data;
  if(!d.showName){ alert('Show name is required.'); return; }

  // Build G.cfg from wizard data
  G.cfg.showName  = d.showName;
  G.cfg.showDate  = d.showDate;
  G.cfg.showDate2 = d.showDate2 || '';
  G.cfg.location  = d.location;
  G.cfg.secretary = d.secretary;
  G.cfg.email     = d.email;
  G.cfg.hostingOrg = d.hostingOrg;

  // Fee schedule
  var fmtS = function(key,label,cat,amt){ return {key:key,label:label,cat:cat,amt:amt||0}; };
  G.cfg.feeSchedule = [
    fmtS('classBase','Base Class Fee','class',d.fees.classBase),
    fmtS('cowSurcharge','Cattle Fee (Cow Work classes)','class',d.fees.cowSurcharge),
    fmtS('cuttingSurcharge','Cutting Fee (Cutting classes)','class',d.fees.cuttingSurcharge),
    fmtS('jackpot','Jackpot Fee','class',d.fees.jackpot),
    fmtS('office','Office Fee (per entry)','office',d.officeAmt),
    fmtS('late','Late Entry Fee','office',d.fees.lateAmt),
  ];
  // Per-org membership prices
  d.selectedOrgs.forEach(function(org){
    var mp = (d.orgConfig[org]||{}).membPrices||{};
    if(mp.yr1  > 0) G.cfg.feeSchedule.push(fmtS('membership1yr_'+org, org+' — 1-Year Membership','member',mp.yr1));
    if(mp.yr3  > 0) G.cfg.feeSchedule.push(fmtS('membership3yr_'+org, org+' — 3-Year Membership','member',mp.yr3));
    if(mp.life > 0) G.cfg.feeSchedule.push(fmtS('membershipLife_'+org, org+' — Lifetime Membership','member',mp.life));
  });
  // Sync fees flat object
  G.cfg.fees = {};
  G.cfg.feeSchedule.forEach(function(f){ if(f.key) G.cfg.fees[f.key] = f.amt; });
  G.cfg.fees.lateEntryDeadline = d.fees.lateDueDate;

  // Assoc fees from orgConfig
  G.cfg.assocFees = [];
  d.selectedOrgs.forEach(function(org){
    (d.orgConfig[org]&&d.orgConfig[org].adminFees||[]).forEach(function(af){
      if(af.desc||af.amt) G.cfg.assocFees.push({id:'af_'+Date.now()+'_'+Math.random(),org:org,desc:af.desc,amt:af.amt,per:af.per||'entry',disciplines:[]});
    });
  });

  // Classes from wizard
  G.cfg.classes = (d.generatedClasses||[]).filter(function(c){ return c.enabled !== false; }).map(function(c,i){
    return {_id:'cr'+(i+1),num:c.num||String(i+1),name:c.name||'',division:c.division||'',org:c.org||'CoWN',isCow:!!c.isCow,baseFee:null,cowFee:null,jackpot:null,addedMoney:null};
  });

  // Stalling/RV packages, clinics, practice sessions, custom sections
  G.cfg.stallingPackages  = d.stallingPackages;
  G.cfg.rvPackages        = d.rvPackages;
  G.cfg.practiceSessions  = d.practiceSessions;
  G.cfg.clinicOptions     = d.clinics;
  G.cfg.customSections    = (d.customSections||[]).map(function(sect,si){
    return {name:sect.name,items:(d['customSection_'+si]||sect.items||[])};
  });
  G.cfg.classPkgs         = [];
  G.cfg.extraFees         = [];

  // Selected orgs + org config stored for entry form
  G.cfg.selectedOrgs = d.selectedOrgs;
  G.cfg.orgConfig    = d.orgConfig;
  G.cfg.hostingOrg   = d.hostingOrg;

  // Save locally
  try{ localStorage.setItem('gatepost_cfg', JSON.stringify(G.cfg)); } catch(e){}

  // Save as org template (for future shows)
  try{ localStorage.setItem('gp_org_template_'+(d.hostingOrg||'default'), JSON.stringify({feeSchedule:G.cfg.feeSchedule,assocFees:G.cfg.assocFees,orgConfig:d.orgConfig,selectedOrgs:d.selectedOrgs,stallingPackages:d.stallingPackages,rvPackages:d.rvPackages})); } catch(e){}

  if(!G.showId){ alert('No show is loaded. Create a show first, then run the wizard.'); return; }

  var feeConfig = Object.assign({}, G.cfg.fees, {
    _schedule:         G.cfg.feeSchedule,
    _extraFees:        [],
    _assocFees:        G.cfg.assocFees,
    _classPkgs:        [],
    _practiceSessions: G.cfg.practiceSessions,
    _clinicOptions:    G.cfg.clinicOptions,
    _stallingPackages:  G.cfg.stallingPackages,
    _rvPackages:        G.cfg.rvPackages,
    _customSections:    G.cfg.customSections,
    _selectedOrgs:      d.selectedOrgs,
    _orgConfig:        d.orgConfig,
    _hostingOrg:       d.hostingOrg,
  });

  sbFetch('shows?id=eq.'+G.showId, {method:'PATCH', body:JSON.stringify({
    name: d.showName,
    date: d.showDate,
    location: d.location,
    status: 'entries_open',
    fee_config: feeConfig,
  })})
  .then(function(){
    return syncShowClassesToSupabase();
  })
  .then(function(){
    toast('Show published! Entry form is now live.');
    showPage('entries');
  })
  .catch(function(e){
    toast('Saved locally — DB error: '+(e&&e.message||e), true);
    showPage('entries');
  });
};

function pgWizard_loadTemplate(){
  // Load the org template saved from a previous show (if any)
  var key = 'gp_org_template_'+(G.cfg&&G.cfg.hostingOrg||'default');
  try {
    var t = JSON.parse(localStorage.getItem(key)||'null');
    if(!t) return false;
    if(t.selectedOrgs) WIZ.data.selectedOrgs = t.selectedOrgs;
    if(t.orgConfig) WIZ.data.orgConfig = t.orgConfig;
    if(t.stallingPackages) WIZ.data.stallingPackages = t.stallingPackages;
    if(t.rvPackages) WIZ.data.rvPackages = t.rvPackages;
    if(t.feeSchedule){
      var fee = WIZ.data.fees;
      t.feeSchedule.forEach(function(f){
        if(f.key==='classBase') fee.classBase=f.amt;
        if(f.key==='cowSurcharge') fee.cowSurcharge=f.amt;
        if(f.key==='cuttingSurcharge') fee.cuttingSurcharge=f.amt;
        if(f.key==='office') fee.office=f.amt;
        if(f.key==='late') fee.lateAmt=f.amt;
      });
    }
    return true;
  } catch(e){ return false; }
}

function saveShowStatus(){
  var sel = document.getElementById('ef-status');
  if(!sel) return;
  var newStatus = sel.value;
  if(!G.showId){ toast('No show ID — save the show first', true); return; }
  sbFetch('shows?id=eq.'+G.showId, {method:'PATCH', body:JSON.stringify({status: newStatus})})
    .then(function(){
      G.cfg.showStatus = newStatus;
      try{ localStorage.setItem('gatepost_cfg', JSON.stringify(G.cfg)); } catch(e){}
      toast('Show status set to: '+newStatus);
      renderEntryFormStab();
    })
    .catch(function(e){ toast('Save failed: '+e.message, true); });
}

function saveEntryDeadline(){
  var dl = document.getElementById('ef-deadline');
  if(!dl) return;
  var val = dl.value || null;
  if(!G.showId){ toast('No show ID — save the show first', true); return; }
  sbFetch('shows?id=eq.'+G.showId, {method:'PATCH', body:JSON.stringify({entry_deadline: val})})
    .then(function(){
      G.cfg.entryDeadline = val || '';
      try{ localStorage.setItem('gatepost_cfg', JSON.stringify(G.cfg)); } catch(e){}
      toast(val ? 'Entry deadline set to '+val : 'Entry deadline cleared');
    })
    .catch(function(e){ toast('Save failed: '+e.message, true); });
}

function copyEntryFormUrl(){
  var inp = document.getElementById('ef-url-input');
  if(!inp) return;
  navigator.clipboard.writeText(inp.value).then(function(){
    toast('Entry form link copied to clipboard');
  }).catch(function(){
    inp.select();
    document.execCommand('copy');
    toast('Link copied');
  });
}

window.toggleAssocOrg = function(org){
  var cb = document.getElementById('assoc-cb-'+org);
  var lbl = document.getElementById('assoc-lbl-'+org);
  if(!cb) return;
  cb.checked = !cb.checked;
  if(lbl) lbl.style.borderColor = cb.checked ? 'var(--accent)' : 'var(--border2)';
};

window.saveAssocOrgs = function(){
  var checked = [];
  Object.keys(ORG_META).forEach(function(org){
    var cb = document.getElementById('assoc-cb-'+org);
    if(cb && cb.checked) checked.push(org);
  });
  G.cfg.showOrgs = checked;
  try{ localStorage.setItem('gatepost_cfg', JSON.stringify(G.cfg)); } catch(e){}
  if(G.showId){
    sbFetch('shows?id=eq.'+G.showId, {method:'PATCH', body:JSON.stringify({org_list: checked})})
      .then(function(){ toast('Associations saved'); })
      .catch(function(e){ toast('Saved locally (DB sync failed: '+e.message+')', true); });
  } else {
    toast('Associations saved locally');
  }
};

function showStab(id,btn){

  document.querySelectorAll('.ssec').forEach(function(s){ s.classList.remove('active'); });

  document.querySelectorAll('.stab').forEach(function(b){ b.classList.remove('active'); });

  document.getElementById('ss-'+id).classList.add('active');

  btn.classList.add('active');

  if(id==='orgs'){ renderAssocTab(); }

  if(id==='entryform') renderEntryFormStab();

  if(id==='mapper') tryRestoreMapper();

  if(id==='resmapper') tryRestoreResMapper();

  if(id==='classes'){ CFG_ORG_FILTER=''; if(G.cfg.classes&&G.cfg.classes.length) renderCfgClassTable(); }

}



function tryRestoreMapper(){

  var out=document.getElementById('mapper-out');

  if(!out||!out.classList.contains('hidden')) return;

  if(G.cfg.mapHeaders&&G.cfg.mapHeaders.length&&Object.keys(G.cfg.colMap||{}).length){

    MAP_HEADERS=G.cfg.mapHeaders.slice();

    ACTIVE_MAP=Object.assign({},G.cfg.colMap);

    buildMapperUI();

    // Hide upload card — saved mapping is already loaded
    var ssMapper=document.getElementById('ss-mapper');
    var uploadCard=ssMapper?ssMapper.querySelector('.card'):null;
    if(uploadCard) uploadCard.style.display='none';

    var note=document.createElement('div');
    note.style.cssText='font-size:.78rem;color:var(--muted);margin-bottom:.5rem;display:flex;align-items:center;gap:.6rem';
    note.innerHTML='<span style="color:var(--green)">&#10003; Saved column map loaded.</span>'
      +'<button class="btn btn-dark btn-sm" style="font-size:.75rem" onclick="'
      +'var c=document.querySelector(\'#ss-mapper .card\');if(c)c.style.display=\'\';this.closest(\'div\').remove()'
      +'">Re-upload file</button>';

    var firstCard=document.querySelector('#mapper-out .card');
    if(firstCard) firstCard.parentNode.insertBefore(note, firstCard);

  }

}

function setupResMapDrop(){

  var dz=document.getElementById('resmap-dz'), fi=document.getElementById('resmap-fi');

  if(!dz||!fi) return;

  dz.addEventListener('click',function(){ fi.click(); });

  fi.addEventListener('change',function(e){ if(e.target.files[0]) loadResMapFile(e.target.files[0]); });

  dz.addEventListener('dragover',function(e){ e.preventDefault(); dz.classList.add('drag'); });

  dz.addEventListener('dragleave',function(){ dz.classList.remove('drag'); });

  dz.addEventListener('drop',function(e){ e.preventDefault(); dz.classList.remove('drag'); if(e.dataTransfer.files[0]) loadResMapFile(e.dataTransfer.files[0]); });

}



function loadResMapFile(file){

  var ext=(file.name||'').split('.').pop().toLowerCase();

  var reader=new FileReader();

  reader.onerror=function(){ toast('File read error',true); };

  if(ext==='txt'||ext==='csv'){

    reader.onload=function(e){

      var lines=e.target.result.split(/\r?\n/).filter(function(l){ return l.trim(); });

      if(!lines.length){ toast('Empty file',true); return; }

      RES_MAP_HEADERS=lines[0].split('\t');

      buildResMapperUI();

    };

    reader.readAsText(file);

  } else {

    reader.onload=function(e){

      try{

        var wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});

        var ws=wb.Sheets[wb.SheetNames[0]];

        // prefer sheet with classdivision column

        for(var si=0;si<wb.SheetNames.length;si++){

          var cws=wb.Sheets[wb.SheetNames[si]];

          var chdr=(XLSX.utils.sheet_to_json(cws,{header:1,defval:''})[0]||[]);

          if(chdr.some(function(h){ return /classdiv/i.test(String(h)); })){ ws=cws; break; }

        }

        RES_MAP_HEADERS=XLSX.utils.sheet_to_json(ws,{header:1,defval:''})[0]||[];

        buildResMapperUI();

      } catch(err){ toast('Error: '+err.message,true); }

    };

    reader.readAsArrayBuffer(file);

  }

}



function buildResMapperUI(){

  RES_ACTIVE_MAP={};

  var autoCount=0;

  var html='<div class="form-row">';

  RES_ROLES.forEach(function(role){

    var found=-1;

    RES_MAP_HEADERS.forEach(function(h,i){

      if(found===-1){

        var hs=String(h||'');

        for(var j=0;j<role.hints.length;j++){

          if(role.hints[j].test(hs)){ found=i; break; }

        }

      }

    });

    // also try normalizeHeader match

    if(found===-1){

      RES_MAP_HEADERS.forEach(function(h,i){

        if(found===-1&&normalizeHeader(String(h||''))===role.id) found=i;

      });

    }

    if(found>-1){ RES_ACTIVE_MAP[found]=role.id; autoCount++; }

    var opts=RES_MAP_HEADERS.map(function(h,i){

      return h!=null?'<option value="'+i+'"'+(i===found?' selected':'')+'>Col '+i+': '+esc(String(h).substring(0,50))+'</option>':'';

    }).join('');

    var autoMark=found>-1?'<span style="color:var(--green);font-size:.68rem"> &#10003; auto</span>':'<span style="color:var(--muted);font-size:.68rem"> not found</span>';

    html+='<div class="form-group"><label>'+esc(role.label)+autoMark+'</label>'

      +'<select onchange="RES_ACTIVE_MAP[this.value]=\''+role.id+'\'" '

      +'style="background:var(--bg);border:1px solid var(--border2);border-radius:5px;color:var(--text);padding:.35rem .5rem;font-size:.78rem">'

      +'<option value="-1">— Not in this file —</option>'+opts+'</select></div>';

  });

  html+='</div>';

  var ac=document.getElementById('resmap-auto-count');

  if(ac) ac.textContent=autoCount+' auto-detected';

  document.getElementById('resmap-fields').innerHTML=html;

  document.getElementById('resmapper-out').classList.remove('hidden');

}

var _orgEdSel = 'CoWN';  // currently selected org in editor



var ORG_CONFIG_VERSION=3; // bump when factory defaults change in a breaking way

function loadOrgConfig(){

  try{

    var saved=localStorage.getItem('gp_org_classes');

    if(saved){

      var parsed=JSON.parse(saved);

      // If saved data predates current version, discard it so new defaults apply

      if((parsed._v||0)<ORG_CONFIG_VERSION){

        localStorage.removeItem('gp_org_classes');

        return;

      }

      // Remove internal version key before merging

      delete parsed._v;

      // Merge saved into ORG_CLASSES (replace each key if present)

      Object.keys(parsed).forEach(function(k){ ORG_CLASSES[k]=parsed[k]; });

      // Backfill new default properties that didn't exist in older saves
      Object.keys(DEFAULT_ORG_CLASSES).forEach(function(k){
        if(ORG_CLASSES[k]){
          Object.keys(DEFAULT_ORG_CLASSES[k]).forEach(function(prop){
            if(ORG_CLASSES[k][prop]===undefined) ORG_CLASSES[k][prop]=DEFAULT_ORG_CLASSES[k][prop];
          });
        }
      });

      // Rebuild DIV_ORDER_BY_ORG from ORG_CLASSES

      Object.keys(ORG_CLASSES).forEach(function(k){ DIV_ORDER_BY_ORG[k]=ORG_CLASSES[k].divisions; });

      // Rebuild ORG_ORDER

      var savedKeys=Object.keys(parsed);

      savedKeys.forEach(function(k){ if(ORG_ORDER.indexOf(k)<0) ORG_ORDER.push(k); });

    }

  } catch(e){ console.warn('Could not load org config:', e); }

}



function saveOrgConfig(silent){

  try{

    var toSave=JSON.parse(JSON.stringify(ORG_CLASSES));

    toSave._v=ORG_CONFIG_VERSION;

    localStorage.setItem('gp_org_classes', JSON.stringify(toSave));

    Object.keys(ORG_CLASSES).forEach(function(k){ DIV_ORDER_BY_ORG[k]=ORG_CLASSES[k].divisions; });

    if(!silent) toast('Association structure saved.');

  } catch(e){ alert('Save failed: '+e.message); }

}



function resetOrgConfig(){

  if(!confirm('Reset ALL association structure to built-in defaults? This cannot be undone.')) return;

  localStorage.removeItem('gp_org_classes');

  location.reload();

}



function _orgDivSuggestions(sel){

  // Canonical divisions for this org from factory defaults, minus already-added ones

  var cfg=ORG_CLASSES[sel]||{};

  var defaults=(DEFAULT_ORG_CLASSES[sel]||{}).divisions||[];

  // Also collect from all defaults for a broad pool

  var all=[];

  Object.values(DEFAULT_ORG_CLASSES).forEach(function(c){ (c.divisions||[]).forEach(function(d){ if(all.indexOf(d)<0) all.push(d); }); });

  // Prioritise defaults for this org, then others

  var pool=defaults.slice();

  all.forEach(function(d){ if(pool.indexOf(d)<0) pool.push(d); });

  return pool.filter(function(d){ return (cfg.divisions||[]).indexOf(d)<0; });

}

function _orgDiscSuggestions(sel){

  var cfg=ORG_CLASSES[sel]||{};

  var defaults=(DEFAULT_ORG_CLASSES[sel]||{}).disciplines||[];

  var all=[];

  Object.values(DEFAULT_ORG_CLASSES).forEach(function(c){ (c.disciplines||[]).forEach(function(d){ if(all.indexOf(d)<0) all.push(d); }); });

  var pool=defaults.slice();

  all.forEach(function(d){ if(pool.indexOf(d)<0) pool.push(d); });

  return pool.filter(function(d){ return (cfg.disciplines||[]).indexOf(d)<0; });

}

  if(!confirm('Remove org "'+o+'" and all its divisions/disciplines? This only affects Thorofare\'s class structure — no show data is deleted.')) return;

  delete ORG_CLASSES[o];

  delete DIV_ORDER_BY_ORG[o];

  var idx=ORG_ORDER.indexOf(o);

  if(idx>=0) ORG_ORDER.splice(idx,1);

  _orgEdSel='CoWN';

  saveOrgConfig(true); renderOrgEditor();

};



window.orgEdRenameOrg=function(o){

  DIV_ORDER_BY_ORG[newName]=DIV_ORDER_BY_ORG[o];

  delete ORG_CLASSES[o];

  delete DIV_ORDER_BY_ORG[o];

  var idx=ORG_ORDER.indexOf(o);

  if(idx>=0) ORG_ORDER[idx]=newName; else ORG_ORDER.push(newName);

window.orgEdRemoveAaReqGroup=function(o,groupIdx){

window.orgEdAddDisc=function(o){

window.orgEdMoveDisc=function(o,i,dir){

var CFG_ORG_FILTER='';

function renderCfgClassTable(){

  var tbody=document.getElementById('cfg-cls-tbody');

  if(!tbody) return;

  var lbl=document.getElementById('cls-count');

  if(lbl) lbl.textContent=G.cfg.classes.length+' classes';

  if(!G.cfg.classes.length){ tbody.innerHTML='<tr><td colspan="10" class="empty-state">No classes loaded.</td></tr>'; return; }

  // Build org tabs
  var orgs=[]; G.cfg.classes.forEach(function(c){ var o=c.org||'CoWN'; if(orgs.indexOf(o)<0) orgs.push(o); });
  if(!CFG_ORG_FILTER) CFG_ORG_FILTER=orgs[0]||'';
  var tabEl=document.getElementById('cls-org-tabs');
  if(tabEl){
    var tabHtml='';
    orgs.forEach(function(o){
      var m=ORG_META&&ORG_META[o]; var lbl=m?m.label:o;
      tabHtml+='<span class="cls-org-tab'+(CFG_ORG_FILTER===o?' active':'')+'" onclick="setCfgOrgFilter(\''+esc(o)+'\',this)">'+(m&&m.icon?m.icon+' ':'')+esc(lbl)+'</span>';
    });
    tabEl.innerHTML=tabHtml;
  }

  var filtered=G.cfg.classes.filter(function(c){ return !CFG_ORG_FILTER||(c.org||'CoWN')===CFG_ORG_FILTER; });

  var byDiv={};

  filtered.forEach(function(c){

    var k=c.division||'General';

    if(!byDiv[k]) byDiv[k]=[];

    byDiv[k].push(c);

  });

  var html='';

  Object.keys(byDiv).sort().forEach(function(div){

    html+='<tr class="div-hdr"><td colspan="10">'+esc(div)+'</td></tr>';

    byDiv[div].forEach(function(c){

      var total=calcCfgTotal(c);

      html+='<tr data-cid="'+c._id+'">'

        +'<td><input type="text" value="'+escH(c.num)+'" onchange="updCls(\''+c._id+'\',\'num\',this.value)" style="width:58px"></td>'

        +'<td><input type="text" value="'+escH(c.name)+'" onchange="updCls(\''+c._id+'\',\'name\',this.value)"></td>'

        +'<td><input type="text" value="'+escH(c.division||'')+'" onchange="updCls(\''+c._id+'\',\'division\',this.value)"></td>'

        +'<td><select onchange="updCls(\''+c._id+'\',\'org\',this.value)" style="background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:3px;font-size:.78rem;width:100%">'

        +ORG_ORDER.concat(['Other']).map(function(o){ return '<option value="'+o+'"'+(c.org===o?' selected':'')+'>'+o+'</option>'; }).join('')

        +'</select></td>'

        +'<td style="text-align:center"><input type="checkbox"'+(c.isCow?' checked':'')+' onchange="updCls(\''+c._id+'\',\'isCow\',this.checked);refreshCfgRow(\''+c._id+'\')"></td>'

        +'<td>'+feeInp(c._id,'baseFee',c.baseFee,'30')+'</td>'

        +'<td>'+feeInp(c._id,'cowFee',c.cowFee,c.isCow?'15':'n/a',!c.isCow)+'</td>'

        +'<td>'+feeInp(c._id,'jackpot',c.jackpot,'0')+'</td>'

        +'<td style="text-align:center;font-weight:600;color:var(--accent);font-size:.8rem" id="ct-'+c._id+'">'+fmtI(total)+'</td>'

        +'<td><button class="btn btn-red btn-sm" onclick="delCls(\''+c._id+'\')">&#10005;</button></td>'

        +'</tr>';

    });

  });

  tbody.innerHTML=html;

  renderAAPrizeCfg();

}

    root.innerHTML='<p style="font-size:.83rem;color:var(--muted)">No All Around-enabled orgs. Enable All Around in the Associations tab.</p>';

    return;

  }

  // Get divisions actually present in classes

  var classedDivs={};

  G.cfg.classes.forEach(function(c){

    var o=c.org||'CoWN';

    if(!classedDivs[o]) classedDivs[o]=[];

    if(c.division&&classedDivs[o].indexOf(c.division)<0) classedDivs[o].push(c.division);

  });

  var html='<p style="font-size:.78rem;color:var(--muted);margin-bottom:.75rem">Enter a total added money amount — payout splits automatically based on number of eligible riders (e.g. 4 eligible → 40/30/20/10).</p>';

        +'<span style="font-size:.85rem;font-weight:600;min-width:160px;color:var(--text)">'+esc(o)+' '+esc(div)+'</span>'

        +'<label style="display:flex;align-items:center;gap:.3rem;font-size:.83rem;color:var(--muted)">Added Money $'

        +'<input type="number" min="0" step="1" value="'+total+'" '

        +'oninput="updAAPrize(\''+key.replace(/'/g,"\\'")+'\',this.value)" '

        +'style="width:6rem;background:var(--bg);border:1px solid var(--border2);color:var(--text);border-radius:4px;padding:.18rem .28rem;font-size:.85rem"></label>'

        +'</div>';

    });

  });

function setupClassDrop(){

  var dz=document.getElementById('cls-dz'), fi=document.getElementById('cls-fi');

  if(!dz||!fi) return;

  dz.addEventListener('click',function(){ fi.click(); });

  fi.addEventListener('change',function(e){ if(e.target.files[0]) loadCfgClassFile(e.target.files[0]); });

  dz.addEventListener('dragover',function(e){ e.preventDefault(); dz.classList.add('drag'); });

  dz.addEventListener('dragleave',function(){ dz.classList.remove('drag'); });

  dz.addEventListener('drop',function(e){ e.preventDefault(); dz.classList.remove('drag'); if(e.dataTransfer.files[0]) loadCfgClassFile(e.dataTransfer.files[0]); });

}



function loadCfgClassFile(file){

  var reader=new FileReader();

  reader.onload=function(e){

    try{

      var wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});

      var ws=wb.Sheets[wb.SheetNames[0]];

      var raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});

      var headers=raw[0], data=raw.slice(1).filter(function(r){ return r[4]; });

      var classMap={};

      headers.forEach(function(h,i){

        if(!h||!isClassCol(String(h))) return;

        var div=extractDivName(String(h)), org=detectOrg(String(h));

        data.forEach(function(row){

          var val=row[i];

          if(!val||!String(val).trim()) return;

          String(val).split(',').forEach(function(cls){

            cls=cls.replace(/\xa0/g,' ').trim(); if(!cls) return;

            var m=cls.match(/^(\d+)[\s\-–]+(.+)$/);

            if(m){

              var num=m[1].trim();

              if(!classMap[num]){

                CFG_ROW_ID++;

                var isCow=COW_WORDS.some(function(k){ return m[2].toLowerCase().indexOf(k)>-1; });

                classMap[num]={_id:'cr'+CFG_ROW_ID,num:num,name:m[2].trim(),division:div,org:org,isCow:isCow,baseFee:null,cowFee:null,jackpot:null,addedMoney:null};

              }

            }

          });

        });

      });

      var newCls=Object.values(classMap).sort(function(a,b){ return (parseInt(a.num)||999)-(parseInt(b.num)||999); });

      var existing=G.cfg.classes.map(function(c){ return c.num; });

      var added=0;

      newCls.forEach(function(c){ if(existing.indexOf(c.num)===-1){ G.cfg.classes.push(c); added++; } });

      renderCfgClassTable();

function setupMapDrop(){

  var dz=document.getElementById('map-dz'), fi=document.getElementById('map-fi');

  if(!dz||!fi) return;

  dz.addEventListener('click',function(){ fi.click(); });

  fi.addEventListener('change',function(e){ if(e.target.files[0]) loadMapFile(e.target.files[0]); });

  dz.addEventListener('dragover',function(e){ e.preventDefault(); dz.classList.add('drag'); });

  dz.addEventListener('dragleave',function(){ dz.classList.remove('drag'); });

  dz.addEventListener('drop',function(e){ e.preventDefault(); dz.classList.remove('drag'); if(e.dataTransfer.files[0]) loadMapFile(e.dataTransfer.files[0]); });

function loadMapFile(file){

  var reader=new FileReader();

  reader.onload=function(e){

    try{

      var wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});

      MAP_HEADERS=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:null})[0];

      buildMapperUI();

    } catch(err){ toast('Error: '+err.message,true); }

  };

  reader.readAsArrayBuffer(file);

}



function autoDetectRole(h,roles){

  var hs=String(h||'');

  for(var i=0;i<roles.length;i++){

    for(var j=0;j<roles[i].hints.length;j++){

      if(roles[i].hints[j].test(hs)) return roles[i].id;

    }

  }

  return null;

}



function buildMapperUI(){

  ACTIVE_MAP={};

  var mapped=new Set();

  var coreHTML='<div class="form-row">', housingHTML='<div class="form-row">';

  var autoCount=0;



  CORE_ROLES.forEach(function(role){

    var found=-1;

    MAP_HEADERS.forEach(function(h,i){ if(found===-1&&autoDetectRole(h,[role])===role.id){ found=i; } });

    if(found>-1){ ACTIVE_MAP[found]=role.id; mapped.add(found); autoCount++; }

    coreHTML+=mapSelect(role.id,role.label,found,found>-1);

  });

  coreHTML+='</div>';



  var divHTML='<div style="overflow-x:auto"><table class="cfg-tbl"><thead><tr>'

    +'<th>Column Header</th><th>Role</th><th>Division Name</th><th>Org</th></tr></thead><tbody>';

  MAP_HEADERS.forEach(function(h,i){

    if(!h) return;

    var hs=String(h).replace(/\xa0/g,' ');

    if(isClassCol(hs)||isCowCountCol(hs)){

      mapped.add(i);

      var isCow=isCowCountCol(hs);

      var div=extractDivName(hs), org=detectOrg(hs);

      ACTIVE_MAP[i]=isCow?'cow_count:'+div:'div_classes:'+div;

      divHTML+='<tr><td class="small" style="color:var(--muted)">'+escH(hs.substring(0,60))+'</td>'

        +'<td>'+(isCow?'<span class="badge b-cow">Cow Count</span>':'<span class="badge b-blue">Class Entries</span>')+'</td>'

        +'<td>'+(isCow?'<span class="badge b-gray">—</span>':'<input type="text" value="'+escH(div)+'" onchange="ACTIVE_MAP['+i+']=\'div_classes:\'+this.value" style="background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:3px 7px;font-size:.78rem;width:100%">')+'</td>'

        +'<td><select onchange="ACTIVE_MAP['+i+']=ACTIVE_MAP['+i+'].split(\':\')[0]+\':\'+ACTIVE_MAP['+i+'].split(\':\')[1]+\':org:\'+this.value" style="background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:3px;font-size:.78rem">'

        +ORG_ORDER.concat(['Other']).map(function(o){ return '<option value="'+o+'"'+(o===org?' selected':'')+'>'+o+'</option>'; }).join('')

        +'</select></td></tr>';

    }

  });

  divHTML+='</tbody></table></div>';



  HOUSING_ROLES.forEach(function(role){

    var found=-1;

    MAP_HEADERS.forEach(function(h,i){ if(found===-1&&autoDetectRole(h,[role])===role.id){ found=i; } });

    if(found>-1){ ACTIVE_MAP[found]=role.id; mapped.add(found); autoCount++; }

    housingHTML+=mapSelect(role.id,role.label,found,found>-1);

  });

  housingHTML+='</div>';



  var unmapped=[];

  MAP_HEADERS.forEach(function(h,i){

    if(h&&!mapped.has(i)&&!IGNORE_PAT.some(function(p){ return p.test(String(h)); })) unmapped.push({i:i,h:String(h)});

  });

  var unmappedHTML='';

  if(!unmapped.length){ unmappedHTML='<p style="color:var(--green);font-size:.84rem">&#10003; All columns accounted for.</p>'; }

  else{

    unmappedHTML='<div class="form-row">';

    var otherOpts='<option value="">— Ignore —</option><option value="practice">Practice Session</option><option value="clinic">Clinic Choice</option><option value="jackpot">Jackpot</option><option value="notes">Notes</option>';

    unmapped.forEach(function(col){

        +'<select onchange="ACTIVE_MAP['+col.i+']=this.value" style="background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);padding:.35rem .5rem;font-size:.78rem">'+otherOpts+'</select></div>';

    });

  }



  var ac=document.getElementById('map-auto-count');

  if(ac) ac.textContent=autoCount+' auto-detected';

  document.getElementById('map-housing').innerHTML=housingHTML;

  document.getElementById('map-unmapped').innerHTML=unmappedHTML;

function feeLabel(key){
  var sched = G.cfg.feeSchedule;
  if(sched){
    var e = sched.find(function(f){ return f.key===key; });
    if(e) return e.label;
  }
  var d = DEFAULT_FEE_SCHEDULE.find(function(f){ return f.key===key; });
  return d ? d.label : key;
}

function initFeeSchedule(){
  if(!G.cfg.feeSchedule){
    G.cfg.feeSchedule = DEFAULT_FEE_SCHEDULE.map(function(f){
      var amt = (G.cfg.fees && G.cfg.fees[f.key]!==undefined) ? G.cfg.fees[f.key] : f.amt;
      return {key:f.key, label:f.label, amt:amt, cat:f.cat};
    });
    (G.cfg.extraFees||[]).forEach(function(ef){
      G.cfg.feeSchedule.push({key:null, label:ef.label, amt:ef.amt||0, cat:'custom'});
    });
  } else {
    // Backfill any DEFAULT_FEE_SCHEDULE keys missing from a previously saved schedule
    DEFAULT_FEE_SCHEDULE.forEach(function(def){
      var exists = G.cfg.feeSchedule.some(function(f){ return f.key === def.key; });
      if(!exists){
        var amt = (G.cfg.fees && G.cfg.fees[def.key]!=null) ? G.cfg.fees[def.key] : def.amt;
        G.cfg.feeSchedule.push({key:def.key, label:def.label, amt:amt, cat:def.cat});
      }
    });
  }
}

function _getShowOrgs(){
  var base = ['CoWN','VRH','AQHA Ranch','AQHA RHC','APHA','WHSR','Jackpot'];
  var fromClasses = (G.cfg.classes||[]).map(function(c){ return c.org; }).filter(Boolean);
  var combined = base.concat(fromClasses);
  return combined.filter(function(o,i){ return combined.indexOf(o)===i; });
}

window.saveFeeSchedule = function(){
  initFeeSchedule();
  var sched = G.cfg.feeSchedule;
  DEFAULT_FEE_SCHEDULE.forEach(function(d){ G.cfg.fees[d.key] = 0; });
  var extras = [];
  sched.forEach(function(f){
    if(f.key){
      G.cfg.fees[f.key] = f.amt;
    } else {
      if(f.label) extras.push({label:f.label, amt:f.amt||0, cat:f.cat||'custom'});
    }
  });
  G.cfg.extraFees = extras;
  if(!G.cfg.assocFees) G.cfg.assocFees = [];
  try{ localStorage.setItem('gatepost_cfg', JSON.stringify(G.cfg)); } catch(e){}
  if(G.showId){
    var feeConfig = Object.assign({}, G.cfg.fees, {
      _schedule:         G.cfg.feeSchedule||null,
      _extraFees:        G.cfg.extraFees||[],
      _assocFees:        G.cfg.assocFees||[],
      _classPkgs:        G.cfg.classPkgs||[],
      _practiceSessions: G.cfg.practiceSessions||[],
      _clinicOptions:    G.cfg.clinicOptions||[]
    });
    sbFetch('shows?id=eq.'+G.showId, {method:'PATCH', body:JSON.stringify({fee_config:feeConfig})})
      .then(function(){ toast('Fee schedule saved'); })
      .catch(function(e){ toast('Saved locally (DB error: '+e.message+')', true); });
  } else {
    toast('Fee schedule saved');
  }
  if(typeof renderCfgClassTable === 'function' && G.cfg.classes && G.cfg.classes.length) renderCfgClassTable();
  if(G.showId && G.cfg.classes && G.cfg.classes.length) syncShowClassesToSupabase().catch(function(){});
};

function saveConfig(){

  G.cfg.showName  = v('cfg-show-name');

  G.cfg.showDate  = v('cfg-show-date');

  G.cfg.location  = v('cfg-show-location');

  G.cfg.secretary = v('cfg-secretary');

  G.cfg.email     = v('cfg-email');

  if(!G.cfg.feeSchedule) G.cfg.fees = readFeesFromUI();

  try{ localStorage.setItem('gatepost_cfg',JSON.stringify(G.cfg)); } catch(e){}



  // Write show info changes back to Supabase

  if(G.showId){

    var updates = {

      name:       G.cfg.showName,

      show_date:  G.cfg.showDate || null,

      location:   G.cfg.location || null,

      fee_config: Object.assign({}, G.cfg.fees, {_schedule:G.cfg.feeSchedule||null, _extraFees:G.cfg.extraFees||[], _assocFees:G.cfg.assocFees||[], _classPkgs:G.cfg.classPkgs||[], _practiceSessions:G.cfg.practiceSessions||[], _clinicOptions:G.cfg.clinicOptions||[], _stallingPackages:G.cfg.stallingPackages||[], _rvPackages:G.cfg.rvPackages||[], _selectedOrgs:G.cfg.selectedOrgs||[]}),

    };

    sbFetch('shows?id=eq.'+G.showId, {method:'PATCH', body:JSON.stringify(updates)})

      .then(function(){

        // Update sidebar pill with new name/location

        document.getElementById('show-pill').innerHTML =

          '<div class="sp-name">'+esc(G.cfg.showName)+'</div>'

          +'<div class="sp-meta">'+(G.cfg.showDate||'')+(G.cfg.location?' &middot; '+G.cfg.location:'')+'</div>';

        toast('Show saved to database');

        // Sync class list so show_classes stays current for entry form and entry_classes
        if(G.cfg.classes && G.cfg.classes.length){
          syncShowClassesToSupabase().catch(function(e){ console.warn('Class sync failed:', e); });
        }

      })

      .catch(function(e){ toast('Saved locally (DB error: '+e.message+')', true); });

  } else {

    toast('Configuration saved');

  }

}

function showEntryModal(rowIdx){

  var e = G.entries.find(function(x){ return x.rowIndex===rowIdx; });

  if(!e){ e = G.entries[rowIdx]; }

  if(!e){ toast('Entry not found', true); return; }



  var root = document.getElementById('modal-root');



  function rebuild(){

    var entry = G.entries.find(function(x){ return x.rowIndex===rowIdx; }) || G.entries[rowIdx];

    if(!entry) return;



    var lines = buildTabLines(entry);

    var total = tabTotal(entry);

    var paid  = amtPaid(entry);

    var bal   = total - paid;



    // All riders on this horse

    var riders = entry.riders ? entry.riders : [{name:entry.name, division:entry.division, isPrimary:true}];



    // Classes tab content

    var classHTML = '<table style="width:100%;border-collapse:collapse;font-size:.83rem">'

      +'<thead><tr>'

      +'<th style="padding:.4rem .5rem;border-bottom:2px solid var(--accent);color:var(--accent);font-family:Oswald">Class</th>'

      +'<th style="padding:.4rem .5rem;border-bottom:2px solid var(--accent);color:var(--accent);font-family:Oswald">Name</th>'

      +'<th style="padding:.4rem .5rem;border-bottom:2px solid var(--accent);color:var(--accent);font-family:Oswald">Rider</th>'

      +'<th style="padding:.4rem .5rem;border-bottom:2px solid var(--accent);color:var(--accent);font-family:Oswald"></th>'

      +'</tr></thead><tbody>';



    if(!entry.classes.length){

      classHTML += '<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:1rem">No classes entered</td></tr>';

    } else {

      entry.classes.forEach(function(cls, ci){

        var scratched = cls.status === 'scratched';

        var riderSel = riders.length > 1

          ? '<select data-ci="'+ci+'" style="background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:2px 4px;font-size:.75rem" onchange="assignClassRider('+rowIdx+','+ci+',this.value)">'

            + riders.map(function(r){ return '<option value="'+esc(r.name)+'"'+(cls.rider===r.name?' selected':(!cls.rider&&r.isPrimary?' selected':''))+'>'+esc(r.name)+'</option>'; }).join('')

            + '</select>'

          : '<span style="font-size:.8rem">'+esc(cls.rider||entry.name)+'</span>';



        classHTML += '<tr style="'+(scratched?'opacity:.4;text-decoration:line-through':'')+'">'

          +'<td style="padding:.35rem .5rem;border-bottom:1px solid var(--border)"><span class="badge b-gray">'+esc(cls.num)+'</span></td>'

          +'<td style="padding:.35rem .5rem;border-bottom:1px solid var(--border)">'

          +'<div style="font-size:.83rem">'+esc(cls.name)+'</div>'

          +'<div style="font-size:.72rem;color:var(--muted)">'+esc(cls.division)+(cls.org&&cls.org!=='CoWN'?' · '+esc(cls.org):'')+'</div>'

          +'</td>'

          +'<td style="padding:.35rem .5rem;border-bottom:1px solid var(--border)">'+riderSel+'</td>'

          +'<td style="padding:.35rem .5rem;border-bottom:1px solid var(--border)">'

          +(scratched

            ? '<span class="badge b-red">Scratched</span>'

            : '<button class="btn btn-red btn-sm" onclick="scratchClass('+rowIdx+','+ci+')">Scratch</button>')

          +'</td></tr>';

      });

    }

    classHTML += '</tbody></table>';

    classHTML += '<div class="btn-row" style="margin-top:.75rem"><button class="btn btn-accent btn-sm" onclick="showAddClassPicker('+rowIdx+')">+ Add Class</button></div>';



    // Riders tab content

    var riderHTML = riders.map(function(r, ri){

      return '<div style="display:flex;align-items:center;gap:.75rem;padding:.5rem 0;border-bottom:1px solid var(--border)">'

        +'<div style="flex:1"><div class="bold" style="font-size:.85rem">'+esc(r.name)+'</div>'

        +'<div class="small">'+esc(r.division||'')+(r.isPrimary?' · Primary':'')+'</div></div>'

        +(r.isPrimary

          ? '<span class="badge b-gold">Primary</span>'

          : '<button class="btn btn-red btn-sm" onclick="removeRider('+rowIdx+','+ri+')">Remove</button>')

        +'</div>';

    }).join('');



    // Get all unique divisions from classes for datalist

    var divOptions = Array.from(new Set(G.cfg.classes.map(function(c){ return c.division||''; }).filter(Boolean)));



    riderHTML += '<div style="background:var(--card2);border:1px solid var(--border2);border-radius:8px;padding:.85rem;margin-top:.75rem">'

      +'<div style="font-size:.78rem;color:var(--muted);margin-bottom:.5rem">Add a rider to this horse</div>'

      +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:.5rem;align-items:flex-end">'

      +'<div class="form-group"><label>First Name</label><input type="text" id="nrf" placeholder="First" style="background:var(--bg);border:1px solid var(--border2);border-radius:5px;color:var(--text);padding:.38rem .6rem;font-size:.82rem;width:100%"></div>'

      +'<div class="form-group"><label>Last Name</label><input type="text" id="nrl" placeholder="Last" style="background:var(--bg);border:1px solid var(--border2);border-radius:5px;color:var(--text);padding:.38rem .6rem;font-size:.82rem;width:100%"></div>'

      +'<datalist id="rider-div-opts">'+divOptions.map(function(d){ return '<option value="'+esc(d)+'">'; }).join('')+'</datalist></div>'

      +'<button class="btn btn-accent btn-sm" style="margin-bottom:1px" onclick="addRider('+rowIdx+')">Add</button>'

    if(memLines.length){

      feesHTML += '<div style="font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:.6rem 0 .25rem">Membership</div>';

      memLines.forEach(function(l){ feesHTML += '<div class="tab-line"><span>'+esc(l.desc)+'</span><span>'+fmt$(l.amt)+'</span></div>'; });

    }



    // Classes

    var classLines = lines.filter(function(l){ return l.type==='class'; });

    if(classLines.length){

      feesHTML += '<div style="display:flex;align-items:center;justify-content:space-between;margin:.6rem 0 .25rem">'

    // Stalling

      assocFeeLines.forEach(function(l){ feesHTML += '<div class="tab-line"><span>'+esc(l.desc)+'</span><span>'+fmt$(l.amt)+'</span></div>'; });

    // Org fees with adjusted display

    var adjLines = (entry.orgFees||[]).filter(function(of){ return !of.splitFromKey; });

    feesHTML += '<div style="margin-top:.5rem;padding-top:.5rem;border-top:1px solid var(--border)">'

      +'<div style="flex:1"><div class="small">Paid</div><div class="bold" style="color:var(--green)">'+fmt$(paid)+'</div></div>'

      +'<div>'+(bal>0

        ?'<button class="btn btn-green btn-sm" onclick="markPaid('+rowIdx+','+total+')">Mark Paid</button>'

    // Stall split tab content

    // Build list of individual housing items that can be split

    var housingItems = [];

    if(entry.stall1qty > 0) housingItems.push({key:'s1', label:'Stall 1-night', qty:entry.stall1qty, unitCost:f.stall1||40});

    if(entry.rv1qty    > 0) housingItems.push({key:'r1', label:'RV 1-night', qty:entry.rv1qty, unitCost:f.rv1||40});

    // Also check org fees for manually added stalls

    (entry.orgFees||[]).forEach(function(of, oi){

      if(of.desc && (of.desc.toLowerCase().indexOf('stall')>-1 || of.desc.toLowerCase().indexOf('rv')>-1)){

      }

    var stallSplitHTML = '';

      var guestSplits = (entry.orgFees||[]).filter(function(of){ return of.splitFromKey; });

            +'<button class="btn btn-red btn-sm guest-remove-btn" data-rowidx="'+rowIdx+'" data-splitkey="'+esc(of.splitFromKey)+'">&#10005;</button>'

      // UI to join another rider's stall

      var stallHolders = G.entries.filter(function(en){

        return (en.stall1qty>0||en.stall2qty>0||en.shavings>0||en.rv1qty>0||en.rv2qty>0||en.rvCircuit>0) && en.rowIndex!==rowIdx;

      });

      if(stallHolders.length){

        stallSplitHTML += '<div style="background:var(--card2);border:1px solid var(--border2);border-radius:8px;padding:.85rem;margin-top:.75rem">';

        stallSplitHTML += '<div style="font-size:.78rem;color:var(--muted);margin-bottom:.5rem">Split housing with another rider&#39;s stall</div>';

        stallSplitHTML += '<div style="display:grid;grid-template-columns:1fr 1fr 60px auto;gap:.4rem;align-items:flex-end">';

        var holderOpts = '<option value="">— Stall holder —</option>'

          + stallHolders.map(function(en){ return '<option value="'+en.rowIndex+'">'+esc(en.name)+' / '+esc(en.horse)+'</option>'; }).join('');

        stallSplitHTML += '<select id="guest-split-holder" style="background:var(--bg);border:1px solid var(--border2);border-radius:5px;color:var(--text);padding:.3rem .5rem;font-size:.78rem">'+holderOpts+'</select>';

        // Item key dropdown — will be populated by holder selection; start with first holder's items

        var firstHolder = stallHolders[0];

        var f2 = G.cfg.fees;

        var firstItems = [];

        if(firstHolder.stall1qty>0) firstItems.push({key:'s1',label:'Stall 1-night'});

        if(firstHolder.stall2qty>0) firstItems.push({key:'s2',label:'Stall 2-nights'});

        if(firstHolder.shavings>0)  firstItems.push({key:'sh',label:'Shavings'});

        if(firstHolder.rv1qty>0)    firstItems.push({key:'r1',label:'RV 1-night'});

        if(firstHolder.rv2qty>0)    firstItems.push({key:'r2',label:'RV 2-nights'});

        if(firstHolder.rvCircuit>0) firstItems.push({key:'rc',label:'RV Circuit'});

        var itemOpts = firstItems.map(function(it){ return '<option value="'+it.key+'">'+it.label+'</option>'; }).join('');

        stallSplitHTML += '<select id="guest-split-item" style="background:var(--bg);border:1px solid var(--border2);border-radius:5px;color:var(--text);padding:.3rem .5rem;font-size:.78rem">'+itemOpts+'</select>';

        stallSplitHTML += '<input type="number" id="guest-split-pct" value="50" min="1" max="99" '

          +'style="background:var(--bg);border:1px solid var(--border2);border-radius:5px;color:var(--text);padding:.3rem .4rem;font-size:.78rem;text-align:center">';

        stallSplitHTML += '<button class="btn btn-accent btn-sm" onclick="addSplitAsGuest('+rowIdx+')">Add</button>';

        stallSplitHTML += '</div></div>';

      }

    } else {

      // Initialize splits per housing item if not set

      if(!entry.stallSplits) entry.stallSplits = {};



      // Rider dropdown options

      var riderOpts = '<option value="">— Select from entries —</option>'

        + G.entries.filter(function(en){ return en.rowIndex!==rowIdx; }).map(function(en){

          return '<option value="'+en.rowIndex+'">'+esc(en.name)+' / '+esc(en.horse)+'</option>';

        }).join('');



      // Build one split block per housing item

      housingItems.forEach(function(item){

        var itemTotal = item.qty * item.unitCost;



        // Initialize this item's splits

        if(!entry.stallSplits[item.key]){

          entry.stallSplits[item.key] = [{name:entry.name, pct:100}];

        }

        var splits = entry.stallSplits[item.key];

        var totalPct = splits.reduce(function(s,x){ return s+x.pct; },0);

        var pctOk = totalPct === 100;



        stallSplitHTML += '<div style="background:var(--card2);border:1px solid var(--border2);border-radius:8px;padding:.85rem;margin-bottom:.75rem">';

        stallSplitHTML += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem">'

          +'<div><span style="font-family:Oswald;color:var(--accent);font-size:.9rem">'+esc(item.label)+'</span>'

          +(item.qty>1?' <span class="badge b-gray">x'+item.qty+'</span>':'')+'</div>'

          +'<span style="font-weight:600;color:var(--accent)">'+fmt$(itemTotal)+'</span>'

          +'</div>';



        // Split rows for this item

        splits.forEach(function(s, si){

          var amt = itemTotal * s.pct / 100;

          stallSplitHTML += '<div style="display:flex;align-items:center;gap:.5rem;padding:.35rem 0;border-bottom:1px solid var(--border)">'

            +'<div style="flex:1"><div class="bold" style="font-size:.83rem">'+esc(s.name)+'</div>'

            +'<div class="small" style="color:var(--green)">'+fmt$(amt)+'</div></div>'

            +'class="split-pct-inp" '

            +'style="width:55px;background:var(--bg);border:1px solid var(--border2);border-radius:4px;color:var(--text);padding:3px 5px;font-size:.82rem;text-align:center">'

            +'<span style="font-size:.75rem;color:var(--muted)">%</span>'

            +(splits.length>1

              ? '<button class="btn btn-red btn-sm split-remove-btn" data-itemkey="'+esc(item.key)+'" data-si="'+si+'" data-rowidx="'+rowIdx+'">&#10005;</button>'

              : '')

            +'</div>';

        });



        stallSplitHTML += '<div style="font-size:.73rem;margin:.3rem 0 .5rem;color:'+(pctOk?'var(--green)':'var(--red)')+'">'

          +'</div>';



        // Add person to this item's split

        stallSplitHTML += '<div style="display:grid;grid-template-columns:1fr 60px auto;gap:.4rem;align-items:flex-end">'

          +'style="background:var(--bg);border:1px solid var(--border2);border-radius:5px;color:var(--text);padding:.3rem .4rem;font-size:.78rem;text-align:center">'

          +'<button class="btn btn-accent btn-sm split-add-btn" data-itemkey="'+esc(item.key)+'" data-rowidx="'+rowIdx+'">Add</button>'

          +'</div>';



        stallSplitHTML += '</div>';

      });

    // ── Details tab ──
    var inp='background:var(--bg);border:1px solid var(--border2);border-radius:6px;color:var(--text);padding:.38rem .6rem;font-size:.84rem;font-family:inherit;width:100%';

    // Rider section
    detailsHTML+='<div style="grid-column:1/-1;font-size:.72rem;color:var(--accent);font-family:Oswald;letter-spacing:.08em;text-transform:uppercase;margin-top:.25rem">Rider</div>';
    var _fn=entry.firstName||(entry.name||'').split(/\s+/)[0]||'';
    var _ln=entry.lastName||(entry.name||'').split(/\s+/).slice(1).join(' ')||'';
    detailsHTML+='<div class="fg"><label>First Name</label><input id="ei-firstname" value="'+esc(_fn)+'" style="'+inp+'"></div>';
    detailsHTML+='<div class="fg"><label>Last Name</label><input id="ei-lastname" value="'+esc(_ln)+'" style="'+inp+'"></div>';
    detailsHTML+='<div class="fg"><label>Member #</label>'
      +'<div style="display:flex;gap:.35rem"><input id="ei-membernum" value="'+esc(entry.memberNum||'')+'" placeholder="CoWN #" style="'+inp+'">'
      +'<button onclick="entryLookupMember('+rowIdx+')" title="Look up in member database (coming soon)" style="background:var(--card2);border:1px solid var(--border2);border-radius:6px;color:var(--muted);cursor:pointer;padding:.38rem .55rem;font-size:.85rem;white-space:nowrap" disabled>🔍</button>'
      +'</div></div>';
    detailsHTML+='<div class="fg"><label>Email</label><input id="ei-email" type="email" value="'+esc(entry.email||'')+'" style="'+inp+'"></div>';
    detailsHTML+='<div class="fg"><label>Phone</label><input id="ei-phone" type="tel" value="'+esc(entry.phone||'')+'" style="'+inp+'"></div>';
    // Derive address parts — handle legacy entries that have everything in one field
    var _ap=(entry.city||entry.state||entry.zip)?{street:entry.address||'',city:entry.city||'',state:entry.state||'',zip:entry.zip||''}:parseUSAddress(entry.address||'');
    detailsHTML+='<div class="fg" style="grid-column:1/-1"><label>Street Address</label><input id="ei-street" value="'+esc(_ap.street)+'" style="'+inp+'"></div>';
    detailsHTML+='<div style="grid-column:1/-1;display:grid;grid-template-columns:2fr 80px 110px;gap:.5rem">'
      +'<div class="fg"><label>City</label><input id="ei-city" value="'+esc(_ap.city)+'" style="'+inp+'"></div>'
      +'<div class="fg"><label>State</label><input id="ei-state" maxlength="2" value="'+esc(_ap.state)+'" placeholder="CO" style="'+inp+';text-transform:uppercase"></div>'
      +'<div class="fg"><label>ZIP</label><input id="ei-zip" value="'+esc(_ap.zip)+'" placeholder="80521" style="'+inp+'"></div>'
      +'</div>';

    // Horse section
    detailsHTML+='<div style="grid-column:1/-1;font-size:.72rem;color:var(--accent);font-family:Oswald;letter-spacing:.08em;text-transform:uppercase;margin-top:.5rem">Horse</div>';
    detailsHTML+='<div class="fg"><label>Horse Name</label><input id="ei-horse" value="'+esc(entry.horse||'')+'" style="'+inp+'"></div>';
    detailsHTML+='<div class="fg"><label>Gender</label><select id="ei-horsegender" style="'+inp+'">'
      +'<option value=""'+((!entry.horseGender||entry.horseGender==='')?' selected':'')+'>—</option>'
      +'<option value="Gelding"'+(entry.horseGender==='Gelding'?' selected':'')+'>Gelding</option>'
      +'<option value="Mare"'+(entry.horseGender==='Mare'?' selected':'')+'>Mare</option>'
      +'<option value="Stallion"'+(entry.horseGender==='Stallion'?' selected':'')+'>Stallion</option>'
      +'</select></div>';

    // Show section
    detailsHTML+='<div style="grid-column:1/-1;font-size:.72rem;color:var(--accent);font-family:Oswald;letter-spacing:.08em;text-transform:uppercase;margin-top:.5rem">Show Info</div>';
    detailsHTML+='<div class="fg"><label>Division</label><input id="ei-division" value="'+esc(entry.division||'')+'" style="'+inp+'"></div>';
    detailsHTML+='<div class="fg" style="display:flex;align-items:center;gap:.5rem;padding-top:1.4rem">'
      +'<label style="display:flex;align-items:center;gap:.4rem;font-size:.82rem;color:var(--muted);cursor:pointer">'
      +'<input type="checkbox" id="ei-addedatshow"'+(entry.addedAtShow?' checked':'')+' style="cursor:pointer"> Added at Show</label>'
      +'</div>';
    if(entry.submitted){
      detailsHTML+='<div style="grid-column:1/-1;font-size:.75rem;color:var(--muted)">Submitted: '+new Date(entry.submitted).toLocaleString()+'</div>';
    }
    detailsHTML+='</div>';
    detailsHTML+='<div style="display:flex;gap:.5rem;margin-top:.85rem">'
      +'<button class="btn btn-accent btn-sm" onclick="saveEntryInfo('+rowIdx+')">Save Changes</button>'
      +'<button class="btn btn-sm" style="margin-left:auto;background:rgba(231,76,60,.12);color:var(--red);border:1px solid rgba(231,76,60,.3)" '
      +'onclick="deleteEntry('+rowIdx+')">&#128465; Delete Entry</button>'
      +'</div>';

    // Build full modal

    var html = '<div class="modal-bg" id="em" onclick="if(event.target===this)closeModal()">'

      +'<div class="modal" style="max-width:680px">'

      +'<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1rem">'

      +'<div><h2 style="margin-bottom:2px">'+esc(entry.horse||'Unknown Horse')+'</h2>'

      +'<div class="small">'+esc(entry.name)+'</div></div>'

      +'<button class="btn btn-dark btn-sm" onclick="closeModal()">Close</button>'

      +'</div>'

      // Tab buttons

      +'<div class="tab-row">'

      +'<button id="tbtn-details" class="tab-btn active gp-modal-tab" data-tab="details">Details</button>'

      +'<button id="tbtn-classes" class="tab-btn gp-modal-tab" data-tab="classes">Classes</button>'

      +'<button id="tbtn-riders" class="tab-btn gp-modal-tab" data-tab="riders">Riders</button>'

      +'<button id="tbtn-fees" class="tab-btn gp-modal-tab" data-tab="fees">Fees &amp; Tab</button>'

      +'<button id="tbtn-stall" class="tab-btn gp-modal-tab" data-tab="stall">Stall Split</button>'

      +'</div>'

      // Tab panels

      +'<div id="mpanel-details">'+detailsHTML+'</div>'

      +'<div id="mpanel-classes" style="display:none">'+classHTML+'</div>'

      +'<div id="mpanel-riders" style="display:none">'+riderHTML+'</div>'

      +'<div id="mpanel-fees" style="display:none">'+feesHTML+'</div>'

      +'<div id="mpanel-stall" style="display:none">'+stallSplitHTML+'</div>'

      +'</div></div>';



    root.innerHTML = html;



    // Wire tab buttons

    root.querySelectorAll('.gp-modal-tab').forEach(function(btn){

      btn.addEventListener('click', function(){ switchModalTab(btn.dataset.tab); });

    });



    // Wire stall split percentage inputs

    root.querySelectorAll('.split-pct-inp').forEach(function(inp){

      inp.addEventListener('change', function(){

        var e2 = G.entries.find(function(x){ return x.rowIndex===parseInt(inp.dataset.rowidx); });

        if(!e2||!e2.stallSplits) return;

        e2.stallSplits[inp.dataset.itemkey][parseInt(inp.dataset.si)].pct = parseInt(inp.value)||0;

        saveEntriesToCache();

        if(G._rebuildEntryModal) G._rebuildEntryModal();

      });

    });



    // Wire stall split remove buttons

    root.querySelectorAll('.split-remove-btn').forEach(function(btn){

      btn.addEventListener('click', function(){

        var e2 = G.entries.find(function(x){ return x.rowIndex===parseInt(btn.dataset.rowidx); });

        if(!e2||!e2.stallSplits) return;

        e2.stallSplits[btn.dataset.itemkey].splice(parseInt(btn.dataset.si), 1);

        saveEntriesToCache();

        if(G._rebuildEntryModal) G._rebuildEntryModal();

      });

    });



    // Wire stall split add buttons

    root.querySelectorAll('.split-add-btn').forEach(function(btn){

      btn.addEventListener('click', function(){

        var e2 = G.entries.find(function(x){ return x.rowIndex===parseInt(btn.dataset.rowidx); });

        if(!e2) return;

        if(!e2.stallSplits) e2.stallSplits = {};

        var key = btn.dataset.itemkey;

        if(!e2.stallSplits[key]) e2.stallSplits[key] = [{name:e2.name, pct:100}];



        // Get selected rider

        var sel = btn.closest('div').querySelector('.split-add-sel');

        var pctInp = btn.closest('div').querySelector('.split-add-pct');

        var pct = parseInt((pctInp&&pctInp.value)||50)||50;

        var name = '';

        if(sel && sel.value !== ''){

          var ref = G.entries.find(function(x){ return x.rowIndex===parseInt(sel.value); });

          if(ref) name = ref.name;

        }

        if(!name){ toast('Select a rider to split with', true); return; }



        // Reduce primary pct to make room

        var splits = e2.stallSplits[key];

        if(splits.length === 1) splits[0].pct = 100 - pct;

        splits.push({name:name, pct:pct});



        // Apply charge to other rider's tab

        var otherEntry = G.entries.find(function(x){ return x.name===name; });

        if(otherEntry){

          if(!otherEntry.orgFees) otherEntry.orgFees = [];

          otherEntry.orgFees = otherEntry.orgFees.filter(function(of){ return of.splitFromKey !== (e2.rowIndex+'_'+key); });

          var housingItem = null;

          var f = G.cfg.fees;

          var items = [];

          if(e2.stall1qty>0) items.push({key:'s1',label:'Stall 1-night',qty:e2.stall1qty,unitCost:f.stall1||40});

          if(e2.stall2qty>0) items.push({key:'s2',label:'Stall 2-nights',qty:e2.stall2qty,unitCost:f.stall2||80});

          if(e2.shavings>0)  items.push({key:'sh',label:'Shavings',qty:e2.shavings,unitCost:f.shavings||12});

          if(e2.rv1qty>0)    items.push({key:'r1',label:'RV 1-night',qty:e2.rv1qty,unitCost:f.rv1||40});

          if(e2.rv2qty>0)    items.push({key:'r2',label:'RV 2-nights',qty:e2.rv2qty,unitCost:f.rv2||80});

          if(e2.rvCircuit>0) items.push({key:'rc',label:'RV Circuit',qty:e2.rvCircuit,unitCost:f.rvCircuit||110});

          housingItem = items.find(function(x){ return x.key===key; });

          if(housingItem){

            var shareAmt = housingItem.qty * housingItem.unitCost * pct / 100;

            otherEntry.orgFees.push({

              org:'Stall Split', desc:'Share of '+housingItem.label+' from '+e2.name+'/'+e2.horse,

              amt:shareAmt, splitFromKey:e2.rowIndex+'_'+key

            });

          }

        }



        saveEntriesToCache();

        if(G._rebuildEntryModal) G._rebuildEntryModal();

      });

    });



    // Wire guest-remove buttons (for non-stall entries sharing another's stall)

    root.querySelectorAll('.guest-remove-btn').forEach(function(btn){

      btn.addEventListener('click', function(){

        removeGuestSplit(parseInt(btn.dataset.rowidx), btn.dataset.splitkey);

      });

    });



    // Wire waive-amt clicks — open Add Fee dialog pre-filled with a matching discount

    root.querySelectorAll('.waive-amt').forEach(function(el){

      el.addEventListener('click', function(){

        var ri = parseInt(el.dataset.rowidx);

        var desc = 'Waiver: '+el.dataset.desc;

        var negAmt = -(parseFloat(el.dataset.amt)||0);

        showAddOrgFee(ri, desc, negAmt);

        // Switch to Discount / Credit in the dialog after it renders

        setTimeout(function(){

          var sel = document.getElementById('of-type');

          if(sel){ sel.value = 'Discount / Credit'; orgFeeTypeChange(ri); }

        }, 30);

      });

    });

  }



  rebuild();

  G._rebuildEntryModal = rebuild;

}

    +'<div class="modal" style="max-width:500px">'

    +'<h2>Add Class</h2>'

    +'<input type="text" id="class-picker-q" placeholder="Search classes..." oninput="filterClassPicker(this.value)" '

    +'style="width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:6px;color:var(--text);padding:.45rem .65rem;font-size:.85rem;margin-bottom:.75rem">'

    +'<div id="class-picker-list" style="max-height:320px;overflow-y:auto">'

    +renderClassPickerList(available, rowIdx)

    +'</div>'

    +'<div class="btn-row" style="margin-top:.75rem">'

function renderClassPickerList(classes, rowIdx){

  if(!classes.length) return '<div class="empty-state">No more classes available</div>';



  // Group by org then division

  var grouped = {};

  classes.forEach(function(c){

    var org = c.org||'CoWN';

    var div = c.division||'General';

    var key = org+'||'+div;

    if(!grouped[key]) grouped[key]={org:org, div:div, classes:[]};

    grouped[key].classes.push(c);

  });



  // Sort groups: CoWN first, then alphabetical by org+division

  var keys = Object.keys(grouped).sort(function(a,b){

    var aOrg = grouped[a].org, bOrg = grouped[b].org;

    if(aOrg==='CoWN' && bOrg!=='CoWN') return -1;

    if(bOrg==='CoWN' && aOrg!=='CoWN') return 1;

    return a.localeCompare(b);

  });



  return keys.map(function(key){

    var group = grouped[key];

    var orgBadge = group.org!=='CoWN'

      ? '<span class="badge b-blue" style="margin-left:6px;font-size:.65rem">'+esc(group.org)+'</span>'

      : '';

    var header = '<div style="background:rgba(200,146,42,.08);padding:.3rem .5rem;font-family:Oswald;font-size:.8rem;color:var(--accent);letter-spacing:.04em;border-bottom:1px solid var(--border)">'

      +esc(group.div)+orgBadge+'</div>';



    var rows = group.classes.sort(function(a,b){ return (parseInt(a.num)||999)-(parseInt(b.num)||999); })

      .map(function(c){

        var isCow = c.isCow;

        var fee = (c.baseFee||G.cfg.fees.classBase||0) + (isCow?(c.cowFee||G.cfg.fees.cowSurcharge||0):0) + (c.jackpot||0);

        return '<div style="display:flex;align-items:center;justify-content:space-between;padding:.4rem .5rem;border-bottom:1px solid var(--border);cursor:pointer" '

          +'data-rowid="'+rowIdx+'" data-classid="'+esc(c._id)+'" class="show-row class-picker-item">'

          +'<div>'

          +'<span class="badge b-gray" style="margin-right:5px">'+esc(c.num)+'</span>'

          +'<span style="font-size:.84rem">'+esc(c.name)+'</span>'

          +(isCow?'<span class="badge b-cow" style="margin-left:4px">Cow</span>':'')

          +'</div>'

          +'<span style="font-size:.84rem;font-weight:600;color:var(--accent)">'+fmt$(fee)+'</span>'

          +'</div>';

      }).join('');



    return header + rows;

  }).join('');

}





function wireClassPicker(){

function filterClassPicker(q){

  var rowIdx = G._addClassRowIdx;

  var e=G.entries.find(function(x){ return x.rowIndex===rowIdx; });

  if(!e) return;

  var enteredNums = e.classes.filter(function(c){ return c.status!=='scratched'; }).map(function(c){ return c.num; });

  var available = G.cfg.classes.filter(function(c){ return enteredNums.indexOf(c.num)===-1; });

  if(q) available = available.filter(function(c){

    return (c.name||'').toLowerCase().indexOf(q.toLowerCase())>-1

        || (c.num||'').indexOf(q)>-1

        || (c.division||'').toLowerCase().indexOf(q.toLowerCase())>-1;

  });

  document.getElementById('class-picker-list').innerHTML = renderClassPickerList(available, rowIdx);

  wireClassPicker();

};



function addClassToEntry(rowIdx, classId){

  var e=G.entries.find(function(x){ return x.rowIndex===rowIdx; });

  var cls=G.cfg.classes.find(function(c){ return c._id===classId; });

  if(!e||!cls) return;



  var isCow = cls.isCow;

  var fee = (cls.baseFee||G.cfg.fees.classBase||0) + (isCow?(cls.cowFee||G.cfg.fees.cowSurcharge||0):0) + (cls.jackpot||0);



  e.classes.push({

    num:cls.num, name:cls.name, division:cls.division,

    org:cls.org||'CoWN', isCow:isCow,

    status:'entered', feeCharged:fee,

    addedDayOf:true

  });



  // Sync to Supabase if we have DB IDs

  if(e.dbId && cls.dbClassId){

    sbFetch('entry_classes',{method:'POST',

      body:JSON.stringify({entry_id:e.dbId,show_class_id:cls.dbClassId,

        status:'entered',fee_charged:fee})

    }).catch(function(err){ console.error('Failed to save added class:', err); });

  }



  toast('Added Class '+cls.num+' — '+cls.name);

  closeModal();

  showEntryModal(rowIdx);

};
