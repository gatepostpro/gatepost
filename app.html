function amtPaid(entry){
  var hist=G.paymentHistory[entry.rowIndex];
  if(hist&&hist.length) return hist.reduce(function(s,p){ return s+p.amount; },0);
  return G.payments[entry.rowIndex]||0;
}

function tabBalance(entry){ return tabTotal(entry) - amtPaid(entry); }

function isFullyPaid(entry){ return tabBalance(entry) <= 0; }

// ─── Horse matching helpers ───────────────────────────────────────────────────

function normHorse(s){
  return (s||'').toLowerCase().replace(/[''']/g,'').replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim();
}

function horsesMatch(a, b){
  var na=normHorse(a), nb=normHorse(b);
  if(!na||!nb) return false;
  var nas=na.replace(/\s/g,''), nbs=nb.replace(/\s/g,'');
  return na===nb || nas===nbs || na.indexOf(nb)>=0 || nb.indexOf(na)>=0;
}

function getCanonicalHorse(name){
  return G.horseAliases[normHorse(name)] || name;
}

function entryKey(e){ return e.name+'|'+e.horse; }

// Returns array of {normKey, canonical, entries:[]} where 2+ different riders share a horse
function findSameHorseGroups(){
  var buckets={};
  G.entries.forEach(function(e){
    var nk=normHorse(e.horse);
    if(!nk) return;
    // Use horseDistinct to separate same-name horses that are different animals
    var bucketKey=G.horseDistinct[entryKey(e)] || nk;
    if(!buckets[bucketKey]) buckets[bucketKey]={normKey:nk, canonical:G.horseAliases[nk]||e.horse, entries:[], distinctKey:bucketKey};
    buckets[bucketKey].entries.push(e);
  });
  // Also merge buckets where horse names fuzzy-match across different norm keys (only if neither has a distinct override)
  var keys=Object.keys(buckets);
  for(var i=0;i<keys.length;i++){
    for(var j=i+1;j<keys.length;j++){
      var bi=buckets[keys[i]], bj=buckets[keys[j]];
      // Don't merge if either bucket has explicit distinct overrides (they've been split on purpose)
      var iHasDistinct=bi.entries.some(function(e){ return !!G.horseDistinct[entryKey(e)]; });
      var jHasDistinct=bj.entries.some(function(e){ return !!G.horseDistinct[entryKey(e)]; });
      if(!iHasDistinct&&!jHasDistinct&&horsesMatch(bi.canonical, bj.canonical)){
        bi.entries=bi.entries.concat(bj.entries);
        delete buckets[keys[j]];
        keys.splice(j,1); j--;
      }
    }
  }
  return Object.keys(buckets).map(function(k){ return buckets[k]; }).filter(function(g){
    var riders=[]; g.entries.forEach(function(e){ if(riders.indexOf(e.name)<0) riders.push(e.name); });
    return riders.length>1;
  });
}

// ─── Billing group helpers ────────────────────────────────────────────────────

function getBillingGroup(e){
  var k=entryKey(e);
  return G.billingGroups.find(function(g){ return g.entryKeys.indexOf(k)>=0; })||null;
}

function groupAmtOwed(grp){
  return grp.entryKeys.reduce(function(s,k){
    var e=G.entries.find(function(e){ return entryKey(e)===k; });
    return s+(e?tabTotal(e):0);
  },0);
}

function groupAmtPaid(grp){
  var key='__grp__'+grp.id;
  var hist=G.paymentHistory[key];
  if(hist&&hist.length) return hist.reduce(function(s,p){ return s+p.amount; },0);
  return G.payments[key]||0;
}

function groupBalance(grp){ return groupAmtOwed(grp)-groupAmtPaid(grp); }

function groupIsFullyPaid(grp){ return groupBalance(grp)<=0; }

function recordPayment(key, amount, method, checkNum, note){
  if(!G.paymentHistory[key]) G.paymentHistory[key]=[];
  G.paymentHistory[key].push({amount:amount, method:method||'cash', checkNum:checkNum||'', note:note||'', paidAt:new Date().toISOString()});
  G.payments[key]=G.paymentHistory[key].reduce(function(s,p){ return s+p.amount; },0);
  saveEntriesToStorage();
}

function undoLastPayment(key){
  var hist=G.paymentHistory[key];
  if(!hist||!hist.length) return;
  hist.pop();
  G.payments[key]=hist.reduce(function(s,p){ return s+p.amount; },0);
  saveEntriesToStorage();
}

function payMethodLabel(m){
  return {cash:'Cash',check:'Check',card:'Credit Card',venmo:'Venmo',other:'Other'}[m]||m||'Cash';
}

function saveBillingData(){
  if(!G.showId) return;
  localStorage.setItem('gp_billinggroups_'+G.showId, JSON.stringify(G.billingGroups));
  localStorage.setItem('gp_horsealiases_'+G.showId, JSON.stringify(G.horseAliases));
  localStorage.setItem('gp_horsedistinct_'+G.showId, JSON.stringify(G.horseDistinct));
  localStorage.setItem('gp_payhistory_'+G.showId, JSON.stringify(G.paymentHistory));
}

async function syncBillingGroupsToSupabase(){
  if(!G.showId) return;
  try{
    await sbFetch('billing_groups?show_id=eq.'+G.showId, {method:'DELETE'});
    for(var i=0;i<G.billingGroups.length;i++){
      var g=G.billingGroups[i];
      await sbFetch('billing_groups', {method:'POST', body:JSON.stringify({
        id:g.id, show_id:G.showId, association_id:G.assocId||null,
        payer_name:g.payerName, entry_keys:g.entryKeys, notes:g.notes||null
      })});
    }
    // Sync horse aliases
    await sbFetch('horse_aliases?show_id=eq.'+G.showId, {method:'DELETE'});
    var aliases=Object.keys(G.horseAliases);
    for(var ai=0;ai<aliases.length;ai++){
      await sbFetch('horse_aliases', {method:'POST', body:JSON.stringify({
        show_id:G.showId, norm_key:aliases[ai], canonical_name:G.horseAliases[aliases[ai]]
      })});
    }
  } catch(e){ console.warn('Billing sync error:', e); }
}

async function loadBillingDataFromSupabase(showId){
  try{
    var grpRows=await sbFetch('billing_groups?show_id=eq.'+showId+'&select=*');
    if(grpRows&&grpRows.length){
      G.billingGroups=grpRows.map(function(r){
        return {id:r.id, payerName:r.payer_name, entryKeys:r.entry_keys||[], notes:r.notes||''};
      });
    }
    var aliasRows=await sbFetch('horse_aliases?show_id=eq.'+showId+'&select=norm_key,canonical_name');
    if(aliasRows&&aliasRows.length){
      G.horseAliases={};
      aliasRows.forEach(function(r){ G.horseAliases[r.norm_key]=r.canonical_name; });
    }
    saveBillingData();
  } catch(e){ console.warn('Could not load billing data:', e); }
}

function createBillingGroup(payerName, entryKeys, notes){
  var id=([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g,function(c){ return (c^(crypto.getRandomValues(new Uint8Array(1))[0]&(15>>c/4))).toString(16); });
  var grp={id:id, payerName:payerName, entryKeys:entryKeys, notes:notes||''};
  G.billingGroups.push(grp);
  saveBillingData();
  syncBillingGroupsToSupabase();
  return grp;
}

function deleteBillingGroup(id){
  G.billingGroups=G.billingGroups.filter(function(g){ return g.id!==id; });
  delete G.payments['__grp__'+id];
  saveBillingData();
  syncBillingGroupsToSupabase();
}

function splitFromBillingGroup(groupId, keysToRemove){
  var grp=G.billingGroups.find(function(g){ return g.id===groupId; });
  if(!grp) return;
  grp.entryKeys=grp.entryKeys.filter(function(k){ return keysToRemove.indexOf(k)<0; });
  if(grp.entryKeys.length<2) deleteBillingGroup(groupId);
  else { saveBillingData(); syncBillingGroupsToSupabase(); }
}

function setHorseAlias(rawName, canonicalName){
  G.horseAliases[normHorse(rawName)]=canonicalName;
  saveBillingData();
  syncBillingGroupsToSupabase();
}

// Split a single-column address string (comma-separated) into parts.
// Handles: "123 Main St, Denver, CO 80201" or "123 Main St, Denver, Colorado 80201"
var _US_STATES={
  'alabama':'AL','alaska':'AK','arizona':'AZ','arkansas':'AR','california':'CA',
  'colorado':'CO','connecticut':'CT','delaware':'DE','florida':'FL','georgia':'GA',
  'hawaii':'HI','idaho':'ID','illinois':'IL','indiana':'IN','iowa':'IA',
  'kansas':'KS','kentucky':'KY','louisiana':'LA','maine':'ME','maryland':'MD',
  'massachusetts':'MA','michigan':'MI','minnesota':'MN','mississippi':'MS',
  'missouri':'MO','montana':'MT','nebraska':'NE','nevada':'NV','new hampshire':'NH',
  'new jersey':'NJ','new mexico':'NM','new york':'NY','north carolina':'NC',
  'north dakota':'ND','ohio':'OH','oklahoma':'OK','oregon':'OR','pennsylvania':'PA',
  'rhode island':'RI','south carolina':'SC','south dakota':'SD','tennessee':'TN',
  'texas':'TX','utah':'UT','vermont':'VT','virginia':'VA','washington':'WA',
  'west virginia':'WV','wisconsin':'WI','wyoming':'WY','district of columbia':'DC'
};
function _abbrevState(s){
  if(!s) return '';
  var t=s.trim();
  if(/^[A-Za-z]{2}$/.test(t)) return t.toUpperCase();
  return _US_STATES[t.toLowerCase()]||t.toUpperCase().slice(0,2);
}
function parseUSAddress(raw){
  if(!raw) return {street:'',city:'',state:'',zip:''};
  var s=String(raw).replace(/\r?\n/g,',').replace(/\xa0/g,' ');
  var parts=s.split(',').map(function(p){ return p.trim(); }).filter(Boolean);
  if(!parts.length) return {street:'',city:'',state:'',zip:''};
  if(parts.length===1) return {street:parts[0],city:'',state:'',zip:''};

  var state='', zip='';

  // Last part may be: "CO 80201", "Colorado 80201", "CO", "Colorado", "80201"
  var last=parts[parts.length-1];
  // "State ZIP" — state can be 2-letter abbrev or full name (1-2 words)
  var szM=last.match(/^([A-Za-z][A-Za-z\s]{0,18}?)\s+(\d{5}(?:-\d{4})?)$/);
  if(szM){ state=_abbrevState(szM[1]); zip=szM[2]; parts=parts.slice(0,-1); }
  else if(/^[A-Za-z\s]{2,25}$/.test(last)){
    // Just a state name/abbrev
    var ab=_abbrevState(last);
    if(ab){ state=ab; parts=parts.slice(0,-1); }
  } else {
    var zipOnly=last.match(/^(\d{5}(?:-\d{4})?)$/);
    if(zipOnly){
      zip=zipOnly[1]; parts=parts.slice(0,-1);
      var maybeState=parts[parts.length-1];
      if(maybeState&&/^[A-Za-z\s]{2,25}$/.test(maybeState)){
        var ab2=_abbrevState(maybeState);
        if(ab2){ state=ab2; parts=parts.slice(0,-1); }
      }
    }
  }

  var city = parts.length>1 ? parts[parts.length-1] : (parts[0]&&(state||zip) ? parts[0] : '');
  var street = parts.length>1 ? parts.slice(0,-1).join(', ') : (state||zip||city ? parts[0]||'' : parts[0]||'');

  return {street:street, city:city, state:state, zip:zip};
}

function fmtI(n){ return '$'+Math.round(n||0); }



function divBadge(d){

  var map={Open:'b-gold','Non-Pro':'b-blue',Limited:'b-green',Intermediate:'b-purple',

    'Open Jr Horse':'b-gold','NP Jr Horse':'b-blue','Novice Horse':'b-gray'};

    drawEntryTable();

  function eTh(col,label){

  window.eSort_division=function(){ eSort('division'); };

        ||(e.division||'').toLowerCase().indexOf(q)>-1||(e.memberNum||'').toLowerCase().indexOf(q)>-1;

        if(_eSortCol==='status') return _eSortDir*((isFullyPaid(a)?0:1)-(isFullyPaid(b)?0:1));

        if(_eSortCol==='backNum') return _eSortDir*((parseInt(G.backNums[a.rowIndex])||9999)-(parseInt(G.backNums[b.rowIndex])||9999));

        var av=a[_eSortCol]||'', bv=b[_eSortCol]||'';

      });

    var isMobile=window.innerWidth<640;

        var isFS=isFullScratched(e.rowIndex);

        return '<div class="entry-card" data-rowidx="'+e.rowIndex+'"'+(isFS?' style="opacity:.55"':'')+'>'

          +'<div style="display:flex;align-items:center;gap:.6rem;margin-bottom:.4rem">'

          +'<input type="number" value="'+backNum+'" placeholder="#" onclick="event.stopPropagation()" onchange="G.backNums['+e.rowIndex+']=this.value;saveEntriesToStorage()" '

          +'style="width:52px;background:var(--bg);border:1px solid var(--border2);border-radius:5px;color:var(--accent);padding:.3rem .4rem;text-align:center;font-size:1rem;font-weight:700">'

          +'<div style="flex:1">'

          +'<div style="font-weight:700;font-size:.95rem">'+esc(e.name)+(isFS?' <span class="badge b-red" style="font-size:.6rem">Full Scratch</span>':'')+(e.addedAtShow?' <span class="badge" style="font-size:.6rem;background:rgba(52,152,219,.18);color:var(--blue)">Added at Show</span>':'')+'</div>'

          +'<div style="font-size:.78rem;color:var(--muted)">'+esc(e.horse)+(e.memberNum?' &middot; '+esc(e.memberNum):'')+'</div>'

          +'</div>'

          +paidBadge(e)

          +'</div>'

          +'<div style="display:flex;flex-wrap:wrap;gap:.3rem;align-items:center">'

          +divBadge(e.division)

          +assocTags(e.assocRaw)

          +'<span style="font-size:.78rem;color:var(--muted);margin-left:auto">'+fmt$(tabTotal(e))+'</span>'

          +'</div>'

          +'<div style="margin-top:.4rem;display:flex;gap:.25rem;flex-wrap:wrap">'

          +e.classes.map(function(c){

            var k=clsKey(c); var s=isScratched(k,e.rowIndex)||isFS;

            return '<span class="badge '+(s?'b-red':'b-gray')+'"'+(s?' style="text-decoration:line-through"':'')+'>'+esc(c.num||c.name.substring(0,10))+'</span>';

          }).join('')

          +'</div>'

          +'</div>';

      }).join('');

    } else {

      t='<table><thead><tr>'+eTh('backNum','Back#')+eTh('name','Rider')+eTh('horse','Horse')

        +'<th>Assoc</th>'+eTh('division','Division')+'<th>Classes</th>'+eTh('fees','Fees')+eTh('status','Status')+'</tr></thead><tbody>';

      list.forEach(function(e){

        var isFS=isFullScratched(e.rowIndex);

        t+='<tr style="cursor:pointer'+(isFS?';opacity:.55':'')+'" data-rowidx="'+e.rowIndex+'">'

          +'<td class="ctr bold" style="width:54px">'

          +'<input type="number" value="'+(G.backNums[e.rowIndex]||'')+'" placeholder="—" onclick="event.stopPropagation()" onchange="G.backNums['+e.rowIndex+']=this.value;saveEntriesToStorage()" style="width:48px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--accent);padding:3px 4px;text-align:center;font-size:.9rem">'

          +'</td>'

          +'<td><div class="bold">'+esc(e.name)+(isFS?' <span class="badge b-red" style="font-size:.65rem">Scratched</span>':'')+(e.addedAtShow?' <span class="badge" style="font-size:.62rem;background:rgba(52,152,219,.18);color:var(--blue)">Added at Show</span>':'')+'</div><div class="small">'+esc(e.memberNum||'No # on file')+'</div></td>'

          +'<td><div>'+esc(e.horse)+'</div><div class="small">'+esc(e.horseGender)+'</div></td>'

          +'<td>'+assocTags(e.assocRaw)+'</td>'

          +'<td>'+divBadge(e.division)+'</td>'

          +'<td class="small">'+e.classes.map(function(c){

            var k=clsKey(c); var s=isScratched(k,e.rowIndex)||isFS;

            return '<span class="badge '+(s?'b-red':'b-gray')+'" style="margin:1px'+(s?';text-decoration:line-through':'')+'">'

              +esc(c.num||c.name.substring(0,8))+'</span>';

          }).join('')+'</td>'

          +'<td class="bold">'+fmt$(tabTotal(e))+'</td>'

          +'<td>'+paidBadge(e)+'</td>'

          +'</tr>';

      });

      t+='</tbody></table>';

    }

    document.getElementById('et').innerHTML=t;

  }

  document.getElementById('eq').addEventListener('input', function(){ drawEntryTable(); });

  document.getElementById('et').addEventListener('click', function(ev){

    if(ev.target.tagName==='INPUT') return;

    var row=ev.target.closest('tr[data-rowidx]');

    if(row){ showEntryModal(parseInt(row.dataset.rowidx)); return; }

window.showAutoBackNumDialog=function(){

};

window.doAutoBackNums=function(){

  var list=G.entries.slice();

  if(order==='alpha') list.sort(function(a,b){ return (a.name||'').localeCompare(b.name||''); });

function wireImportDZ(){

  var dz=document.getElementById('dz'), fi=document.getElementById('fi');

  if(!dz||!fi) return;

  function loadFile(file){

    var stat=document.getElementById('imp-status');

    if(stat) stat.innerHTML='<span style="color:var(--muted)">Reading...</span>';

    var reader=new FileReader();

    reader.onload=function(e){

      try{

        var wb=XLSX.read(new Uint8Array(e.target.result),{type:'array',cellDates:true});

        var auditData=previewEntriesFile(wb);

        showEntriesAudit(auditData,wb);

      } catch(err){

        var el=document.getElementById('imp-status');

        if(el) el.innerHTML='<span style="color:var(--red)">Error: '+esc(err.message)+'</span>';

        console.error(err);

      }

    };

    reader.readAsArrayBuffer(file);

  }

  dz.addEventListener('click',function(e){ if(e.target!==fi) fi.click(); });

  fi.addEventListener('change',function(e){ if(e.target.files[0]) loadFile(e.target.files[0]); });

  dz.addEventListener('dragover',function(e){ e.preventDefault(); dz.classList.add('drag'); });

  dz.addEventListener('dragleave',function(){ dz.classList.remove('drag'); });

  dz.addEventListener('drop',function(e){ e.preventDefault(); dz.classList.remove('drag'); if(e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });

}



// ═══════════════════════ PAGE: CLASS LISTS ═══════════════════════

// ── Class sheet helpers ───────────────────────────────────────

function clsKey(cls){ return (cls.num||'')+'|'+(cls.name||''); }



function getClassOrder(key, entries){

  if(G.classOrder[key]&&G.classOrder[key].length){

    // Restore order, add any new entries not yet in the order

    var existing=G.classOrder[key];

    var inOrder=new Set(existing);

    var extras=entries.filter(function(e){ return !inOrder.has(e.rowIndex); }).map(function(e){ return e.rowIndex; });

    return existing.concat(extras);

  }

  // Default: sort by back number, then name

  return entries.slice().sort(function(a,b){

    var ba=parseInt(G.backNums[a.rowIndex])||9999, bb=parseInt(G.backNums[b.rowIndex])||9999;

    if(ba!==bb) return ba-bb;

    return (a.name||'').localeCompare(b.name||'');

  }).map(function(e){ return e.rowIndex; });

}



function isScratched(classKey, rowIndex){

  return (G.scratches[classKey]||[]).indexOf(rowIndex)>=0;

}

function isFullScratched(rowIndex){

  return (G.fullScratches||[]).indexOf(rowIndex)>=0;

}



window.clsScratch=function(classKey, rowIndex){

  if(!G.scratches[classKey]) G.scratches[classKey]=[];

  var idx=G.scratches[classKey].indexOf(rowIndex);

  if(idx>=0) G.scratches[classKey].splice(idx,1);

  else G.scratches[classKey].push(rowIndex);

  saveEntriesToStorage(); pgClasses();

};

window.clsFullScratch=function(rowIndex){

  if(!G.fullScratches) G.fullScratches=[];

  var idx=G.fullScratches.indexOf(rowIndex);

  if(idx>=0) G.fullScratches.splice(idx,1);

  else G.fullScratches.push(rowIndex);

  saveEntriesToStorage(); pgClasses();

};

window.clsMoveUp=function(classKey, rowIndex){

  var order=G.classOrder[classKey];

  if(!order) return;

  var i=order.indexOf(rowIndex);

  if(i>0){ var t=order[i-1]; order[i-1]=order[i]; order[i]=t; }

  saveEntriesToStorage(); pgClasses();

};

window.clsMoveDown=function(classKey, rowIndex){

  var order=G.classOrder[classKey];

  if(!order) return;

  var i=order.indexOf(rowIndex);

  if(i<order.length-1){ var t=order[i+1]; order[i+1]=order[i]; order[i]=t; }

  saveEntriesToStorage(); pgClasses();

};



var _dragSrcKey='', _dragSrcIdx=-1;

window.clsDragStart=function(classKey, rowIndex, ev){

  _dragSrcKey=classKey; _dragSrcIdx=rowIndex;

  ev.dataTransfer.effectAllowed='move';

  ev.currentTarget.classList.add('dragging');

};

window.clsDragEnd=function(ev){

  ev.currentTarget.classList.remove('dragging');

  document.querySelectorAll('.drag-over').forEach(function(el){ el.classList.remove('drag-over'); });

};

window.clsDragOver=function(ev){ ev.preventDefault(); ev.currentTarget.classList.add('drag-over'); };

window.clsDragLeave=function(ev){ ev.currentTarget.classList.remove('drag-over'); };

window.clsDrop=function(classKey, rowIndex, ev){

  ev.preventDefault();

  ev.currentTarget.classList.remove('drag-over');

  if(_dragSrcKey!==classKey||_dragSrcIdx===rowIndex) return;

  var order=G.classOrder[classKey];

  if(!order) return;

  var from=order.indexOf(_dragSrcIdx), to=order.indexOf(rowIndex);

  if(from<0||to<0) return;

  order.splice(from,1); order.splice(to,0,_dragSrcIdx);

  saveEntriesToStorage(); pgClasses();

};



var _clsCollapsed={};

window.clsToggleCollapse=function(key){

  _clsCollapsed[key]=!_clsCollapsed[key];

  var el=document.getElementById('cls-body-'+key.replace(/[^a-zA-Z0-9]/g,'_'));

  var btn=document.getElementById('cls-tog-'+key.replace(/[^a-zA-Z0-9]/g,'_'));

  if(el){ el.style.display=_clsCollapsed[key]?'none':'block'; }

  if(btn){ btn.textContent=_clsCollapsed[key]?'▶ Show':'▼ Hide'; }

};



function pgClasses(){

  var pg=document.getElementById('page');

  if(!G.entries.length){

    pg.innerHTML='<div class="card"><p class="empty-state">No entries loaded. <a href="#" onclick="showPage(\'entries\');return false" style="color:var(--accent)">Import entries first &rarr;</a></p></div>';

    return;

  }



  // Build class map

  var classMap={};

  G.entries.forEach(function(e){

    e.classes.forEach(function(cls){

      var key=clsKey(cls);

      if(!classMap[key]) classMap[key]={num:cls.num,name:cls.name,division:cls.division,org:cls.org,key:key,allEntries:[]};

      classMap[key].allEntries.push(e);

    });

  });



  var sorted=Object.values(classMap).sort(function(a,b){ return (parseInt(a.num)||999)-(parseInt(b.num)||999); });



  // Build running orders

  sorted.forEach(function(cls){

    if(!G.classOrder[cls.key]||!G.classOrder[cls.key].length){

      G.classOrder[cls.key]=getClassOrder(cls.key, cls.allEntries);

    }

  });



  var orgs=Array.from(new Set(sorted.map(function(c){ return c.org||'CoWN'; }))).sort();

  var activeOrg='All';

  var activeDivision='All';



  pg.innerHTML='<div class="btn-row no-print">'

    +'<button class="btn btn-accent btn-sm" onclick="printGoSheets()">&#128424; Print Go Sheets</button>'

    +'<a class="btn btn-dark btn-sm" href="scribe.html?show='+esc(G.showId||'')+'" target="_blank" style="margin-left:auto;text-decoration:none">&#9999;&#65039; Open Scribe</a>'

    +'</div>'

    +'<div class="pills no-print" id="org-pills"></div>'

    +'<div class="pills no-print" id="div-tabs" style="margin-top:.35rem;padding-bottom:.3rem;border-bottom:1px solid var(--border)"></div>'

    +'<div id="cl-content"></div>';



  function drawOrgPills(){

    document.getElementById('org-pills').innerHTML=(['All'].concat(orgs)).map(function(o){

      return '<button class="pill'+(o===activeOrg?' active':'')+'" data-org="'+esc(o)+'">'+esc(o)+'</button>';

    }).join('');

  }

  function getActiveDivisions(){

    var list=sorted.filter(function(c){ return activeOrg==='All'||(c.org||'CoWN')===activeOrg; });

    return Array.from(new Set(list.map(function(c){ return c.division||'General'; }))).sort();

  }

  function drawDivTabs(){

    var divs=getActiveDivisions();

    var tabEl=document.getElementById('div-tabs');

    if(divs.length<=1){ tabEl.innerHTML=''; return; }

    tabEl.innerHTML=(['All'].concat(divs)).map(function(d){

      return '<button class="pill'+(d===activeDivision?' active':'')+'" data-pill="'+esc(d)+'">'+esc(d)+'</button>';

    }).join('');

  }

  function drawAndWireDivTabs(){

    drawDivTabs();

    wirePillClicks('div-tabs', function(v){ activeDivision=v; drawAndWireDivTabs(); drawClassLists(); });

  }

  function drawAndWireOrgPills(){

    drawOrgPills();

    wirePillClicks('org-pills', function(v){ activeOrg=v; activeDivision='All'; drawAndWireOrgPills(); drawAndWireDivTabs(); drawClassLists(); });

  }

  drawAndWireOrgPills();

  drawAndWireDivTabs();



  function drawClassLists(){

    var list=sorted.filter(function(c){
      return (activeOrg==='All'||(c.org||'CoWN')===activeOrg)
          && (activeDivision==='All'||(c.division||'General')===activeDivision);
    });

    var html=list.map(function(cls){

      var key=cls.key;

      var order=G.classOrder[key]||[];

      var entryMap={};

      cls.allEntries.forEach(function(e){ entryMap[e.rowIndex]=e; });

      var orderedEntries=order.map(function(ri){ return entryMap[ri]; }).filter(Boolean);

      var activeCount=orderedEntries.filter(function(e){ return !isFullScratched(e.rowIndex)&&!isScratched(key,e.rowIndex); }).length;

      var scratchCount=orderedEntries.filter(function(e){ return isFullScratched(e.rowIndex)||isScratched(key,e.rowIndex); }).length;



      var rows=orderedEntries.map(function(e,i){

        var ri=e.rowIndex;

        var fullS=isFullScratched(ri), clsS=isScratched(key,ri);

        var rowCls='go-sheet-row'+(fullS?' full-scratched':clsS?' scratched':'');

        var keyEsc=key.replace(/'/g,"\\'");

        return '<div class="'+rowCls+'" draggable="true" '

          +'ondragstart="clsDragStart(\''+keyEsc+'\','+ri+',event)" '

          +'ondragend="clsDragEnd(event)" '

          +'ondragover="clsDragOver(event)" '

          +'ondragleave="clsDragLeave(event)" '

          +'ondrop="clsDrop(\''+keyEsc+'\','+ri+',event)">'

          +'<span class="drag-handle no-print">&#8597;</span>'

          +'<div class="no-print" style="display:flex;gap:.15rem;flex-shrink:0">'

          +'<button class="btn btn-dark btn-sm" style="padding:.15rem .3rem;font-size:.7rem" onclick="clsMoveUp(\''+keyEsc+'\','+ri+')" title="Move up">&#8679;</button>'

          +'<button class="btn btn-dark btn-sm" style="padding:.15rem .3rem;font-size:.7rem" onclick="clsMoveDown(\''+keyEsc+'\','+ri+')" title="Move down">&#8681;</button>'

          +'</div>'

          +'<span class="gs-backnum">'+(G.backNums[ri]||'—')+'</span>'

          +'<span class="gs-name">'+esc(e.name)+'</span>'

          +'<span class="gs-horse">'+esc(e.horse)+'</span>'

          +'<span class="gs-membernum no-print">'+esc(e.memberNum||'—')+'</span>'

          +'<div class="gs-actions no-print">'

          +(fullS

            ?'<button class="btn btn-sm" style="background:rgba(231,76,60,.15);color:var(--red);padding:.15rem .4rem;font-size:.72rem" onclick="clsFullScratch('+ri+')" title="Un-scratch from show">&#10227; Unscratch</button>'

            :(clsS

              ?'<button class="btn btn-sm" style="background:rgba(231,76,60,.15);color:var(--red);padding:.15rem .4rem;font-size:.72rem" onclick="clsScratch(\''+keyEsc+'\','+ri+')" title="Un-scratch from class">&#10227; Unscratch</button>'

              :'<button class="btn btn-dark btn-sm" style="padding:.15rem .4rem;font-size:.72rem" onclick="clsScratch(\''+keyEsc+'\','+ri+')" title="Scratch from this class">&#10007; Scratch</button>'

               +'<button class="btn btn-dark btn-sm" style="padding:.15rem .4rem;font-size:.72rem;color:var(--red)" onclick="clsFullScratch('+ri+')" title="Scratch from whole show">&#10007;&#10007; Full</button>'

            ))

          +'</div>'

          +'</div>';

      }).join('');



      var safeKey=key.replace(/[^a-zA-Z0-9]/g,'_');

      var keyEscQ=key.replace(/'/g,"\\'");

      var collapsed=!!_clsCollapsed[key];

      return '<div class="card" style="margin-bottom:.65rem">'

        +'<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.4rem;cursor:pointer" onclick="clsToggleCollapse(\''+keyEscQ+'\')">'

        +'<div style="display:flex;align-items:center;gap:.5rem;flex-wrap:wrap">'

        +'<button id="cls-tog-'+safeKey+'" class="btn btn-dark btn-sm no-print" style="padding:.15rem .4rem;font-size:.72rem;min-width:52px" onclick="event.stopPropagation();clsToggleCollapse(\''+keyEscQ+'\')">'+(collapsed?'&#9654; Show':'&#9660; Hide')+'</button>'

        +'<span style="font-family:Oswald;font-size:1.05rem;color:var(--accent)">Class '+esc(cls.num)+' &mdash; '+esc(cls.name)+'</span>'

        +' '+divBadge(cls.division)

        +(cls.org&&cls.org!=='CoWN'?'<span class="badge b-blue" style="margin-left:4px">'+esc(cls.org)+'</span>':'')

        +'</div>'

        +'<div style="display:flex;gap:.4rem;align-items:center;flex-wrap:wrap">'

        +'<span class="badge b-blue">'+activeCount+' going'+(scratchCount?' &middot; '+scratchCount+' scratched':'')+'</span>'

        +'<button class="btn btn-dark btn-sm no-print" onclick="event.stopPropagation();openScoreEntry(\''+keyEscQ+'\')">&#9998; Scores</button>'

        +'<button class="btn btn-dark btn-sm no-print" onclick="event.stopPropagation();printGoSheets(\''+keyEscQ+'\')">&#128424;</button>'

        +'</div>'

        +'</div>'

        +'<div id="cls-body-'+safeKey+'" style="margin-top:.65rem;'+(collapsed?'display:none':'')+'"><div id="rows-'+safeKey+'">'+rows+'</div></div>'

        +'</div>';

    }).join('');



    document.getElementById('cl-content').innerHTML=html||'<p class="empty-state">No classes found.</p>';

  }

  drawClassLists();

}



window.printGoSheets=function(onlyKey){

  var classMap={};

  G.entries.forEach(function(e){

    e.classes.forEach(function(cls){

      var key=clsKey(cls);

      if(!classMap[key]) classMap[key]={num:cls.num,name:cls.name,division:cls.division,org:cls.org,key:key,allEntries:[]};

      classMap[key].allEntries.push(e);

    });

  });

  var sorted=Object.values(classMap).sort(function(a,b){ return (parseInt(a.num)||999)-(parseInt(b.num)||999); });

  if(onlyKey) sorted=sorted.filter(function(c){ return c.key===onlyKey; });

  var showName=G.cfg.showName||G.showName||'Show';

  var showDate=G.cfg.showDate||'';



  var win=window.open('','_blank');

  var pages=sorted.map(function(cls){

    var key=cls.key;

    var order=G.classOrder[key]||[];

    var entryMap={};

// ─── Score Entry ────────────────────────────────────────────

// Build the list of active (non-scratched) entries for a class key in go-sheet order

function getGoEntries(key){

  var entryMap={};

  G.entries.forEach(function(e){

    e.classes.forEach(function(cls){

      if(clsKey(cls)===key) entryMap[e.rowIndex]=e;

    });

  });

  var order=G.classOrder[key]||Object.keys(entryMap).map(Number);

  return order.map(function(ri){ return entryMap[ri]; }).filter(function(e){

    return e&&!isFullScratched(e.rowIndex)&&!isScratched(key,e.rowIndex);

  });

}



// Pull existing manually-entered (or imported) scores for a class

function getExistingScores(cls){

  var map={};

  (G.results||[]).forEach(function(r){

    if(r.org===cls.org && r.division===cls.division && r.discipline===cls.name){

      map[r.rider]={score:r.score, place:r.place};

    }

  });

  return map;

}



// Compute placements from an array of {rowIndex, score} — handles ties

function computePlacements(scored){

  var sorted=scored.slice().sort(function(a,b){ return (b.score||0)-(a.score||0); });

  var place=1;

  for(var i=0;i<sorted.length;){

    var s=sorted[i].score||0;

    var j=i;

    while(j<sorted.length&&(sorted[j].score||0)===s) j++;

    for(var k=i;k<j;k++) sorted[k].place=(s>0)?place:0;

    if(s>0) place=j+1;

    i=j;

  }

  var pm={};

  sorted.forEach(function(x){ pm[x.rowIndex]=x.place; });

  return pm;

}



// Save a set of {rowIndex, score, place} into G.results for a class

function commitScores(cls, entries, scores){

  // Remove existing rows for this class

  var keep=[];

  (G.results||[]).forEach(function(r){

    if(!(r.org===cls.org && r.division===cls.division && r.discipline===cls.name)) keep.push(r);

  });

  var total=entries.length;

  entries.forEach(function(e){

    var sc=scores[e.rowIndex]||{score:0,place:0};

    if(!sc.score) return; // skip blank

    keep.push({

      showName: G.cfg.showName||G.showName||'',

      org:      cls.org||'CoWN',

      division: cls.division||'',

      discipline: cls.name||'',

      rawClass: (cls.num?cls.num+' ':'')+cls.name,

      entries:  total,

      score:    sc.score,

      place:    sc.place,

      horse:    e.horse||'',

      rider:    e.name||'',

      riderNum: e.memberNum||'',

      pts:      0,

      money:    0,

      addedMoney:0,

      goRound:  '',

      _manual:  true

    });

  });

  G.results=keep;

  saveResultsToStorage();

}



// Secretary score-entry modal

window.openScoreEntry=function(key){

  var cls=null;

  G.entries.forEach(function(e){

    e.classes.forEach(function(c){ if(clsKey(c)===key&&!cls) cls=c; });

  });

  if(!cls) return;



  var entries=getGoEntries(key);

  var existingScores=getExistingScores(cls);

  var mr=document.getElementById('modal-root');



  function renderModal(scoreState){

    var rows=entries.map(function(e,i){

      var rider=e.name||'';

      var ex=existingScores[rider]||{};

      var cur=scoreState[e.rowIndex];

      var val=(cur!==undefined)?cur:(ex.score||'');

      var hasScore=cur!==undefined?(cur>0):(ex.score>0);

      return '<div class="score-entry-row" style="display:flex;align-items:center;gap:.5rem;padding:.4rem .2rem;border-bottom:1px solid var(--border)">'

        +'<span style="width:36px;text-align:center;font-weight:700;color:var(--accent);font-size:.9rem">'+(G.backNums[e.rowIndex]||'—')+'</span>'

        +'<div style="flex:1;min-width:0">'

        +'<div style="font-size:.75rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(e.horse||'')+'</div>'

        +'</div>'

        +'<input type="number" step="0.001" min="0" max="300" placeholder="—" value="'+esc(String(val))+'" '

        +'data-ri="'+e.rowIndex+'" '

        +'style="width:80px;background:var(--bg);border:1px solid var(--border2);border-radius:6px;color:var(--text);'

        +'padding:.3rem .4rem;font-size:.95rem;text-align:right'+(hasScore?';border-color:var(--accent)':'')+'" '

        +'oninput="scoreEntryInput('+e.rowIndex+',this.value)">'

        +'</div>';

    }).join('');



    mr.innerHTML='<div class="modal-bg" id="se-modal-bg" onclick="if(event.target===this)closeModal()">'

      +'<div class="modal" style="max-width:520px">'

      +'<h2>&#9998; '+esc(cls.num?'Class '+cls.num+' — ':'')+esc(cls.name)+'</h2>'

      +'<div style="font-size:.8rem;color:var(--muted);margin-bottom:1rem">'+esc(cls.division||'')+(cls.org&&cls.org!=='CoWN'?' &middot; '+esc(cls.org):'')+'</div>'

      +'<div style="max-height:55vh;overflow-y:auto">'+rows+'</div>'

      +'<div style="display:flex;gap:.5rem;margin-top:1rem;flex-wrap:wrap">'

      +'<button class="btn btn-dark btn-sm" onclick="scoreEntryAutoPlace()">&#8645; Auto-Place from Scores</button>'

      +'<button class="btn btn-accent" style="margin-left:auto" onclick="scoreEntrySave(\''+key.replace(/'/g,"\\'")+'\')">&#10003; Save Scores</button>'

      +'<button class="btn btn-dark" onclick="closeModal()">Cancel</button>'

      +'</div>'

      +'</div>'

      +'</div>';

  }



  // Score state accumulator (rowIndex -> score value)

  window._seState={};

  window._seCls=cls;

  window._seEntries=entries;

  window._seKey=key;



  // Pre-populate from existing

  entries.forEach(function(e){

    var ex=existingScores[e.name||''];

    if(ex&&ex.score) window._seState[e.rowIndex]=ex.score;

  });



  renderModal(window._seState);



  window.scoreEntryInput=function(ri, val){

    var v=parseFloat(val);

    window._seState[ri]=isNaN(v)?0:v;

    // Update border color live

    var inp=document.querySelector('input[data-ri="'+ri+'"]');

    if(inp) inp.style.borderColor=(v>0)?'var(--accent)':'var(--border2)';

  };



  window.scoreEntryAutoPlace=function(){

    var scored=entries.map(function(e){

      return {rowIndex:e.rowIndex, score:window._seState[e.rowIndex]||0};

    });

    var pm=computePlacements(scored);

    window._sePlaces=pm;

    // Show places next to inputs

    entries.forEach(function(e){

      var p=pm[e.rowIndex]||0;

      var inp=document.querySelector('input[data-ri="'+e.rowIndex+'"]');

      if(!inp) return;

      var row=inp.closest('.score-entry-row');

      var lbl=row.querySelector('.place-lbl');

      if(!lbl){ lbl=document.createElement('span'); lbl.className='place-lbl';

        lbl.style.cssText='width:28px;text-align:center;font-size:.82rem;font-weight:700;color:var(--accent)';

        row.appendChild(lbl);

      }

      lbl.textContent=p?ordinal(p):'DQ';

    });

  };



  window.scoreEntrySave=function(key){

    var scored=entries.map(function(e){

      return {rowIndex:e.rowIndex, score:window._seState[e.rowIndex]||0};

    });

    var pm=window._sePlaces||computePlacements(scored);

    var scoresFull={};

    entries.forEach(function(e){

      scoresFull[e.rowIndex]={score:window._seState[e.rowIndex]||0, place:pm[e.rowIndex]||0};

    });

    commitScores(cls, entries, scoresFull);

    closeModal();

    // Flash confirmation

    var notice=document.createElement('div');

    notice.textContent='Scores saved for '+cls.name+' ('+cls.division+')';

    notice.style.cssText='position:fixed;bottom:1.2rem;right:1.2rem;background:var(--accent);color:#000;'

      +'padding:.5rem 1rem;border-radius:8px;font-weight:700;font-size:.85rem;z-index:300';

    document.body.appendChild(notice);

    setTimeout(function(){ notice.remove(); },2500);

  };

};



function ordinal(n){

  var s=['th','st','nd','rd'],v=n%100;

  return n+(s[(v-20)%10]||s[v]||s[0]);

}

function getTemplateForDisc(name){

  if(!name) return null;

  if(SCORE_TEMPLATES[name]) return name;

  var n=name.toLowerCase();

  // Novice / Rookie Cow Work
  if(n.indexOf('novice')>=0&&n.indexOf('cow')>=0) return 'Novice Cow Work';
  if(n.indexOf('rookie')>=0&&n.indexOf('cow')>=0) return 'Novice Cow Work';

  // BDBD / Limited
  if(n.indexOf('bdbd')>=0) return 'BDBD Cow Work';
  if(n.indexOf('limited')>=0&&n.indexOf('cow')>=0) return 'BDBD Cow Work';
  if(n.indexOf('ltd')>=0&&n.indexOf('cow')>=0) return 'BDBD Cow Work';

  // NRCHA — must precede generic ranch/cow/rein checks
  if(n.indexOf('nrcha')>=0){
    if(n.indexOf('herd')>=0) return 'NRCHA Herd Work';
    if(n.indexOf('steer')>=0) return 'NRCHA Steer Stopping';
    if(n.indexOf('box')>=0&&n.indexOf('drive')>=0) return 'NRCHA Box Drive';
    if(n.indexOf('boxing')>=0) return 'NRCHA Boxing';
    if(n.indexOf('cow')>=0) return 'NRCHA Cow Work';
    if(n.indexOf('rein')>=0) return 'NRCHA Reined Work';
  }

  // APHA-specific
  if(n.indexOf('apha')>=0){
    if(n.indexOf('ranch')>=0&&n.indexOf('rein')>=0) return 'Ranch Reining (APHA)';
    if(n.indexOf('cutting')>=0) return 'Ranch Cutting (APHA)';
    if(n.indexOf('ranch')>=0&&n.indexOf('trail')>=0) return 'Ranch Trail (10)';
    if(n.indexOf('box')>=0&&n.indexOf('drive')>=0) return 'Ranch Box Drive';
    if(n.indexOf('boxing')>=0) return 'Ranch Boxing';
  }

  // ApHC-specific
  if(n.indexOf('aphc')>=0){
    if(n.indexOf('ranch')>=0&&n.indexOf('rein')>=0) return 'Ranch Reining (ApHC)';
    if(n.indexOf('ranch')>=0&&n.indexOf('riding')>=0) return 'Ranch Riding (ApHC)';
    if(n.indexOf('cutting')>=0) return 'Ranch Cutting (APHA)';
    if(n.indexOf('ranch')>=0&&n.indexOf('trail')>=0) return 'Ranch Trail (10)';
    if(n.indexOf('cow')>=0) return 'ApHC Cow Work';
  }

  // Ranch Boxing / Box Drive (non-NRCHA, before generic cow check)
  if(n.indexOf('box')>=0&&n.indexOf('drive')>=0) return 'Ranch Box Drive';
  if(n.indexOf('boxing')>=0) return 'Ranch Boxing';

  // Ranch Cutting / Cutting
  if(n.indexOf('ranch')>=0&&n.indexOf('cutting')>=0) return 'Ranch Cutting';
  if(n.indexOf('cutting')>=0) return 'Cutting';

  if(n.indexOf('cow')>=0) return 'Cow Work';

  // Ranch disciplines (VRH / generic)
  if(n.indexOf('ranch')>=0&&n.indexOf('trail')>=0) return 'Ranch Trail';

  if(n.indexOf('ranch')>=0&&(n.indexOf('pleasure')>=0||n.indexOf('rail')>=0)) return 'Ranch Rail Pleasure';

  if(n.indexOf('ranch')>=0&&n.indexOf('rein')>=0) return 'Ranch Reining';
  if(n.indexOf('ranch')>=0&&n.indexOf('riding')>=0) return 'Ranch Riding';

  // AQHA / generic
  if(n.indexOf('rein')>=0) return 'Reining';

  if(n.indexOf('trail')>=0) return 'Trail';

  if(n.indexOf('pleasure')>=0) return 'Pleasure';

  return null;

}



// ─── Scribe Mode — guided one-maneuver-at-a-time ──────────────

window.openScribeMode=function(initialKey){

  var classMap={};

  G.entries.forEach(function(e){

    e.classes.forEach(function(cls){

      var k=clsKey(cls);

      if(!classMap[k]) classMap[k]={key:k,num:cls.num,name:cls.name,division:cls.division,org:cls.org};

    });

  });

  var classList=Object.values(classMap).sort(function(a,b){

    return (parseInt(a.num)||999)-(parseInt(b.num)||999);

  });

  if(!classList.length){ alert('No classes loaded. Import entries first.'); return; }



  var selKey=initialKey||classList[0].key;

  var riderIdx=0;

  var mvrIdx=0;

  var sheetData=G.scratchpad;  // reference — writes persist automatically

  var tmplOverride={};
  try{ var _to=localStorage.getItem('gp_tmploverride_'+G.showId); if(_to) tmplOverride=JSON.parse(_to); } catch(e){}



  var mr=document.getElementById('modal-root');

  var MVALS=[-1.5,-1,-0.5,0,0.5,1,1.5];

  var MLABELS=['−1½','−1','−½','0','+½','+1','+1½'];



  // Inject CSS once

      '.scr-mvr-name{font-family:Oswald;font-size:1.1rem;color:var(--accent);margin-bottom:.55rem;letter-spacing:.02em}'+

        'border-radius:6px;cursor:pointer;background:var(--card2);line-height:1;text-align:center;min-height:46px}'+

      '.scr-mb.neg{color:#e74c3c;border-color:rgba(231,76,60,.3)}'+

      '.scr-mb.zero{color:var(--muted)}'+

      '.scr-mb.pos{color:#2ecc71;border-color:rgba(46,204,113,.3)}'+

      '.scr-mb.sel{background:var(--accent);color:#000;border-color:var(--accent)}'+

      // Penalty section

      '.scr-pen-section{border-top:1px solid var(--border);padding-top:.45rem}'+

      '.scr-pen-lbl{font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:.3rem;display:flex;align-items:center;justify-content:space-between}'+

      '.scr-pen-btns{display:flex;gap:3px;margin-bottom:.25rem}'+

      '.scr-padd{flex:1;padding:.5rem 0;font-size:.8rem;font-weight:700;border:1px solid rgba(231,76,60,.4);'+

        'border-radius:6px;cursor:pointer;background:rgba(231,76,60,.07);color:#e74c3c;min-height:42px;text-align:center}'+

      '.scr-padd:active{background:rgba(231,76,60,.2)}'+

      '.scr-pen-total{font-size:.78rem;color:#e74c3c;font-weight:700}'+

      '.scr-pclr{padding:.2rem .5rem;font-size:.72rem;border:1px solid var(--border2);border-radius:4px;cursor:pointer;background:transparent;color:var(--muted)}'+
      '.scr-pen-note{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:4px;color:var(--text);padding:.2rem .38rem;font-size:.68rem;margin-top:.2rem;text-transform:uppercase;letter-spacing:.04em}'+

      // Maneuver nav

      '.scr-mvr-nav{display:flex;align-items:center;justify-content:space-between;gap:.4rem;margin-bottom:.45rem}'+

      '.scr-mvr-nav-btn{padding:.4rem .7rem;border:1px solid var(--border2);border-radius:7px;background:var(--card2);color:var(--text);cursor:pointer;font-size:.88rem;font-weight:700}'+

      '.scr-mvr-nav-btn:disabled{opacity:.3;cursor:default}'+

      '.scr-mvr-pos{font-size:.78rem;color:var(--muted)}'+

      // Score display

      '.scr-big{font-family:Oswald;font-size:1.85rem;font-weight:700;line-height:1;text-align:right}'+

      // Status & nav buttons

      '.scr-status-btn{flex:1;padding:.42rem;border:1px solid var(--border2);border-radius:7px;background:transparent;color:var(--text);cursor:pointer;font-size:.78rem;font-weight:600}'+

      '.scr-status-btn.on.op{background:rgba(231,76,60,.15);border-color:#e74c3c;color:#e74c3c}'+

      '.scr-status-btn.on.dq{background:#e74c3c;border-color:#e74c3c;color:#fff}'+

      '.scr-rnav{padding:.35rem .55rem;border-radius:6px;border:1px solid var(--border2);background:var(--card2);color:var(--text);cursor:pointer;font-size:.9rem;flex-shrink:0}'+

      '.scr-rnav:disabled{opacity:.3;cursor:default}'+

      // Horizontal maneuver scroll

      '.scr-hscroll{display:flex;gap:10px;overflow-x:auto;padding:.5rem .65rem .75rem;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}'+

      '.scr-hscroll::-webkit-scrollbar{height:4px}.scr-hscroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}'+

      '.scr-mcard{flex-shrink:0;width:210px;scroll-snap-align:start;background:var(--card);border:2px solid var(--border2);border-radius:10px;padding:.6rem .65rem}'+

      '.scr-mcard.touched{border-color:rgba(200,146,42,.55)}'+

      '.scr-mc-name{font-family:Oswald;font-size:.92rem;color:var(--accent);margin-bottom:.12rem;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}'+

      '.scr-mc-vals{font-size:.7rem;min-height:.85rem;margin-bottom:.28rem}'+

      '.scr-mcard.dq-on{border-color:#e74c3c;background:rgba(231,76,60,.08)}'+

      '.scr-mcard.op-on{border-color:#e07c00;background:rgba(224,124,0,.06)}'+

      '.scr-mc-sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin-bottom:.3rem}'+

      '.scr-mb3{padding:.58rem 0;font-size:.92rem;font-weight:800;border:1px solid var(--border2);border-radius:5px;cursor:pointer;background:var(--card2);line-height:1;text-align:center;min-height:44px}'+

      '.scr-mb3.neg{color:#e74c3c;border-color:rgba(231,76,60,.3)}'+

      '.scr-mb3.zero{color:var(--muted);grid-column:1/-1;min-height:34px;padding:.42rem 0;font-size:.78rem}'+

      '.scr-mb3.pos{color:#2ecc71;border-color:rgba(46,204,113,.3)}'+

      '.scr-mb3.sel{background:var(--accent);color:#000;border-color:var(--accent)}'+

      '.scr-mc-pbtns{display:flex;gap:2px;margin-bottom:.2rem}'+

      '.scr-padd3{flex:1;padding:.38rem 0;font-size:.78rem;font-weight:700;border:1px solid rgba(231,76,60,.4);border-radius:5px;cursor:pointer;background:rgba(231,76,60,.07);color:#e74c3c;min-height:34px;text-align:center}'+

      '.scr-pen-lbl3{font-size:.6rem;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:.22rem}';

    document.head.appendChild(sty);

  }



  function getCls(){ return classMap[selKey]; }

  function getTmplName(){ return tmplOverride[selKey]||getTemplateForDisc(getCls().name); }

  function getTmpl(){ var n=getTmplName(); return n?SCORE_TEMPLATES[n]:null; }



  // Every discipline uses per-maneuver {score, pen}

  function initState(ri){

    var tmpl=getTmpl();

    if(!sheetData[selKey]) sheetData[selKey]={};

    if(!sheetData[selKey][ri]){

      sheetData[selKey][ri]={

        m: tmpl?tmpl.maneuvers.map(function(){ return {score:0,pen:0}; }):[],

        isOP:false, isDQ:false, nrha:0, comments:'', rawScore:0

      };

    }

    return sheetData[selKey][ri];

  }



  function calcTotal(s, tmpl){

    if(s.isDQ) return 0;

    if(s.isOP) return null;

    if(!tmpl) return s.rawScore||0;

    var ps=s.m.reduce(function(a,mi){ return a+mi.pen; },0);

    if(tmpl.cowCount&&tmpl.categoriesPerCow){

      var cowSum=0;

      for(var c=0;c<tmpl.cowCount;c++){

        var cSum=0;

        for(var k=0;k<tmpl.categoriesPerCow;k++) cSum+=(s.m[c*tmpl.categoriesPerCow+k]||{score:0}).score;

        cowSum+=cSum;

      }

      var postSum=0;
      if(tmpl.postCowManeuvers){
        var startIdx=tmpl.cowCount*tmpl.categoriesPerCow;
        for(var p=0;p<tmpl.postCowManeuvers;p++) postSum+=(s.m[startIdx+p]||{score:0}).score;
      }
      return Math.round((70+cowSum/tmpl.cowCount+postSum-ps)*1000)/1000;

    }

    var ms=s.m.reduce(function(a,mi){ return a+mi.score; },0);

    return Math.round((70+ms-ps+(s.nrha||0))*1000)/1000;

  }



  function isDone(ri){

    if(!sheetData[selKey]||!sheetData[selKey][ri]) return false;

    var s=sheetData[selKey][ri];

    return s.isDQ||s.isOP||s.rawScore>0||s.m.some(function(mi){ return mi.score!==0||mi.pen>0; });

  }



  function render(){

    var savedScroll=(document.querySelector('.scr-hscroll')||{scrollLeft:0}).scrollLeft;

    var cls=getCls();

    var entries=getGoEntries(selKey);

    if(!entries.length){

      mr.innerHTML='<div class="scr-wrap"><div style="padding:2rem;text-align:center">'

        +'<p style="margin-bottom:1rem">No active entries.</p>'

        +'<button class="btn btn-dark" onclick="closeScribeMode()">Close</button></div></div>';

      return;

    }

    if(riderIdx<0) riderIdx=0;

    if(riderIdx>=entries.length) riderIdx=entries.length-1;



    var entry=entries[riderIdx];

    var ri=entry.rowIndex;

    var s=initState(ri);

    var tmpl=getTmpl();

    var tmplName=getTmplName();



    // Clamp maneuver index

    var mvrCount=tmpl?tmpl.maneuvers.length:0;

    if(mvrIdx<0) mvrIdx=0;

    if(mvrCount>0&&mvrIdx>=mvrCount) mvrIdx=mvrCount-1;



    var total=calcTotal(s,tmpl);

    var totalStr=s.isDQ?'DQ':s.isOP?'OP':(total!==null?total.toFixed(1):'—');

    var totalColor=s.isDQ?'#e74c3c':s.isOP?'#e07c00':'var(--accent)';

    var manSum=s.m.reduce(function(a,mi){ return a+mi.score; },0);

    var penSum=s.m.reduce(function(a,mi){ return a+mi.pen; },0);



    // Class dropdown

    var clsOpts=classList.map(function(c){

      return '<option value="'+esc(c.key)+'"'+(c.key===selKey?' selected':'')+'>Class '

        +esc(c.num||'?')+' — '+esc(c.name)+' ('+esc(c.division||'')+')</option>';

    }).join('');



    // Rider progress dots

    var dots=entries.map(function(e,i){

      var done=isDone(e.rowIndex);

      return '<span title="'+esc(e.name)+'" style="width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0;margin:1px;background:'

        +(i===riderIdx?'var(--accent)':(done?'rgba(200,146,42,.55)':'var(--border2)'))+'""></span>';

    }).join('');



    // Template switcher

    var tmplBtns=Object.keys(SCORE_TEMPLATES).map(function(t){

      return '<button class="btn btn-sm '+(t===tmplName?'btn-accent':'btn-dark')+'" '

        +'style="font-size:.68rem;padding:.18rem .4rem" '

        +'onclick="scrSetTmpl(\''+t.replace(/'/g,"\\'")+'\')">'+esc(t)+'</button>';

    }).join('');



    // ── Horizontal maneuver scroll — all maneuvers side by side ──

    var statusCardClass=s.isDQ?' dq-on':s.isOP?' op-on':'';

    var statusBadge=s.isDQ

      ?'<div style="background:#e74c3c;color:#fff;font-size:.6rem;font-weight:800;padding:.1rem .35rem;border-radius:3px;display:inline-block;margin-bottom:.18rem">DQ</div>'

      :s.isOP

      ?'<div style="background:#e07c00;color:#fff;font-size:.6rem;font-weight:800;padding:.1rem .35rem;border-radius:3px;display:inline-block;margin-bottom:.18rem">OP</div>'

      :'';

    var hscrollHtml='';

    if(tmpl){

      hscrollHtml='<div class="scr-hscroll">';

      var scrScorePairs=tmpl.scorePairs||[[-1.5,0.5,'−1½','+½'],[-1,1,'−1','+1'],[-0.5,1.5,'−½','+1½']];

      var scrZeroLabel=tmpl.zeroLabel||'0';

      tmpl.maneuvers.forEach(function(mname,mi){

        // Cow group divider card for NCHA cutting
        if(tmpl.cowCount&&tmpl.categoriesPerCow&&mi%tmpl.categoriesPerCow===0&&mi<tmpl.cowCount*tmpl.categoriesPerCow){
          var cowNum=Math.floor(mi/tmpl.categoriesPerCow)+1;
          var cSum=0;
          for(var ck=0;ck<tmpl.categoriesPerCow;ck++) cSum+=(sheetData[selKey]&&sheetData[selKey][ri]&&sheetData[selKey][ri].m[((cowNum-1)*tmpl.categoriesPerCow+ck)]||{score:0}).score;
          var cColor=cSum>0?'var(--green)':cSum<0?'var(--red)':'var(--muted)';
          hscrollHtml+='<div class="scr-mcard" style="width:80px;background:var(--bg);border-color:var(--accent);'
            +'display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.4rem">'
            +'<div style="font-family:Oswald;font-size:1rem;color:var(--accent)">Cow '+cowNum+'</div>'
            +'<div style="font-size:.65rem;color:var(--muted)">'+tmpl.categoriesPerCow+' categories</div>'
            +'<div style="font-size:1.3rem;font-weight:700;color:'+cColor+'">'+(cSum>=0?'+':'')+cSum.toFixed(1)+'</div>'
            +'</div>';
        }

        var cm=s.m[mi];

        var penVals=tmpl.penValues||[];

        var touched=cm.score!==0||cm.pen>0;

        // Build neg/pos buttons from scorePairs
        var negBtns=scrScorePairs.map(function(p){
          return '<button class="scr-mb3 neg'+(cm.score===p[0]?' sel':'')+'" onclick="scrSetM('+mi+','+p[0]+')">'+p[2]+'</button>';
        }).join('');

        var posBtns=scrScorePairs.map(function(p){
          return '<button class="scr-mb3 pos'+(cm.score===p[1]?' sel':'')+'" onclick="scrSetM('+mi+','+p[1]+')">'+p[3]+'</button>';
        }).join('');

        var zeroBtn='<button class="scr-mb3 zero'+(cm.score===0?' sel':'')+'" onclick="scrSetM('+mi+',0)">'+scrZeroLabel+'</button>';

        var penBtns=penVals.map(function(pv){

          return '<button class="scr-padd3" onclick="scrMPenAdd('+mi+','+pv+')">'+(pv===0.5?'½':pv)+' pen</button>';

        }).join('');

        var scoreDisp=cm.score!==0

          ?(cm.score>0?'<span style="color:#2ecc71;font-weight:700">+'+cm.score+'</span>':'<span style="color:#e74c3c;font-weight:700">'+cm.score+'</span>')

          :'<span style="color:var(--muted)">0</span>';

        var penDisp=cm.pen>0?'<span style="color:#e74c3c;font-weight:700;margin-left:.35rem">−'+cm.pen+(cm.penNote?' ('+esc(cm.penNote)+')':'')+' pen</span>':'';

        hscrollHtml+='<div class="scr-mcard'+(touched?' touched':'')+statusCardClass+'">'

          +statusBadge

          +'<div class="scr-mc-name">'+esc(mname)+'</div>'

          +'<div class="scr-mc-vals">'+scoreDisp+penDisp+'</div>'

          // Penalties FIRST

          +(penVals.length

            ?'<div class="scr-pen-lbl3">Penalty</div>'

             +'<div class="scr-mc-pbtns">'+penBtns+'</div>'

             +(cm.pen>0?'<button class="scr-pclr" style="margin-bottom:.3rem" onclick="scrMPenClr('+mi+')">✕ clear penalty</button>':'')
             +(cm.pen>0?'<input class="scr-pen-note" type="text" maxlength="12" placeholder="Code (e.g. W/O)" value="'+esc(cm.penNote||'')+'" onchange="scrSetPenNote('+mi+',this.value)">':'')

            :'')

          // Score grid

          +'<div class="scr-pen-lbl3">Score</div>'

          +'<div class="scr-mc-sgrid">'+negBtns+posBtns+zeroBtn+'</div>'

          +'</div>';

      });

      hscrollHtml+='</div>';

    } else {

      // Unknown discipline — raw score input

      hscrollHtml='<div style="padding:.4rem .65rem">'

        +'<div class="scr-mcard" style="width:auto">'

        +'<div style="font-size:.6rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:.3rem">Final Score</div>'

        +'<input type="number" inputmode="decimal" step="0.001" min="0" max="300" placeholder="70.000" '

        +'value="'+(s.rawScore||'')+'" '

        +'style="width:140px;background:var(--bg);border:2px solid var(--accent);border-radius:8px;'

        +'color:var(--text);padding:.5rem .7rem;font-size:1.2rem;font-weight:700;text-align:center;display:block" '

        +'oninput="scrSetRaw(this.value)">'

        +'</div></div>';

    }



    // NRHA

    var nrhaHtml=(tmpl&&tmpl.hasNRHA)

      ?'<div style="display:flex;align-items:center;gap:.5rem;margin:.4rem 0">'

        +'<span style="font-size:.78rem;flex:1">Natural Ranch Horse Appearance</span>'

        +'<input type="number" step="0.5" min="-5" max="5" placeholder="0" value="'+(s.nrha||'')+'" '

        +'style="width:58px;background:var(--bg);border:1px solid var(--border2);border-radius:5px;'

        +'color:var(--text);padding:.22rem .35rem;text-align:center;font-size:.88rem" oninput="scrSetNRHA(this.value)"></div>'

      :'';



    var commHtml=(tmpl&&tmpl.hasComments)

      ?'<div style="font-size:.6rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:.4rem 0 .2rem">Comments</div>'

        +'<textarea rows="2" placeholder="Comments..." '

        +'style="width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:6px;'

        +'color:var(--text);padding:.3rem .45rem;font-size:.8rem;resize:none" '

        +'oninput="scrSetComments(this.value)">'+esc(s.comments||'')+'</textarea>'

      :'';



    // ── Assemble ───────────────────────────────────────────────

    mr.innerHTML='<div class="scr-wrap"><div class="scr-inner">'

      // Header

      +'<div class="scr-head">'

      +'<button class="scr-rnav" onclick="closeScribeMode()">✕</button>'

      +'<select onchange="scrSelClass(this.value)" style="flex:1;background:var(--card);border:1px solid var(--border2);border-radius:5px;color:var(--text);padding:.26rem .38rem;font-size:.76rem">'+clsOpts+'</select>'

      +'</div>'

      // Rider bar

      +'<div class="scr-rider-bar">'

      +'<button class="scr-rnav" onclick="scrPrevRider()" '+(riderIdx===0?'disabled':'')+'>◀</button>'

      +'<div style="flex:1;min-width:0;text-align:center">'

      +'<div style="font-weight:700;font-size:.87rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'

      +'<span style="color:var(--accent);margin-right:.3rem">#'+(G.backNums[ri]||'—')+'</span>'+esc(entry.name||'')+'</div>'

      +'<div style="font-size:.7rem;color:var(--muted)">'+esc(entry.horse||'')+'</div>'

      +'<div style="display:flex;gap:2px;justify-content:center;margin-top:.12rem;flex-wrap:wrap">'+dots+'</div>'

      +'</div>'

      +'<button class="scr-rnav" onclick="scrNextRider()" '+(riderIdx>=entries.length-1?'disabled':'')+'>▶</button>'

      +'</div>'

      // Total bar

      +'<div class="scr-total-bar">'

      +'<div style="font-size:.68rem;color:var(--muted);line-height:1.4">'

      +'<div>Base 70</div>'

      +(manSum!==0?'<div style="color:'+(manSum>=0?'#2ecc71':'#e74c3c')+'">'+(manSum>=0?'+':'')+manSum.toFixed(1)+'</div>':'')

      +(penSum>0?'<div style="color:#e74c3c">−'+penSum.toFixed(1)+' pen</div>':'')

      +'</div>'

      +'<div class="scr-big" style="color:'+totalColor+'">'+totalStr+'</div>'

      +'<div style="font-size:.66rem;color:var(--muted);text-align:right">Rider '+(riderIdx+1)+'/'+entries.length+'</div>'

      +'</div>'

      // Body

      +'<div class="scr-body" style="padding:.4rem 0">'

      // Template switcher (compact, zero-padded sides)

      +'<div style="display:flex;flex-wrap:wrap;gap:.25rem;padding:0 .65rem .35rem">'+tmplBtns+'</div>'

      // Horizontal maneuver scroll — full bleed so first card starts flush

      +hscrollHtml

      // NRHA + comments (padded)

      +'<div style="padding:0 .65rem">'

      +nrhaHtml+commHtml

      // Status

      +'<div style="display:flex;gap:.35rem;margin-top:.45rem">'

      +'<button class="scr-status-btn'+(s.isOP?' on op':' op')+'" onclick="scrToggleOP()">'+(s.isOP?'✓ ':'')+'Off Pattern</button>'

      +'<button class="scr-status-btn'+(s.isDQ?' on dq':' dq')+'" onclick="scrToggleDQ()">'+(s.isDQ?'✓ ':'')+'Disqualified</button>'

      +'</div>'

      +'</div>'

      +'</div>'

      // Footer

      +'<div class="scr-foot">'

      +'<button class="btn btn-accent" style="flex:1;padding:.55rem;font-size:.9rem;font-weight:700" onclick="scrPost()">✓ Post Score</button>'

      +'</div>'

      +'</div></div>';



    var hs=document.querySelector('.scr-hscroll');

    if(hs) hs.scrollLeft=savedScroll;



    // ── Handlers ───────────────────────────────────────────────

    function saveScratch(){ saveResultsToStorage(); }

    window.scrSetM=function(mi,v){ initState(ri).m[mi].score=v; saveScratch(); render(); };

    window.scrMPenAdd=function(mi,pv){ var st=initState(ri); st.m[mi].pen=Math.round((st.m[mi].pen+pv)*10)/10; saveScratch(); render(); };

    window.scrMPenClr=function(mi){ var m=initState(ri).m[mi]; m.pen=0; m.penNote=''; saveScratch(); render(); };
    window.scrSetPenNote=function(mi,v){ initState(ri).m[mi].penNote=(v||'').trim().toUpperCase(); saveScratch(); };

    window.scrToggleOP=function(){ var st=initState(ri); st.isOP=!st.isOP; if(st.isOP)st.isDQ=false; saveScratch(); render(); };

    window.scrToggleDQ=function(){ var st=initState(ri); st.isDQ=!st.isDQ; if(st.isDQ)st.isOP=false; saveScratch(); render(); };

    window.scrSetNRHA=function(v){ initState(ri).nrha=parseFloat(v)||0; saveScratch(); };

    window.scrSetComments=function(v){ initState(ri).comments=v; saveScratch(); };

    window.scrSetRaw=function(v){ initState(ri).rawScore=parseFloat(v)||0; };

    window.scrSelClass=function(key){ selKey=key; riderIdx=0; mvrIdx=0; render(); };

    window.scrSetTmpl=function(name){ tmplOverride[selKey]=name; sheetData[selKey]={}; mvrIdx=0; try{ localStorage.setItem('gp_tmploverride_'+G.showId,JSON.stringify(tmplOverride)); } catch(e){} render(); };

    window.scrPrevRider=function(){ if(riderIdx>0){ riderIdx--; mvrIdx=0; render(); } };

    window.scrNextRider=function(){ if(riderIdx<entries.length-1){ riderIdx++; mvrIdx=0; render(); } };

    window.scrPrevMvr=function(){ if(mvrIdx>0){ mvrIdx--; render(); } };

    window.scrNextMvr=function(){ if(mvrIdx<mvrCount-1){ mvrIdx++; render(); } };

    window.scrJumpMvr=function(mi){ mvrIdx=mi; render(); };



    function recomputeManualPlacements(org, division, discipline, totalEntries){

      var rows=G.results.filter(function(r){

        return r._manual&&r.org===org&&r.division===division&&r.discipline===discipline;

      });

      var scored=rows.filter(function(r){ return !r.isOP&&!r.isDQ&&r.score; });

      scored.sort(function(a,b){ return (b.score||0)-(a.score||0); });

      var rank=1;

      scored.forEach(function(r,i){

        if(i>0&&scored[i-1].score===r.score) r.place=scored[i-1].place;

        else r.place=rank;

        rank=i+2;

      });

      var byPlace={};

      scored.forEach(function(r){

        if(!byPlace[r.place]) byPlace[r.place]=[];

        byPlace[r.place].push(r);

      });

      Object.keys(byPlace).forEach(function(pl){

        pl=parseInt(pl);

        var grp=byPlace[pl]; var sum=0;

        for(var k=0;k<grp.length;k++) sum+=Math.max(0,totalEntries-(pl+k-1));

        var avg=Math.round(sum/grp.length*1000)/1000;

        grp.forEach(function(r){ r.pts=avg; });

      });

      rows.filter(function(r){ return r.isOP||r.isDQ; }).forEach(function(r){ r.place=0; r.pts=0; });

    }



    window.scrPost=function(){

      var st=initState(ri);

      var tmplLocal=getTmpl();

      var tmplName=getTmplName();

      var finalScore=calcTotal(st,tmplLocal);

      if(finalScore===null) finalScore=0;

      var clsRef=getCls();

      // Use normalized discipline name so Results page can match it

      var discName=tmplName||clsRef.name;

      G.results=G.results.filter(function(r){

        return !(r._manual&&r.org===clsRef.org&&r.division===clsRef.division

          &&r.discipline===discName&&r.rider===entry.name);

      });

      G.results.push({

        showName:G.cfg.showName||G.showName||'', org:clsRef.org||'CoWN',

        division:clsRef.division||'', discipline:discName,

        rawClass:(clsRef.num?clsRef.num+' ':'')+clsRef.name,

        entries:entries.length, score:finalScore, place:0,

        horse:entry.horse||'', rider:entry.name||'', riderNum:entry.memberNum||'',

        pts:0, money:0, addedMoney:0, goRound:'',

        isOP:st.isOP||false, isDQ:st.isDQ||false, _manual:true,

        _scoreDetail:tmplLocal?{

          maneuvers:tmplLocal.maneuvers,

          m:st.m.map(function(x){ return {score:x.score,pen:x.pen}; }),

          nrha:st.nrha||0, comments:st.comments||''

        }:null

      });

      recomputeManualPlacements(clsRef.org||'CoWN', clsRef.division||'', discName, entries.length);

      saveResultsToStorage();

      var fl=document.createElement('div');

      fl.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);'

        +'background:var(--accent);color:#000;padding:.6rem 1.4rem;border-radius:12px;'

        +'font-family:Oswald;font-size:1.35rem;font-weight:700;z-index:400;pointer-events:none';

      fl.textContent=st.isDQ?'DQ':st.isOP?'OP':finalScore.toFixed(1);

      document.body.appendChild(fl);

      setTimeout(function(){fl.remove();},700);

      if(riderIdx<entries.length-1){ riderIdx++; mvrIdx=0; }

      render();

    };

  }



  window.closeScribeMode=function(){ mr.innerHTML=''; };

  render();

};



// ═══════════════════════ PAGE: TABS ═══════════════════════

function pgTabs(){

  var pg=document.getElementById('page');

  if(!G.entries.length){ pg.innerHTML='<div class="card"><p class="empty-state">No entries loaded.</p></div>'; return; }

  // Totals include group payments; individual entries in a group don't count their own payments
  var groupedKeys={};
  G.billingGroups.forEach(function(g){ g.entryKeys.forEach(function(k){ groupedKeys[k]=g.id; }); });

  var totalOwed=0, totalPaid=0, fullyPaidCount=0;
  G.billingGroups.forEach(function(g){
    totalOwed+=groupAmtOwed(g); totalPaid+=groupAmtPaid(g);
    if(groupIsFullyPaid(g)) fullyPaidCount++;
  });
  G.entries.forEach(function(e){
    if(!groupedKeys[entryKey(e)]){ totalOwed+=tabTotal(e); totalPaid+=amtPaid(e); if(isFullyPaid(e)) fullyPaidCount++; }
  });

  // Detect same-horse suggestions for unmerged entries
  var sameHorseGroups=findSameHorseGroups();
  var sameHorseBadge={};  // riderName → suggested horse canonical
  sameHorseGroups.forEach(function(g){
    g.entries.forEach(function(e){
      if(!groupedKeys[entryKey(e)]) sameHorseBadge[e.name]=g.canonical;
    });
  });

  var suggestionHtml='';
  if(sameHorseGroups.length){
    var unmergedGroups=sameHorseGroups.filter(function(g){
      return g.entries.some(function(e){ return !groupedKeys[entryKey(e)]; });
    });
    if(unmergedGroups.length){
      suggestionHtml='<div style="margin-bottom:.65rem;padding:.5rem .7rem;background:rgba(200,146,42,.07);border:1px solid rgba(200,146,42,.3);border-radius:6px;display:flex;align-items:center;gap:.6rem;flex-wrap:wrap">'
        +'<span style="font-size:.78rem;color:var(--accent);font-weight:600">&#9650; Same horse detected across riders:</span>';

        g.entries.forEach(function(e){ if(!groupedKeys[entryKey(e)]&&riders.indexOf(e.name)<0) riders.push(e.name); });
        if(riders.length>1){
          var rEsc=riders.map(function(r){ return r.replace(/\\/g,'\\\\').replace(/'/g,"\\'"); });
          var canEsc=esc(g.canonical).replace(/'/g,"\\'");
          suggestionHtml+='<span style="font-size:.78rem;color:var(--text)">'+esc(g.canonical)+': <em style="color:var(--muted)">'+esc(riders.join(', '))+'</em></span>'

            +'onclick="promptMerge(\''+canEsc+"',['"+rEsc.join("','")+"'])\">"

            +(riders.length>2?'<button class="btn btn-sm btn-dark" style="font-size:.72rem" onclick="promptSplitHorse(\''+canEsc+'\')">Split horse</button>':'');
        }
      });
      suggestionHtml+='</div>';
    }

    +'<div class="stat c-green"><div class="n">'+fmt$(totalOwed)+'</div><div class="l">Total Owed</div></div>'

    +'<div class="stat c-red"><div class="n">'+fmt$(totalOwed-totalPaid)+'</div><div class="l">Outstanding</div></div>'
    +'<div class="stat c-gold"><div class="n">'+fullyPaidCount+'</div><div class="l">Paid in Full</div></div>'

    +'<div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem">'

    G.billingGroups.forEach(function(grp){

      var qMatch=!q||grp.payerName.toLowerCase().indexOf(q)>-1
        ||grp.entryKeys.some(function(k){ return k.toLowerCase().indexOf(q)>-1; });
      var fOk=tf==='All'||(tf==='Paid'&&isPaid)||(tf==='Outstanding'&&!isPaid);

      anyRow=true;

        +'<td class="bold" style="color:var(--accent)">&#128281; '+esc(grp.payerName)+'<span style="font-size:.68rem;color:var(--muted);margin-left:.4rem">Combined</span></td>'
        +'<td class="small" style="color:var(--muted)">'+esc([...new Set(grp.entryKeys.map(function(k){ return k.split('|')[1]||''; }))].join(', '))+'</td>'
        +'<td class="ctr">'+grp.entryKeys.length+'</td>'
        +'<td>'+fmt$(owed)+'</td>'
        +'<td style="color:var(--green)">'+fmt$(paid)+'</td>'
        +'<td class="bold" style="color:'+(isPaid?'var(--green)':'var(--red)')+'">'+fmt$(bal)+'</td>'

      grp.entryKeys.forEach(function(k){

          +'<td></td><td></td><td></td>'
          +'<td><button class="btn btn-sm btn-dark" style="font-size:.65rem" onclick="event.stopPropagation();promptMoveRider(\''+rEsc+'\',\''+gEsc+'\')">Move&hellip;</button></td>'
          +'</tr>';
      });
    });

    // ── Individual rider tabs (not in any group) ──
    var byRider={};
    G.entries.forEach(function(e){
      if(groupedKeys[entryKey(e)]) return;
      if(!byRider[e.name]) byRider[e.name]=[];

    });
    G._riderList=Object.keys(byRider).sort(function(a,b){

      var al=aW[aW.length-1].toLowerCase(),bl=bW[bW.length-1].toLowerCase();
      return al<bl?-1:al>bl?1:a.toLowerCase()<b.toLowerCase()?-1:1;

    G._riderList.forEach(function(name){
      var entries=byRider[name];

      var paid=entries.reduce(function(s,e){ return s+amtPaid(e); },0);
      var bal=owed-paid; var isPaid=bal<=0;
      var qOk=!q||name.toLowerCase().indexOf(q)>-1;

      var nEsc=name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      t+='<tr>'
        +'<td class="bold" style="cursor:pointer" onclick="showTabModalByIdx('+refIdx+')">'+esc(name)+badgeHtml+'</td>'
        +'<td class="small">'+esc(horses)+'</td>'

        +'<td>'+(hasSameHorse?'<button class="btn btn-sm" style="font-size:.68rem;background:rgba(200,146,42,.12);border:1px solid rgba(200,146,42,.3);color:var(--accent)" onclick="promptMergeForRider(\''+nEsc+'\')">Merge</button>':'')+'</td>'

    });

    if(!anyRow) t+='<tr><td colspan="8" class="empty-state">No entries match</td></tr>';
    t+='</tbody></table>';
    document.getElementById('ttbl').innerHTML=t;
  }

  drawTabTable();
  document.getElementById('tq').addEventListener('input',drawTabTable);
}

window.resSetMatch=function(resultIdx, entryIdx){
  var r=G.results[resultIdx];
  var e=G.entries[entryIdx];
  if(!r||!e) return;
  // Apply match to every row for this same SHTX rider+horse (all their classes)
  var rName=r.rider, rHorse=(r.horse||'');
  var canonical={rider:e.name, horse:e.horse, email:e.email||''};
  G.results.forEach(function(row){
    if(row.rider===rName && (row.horse||'')=== rHorse){
      row._matchType='manual';
      row._canonical=Object.assign({},canonical);
    }
  });
  saveResultsToStorage();
  pgResults();
};

window.resClearMatch=function(resultIdx){
  var r=G.results[resultIdx];
  if(!r) return;
  r._matchType='none';
  delete r._canonical;
  saveResultsToStorage();
  pgResults();
};

window.resCreateEntryFromIdx=function(resultIdx){
  var r=G.results[resultIdx];
  if(r) window.resCreateEntry(r.rider, r.horse||'');
};

window.resCreateEntry=function(riderName, horseName){
  // Scope to this specific rider+horse combination — one entry per horse
  var hKey=(horseName||'').toUpperCase().replace(/\s+/g,' ').trim();
  var rows=G.results.filter(function(r){
    if(r.rider!==riderName) return false;
    if(hKey){
      var rh=(r.horse||'').toUpperCase().replace(/\s+/g,' ').trim();
      return rh===hKey;
    }
    return true;
  });
  if(!rows.length) return;
  var ref=rows[0];
  // Build classes from unique org/division/discipline combos
  var classSet={}, classKeys=[];
  rows.forEach(function(r){
    var k=(r.org||'')+'|'+(r.division||'')+'|'+(r.discipline||'');
    if(!classSet[k]){ classSet[k]={name:(r.discipline||r.division||r.org||''), num:'', org:r.org, division:r.division, discipline:r.discipline}; classKeys.push(k); }
  });
  var classes=classKeys.map(function(k){ return classSet[k]; });
  var newIdx=G.entries.length;
  var _rParts=(riderName||'').trim().split(/\s+/);

function recomputeClassPts(org, division, discipline){
  var clsRows=G.results.filter(function(r){ return r.org===org&&r.division===division&&r.discipline===discipline; });
  var total=clsRows.length;
  var dqRows=clsRows.filter(function(r){ return r.isDQ; });
  var opRows=clsRows.filter(function(r){ return (r.opCount||0)>0&&!r.isDQ; });
  var normalRows=clsRows.filter(function(r){ return !(r.opCount||0)&&!r.isDQ; });

  // Place normal rows by score (desc), ties share place
  normalRows.sort(function(a,b){ return (b.score||0)-(a.score||0); });
  var pl=1;
  for(var i=0;i<normalRows.length;){
    var j=i;
    while(j<normalRows.length-1&&normalRows[j+1].score===normalRows[j].score) j++;
    for(var k=i;k<=j;k++) normalRows[k].place=pl;
    pl+=j-i+1; i=j+1;
  }

  // OPs: OP1 places above OP2 above OP3; within same opCount, higher score places higher
  opRows.sort(function(a,b){
    var oc=(a.opCount||1)-(b.opCount||1);
    if(oc!==0) return oc;
    return (b.score||0)-(a.score||0);
  });
  var opStart=normalRows.length+1;
  opRows.forEach(function(r,i){ r.place=opStart+i; });

  // DQs: no place, no points
  dqRows.forEach(function(r){ r.place=0; r.pts=0; });

  // Points: CoWN entries-based (totalEntries includes OPs and DQs in the count)
  var orgPtsSys=(ORG_CLASSES[org]||{}).pointsSystem||'entries';
  var byPlace={};
  normalRows.concat(opRows).forEach(function(r){
    if(!byPlace[r.place]) byPlace[r.place]=[];
    byPlace[r.place].push(r);
  });
  if(orgPtsSys==='entries'){
    Object.keys(byPlace).forEach(function(p){
      var rows=byPlace[p]; p=parseInt(p);
      var sum=0;
      for(var k=0;k<rows.length;k++) sum+=Math.max(0,total-(p+k)+1);
      var avg=sum/rows.length;
      rows.forEach(function(r){ r.pts=avg; });
    });
  } else if(orgPtsSys==='entries+1'){
    Object.keys(byPlace).forEach(function(p){
      var rows=byPlace[p]; p=parseInt(p);
      var sum=0;
      for(var k=0;k<rows.length;k++) sum+=Math.max(0,total-(p+k)+2);
      var avg=sum/rows.length;
      rows.forEach(function(r){ r.pts=avg; });
    });
  } else if(orgPtsSys==='aqha'){
    var tier=Math.floor(total/5);
    Object.keys(byPlace).forEach(function(p){
      var rows=byPlace[p]; p=parseInt(p);
      var pts=tier<1?0:(p<=tier?(tier-p+1):(p===tier+1?0.5:0));
      rows.forEach(function(r){ r.pts=pts; });
    });
  } else if(orgPtsSys==='fixed10'){
    Object.keys(byPlace).forEach(function(p){
      var rows=byPlace[p]; p=parseInt(p);
      var pts=Math.max(0,11-p);
      rows.forEach(function(r){ r.pts=(r.score&&!r.isDQ)?pts:0; });
    });
  } else if(orgPtsSys==='aphc'){
    var aphcTier=null;
    for(var t=0;t<APHC_PTS_TABLE.length;t++){
      if(total>=APHC_PTS_TABLE[t].min){ aphcTier=APHC_PTS_TABLE[t].pts; break; }
    }
    Object.keys(byPlace).forEach(function(p){
      var rows=byPlace[p]; p=parseInt(p);
      var pts=aphcTier&&(p-1)<aphcTier.length?aphcTier[p-1]:0;
      rows.forEach(function(r){ r.pts=pts; });
    });
  }
}

      // ── Verification ──
      // We trust the judge's placements — OPs are placed at the bottom regardless of score.

      var calcPtsMap={};
      var byPlace={};
      clsRows.filter(function(r){ return r.place>0; }).forEach(function(r){
        if(!byPlace[r.place]) byPlace[r.place]=[];
        byPlace[r.place].push(r);
      });
      if(orgPtsSys==='entries'){
        Object.keys(byPlace).forEach(function(pl){
          var rows=byPlace[pl]; pl=parseInt(pl);

        });
      } else if(orgPtsSys==='entries+1'){
        Object.keys(byPlace).forEach(function(pl){
          var rows=byPlace[pl]; pl=parseInt(pl);
          var sum=0;
          for(var k=0;k<rows.length;k++) sum+=Math.max(0, actualRows-(pl+k)+2);
          var avg=sum/rows.length;
          rows.forEach(function(r){ calcPtsMap[r.rider+'|'+r.horse]=avg; });
        });
      } else if(orgPtsSys==='aqha'){
        var tier=Math.floor(actualRows/5);
        Object.keys(byPlace).forEach(function(pl){
          var rows=byPlace[pl]; pl=parseInt(pl);
          var pts=tier<1?0:(pl<=tier?(tier-pl+1):(pl===tier+1?0.5:0));

        });
      } else if(orgPtsSys==='fixed10'){
        Object.keys(byPlace).forEach(function(pl){
          var rows=byPlace[pl]; pl=parseInt(pl);

        });
      } else if(orgPtsSys==='aphc'){
        var aphcTier2=null;
        for(var t2=0;t2<APHC_PTS_TABLE.length;t2++){

          var rows=byPlace[pl]; pl=parseInt(pl);
          var pts=aphcTier2&&(pl-1)<aphcTier2.length?aphcTier2[pl-1]:0;
          rows.forEach(function(r){ calcPtsMap[r.rider+'|'+r.horse]=pts; });

      } else {
        clsRows.filter(function(r){ return r.place>0; }).forEach(function(r){ calcPtsMap[r.rider+'|'+r.horse]=0; });
      }

      // Per-row anomaly hints — CoWN only. AQHA has its own rules and tracks points centrally;
      // OP/DQ detection based on pts patterns is meaningless for AQHA classes.
      var possibleOPMap={}, possibleDQMap={};

        clsRows.forEach(function(r){
          if(r.isDQ||(r.opCount>0)||r._manual) return;
          var key=r.rider+'|'+r.horse;
          if(r.score>0&&r.pts===0){ possibleDQMap[key]=true; return; }
          if(r.score>0&&r.pts>0){

              return o!==r && o.score<r.score && o.pts>r.pts;

            if(lowerScoreMorePts.length>0) possibleOPMap[key]=true;
          }
        });

        // Detector 2: duplicate pts with different place → likely SHTX OP artifact

        scoredActive.forEach(function(r){

          var places=bucket.map(function(r){ return r.place; });
          var allSamePlace=places.every(function(p){ return p===places[0]; });
          if(!allSamePlace){
            var minPlace=Math.min.apply(null,places);
            bucket.forEach(function(r){

      var dupPtsRiders=Object.keys(possibleOPMap).filter(function(k){

          +(isOP?' <span style="font-size:.62rem;font-weight:700;background:rgba(224,124,0,.15);color:#e07c00;padding:1px 4px;border-radius:3px">'+opLabel+'</span>':'');

        var cpts=calcPtsMap[key];

        var ptsMismatch=!r._manual&&!(isOP||isDQ)&&cpts!==undefined&&(isAqhaOrg?r.pts>0:true)&&Math.abs((cpts||0)-(r.pts||0))>tol;

        var hintOP=!isOP&&!isDQ&&!r._manual&&possibleOPMap[key];
