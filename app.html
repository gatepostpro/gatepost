<!DOCTYPE html><!-- v20260422f -->

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Thorofare — Association Management</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

:root{
  --bg:#090f0b;--card:#0e1a10;--card2:#122014;
  --accent:#c8922a;--accent2:#a87422;--accent-dim:rgba(200,146,42,.12);
  --green:#27ae60;--red:#e74c3c;--blue:#4a9edd;--purple:#9b59b6;
  --text:#e8ede4;--muted:#6a8a64;--border:#1a301c;--border2:#1f3a22
}

[data-theme="light"]{
  --bg:#f0f2ee;--card:#ffffff;--card2:#e8ece4;
  --accent:#8a6218;--accent2:#7a5210;--accent-dim:rgba(138,98,24,.1);
  --green:#1a7a40;--red:#c0392b;--blue:#1a6faa;--purple:#6c3483;
  --text:#1a2018;--muted:#507050;--border:#ccd4c8;--border2:#b0c0ac
}

*{margin:0;padding:0;box-sizing:border-box}

body{font-family:'Source Sans 3',sans-serif;font-size:16px;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

.shell{display:flex;height:100vh;overflow:hidden}

.sidebar{width:224px;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}

.sidebar-logo{padding:1.25rem 1.1rem 1rem;border-bottom:1px solid var(--border)}

.sidebar-logo h1{font-family:'Oswald',sans-serif;font-size:1.45rem;font-weight:700;color:var(--accent);letter-spacing:.05em}

.sidebar-logo span{display:block;font-size:.76rem;color:var(--muted);letter-spacing:.1em;margin-top:3px}

.show-pill{margin:.75rem;background:var(--card2);border:1px solid var(--border2);border-radius:8px;padding:.65rem .8rem;font-size:.84rem}

.show-pill .sp-name{font-family:'Oswald',sans-serif;color:var(--accent);font-size:.95rem}

.show-pill .sp-meta{color:var(--muted);margin-top:2px}

.nav{flex:1;padding:.5rem 0;overflow-y:auto}

.nav-item{display:flex;align-items:center;gap:.65rem;padding:.65rem 1.1rem;cursor:pointer;color:var(--muted);font-size:.9rem;border-left:3px solid transparent;transition:all .15s}

.nav-item:hover{color:var(--text);background:rgba(255,255,255,.04)}

.nav-item.active{color:var(--accent);border-left-color:var(--accent);background:var(--accent-dim)}

.nav-item .ico{width:16px;text-align:center;font-size:14px;flex-shrink:0}

.nav-section{padding:.8rem 1.1rem .3rem;font-size:.7rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}

.sidebar-footer{padding:.8rem;border-top:1px solid var(--border);font-size:.78rem;color:var(--muted)}

.content{flex:1;overflow-y:auto;display:flex;flex-direction:column}

.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:.7rem 1.4rem;display:flex;align-items:center;gap:1rem;flex-shrink:0}

.topbar-title{font-family:'Oswald',sans-serif;font-size:1.15rem;color:var(--accent)}

.topbar-right{margin-left:auto;display:flex;gap:.5rem;align-items:center}

.page{padding:1.4rem;flex:1;max-width:1080px;width:100%}

.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1.25rem 1.4rem;margin-bottom:1.1rem}

.card-title{font-family:'Oswald',sans-serif;color:var(--accent);font-size:1.08rem;margin-bottom:.9rem;display:flex;align-items:center;justify-content:space-between;gap:.5rem}

.card-title small{font-size:.78rem;color:var(--muted);font-family:'Source Sans 3',sans-serif;font-weight:400}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:.85rem;margin-bottom:1.1rem}

.stat{background:var(--card2);border:1px solid var(--border2);border-radius:8px;padding:.85rem;text-align:center}

.stat .n{font-family:'Oswald',sans-serif;font-size:2rem;font-weight:700}

.stat .l{font-size:.82rem;color:var(--muted);margin-top:3px}

.c-gold .n{color:var(--accent)}.c-green .n{color:var(--green)}.c-blue .n{color:var(--blue)}.c-red .n{color:var(--red)}.c-purple .n{color:var(--purple)}

.tbl-wrap{overflow-x:auto}

table{width:100%;border-collapse:collapse;font-size:.92rem}

th{text-align:left;padding:.55rem .7rem;border-bottom:2px solid var(--accent);color:var(--accent);font-family:'Oswald',sans-serif;white-space:nowrap}

td{padding:.55rem .7rem;border-bottom:1px solid var(--border);vertical-align:middle}

tr:hover td{background:rgba(255,255,255,.03)}

.ctr{text-align:center}

.bold{font-weight:600}

.small{font-size:.82rem;color:var(--muted)}

.badge{display:inline-block;padding:2px 9px;border-radius:10px;font-size:.74rem;font-weight:600;white-space:nowrap}

.b-gold{background:rgba(200,146,42,.15);color:var(--accent)}

.b-green{background:rgba(39,174,96,.15);color:#2ecc71}

.b-red{background:rgba(231,76,60,.15);color:#e74c3c}

.b-blue{background:rgba(41,128,185,.15);color:#5dade2}

.b-purple{background:rgba(142,68,173,.15);color:#a569bd}

.b-gray{background:rgba(154,143,126,.1);color:var(--muted)}

.b-cow{background:rgba(184,134,58,.2);color:#d4943a;border:1px solid rgba(184,134,58,.3)}

.btn{display:inline-flex;align-items:center;gap:.35rem;padding:.45rem .9rem;border:none;border-radius:6px;cursor:pointer;font-size:.85rem;font-weight:600;font-family:'Source Sans 3',sans-serif;transition:all .15s;white-space:nowrap}

.btn-accent{background:var(--accent);color:#1a1612}.btn-accent:hover{background:var(--accent2)}

.btn-dark{background:var(--card2);color:var(--text);border:1px solid var(--border2)}.btn-dark:hover{border-color:var(--accent);color:var(--accent)}

.btn-green{background:var(--green);color:#fff}.btn-green:hover{opacity:.9}

.btn-red{background:rgba(231,76,60,.12);color:var(--red);border:1px solid rgba(231,76,60,.25)}.btn-red:hover{background:rgba(231,76,60,.2)}

.btn-sm{padding:.28rem .6rem;font-size:.8rem}

.btn:disabled{opacity:.4;cursor:default}

/* ── Fee schedule (legacy, used by assoc-fee rows) ── */
.fee-cat-section{margin-bottom:.5rem}
.fee-cat-head{display:flex;align-items:center;gap:.6rem;padding:.55rem .75rem;background:var(--card2);border:1px solid var(--border2);border-radius:6px;cursor:pointer;user-select:none}
.fee-cat-section:not(.collapsed) .fee-cat-head{border-radius:6px 6px 0 0;border-bottom:none}
.fee-cat-label{font-family:'Oswald',sans-serif;font-size:.9rem;color:var(--accent);flex:1;letter-spacing:.02em}
.fee-cat-note{display:none}
.fee-cat-toggle{color:var(--muted);font-size:.7rem;transition:transform .15s}
.fee-cat-section.collapsed .fee-cat-toggle{transform:rotate(-90deg)}
.fee-cat-section.collapsed .fee-sched-row,.fee-cat-section.collapsed .fee-add-btn,.fee-cat-section.collapsed .fee-cat-empty{display:none}
.fee-cat-section.collapsed .fee-cat-head{border-radius:6px;border-bottom:1px solid var(--border2)}
.fee-sched-row{display:grid;grid-template-columns:1fr 130px 34px;gap:.5rem;align-items:center;padding:.42rem .75rem;border-bottom:1px solid var(--border);background:var(--card)}
.fee-sched-row:last-child{border-bottom:none}
.fee-sched-label,.fee-sched-amt{background:var(--bg);border:1px solid var(--border2);border-radius:5px;color:var(--text);padding:.32rem .55rem;font-size:.88rem;font-family:inherit}
.fee-sched-label{width:100%}
.fee-sched-amt{width:100%;text-align:right}
.fee-sched-label:focus,.fee-sched-amt:focus{outline:none;border-color:var(--accent)}
/* ── Fee schedule (new clean sections) ── */
.fee-sec{margin-bottom:.5rem;border:1px solid var(--border2);border-radius:6px;overflow:hidden}
.fee-sec-head{display:flex;align-items:center;gap:.6rem;padding:.6rem .85rem;background:var(--card2);cursor:pointer;user-select:none}
.fee-sec-title{font-family:'Oswald',sans-serif;font-size:.92rem;color:var(--accent);flex:1;letter-spacing:.02em}
.fee-sec-toggle{color:var(--muted);font-size:.7rem;transition:transform .15s}
.fee-sec.collapsed .fee-sec-toggle{transform:rotate(-90deg)}
.fee-sec-body{background:var(--card);padding:.2rem .85rem .6rem}
.fee-sec.collapsed .fee-sec-body{display:none}
.fee-row{display:flex;align-items:center;gap:.6rem;padding:.4rem 0;border-bottom:1px solid var(--border)}
.fee-row:last-of-type{border-bottom:none}
.fee-row-lbl{flex:1;font-size:.87rem;color:var(--text2)}
.fee-row-lbl-inp{flex:1;background:var(--bg);border:1px solid var(--border2);border-radius:4px;color:var(--text);padding:.28rem .55rem;font-size:.87rem;font-family:inherit}
.fee-row-lbl-inp:focus{outline:none;border-color:var(--accent)}
.fee-sym{color:var(--muted);font-size:.85rem;flex-shrink:0}
.fee-amt{width:90px;background:var(--bg);border:1px solid var(--border2);border-radius:4px;color:var(--text);padding:.28rem .5rem;font-size:.9rem;text-align:right;font-family:inherit;flex-shrink:0}
.fee-amt:focus{outline:none;border-color:var(--accent)}
.fee-row-del{background:transparent;border:1px solid rgba(200,60,60,.25);color:var(--red);border-radius:4px;cursor:pointer;padding:.15rem .42rem;font-size:.88rem;line-height:1;flex-shrink:0}
.fee-row-del:hover{border-color:var(--red)}
.fee-add-row{display:flex;margin-top:.5rem}
.fee-add-row button{background:transparent;border:1px dashed var(--border2);color:var(--muted);border-radius:4px;cursor:pointer;padding:.3rem .85rem;font-size:.82rem;width:100%}
.fee-add-row button:hover{border-color:var(--accent);color:var(--accent)}

.btn-row{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center;margin-bottom:.85rem}

details>summary{color:var(--muted);font-size:.82rem;cursor:pointer;list-style:none;padding:.3rem 0;user-select:none}details>summary::-webkit-details-marker{display:none}details>summary::before{content:'▶ ';font-size:.65rem;margin-right:.3rem;transition:transform .15s}details[open]>summary::before{content:'▼ '}
/* ── Setup Wizard ── */
.wiz-wrap{max-width:820px;margin:0 auto;padding-bottom:3rem}
.wiz-progress{display:flex;gap:0;margin-bottom:1.5rem;border-radius:6px;overflow:hidden;height:6px;background:var(--border)}
.wiz-progress-bar{height:6px;background:var(--accent);transition:width .3s}
.wiz-step-label{font-size:.72rem;color:var(--muted);margin-bottom:.75rem;letter-spacing:.04em;text-transform:uppercase}
.wiz-nav{display:flex;gap:.6rem;margin-top:1.25rem;justify-content:space-between}
.wiz-org-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.5rem;margin-top:.5rem}
.wiz-org-btn{background:var(--card2);border:1px solid var(--border2);color:var(--text2);border-radius:6px;padding:.55rem .75rem;cursor:pointer;font-size:.85rem;text-align:left;transition:border-color .12s,color .12s}
.wiz-org-btn:hover{border-color:var(--border);color:var(--fg)}
.wiz-org-btn.selected{border-color:var(--accent);color:var(--accent);background:#162518}
.wiz-org-section{background:var(--card2);border:1px solid var(--border2);border-radius:8px;padding:.85rem 1rem;margin-bottom:.75rem}
.wiz-org-section-title{font-family:Oswald,sans-serif;color:var(--accent);font-size:.95rem;margin-bottom:.65rem}
.wiz-div-grid{display:flex;flex-wrap:wrap;gap:.35rem;margin:.35rem 0}
.wiz-div-pill{background:var(--bg);border:1px solid var(--border2);color:var(--text2);border-radius:20px;padding:.2rem .65rem;cursor:pointer;font-size:.78rem;transition:border-color .12s,color .12s}
.wiz-div-pill.on{border-color:var(--accent);color:var(--accent);background:#162518}
.wiz-pkg-row{display:flex;gap:.4rem;align-items:center;flex-wrap:wrap;background:var(--bg);border:1px solid var(--border2);border-radius:6px;padding:.4rem .6rem;margin-bottom:.35rem}
.wiz-inp{background:var(--bg);border:1px solid var(--border2);border-radius:5px;color:var(--fg);padding:.28rem .55rem;font-size:.85rem}
.wiz-inp:focus{outline:none;border-color:var(--accent)}
.wiz-review-section{margin-bottom:1rem}
.wiz-review-section h4{font-family:Oswald,sans-serif;color:var(--accent);font-size:.92rem;margin:0 0 .35rem;border-bottom:1px solid var(--border);padding-bottom:.2rem}
.search-wrap{position:relative;margin-bottom:.85rem}

.search-ico{position:absolute;left:.75rem;top:50%;transform:translateY(-50%);color:var(--muted)}

.search-box{width:100%;padding:.58rem .65rem .58rem 2.2rem;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-size:.9rem;font-family:inherit}

.search-box:focus{outline:none;border-color:var(--accent)}

.pills{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.85rem}

.pill{background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:.25rem .7rem;font-size:.8rem;cursor:pointer;color:var(--muted);transition:all .15s}

.pill:hover{color:var(--text)}.pill.active{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}

.drop-zone{border:2px dashed var(--border2);border-radius:10px;padding:2.5rem;text-align:center;cursor:pointer;transition:all .2s;background:var(--card2)}

.drop-zone:hover,.drop-zone.drag{border-color:var(--accent);background:rgba(200,146,42,.04)}

.drop-zone .dz-ico{font-size:2rem;margin-bottom:.65rem;color:var(--muted)}

.drop-zone h3{font-family:'Oswald',sans-serif;color:var(--accent);font-size:1.1rem;margin-bottom:.35rem}

.drop-zone p{color:var(--muted);font-size:.88rem}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem}

.modal{background:var(--card);border:1px solid var(--border2);border-radius:12px;padding:1.6rem;max-width:640px;width:100%;max-height:90vh;overflow-y:auto}

.modal h2{font-family:'Oswald',sans-serif;color:var(--accent);font-size:1.3rem;margin-bottom:1rem}

.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:.55rem .85rem;font-size:.88rem;margin-bottom:1rem}

.modal-grid .lbl{color:var(--muted);font-size:.78rem}

.modal-grid .val{font-weight:600;margin-top:2px}

.tab-row{display:flex;gap:.2rem;border-bottom:1px solid var(--border);margin-bottom:1rem}

.tab-btn{background:none;border:none;color:var(--muted);padding:.55rem .9rem;cursor:pointer;font-size:.88rem;font-family:'Oswald',sans-serif;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}

.tab-btn:hover{color:var(--text)}.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}

.tab-panel{display:none}.tab-panel.active{display:block}

.tab-line{display:flex;justify-content:space-between;align-items:center;padding:.45rem 0;border-bottom:1px solid var(--border);font-size:.88rem}

.tab-line:last-child{border:none}

.tab-total{display:flex;justify-content:space-between;padding:.8rem 0 .25rem;font-weight:600;font-size:1rem;border-top:2px solid var(--border2);margin-top:.5rem}

.pay-status{display:flex;align-items:center;gap:.75rem;padding:.8rem;background:var(--card2);border-radius:8px;margin-top:.8rem}

.stab-row{display:flex;align-items:center;gap:.2rem;border-bottom:1px solid var(--border);margin-bottom:1.4rem;flex-wrap:wrap}

.stab{background:none;border:none;color:var(--muted);padding:.55rem .95rem;cursor:pointer;font-size:.88rem;font-family:'Oswald',sans-serif;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}

.stab:hover{color:var(--text)}.stab.active{color:var(--accent);border-bottom-color:var(--accent)}

.stab-group-label{font-size:.7rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;padding:0 .5rem 0 .25rem;white-space:nowrap;align-self:center;margin-bottom:-1px}

.stab-group-sep{margin-left:.5rem;padding-left:.75rem;border-left:1px solid var(--border)}

.ssec{display:none}.ssec.active{display:block}

.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:.85rem;margin-bottom:.85rem}

.form-group{display:flex;flex-direction:column;gap:.3rem}

.form-group label{font-size:.8rem;color:var(--muted)}

.form-group input,.form-group select{background:var(--bg);border:1px solid var(--border2);border-radius:6px;color:var(--text);padding:.48rem .7rem;font-size:.9rem;font-family:'Source Sans 3',sans-serif;transition:border-color .15s}

.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--accent)}

.form-group select option{background:var(--card)}

.pfx{position:relative}.pfx span{position:absolute;left:.55rem;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.84rem;pointer-events:none}.pfx input{padding-left:1.3rem;max-width:130px}

.tip{font-size:.78rem;color:var(--muted);margin-top:.25rem}

.fee-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:.55rem;margin:.85rem 0 .3rem}

.fee-chip{background:var(--card2);border:1px solid var(--border2);border-radius:6px;padding:.55rem .8rem}

.fee-chip .fc-l{font-size:.76rem;color:var(--muted)}

.fee-chip .fc-v{font-family:'Oswald',sans-serif;color:var(--accent);font-size:1rem;margin-top:2px}

.cfg-tbl{width:100%;border-collapse:collapse;font-size:.86rem}

.cfg-tbl th{text-align:left;padding:.45rem .55rem;border-bottom:2px solid var(--accent);color:var(--accent);font-family:'Oswald',sans-serif;font-size:.82rem;white-space:nowrap}

.cfg-tbl td{padding:.32rem .45rem;border-bottom:1px solid var(--border);vertical-align:middle}

.cfg-tbl tr:hover td{background:rgba(255,255,255,.03)}

.cfg-tbl input[type=text],.cfg-tbl input[type=number]{background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:.3rem .48rem;font-size:.84rem;width:100%;transition:border-color .15s}

.cfg-tbl input:focus{outline:none;border-color:var(--accent)}

.cfg-tbl input[type=checkbox]{width:15px;height:15px;accent-color:var(--accent);cursor:pointer}

.cfg-tbl .div-hdr td{background:rgba(200,146,42,.07);font-family:'Oswald',sans-serif;color:var(--muted);font-size:.8rem;letter-spacing:.04em;padding:.35rem .55rem}

.map-row{background:var(--card2);border:1px solid var(--border2);border-radius:6px;padding:.65rem .8rem;margin-bottom:.45rem}

.map-row label{font-size:.8rem;color:var(--muted);display:block;margin-bottom:.3rem}

.map-row select{background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:.32rem .55rem;font-size:.84rem;width:100%}

.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--green);color:#fff;padding:.65rem 1.1rem;border-radius:8px;font-size:.88rem;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}

.toast.show{opacity:1}

.empty-state{color:var(--muted);text-align:center;padding:2.5rem;font-size:.92rem}

.hidden{display:none!important}

.theme-toggle{background:none;border:1px solid var(--border2);border-radius:6px;color:var(--muted);cursor:pointer;font-size:.88rem;padding:.28rem .55rem;transition:all .15s;line-height:1}
.theme-toggle:hover{color:var(--text);border-color:var(--accent)}

.sel-row{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.9rem}

.entry-card{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:.8rem;margin-bottom:.55rem;cursor:pointer;transition:border-color .15s}

.entry-card:active{border-color:var(--accent)}

.assoc-tag{display:inline-block;padding:1px 8px;border-radius:4px;font-size:.74rem;font-weight:600;margin:1px}

.at-cown{background:rgba(200,146,42,.15);color:var(--accent)}

.at-aqha{background:rgba(41,128,185,.15);color:#5dade2}

.at-apha{background:rgba(142,68,173,.15);color:#a569bd}

.at-other{background:rgba(154,143,126,.1);color:var(--muted)}

.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:150}

.sidebar-overlay.open{display:block}

.hamburger{display:none;background:none;border:none;color:var(--text);font-size:1.35rem;cursor:pointer;padding:.3rem .4rem;line-height:1;margin-right:.25rem}

@media(max-width:768px){
  .shell{flex-direction:column;height:auto;min-height:100vh;overflow:visible}
  .sidebar{position:fixed;top:0;left:0;bottom:0;z-index:160;width:260px;transform:translateX(-100%);transition:transform .22s ease}
  .sidebar.open{transform:translateX(0)}
  .content{flex:1;overflow-y:visible}
  .topbar{position:sticky;top:0;z-index:100;padding:.55rem .9rem}
  .topbar-title{font-size:1.05rem}
  .page{padding:.9rem;padding-bottom:5rem}
  .hamburger{display:block}
  .card{padding:.9rem 1.1rem}
  .card-title{font-size:1rem}
  .stat-grid{grid-template-columns:1fr 1fr}
  .stat .n{font-size:1.5rem}
  td,th{padding:.5rem .5rem}
  .tbl-wrap{-webkit-overflow-scrolling:touch}
  .btn{padding:.52rem 1rem;font-size:.88rem}

}

// Detect columns that hold class entry text (e.g. "91-Cow, 92-Reining")

function isClassCol(h){ return /classes and class|class.*#|division.*class/i.test(String(h||'')); }

function isCowCountCol(h){ return /cows?\s*$/i.test(String(h||'').trim()); }



function extractDivName(h){

  return String(h||'')

    .replace(/COWN\s*/ig,'').replace(/CoWN\s*/ig,'')

    .replace(/Classes and Class #s/ig,'').replace(/Classes and Class Numbers/ig,'')

    .replace(/Collegiate\s*/ig,'Collegiate ')

    .replace(/\s+/g,' ').replace(/\xa0/g,' ').trim();

}



function detectOrg(h){

  var s = String(h||'').toLowerCase();

  if(/vrh|versatility/.test(s)) return 'VRH';

  if(/rhc|ranch\s*heritage/.test(s)) return 'AQHA RHC';

  if(/aqha\s*ranch|ranch\s*riding|ranch\s*trail|working\s*western/.test(s)) return 'AQHA Ranch';

  if(/aqha/.test(s)) return 'AQHA Ranch'; // generic AQHA → AQHA Ranch

  if(/apha/.test(s)) return 'APHA';

  if(/nhsra|whsr|high\s*school/.test(s)) return 'WHSR';

  if(/cown|cow\s*n/i.test(s)) return 'CoWN';

  if(/jackpot/.test(s)) return 'Jackpot';

  return 'CoWN'; // default to CoWN (most common at these shows)

}



function assocTags(raw){

  var s = String(raw||'');

  var out = '';

  if(/cown/i.test(s)) out += '<span class="assoc-tag at-cown">CoWN</span>';

  if(/aqha/i.test(s)) out += '<span class="assoc-tag at-aqha">AQHA</span>';

  if(/apha/i.test(s)) out += '<span class="assoc-tag at-apha">APHA</span>';

  if(!out && s.trim()) out = '<span class="assoc-tag at-other">'+esc(s.substring(0,20))+'</span>';

  return out || '<span class="badge b-gray">—</span>';

}

// classCols: explicit [{i,div,org,isCow}] from audit (null = auto-detect from headers)
// customFields: [{name,col}] extra columns to capture per-entry as customFees
function parseCognito(wb, colMapping, classCols, customFields){
  var m = colMapping || {};
  var gc = function(r, key, defaultCol){
    var col = (key in m) ? m[key] : defaultCol;
    return (col != null) ? r[col] : null;
  };
  var gn = function(r, key, defaultCol){
    var v = gc(r, key, defaultCol);
    return (typeof v === 'number' && v > 0) ? v : 0;
  };

  var ws = wb.Sheets[wb.SheetNames[0]];
  var raw = XLSX.utils.sheet_to_json(ws,{header:1,defval:null,cellDates:true});
  var headers = raw[0];

  var headerStr = (headers||[]).slice(0,10).map(function(h){ return String(h||'').toLowerCase(); }).join('|');
  if(headerStr.indexOf('classdivision')>-1 || headerStr.indexOf('placecode')>-1){
    throw new Error('This looks like a Funnware/SHTX results file, not a Cognito entry form export. Use the Results tab to import it.');
  }

  var riderCol = ('riderName' in m) ? m.riderName : 4;

      if(isClassCol(String(h)))      detectedClassCols.push({i:i, div:extractDivName(String(h)), org:detectOrg(String(h)), isCow:false});
      else if(isCowCountCol(String(h))) detectedClassCols.push({i:i, div:extractDivName(String(h)), org:detectOrg(String(h)), isCow:true});

function _normStr(s){ return String(s||'').toLowerCase().replace(/\s+/g,' ').trim(); }

function _findMatchingEntry(ne){
  // Try entry number first
  if(ne.entryNum){
    var byNum = G.entries.find(function(ex){ return String(ex.entryNum||ex.rowIndex)===String(ne.entryNum); });
    if(byNum) return byNum;
  }
  // Fall back to rider last name + horse name
  var rk = _normStr(ne.riderName), hk = _normStr(ne.horseName);
  if(!rk || !hk) return null;
  return G.entries.find(function(ex){ return _normStr(ex.riderName)===rk && _normStr(ex.horseName)===hk; }) || null;
}

function _diffEntries(existing, incoming){
  var diffs = [];
  _DIFF_FIELDS.forEach(function(f){
    var ov = String(existing[f.key]||''), nv = String(incoming[f.key]||'');
    if(ov !== nv) diffs.push({field:f.key, label:f.label, oldVal:ov, newVal:nv});
  });
  // Compare class lists by sorted classNum / class name
  var exCls = (existing.classes||[]).map(function(c){ return c.num||c.name||''; }).sort().join('|');
  var inCls = (incoming.classes||[]).map(function(c){ return c.num||c.name||''; }).sort().join('|');
  if(exCls !== inCls) diffs.push({field:'classes', label:'Classes', oldVal:exCls||'(none)', newVal:inCls||'(none)'});
  return diffs;
}

function _analyzeMerge(newEntries){
  var result = {unchanged:[], changed:[], added:[], missing:[]};
  var matchedRowIndexes = {};
  newEntries.forEach(function(ne){
    var match = _findMatchingEntry(ne);
    if(!match){ result.added.push(ne); return; }
    matchedRowIndexes[match.rowIndex] = true;
    var diffs = _diffEntries(match, ne);
    if(diffs.length === 0){ result.unchanged.push(ne); }
    else { result.changed.push({existing:match, incoming:ne, diffs:diffs}); }
  });
  G.entries.forEach(function(ex){
    if(!matchedRowIndexes[ex.rowIndex]) result.missing.push(ex);
  });
  return result;
}

window.commitMergeImport = function(){
  var result = _pendingMergeResult;
  if(!result){ toast('No pending merge',true); return; }

  // Apply checked field changes to existing entries
  result.changed.forEach(function(item, idx){
    var checkboxes = document.querySelectorAll('[data-merge-idx="'+idx+'"]');
    var fieldsToApply = {};
    checkboxes.forEach(function(cb){ if(cb.checked) fieldsToApply[cb.dataset.mergeField] = true; });
    _DIFF_FIELDS.forEach(function(f){
      if(fieldsToApply[f.key]) item.existing[f.key] = item.incoming[f.key];
    });
    if(fieldsToApply['classes']) item.existing.classes = item.incoming.classes;
  });

  // Add new entries (assign rowIndex continuing from max existing)
  var maxIdx = G.entries.reduce(function(m,e){ return Math.max(m, e.rowIndex||0); }, 0);
  result.added.forEach(function(ne){
    ne.rowIndex = ++maxIdx;
    G.entries.push(ne);
    G.payments[ne.rowIndex] = ne.isPaid ? tabTotal(ne) : 0;
  });

  // Persist column mapping for next upload
  if(_pendingColMapping && Object.keys(_pendingColMapping).length){
    G.cfg.colMap     = Object.assign({}, _pendingColMapping);
    if(_pendingAuditData) G.cfg.mapHeaders = _pendingAuditData.headers.slice();
    try{ localStorage.setItem('gatepost_cfg', JSON.stringify(G.cfg)); } catch(e){}
  }

  _pendingMergeResult = null;
  _pendingAuditData   = null;

  try{
    localStorage.setItem('gp_entries_'+G.showId, JSON.stringify(G.entries));
    localStorage.setItem('gp_payments_'+G.showId, JSON.stringify(G.payments));
    localStorage.setItem('gp_backnums_'+G.showId, JSON.stringify(G.backNums));
  } catch(ex){}

  var spn=document.getElementById('pill-name'), spm=document.getElementById('pill-meta');
  if(spn) spn.textContent = G.showName || 'Imported';
  if(spm) spm.textContent = G.entries.length+' entries';

  showPage('entries');
  if(G.showId){
    syncEntriesToSupabase().then(function(){
      toast(result.added.length+' added, '+result.changed.length+' updated');
    }).catch(function(err){
      toast('Saved locally. Sync failed: '+esc(err.message), true);
    });
  }
};

function _autoDetectMapping(headers, fieldDefs){
  var mapping = {};
  fieldDefs.forEach(function(def){
    var bestCol = null, bestScore = 0;
    var nkw = def.nkw || [];
    headers.forEach(function(h,i){
      if(!h) return;
      var hn = String(h).toLowerCase();
      // All required keywords must be present
      if(!def.kw.every(function(k){ return hn.indexOf(k)>-1; })) return;
      // None of the exclusion keywords may be present
      if(nkw.some(function(k){ return hn.indexOf(k)>-1; })) return;
      var score = def.kw.length;
      if(score > bestScore){ bestScore = score; bestCol = i; }
    });
    // Only use default column fallback when we have no keyword match AND the default col is defined
    mapping[def.key] = (bestCol !== null) ? bestCol : (bestScore===0 && def.col!=null ? def.col : null);
  });
  return mapping;
}

function previewEntriesFile(wb){
  var ws = wb.Sheets[wb.SheetNames[0]];
  var raw = XLSX.utils.sheet_to_json(ws,{header:1,defval:null,cellDates:true});
  var headers = raw[0] || [];
  var colMapping = _autoDetectMapping(headers, _EXPECTED_FIELDS);
  var classCols = [];
  headers.forEach(function(h,i){
    if(!h) return;
    var hs = String(h);
    if(isClassCol(hs))       classCols.push({i:i, header:hs, div:extractDivName(hs), org:detectOrg(hs), isCow:false});
    else if(isCowCountCol(hs)) classCols.push({i:i, header:hs, div:extractDivName(hs), org:detectOrg(hs), isCow:true});
  });
  var riderCol = (colMapping.riderName != null) ? colMapping.riderName : 4;
  var dataRows = raw.slice(1).filter(function(r){ return r[riderCol]; });
  return {headers:headers, colMapping:colMapping, classCols:classCols, dataRows:dataRows, totalEntries:dataRows.length};
}

window._entryMapChange = function(fieldKey, colVal, selectEl){
  var col = colVal==='' ? null : parseInt(colVal,10);
  _pendingColMapping[fieldKey] = col;
  // Update adjacent sample value span immediately
  if(selectEl && _pendingAuditData && _pendingAuditData.dataRows.length){
    var span = selectEl.nextSibling;
    if(span && span.tagName==='SPAN'){
      if(col!=null){
        var sv = String(_pendingAuditData.dataRows[0][col]||'').trim().substring(0,28);
        span.textContent = sv ? 'e.g. '+sv : '';
      } else {
        span.textContent = '';
      }
    }
  }
};
window._entryClassDiv = function(colIdx, val){
  var cc = _pendingClassCols.find(function(c){ return c.i===colIdx; });
  if(cc) cc.div = val;
};
window._entryClassOrg = function(colIdx, val){
  var cc = _pendingClassCols.find(function(c){ return c.i===colIdx; });
  if(cc) cc.org = val;
};
window._entryDeleteClassCol = function(colIdx){
  _pendingClassCols = _pendingClassCols.filter(function(c){ return c.i!==colIdx; });
  _reRenderAudit();
};
window._entryAddClassCol = function(){
  var sel = document.getElementById('ea-add-cc');
  if(!sel || sel.value==='') return;
  var i = parseInt(sel.value,10);
  var h = String(_pendingAuditData.headers[i]||'');
  _pendingClassCols.push({i:i, header:h, div:extractDivName(h), org:detectOrg(h), isCow:false});
  _reRenderAudit();
};
window._entryAddCustom = function(){
  _pendingCustomFields.push({name:'', col:null});
  _reRenderAudit();
};
window._entryCustomName = function(idx, val){
  if(_pendingCustomFields[idx]) _pendingCustomFields[idx].name = val;
};
window._entryCustomCol = function(idx, val){
  if(_pendingCustomFields[idx]) _pendingCustomFields[idx].col = val==='' ? null : parseInt(val,10);
};
window._entryDeleteCustom = function(idx){
  _pendingCustomFields.splice(idx, 1);
  _reRenderAudit();
};

function commitEntriesImport(){
  if(!_pendingEntriesWb){ toast('No pending import',true); return; }
  try{
    // Register any custom fee columns in the fee schedule so Finances shows them with price inputs
    if(_pendingCustomFields.length){
      initFeeSchedule();
      _pendingCustomFields.forEach(function(cf){
        if(!cf.name || cf.col==null) return;
        var exists = G.cfg.feeSchedule.some(function(s){ return s.cat==='import' && s.label===cf.name; });
        if(!exists) G.cfg.feeSchedule.push({key:null, label:cf.name, amt:0, cat:'import'});
      });
    }

    var newEntries = parseCognito(_pendingEntriesWb, _pendingColMapping, _pendingClassCols, _pendingCustomFields);

    // Re-import: show merge preview instead of replacing immediately
    if(G.entries && G.entries.length > 0){
      _pendingMergeResult = _analyzeMerge(newEntries);
      _renderMergeAudit(_pendingMergeResult);
      return;
    }

    // First import: replace directly
    // Persist the column mapping so re-uploads are pre-filled
    G.cfg.colMap     = Object.assign({}, _pendingColMapping);
    G.cfg.mapHeaders = _pendingAuditData ? _pendingAuditData.headers.slice() : [];
    try{ localStorage.setItem('gatepost_cfg', JSON.stringify(G.cfg)); } catch(e){}

    _pendingEntriesWb = null;
    G.entries  = newEntries;
    G.payments = {}; G.backNums = {};
    G.entries.forEach(function(en){ G.payments[en.rowIndex] = en.isPaid ? tabTotal(en) : 0; });

    var spn=document.getElementById('pill-name'), spm=document.getElementById('pill-meta');
    if(spn) spn.textContent = G.showName || 'Imported';
    if(spm) spm.textContent = G.entries.length+' entries';

    try{
      localStorage.setItem('gp_entries_'+G.showId, JSON.stringify(G.entries));
      localStorage.setItem('gp_payments_'+G.showId, JSON.stringify(G.payments));
      localStorage.setItem('gp_backnums_'+G.showId, JSON.stringify(G.backNums));
    } catch(ex){}

    if(!G.cfg.classes.length){
      var classMap = {};
      G.entries.forEach(function(en){
        en.classes.forEach(function(cls){
          if(cls.num && !classMap[cls.num]){
            var isCow = COW_WORDS.some(function(k){ return (cls.name||'').toLowerCase().indexOf(k)>-1; });
            CFG_ROW_ID++;
            classMap[cls.num] = {_id:'cr'+CFG_ROW_ID, num:cls.num, name:cls.name,
              division:cls.division, org:cls.org||'CoWN', isCow:isCow,
              baseFee:null, cowFee:null, jackpot:null, addedMoney:null};
          }
        });
      });
      G.cfg.classes = Object.values(classMap).sort(function(a,b){ return (parseInt(a.num)||999)-(parseInt(b.num)||999); });
    }

    showPage('entries');
    if(G.showId){
      syncEntriesToSupabase().then(function(){
        toast(G.entries.length+' entries saved to database');
      }).catch(function(err){
        toast('Entries loaded locally. Sync failed: '+esc(err.message), true);
      });
    }
  } catch(err){
    var el = document.getElementById('imp-status');
    if(el) el.innerHTML = '<span style="color:var(--red)">Error: '+esc(err.message)+'</span>';
    console.error(err);
  }
}

  _pendingEntriesWb    = null;
  _pendingColMapping   = {};

  _pendingCustomFields = [];
  _pendingAuditData    = null;

  var el = document.getElementById('imp-status');
  if(el) el.innerHTML = '';
}

function normalizeHeader(h){ return (h||'').toLowerCase().replace(/[^a-z0-9]/g,''); }



// Convert ALL CAPS string to Title Case: "SS ROLL OF THE DICE" → "Ss Roll Of The Dice"

// Preserves mixed-case strings that are already clean

function toTitleCase(s){

  if(!s) return s;

  // Only convert if ALL CAPS (all letters are uppercase)

  var letters = s.replace(/[^a-zA-Z]/g,'');

  if(letters && letters === letters.toUpperCase()){

    return s.replace(/\w\S*/g, function(w){ return w.charAt(0).toUpperCase()+w.slice(1).toLowerCase(); });

  }

  return s;

}



// Normalize a person name from any SHTX format:

//   "HALL,KELLY" → "Kelly Hall"  (Last,First flip)

//   "TRACY S DILL" → "Tracy Dill"  (ALL CAPS + middle initial removal)

function normalizePersonName(s){

  if(!s) return s;

  // Strip Unicode smart quotes, zero-width spaces, BOM that SHTX sometimes embeds
  s = s.replace(/[​‌‍﻿“”„‟‘’‚‛"]/g, '');

  s = s.trim();

  // "LAST,FIRST" or "LAST, FIRST" → "FIRST LAST"

  var commaM = s.match(/^([^,]+),\s*(.+)$/);

  if(commaM) s = commaM[2].trim() + ' ' + commaM[1].trim();

  s = toTitleCase(s);

  // Remove middle initial: "Tracy S Dill" → "Tracy Dill"

  s = s.replace(/^(\S+)\s+[A-Z]\.?\s+(\S.*)$/, '$1 $2').trim();

  return s;

}

// ── AQHA points calculator ────────────────────────────────────

// Official AQHA scale:
//   <3 entries → 0 pts
//   3–4 entries → 0.5 pts to 1st only
//   5–9 → tier 1: 1st=1, 2nd=0.5
//   10–14 → tier 2: 1st=2, 2nd=1, 3rd=0.5
//   … (tier = floor(entries/5), capped at 9)
//   40+ → tier 9 (max): 1st=9, 2nd=8 … 9th=1, 10th=0.5

function calcAqhaPoints(rows, entries){

  if(!entries||entries<1) entries=rows.length;

  // Special case: 3–4 entries → only 1st gets 0.5
  if(entries>=3 && entries<5){
    rows.forEach(function(r,i){
      rows[i]._pts=(r.isDQ||!r.place)?0:(r.place===1?0.5:0);
    });
    return rows;
  }

  var tier=Math.min(9, Math.floor(entries/5)); // cap at 9

  rows.forEach(function(r,i){

    if(r.isDQ||!r.place){ rows[i]._pts=0; return; }

    var p=r.place;

    if(tier<1){ rows[i]._pts=0; return; }

    if(p<=tier) rows[i]._pts=tier-p+1;

    else if(p===tier+1) rows[i]._pts=0.5;

    else rows[i]._pts=0;

  });

  return rows;

}



// ── CoWN points calculator ────────────────────────────────────

// entries = total horses in the class

// rows = [{place, score, isDQ}, ...] for the class

// Returns array of {place, pts} in same order as input rows

function calcCownPoints(rows, entries){

  if(!entries||entries<1) entries=rows.length;

  // Group by place to find ties

  var byPlace={};

  rows.forEach(function(r,i){

    if(r.isDQ||!r.place){ rows[i]._pts=0; return; }

    if(!byPlace[r.place]) byPlace[r.place]=[];

    byPlace[r.place].push(i);

  });

  Object.keys(byPlace).forEach(function(pl){

    var idxs=byPlace[pl];

    pl=parseInt(pl);

    // Sum points for all tied positions

    var sum=0;

    for(var k=0;k<idxs.length;k++){

      var pos=pl+k;  // consecutive places occupied

      var pts=Math.max(0, entries-pos+1);

      sum+=pts;

    }

    var avg=sum/idxs.length;

    idxs.forEach(function(i){ rows[i]._pts=avg; });

  });

  return rows;

}



// ── NCHA fixed-top-10 points ──────────────────────────────────
// 1st=10, 2nd=9 … 10th=1, below 10th or zero score = 0 pts
function calcFixed10Points(rows){
  rows.forEach(function(r,i){
    if(r.isDQ||!r.place||!r.score){ rows[i]._pts=0; return; }
    rows[i]._pts=Math.max(0,11-r.place);
  });
  return rows;
}

// ── ApHC tiered-lookup points ─────────────────────────────────
var APHC_PTS_TABLE=[
  {min:18,pts:[12,10,8,6,4,2]},
  {min:15,pts:[6,5,4,3,2,1]},
  {min:12,pts:[5,4,3,2,1,0]},
  {min:8, pts:[4,3,2,1,0,0]},
  {min:5, pts:[3,2,1,0,0,0]},
  {min:2, pts:[2,1,0,0,0,0]}
];
function calcAphcPoints(rows,entries){
  if(!entries||entries<1) entries=rows.length;
  var tier=null;
  for(var t=0;t<APHC_PTS_TABLE.length;t++){
    if(entries>=APHC_PTS_TABLE[t].min){ tier=APHC_PTS_TABLE[t].pts; break; }
  }
  rows.forEach(function(r,i){
    if(r.isDQ||!r.place){ rows[i]._pts=0; return; }
    var p=r.place-1;
    rows[i]._pts=tier&&p<tier.length?tier[p]:0;
  });
  return rows;
}

// ── ASHA entries+1 points ─────────────────────────────────────
// Same tie-split logic as CoWN but offset +1 (1st=N+1, last=2, no zeros)
function calcEntriesPlusOnePoints(rows,entries){
  if(!entries||entries<1) entries=rows.length;
  var byPlace={};
  rows.forEach(function(r,i){
    if(r.isDQ||!r.place){ rows[i]._pts=0; return; }
    if(!byPlace[r.place]) byPlace[r.place]=[];
    byPlace[r.place].push(i);
  });
  Object.keys(byPlace).forEach(function(pl){
    var idxs=byPlace[pl]; pl=parseInt(pl);
    var sum=0;
    for(var k=0;k<idxs.length;k++) sum+=Math.max(0,entries-(pl+k)+2);
    var avg=sum/idxs.length;
    idxs.forEach(function(i){ rows[i]._pts=avg; });
  });
  return rows;
}

// Recalculate placings from scores (higher score = better place)

// Returns rows sorted and stamped with _calcPlace

function calcPlacingsFromScores(rows){

  var scored=rows.filter(function(r){ return r.score&&!r.isDQ; });

  var dqd=rows.filter(function(r){ return r.isDQ||!r.score; });

  scored.sort(function(a,b){ return (b.score||0)-(a.score||0); });

  var rank=1;

  scored.forEach(function(r,i){

    if(i>0&&scored[i-1].score===r.score) r._calcPlace=scored[i-1]._calcPlace;

    else r._calcPlace=rank;

    rank=i+2;

  });

  dqd.forEach(function(r){ r._calcPlace=null; });

  return scored.concat(dqd);

}

// Map a raw discipline string to the canonical name for a given org.
// Handles SHTX quirks like "Ranch Pleasure" → "Pleasure" for CoWN.
function normalizeDiscName(raw, org){
  if(!raw) return raw;
  var orgDiscs = (ORG_CLASSES[org] || {}).disciplines || [];
  if(!orgDiscs.length) return raw;

  // 1. Exact match
  if(orgDiscs.indexOf(raw) >= 0) return raw;

  // 2. Case-insensitive exact
  var lower = raw.toLowerCase();
  for(var i=0;i<orgDiscs.length;i++){
    if(orgDiscs[i].toLowerCase()===lower) return orgDiscs[i];
  }

  // 3. Strip leading "Ranch " or "Working " from raw and retry
  var stripped = raw.replace(/^ranch\s+/i,'').replace(/^working\s+/i,'').trim();
  if(stripped !== raw){
    for(var i=0;i<orgDiscs.length;i++){
      var dLow=orgDiscs[i].toLowerCase();
      var dStripped=dLow.replace(/^ranch\s+/,'').replace(/^working\s+/,'');
      if(dLow===stripped.toLowerCase()||dStripped===stripped.toLowerCase()) return orgDiscs[i];
    }
  }

  // 4. Best word-overlap (must share ≥50% of words)
  var rawWords=lower.split(/\s+/);
  var best=0, bestDisc='';
  for(var i=0;i<orgDiscs.length;i++){
    var dWords=orgDiscs[i].toLowerCase().split(/\s+/);
    var overlap=rawWords.filter(function(w){ return dWords.indexOf(w)>=0; }).length;
    var score=overlap/Math.max(rawWords.length,dWords.length);
    if(score>best){ best=score; bestDisc=orgDiscs[i]; }
  }
  if(best>=0.5) return bestDisc;

  return raw; // no match — keep original
}

// Parse Funnware ClassDivision compound string → {org, division, discipline}

// Handles three distinct export formats:

//   1. Standard: "Collegiate Ltd Non Pro Trail", "Non Pro All Around"

//   2. GJHSA space-padded: " PLEASURE  OPEN  " (discipline + 2+ spaces + division)

//   3. GJHSA concatenated: "PLEASUREOPEN", "WORKING COWOPEN" (discipline prefix directly joined)

function parseClassDivStr(raw){

  if(!raw||!raw.trim()) return {org:'CoWN',division:'Open',discipline:''};

  var s=raw.trim();



  // ── GJHSA all-caps format (formats 2 & 3) ──────────────────────────────

  // Detect by: string equals its own toUpperCase AND contains letters

  if(s === s.toUpperCase() && /[A-Z]/.test(s)){

    function gjNormDiv(d){

      // Normalize "JR." periods and extra spaces, then look up canonical name

      var clean=d.replace(/\bJR\.\s*/gi,'Jr ').replace(/\s+/g,' ').trim();

      var key=clean.toLowerCase();

      return SHTX_DIV[key]||(clean?clean.charAt(0).toUpperCase()+clean.slice(1).toLowerCase():'Open');

    }

    // Format 2: two or more spaces separate discipline from division

    var spM=s.match(/^(WORKING\s+COW|PLEASURE|REINING|TRAIL)\s{2,}(.+?)\s*$/);

    if(spM){

      var spDisc=spM[1]==='WORKING COW'?'Working Cow':spM[1].charAt(0)+spM[1].slice(1).toLowerCase();

      return {org:'CoWN', division:gjNormDiv(spM[2]), discipline:spDisc};

    }

    // Format 3: discipline prefix directly concatenated (or single space) with division

    var gjPfx=[['WORKING COW','Working Cow'],['PLEASURE','Pleasure'],['REINING','Reining'],['TRAIL','Trail']];

    for(var ci=0;ci<gjPfx.length;ci++){

      var pfx=gjPfx[ci][0];

      if(s.startsWith(pfx) && s.length>pfx.length){

        return {org:'CoWN', division:gjNormDiv(s.slice(pfx.length).trim()), discipline:gjPfx[ci][1]};

      }

    }

    // All-caps but no discipline prefix — fall through to standard parsing with s as-is

  }



  // ── Standard parsing ───────────────────────────────────────────────────

  // Normalize abbreviations and common misspellings before org detection

  var n=s

    .replace(/\bAmatuer\b/gi,'Amateur')

    .replace(/\bAmt\b/g,'Amateur')

    .replace(/\bJR\.\s*/g,'Jr ')

    .replace(/\s+/g,' ').trim();



  var org, rest, forcedDiv=null;



  if(/^VRH\b/i.test(s)){

    org='VRH'; rest=n.replace(/^VRH\s*/i,'').trim();

  } else if(/\bversatility\s+ranch\s+horse\b/i.test(s)){

    org='VRH'; rest=n.replace(/\bVersatility\s+Ranch\s+Horse\b/gi,'').replace(/\s+/g,' ').trim();

  } else if(/\bversatility\b/i.test(s)){

    org='VRH'; rest=n.replace(/\bVersatility\b/gi,'').replace(/\s+/g,' ').trim();

  } else if(/^AQHA\s+RHC\b/i.test(s)){

    org='AQHA RHC'; rest=n.replace(/^AQHA\s+RHC\s*/i,'').trim();

  } else if(/\branch\s+heritage\b/i.test(s)){

    org='AQHA RHC'; rest=n.replace(/\bAQHA\s+Ranch\s+Heritage\s+Challenge\b/gi,'')

                          .replace(/\bRanch\s+Heritage\b/gi,'').replace(/\s+/g,' ').trim();

  } else if(/^AQHA\s+Ranch\b/i.test(s)){

    // Must check "AQHA Ranch" before generic "AQHA" — otherwise "Ranch" stays in rest and breaks division lookup

    org='AQHA Ranch'; rest=n.replace(/^AQHA\s+Ranch\s*/i,'').trim();

  } else if(/^AQHA\b/i.test(s)){

    org='AQHA Ranch'; rest=n.replace(/^AQHA\s*/i,'').trim();

  } else if(/^apha/i.test(s)){

    org='APHA'; rest=n.replace(/^apha\s*/i,'').trim();

  } else if(/\bWHSR\b|wyoming\s+high\s+school|wyo\s+hs\b|\bhigh\s+school\b/i.test(s)){

    org='WHSR'; rest=n.replace(/\b(?:WHSR|Wyoming\s+High\s+School\s+Rodeo|Wyo\s+HS|High\s+School)\b/gi,'').replace(/\s+/g,' ').trim();

    forcedDiv='';

  } else if(/^collegiate\b/i.test(s)){

    // Collegiate divisions belong to CoWN — "Collegiate Non-Pro Trail"

    org='CoWN'; rest=n;  // leave "Collegiate Non-Pro" in rest for div lookup

  } else if(/^(?:level\s+1|l1)\b/i.test(s)){

    org='CoWN'; forcedDiv='L1 Novice';

    rest=n.replace(/^(?:level\s+1|l1)\s*(?:novice?)?\s*/i,'').trim();

  } else if(/jackpot/i.test(s)){

    org='Jackpot'; rest=n.replace(/\s*jackpot\s*/gi,' ').replace(/\s+/g,' ').trim();

  } else if(/\bopen\s+schooling\b/i.test(s)){

    // "Open Schooling Trail" — strip the whole "Open Schooling" phrase, keep discipline

    org='CoWN'; forcedDiv='Open Schooling';

    rest=n.replace(/\bopen\s+schooling\b/gi,'').replace(/\s+/g,' ').trim();

  } else if(/^schooling\b/i.test(s)){

    org='CoWN'; forcedDiv='Open Schooling';

    rest=n.replace(/^schooling\s*/i,'').trim();

  } else {

    org='CoWN'; rest=n;

  }



  // Extract discipline from end of rest string

  var disc='', divPart=rest;

  for(var i=0;i<SHTX_DISCS.length;i++){

    var m=rest.match(SHTX_DISCS[i][0]);

    if(m){ disc=SHTX_DISCS[i][1]; divPart=rest.slice(0,m.index).trim(); break; }

  }

  // Jackpot-specific: "CUTTING YOUTH" format (discipline word comes first after jackpot strip)
  if(!disc && org==='Jackpot'){
    var spaceIdx=rest.search(/\s/);
    if(spaceIdx>0){
      var discMap={cutting:'Cutting',reining:'Reining',trail:'Trail',pleasure:'Pleasure','ranch riding':'Ranch Riding','ranch trail':'Ranch Trail'};
      var firstWord=rest.slice(0,spaceIdx).toLowerCase();
      if(discMap[firstWord]){ disc=discMap[firstWord]; divPart=rest.slice(spaceIdx+1).trim(); }
    }
  }



  // Canonicalize division

  var div=forcedDiv!==null ? forcedDiv : (SHTX_DIV[divPart.toLowerCase()]||(divPart||'Open'));



  // ── Secondary org inference (when no explicit prefix was found) ─────────

  // Uses three signals in priority order:

  //   1. Discipline is unique to one non-CoWN org (Ranch Trail → AQHA Ranch)

  //   2. Division name belongs only to one org (Amateur → VRH/AQHA; Novice Amateur → APHA)

  //   3. "Ranch" keyword anywhere → AQHA Ranch (if discipline confirms it)

  if(org==='CoWN'){

    var cownDiscs=ORG_CLASSES.CoWN.disciplines; // ['Cow Work','Reining','Trail','Pleasure']

    // Normalize against CoWN BEFORE org inference so "Ranch Pleasure" → "Pleasure"
    // prevents the class from being misassigned to another org
    if(disc && cownDiscs.indexOf(disc)<0){
      var _discCoWN=normalizeDiscName(disc,'CoWN');
      if(cownDiscs.indexOf(_discCoWN)>=0) disc=_discCoWN;
    }

    // Signal 1: discipline not in CoWN → find the right org

    if(disc && cownDiscs.indexOf(disc)<0){

      // AQHA Ranch disciplines are all prefixed "Ranch..." or "Working Western Rail"

      if(ORG_CLASSES['AQHA Ranch'].disciplines.indexOf(disc)>=0){

        org='AQHA Ranch';

      } else if(disc==='Cutting'||disc==='Conformation'||disc==='VRH All Around'){

        org='VRH';

      } else if(disc==='Cow Horse'){

        org='APHA';

      } else {

        // Generic scan

        var orgKeys=Object.keys(ORG_CLASSES);

        for(var oi=0;oi<orgKeys.length;oi++){

          if(orgKeys[oi]==='CoWN'||orgKeys[oi]==='Jackpot') continue;

          if(ORG_CLASSES[orgKeys[oi]].disciplines.indexOf(disc)>=0){ org=orgKeys[oi]; break; }

        }

      }

    }



    // Signal 2: division name that doesn't exist in CoWN

    if(org==='CoWN'){

      var cownDivs=DIV_ORDER_BY_ORG.CoWN;

      if(cownDivs.indexOf(div)<0 && div){

        // "Amateur","LTD Am","Rookie Am","LTD Youth","Rookie Youth" → VRH or AQHA Ranch

        var vrhAqhaDivs=['Amateur','LTD Am','Rookie Am','LTD Youth','Rookie Youth'];

        if(vrhAqhaDivs.indexOf(div)>=0){

          // AQHA Ranch if discipline is a Ranch discipline, otherwise VRH

          org=ORG_CLASSES['AQHA Ranch'].disciplines.indexOf(disc)>=0 ? 'AQHA Ranch' : 'VRH';

        } else if(div==='Novice Amateur'||div==='Jr Horse'){

          org='APHA';

        }

      }

    }



    // Signal 3: "Ranch" keyword + discipline is specifically an AQHA Ranch discipline
    // (Avoid false positive: "Ranch Pleasure" has "Ranch" but isn't AQHA Ranch)

    if(org==='CoWN' && /\branch\b/i.test(s) && disc && ORG_CLASSES['AQHA Ranch'].disciplines.indexOf(disc)>=0){

      org='AQHA Ranch';

    }



    // If org changed, re-canonicalize division against the new org's known divisions

    if(org!=='CoWN'){

      var newDivList=DIV_ORDER_BY_ORG[org]||[];

      var remapped=SHTX_DIV[divPart.toLowerCase()];

      if(remapped && newDivList.indexOf(remapped)>=0) div=remapped;

      else if(newDivList.indexOf(div)<0 && newDivList.length) div=newDivList[0];

    }

  }



  // Don't use rest as discipline if it's just a division name (e.g. "Amateur" after stripping "Versatility Ranch Horse")
  var discFinal = disc || (SHTX_DIV.hasOwnProperty(rest.toLowerCase()) ? '' : rest);
  // Remap to the org's canonical discipline name (e.g. "Ranch Pleasure" → "Pleasure" for CoWN)
  var discNorm = normalizeDiscName(discFinal, org);
  return {org:org, division:div, discipline:discNorm};

}

// Confidence of parseClassDivStr result:
//  'matched'   → org was explicit in the string, discipline found        (green ✓)
//  'check'     → org inferred or defaulted to CoWN, should verify        (amber ⚠)
//  'unmatched' → discipline could not be identified                       (red ✗)
function classParseConfidence(rawStr, parsed){
  if(!parsed.discipline) return 'unmatched';
  var s=String(rawStr||'');
  // Explicit org marker in the string
  if(/^VRH\b|^AQHA\b|^APHA\b|^ApHC\b|^NRCHA\b|^NRHA\b|^NCHA\b|^WHSR\b|^ASHA\b|^NVRHA\b/i.test(s)) return 'matched';
  if(/versatility\s+ranch|ranch\s+heritage|jackpot|collegiate|open\s+schooling|^schooling\b/i.test(s)) return 'matched';
  if(s===s.toUpperCase()&&/[A-Z]/.test(s)) return 'matched'; // GJHSA all-caps format
  if(parsed.org!=='CoWN') return 'matched'; // inferred to non-CoWN via discipline signal
  return 'check'; // defaulted to CoWN — may or may not be correct
}



function parseSTHXRows(rawRows, headerOverride){

  if(!rawRows||!rawRows.length) return [];

  var headerMap={};

  // headerOverride: {normalizedRole → original header key} from saved resColMap

  if(headerOverride && Object.keys(headerOverride).length){

    Object.keys(headerOverride).forEach(function(role){ headerMap[role]=headerOverride[role]; });

  }

  // Auto-detection fills in anything not covered by the override

  Object.keys(rawRows[0]).forEach(function(k){

    var n=normalizeHeader(k);

    if(!headerMap[n]) headerMap[n]=k;

  });

  return rawRows.map(function(row){

    function col(n){ var k=headerMap[n]; var v=k!=null?row[k]:''; return (v===null||v===undefined)?'':String(v); }

    var parsed=parseClassDivStr(col('classdivision'));

    var discOverride=(col('classage')||'').trim();

    var horse=toTitleCase((col('horse')||'').trim());

    var rider=normalizePersonName((col('rider')||'').trim());

    var owner=normalizePersonName((col('owner')||'').trim());

    return {

      showName:   (col('show')||'').trim(),

      org:        parsed.org,

      division:   parsed.division,

      discipline: discOverride||parsed.discipline,

      rawClass:   (col('classdivision')||'').trim(),

      entries:    parseInt(col('entries'),10)||0,

      addedMoney: parseFloat(col('addedmoney'))||0,

      horse:      horse,

      rider:      rider,

      riderNum:   (col('ridershtxno')||'').trim(),

      owner:      owner,

      goRound:    (col('goround')||'').trim(),

      score:      parseFloat(col('score'))||0,

      place:      parseInt(col('place'),10)||0,

      pts:        parseFloat(col('shtxpts'))||0,

      money:      parseFloat(col('money'))||0,

      riderCity:  (col('ridercity')||'').trim(),

      riderState: (col('riderstate')||'').trim(),

      horseReg:   (col('breed')||'').trim(),

      horseOrg:   (col('registration')||'').trim()

    };

  }).filter(function(r){ return r.horse||r.rider; });

}

function calcAaPrizes(total, eligibleCount){

  if(!total||!eligibleCount) return [0,0,0,0,0];

  var n=Math.min(eligibleCount,5);

  var pcts=AA_PAYOUT_TABLE[n]||AA_PAYOUT_TABLE[5];

  return [0,0,0,0,0].map(function(_,i){ return i<pcts.length ? Math.round(total*pcts[i]/100) : 0; });

}

// ── Name normalisation for entry/result matching ──────────────────────────
function normForMatch(s){
  if(!s) return '';
  s=s.trim();
  // "LAST,FIRST" or "LAST, FIRST" → "FIRST LAST"
  var cm=s.match(/^([^,]+),\s*(.+)$/);
  if(cm) s=cm[2].trim()+' '+cm[1].trim();
  s=s.toUpperCase().replace(/\s+/g,' ').trim();
  // Remove single-letter middle initials (e.g. "TRACY S DILL" → "TRACY DILL")
  s=s.replace(/(^|\s)[A-Z](\s|$)/g,'$2').replace(/\s+/g,' ').trim();
  return s;
}

// Returns first + last word only (ignores middle names like "JOSEPHINE NICOLE GURLEY" → "JOSEPHINE GURLEY")
function firstLast(s){
  var p=s.split(' ');
  return p.length<2?s:p[0]+' '+p[p.length-1];
}

function findEntryForRider(riderName, horseName){
  if(!G.entries||!G.entries.length) return null;
  var rNorm=normForMatch(riderName);
  var rFL=firstLast(rNorm);
  var hNorm=(horseName||'').toUpperCase().replace(/\s+/g,' ').trim();
  var hNormStripped=hNorm.replace(/\s/g,'');
  // Pass 1: exact rider name + exact/alias/space-stripped horse name
  if(hNorm){
    for(var i=0;i<G.entries.length;i++){
      var e=G.entries[i];
      var eHorse=(e.horse||'').toUpperCase().replace(/\s+/g,' ').trim();
      var eHorseCanon=(getCanonicalHorse(e.horse)||'').toUpperCase().replace(/\s+/g,' ').trim();
      var eStripped=eHorse.replace(/\s/g,'');
      if(normForMatch(e.name||'')===rNorm && (eHorse===hNorm||eHorseCanon===hNorm||eStripped===hNormStripped)) return {entry:e,idx:i,type:'exact'};
    }
  }
  // Pass 2: fuzzy rider name + exact/alias/space-stripped horse name
  if(hNorm){
    for(var i=0;i<G.entries.length;i++){
      var e=G.entries[i];
      var eHorse=(e.horse||'').toUpperCase().replace(/\s+/g,' ').trim();
      var eHorseCanon=(getCanonicalHorse(e.horse)||'').toUpperCase().replace(/\s+/g,' ').trim();
      var eStripped=eHorse.replace(/\s/g,'');
      if(firstLast(normForMatch(e.name||''))===rFL && (eHorse===hNorm||eHorseCanon===hNorm||eStripped===hNormStripped)) return {entry:e,idx:i,type:'fuzzy'};
    }
  }
  // Pass 3: name-only match — only use if this entry has no horse or the result has no horse
  // (avoids merging two different horses under the same rider)
  var nameOnlyMatch=null;
  for(var i=0;i<G.entries.length;i++){
    var e=G.entries[i];
    var eHorse=(e.horse||'').toUpperCase().replace(/\s+/g,' ').trim();
    var nameMatch=normForMatch(e.name||'')===rNorm || firstLast(normForMatch(e.name||''))===rFL;
    if(!nameMatch) continue;
    // If both sides have a horse and they differ, skip — different entry
    if(hNorm && eHorse && hNorm!==eHorse) continue;
    if(!nameOnlyMatch) nameOnlyMatch={entry:e,idx:i,type:'fuzzy'};
  }
  return nameOnlyMatch;
}

function reconcileResultsToEntries(){
  var matched=0, skipped=0;
  // Group results by rider to avoid re-matching the same person repeatedly
  var cache={};
  G.results.forEach(function(r){
    // Never overwrite a manual match — user explicitly set it
    if(r._matchType==='manual'){ matched++; return; }
    if(!r.rider){ r._matchType='none'; return; }
    var key=r.rider+'|||'+(r.horse||'');
    if(cache[key]===undefined){
      var m=findEntryForRider(r.rider, r.horse);
      if(m){
        var eHorse=(m.entry.horse||'').toUpperCase().replace(/\s+/g,' ').trim();
        var rHorse=(r.horse||'').toUpperCase().replace(/\s+/g,' ').trim();
        var horseMismatch=!!(rHorse && eHorse && rHorse!==eHorse);
        cache[key]={type:m.type, rider:m.entry.name, horse:m.entry.horse, email:m.entry.email||'', horseMismatch:horseMismatch};
      } else {
        cache[key]=null;
      }
    }
    var hit=cache[key];
    if(hit){
      r._matchType=hit.type;
      r._horseMismatch=hit.horseMismatch||false;
      r._canonical={rider:hit.rider, horse:hit.horse, email:hit.email};
      matched++;
    } else {
      r._matchType='none';
      r._horseMismatch=false;
      delete r._canonical;
      skipped++;
    }
  });
  return {matched:matched, unmatched:skipped};
}

// Build headerOverride from saved resColMap: {normalizedRole → originalKey}

function buildResHeaderOverride(rawHeaders){

  var resColMap=G.cfg.resColMap||{};

  if(!Object.keys(resColMap).length) return null;

  var override={};

  Object.keys(resColMap).forEach(function(colIdx){

    var role=resColMap[colIdx];

    var origKey=rawHeaders[parseInt(colIdx,10)];

    if(origKey!=null) override[role]=origKey;

  });

  return Object.keys(override).length ? override : null;

}



async function loadResultsFile(file){

  return new Promise(function(resolve,reject){

    var ext=(file.name||'').split('.').pop().toLowerCase();

    var reader=new FileReader();

    reader.onerror=function(){ reject(new Error('File read failed')); };

    if(ext==='txt'||ext==='csv'){

      reader.onload=function(e){

        try{

          var lines=e.target.result.split(/\r?\n/).filter(function(l){ return l.trim(); });

          if(!lines.length){ reject(new Error('Empty file')); return; }

          var headers=lines[0].split('\t');

          var rows=[];

          for(var i=1;i<lines.length;i++){

            var cells=lines[i].split('\t'), obj={};

            headers.forEach(function(h,j){ obj[h]=cells[j]||''; });

            rows.push(obj);

          }

          var override=buildResHeaderOverride(headers);

          G.results=parseSTHXRows(rows, override);

          G.results.forEach(function(r,i){ r._idx=i; });

          G.resultsFile=file.name;

          _resSelOrg=''; _resSelDiv=''; _resSelClass=''; _resSearch=''; _resSortCol='place'; _resSortDir=1; _resSelShow='';

          reconcileResultsToEntries(); saveResultsToStorage(); resolve(G.results.length);

        } catch(ex){ reject(ex); }

      };

      reader.readAsText(file);

    } else {

      reader.onload=function(e){

        try{

          var wb=XLSX.read(e.target.result,{type:'array'});

          var ws=null, rawHeaders=[];

          for(var si=0;si<wb.SheetNames.length;si++){

            var cws=wb.Sheets[wb.SheetNames[si]];

            var chdr=(XLSX.utils.sheet_to_json(cws,{header:1,defval:''})[0]||[]);

            if(chdr.some(function(h){ return normalizeHeader(String(h))==='classdivision'; })){ ws=cws; rawHeaders=chdr; break; }

          }

          if(!ws){ ws=wb.Sheets[wb.SheetNames[0]]; rawHeaders=XLSX.utils.sheet_to_json(ws,{header:1,defval:''})[0]||[]; }

          var rows=XLSX.utils.sheet_to_json(ws,{defval:''});

          var override=buildResHeaderOverride(rawHeaders);

          G.results=parseSTHXRows(rows, override);

          G.results.forEach(function(r,i){ r._idx=i; });

          G.resultsFile=file.name;

          _resSelOrg=''; _resSelDiv=''; _resSelClass=''; _resSearch=''; _resSortCol='place'; _resSortDir=1; _resSelShow='';

          reconcileResultsToEntries(); saveResultsToStorage(); resolve(G.results.length);

        } catch(ex){ reject(ex); }

      };

      reader.readAsArrayBuffer(file);

    }

  });

}



// Parse results file without committing — returns {parsedRows, uniqueClasses, filename}
async function previewResultsFile(file){
  return new Promise(function(resolve,reject){
    var ext=(file.name||'').split('.').pop().toLowerCase();
    var reader=new FileReader();
    reader.onerror=function(){ reject(new Error('File read failed')); };

    function processRows(rawRows, rawHeaders){
      var override=buildResHeaderOverride(rawHeaders||[]);
      var parsed=parseSTHXRows(rawRows, override);
      parsed.forEach(function(r,i){ r._idx=i; });

      // Build unique class strings with parse results + confidence
      var seenMap={}, uniqueClasses=[];
      parsed.forEach(function(r){
        var k=r.rawClass||'';
        if(!seenMap[k]){
          seenMap[k]=uniqueClasses.length;
          uniqueClasses.push({rawClass:k, org:r.org, division:r.division, discipline:r.discipline,
            confidence:classParseConfidence(k,r), count:0});
        }
        uniqueClasses[seenMap[k]].count++;
      });

      resolve({parsedRows:parsed, uniqueClasses:uniqueClasses, override:override, filename:file.name});
    }

    if(ext==='txt'||ext==='csv'){
      reader.onload=function(e){
        try{
          var lines=e.target.result.split(/\r?\n/).filter(function(l){ return l.trim(); });
          if(!lines.length){ reject(new Error('Empty file')); return; }
          var headers=lines[0].split('\t'), rows=[];
          for(var i=1;i<lines.length;i++){
            var cells=lines[i].split('\t'), obj={};
            headers.forEach(function(h,j){ obj[h]=cells[j]||''; });
            rows.push(obj);
          }
          processRows(rows, headers);
        } catch(ex){ reject(ex); }
      };
      reader.readAsText(file);
    } else {
      reader.onload=function(e){
        try{
          var wb=XLSX.read(e.target.result,{type:'array'});
          var ws=null, rawHeaders=[];
          for(var si=0;si<wb.SheetNames.length;si++){
            var cws=wb.Sheets[wb.SheetNames[si]];
            var chdr=(XLSX.utils.sheet_to_json(cws,{header:1,defval:''})[0]||[]);
            if(chdr.some(function(h){ return normalizeHeader(String(h))==='classdivision'; })){ ws=cws; rawHeaders=chdr; break; }
          }
          if(!ws){ ws=wb.Sheets[wb.SheetNames[0]]; rawHeaders=XLSX.utils.sheet_to_json(ws,{header:1,defval:''})[0]||[]; }
          processRows(XLSX.utils.sheet_to_json(ws,{defval:''}), rawHeaders);
        } catch(ex){ reject(ex); }
      };
      reader.readAsArrayBuffer(file);
    }
  });
}

window.commitResultsImport=function(){
  if(!_pendingResultsAudit) return;
  var data=_pendingResultsAudit;

  var fix={};
  data.uniqueClasses.forEach(function(u){ fix[u.rawClass]={org:u.org,division:u.division,discipline:u.discipline}; });
  // Apply corrections to each result row
  data.parsedRows.forEach(function(r){
    var c=fix[r.rawClass];
    if(c){ r.org=c.org; r.division=c.division; r.discipline=c.discipline; }
  });
  G.results=data.parsedRows;
  G.resultsFile=data.filename;
  _resSelOrg=''; _resSelDiv=''; _resSelClass=''; _resSearch=''; _resSortCol='place'; _resSortDir=1; _resSelShow='';

    saveBillingData();

  } catch(ex){ console.warn('localStorage save failed:', ex); }

}



function buildTabLines(entry){

  var f = G.cfg.fees;

  var lines = [];



  // Office fee

  if(f.office > 0) lines.push({desc:feeLabel('office'), amt:f.office, type:'office'});



  // Per-org fees (manually added)

  if(entry.orgFees && entry.orgFees.length){

    entry.orgFees.forEach(function(of){

      lines.push({desc:of.org+' — '+of.desc, amt:of.amt, type:'office'});

    });

  }



  // Membership

  var m = (entry.needsMembership||'').toLowerCase();

  if(m.indexOf('1 year') > -1 || m === '1yr') lines.push({desc:feeLabel('membership1yr'), amt:f.membership1yr, type:'membership'});

  else if(m.indexOf('3 year') > -1 || m === '3yr') lines.push({desc:feeLabel('membership3yr'), amt:f.membership3yr, type:'membership'});

  else if(m.indexOf('life') > -1) lines.push({desc:feeLabel('membershipLife'), amt:f.membershipLife, type:'membership'});




  // Classes — look up per-class config fee if available

  // skip scratched classes -- no fee charged

  if(!isFullScratched(entry.rowIndex)){

    entry.classes.forEach(function(cls){

      var key=clsKey(cls);

      if(isScratched(key, entry.rowIndex)) return;

      var cfgCls = G.cfg.classes.find(function(c){ return c.num === cls.num; });

      var base = (cfgCls && cfgCls.baseFee != null) ? cfgCls.baseFee : (f.classBase||0);

      var isCow = cfgCls ? cfgCls.isCow : COW_WORDS.some(function(k){ return (cls.name||'').toLowerCase().indexOf(k)>-1; });

      var isCutting = !isCow && /cutting/i.test(cls.name||'');

      var cowFee = isCow ? ((cfgCls && cfgCls.cowFee != null) ? cfgCls.cowFee : (f.cowSurcharge||0)) : 0;

      var cutFee = isCutting ? (f.cuttingSurcharge||0) : 0;

      var jp = (cfgCls && cfgCls.jackpot) ? cfgCls.jackpot : 0;

      var desc = 'Class '+(cls.num||'?')+' \u2014 '+cls.name;

      if(cls.org && cls.org !== 'CoWN') desc += ' ['+cls.org+']';

      lines.push({desc:desc, amt:base+cowFee+cutFee+jp, type:'class', isCow:isCow});

    });

  }



  // Show-wide custom fees (applied to every entry)

  (G.cfg.extraFees||[]).forEach(function(ef){

    if(ef.label && ef.amt) lines.push({desc:ef.label, amt:ef.amt, type:'extra'});

  });



  // Package discounts — best qualifying package per org
  var pkgs = G.cfg.classPkgs || [];
  if(pkgs.length > 0 && !isFullScratched(entry.rowIndex)) {
    var orgCnt = {};
    entry.classes.forEach(function(cls){
      if(isScratched(clsKey(cls), entry.rowIndex)) return;
      var o = cls.org || 'CoWN';
      orgCnt[o] = (orgCnt[o]||0) + 1;
    });
    var bestByOrg = {};
    pkgs.forEach(function(pkg){
      if((orgCnt[pkg.org]||0) >= pkg.minClasses) {
        if(!bestByOrg[pkg.org] || pkg.minClasses > bestByOrg[pkg.org].minClasses) bestByOrg[pkg.org] = pkg;
      }
    });
    Object.keys(bestByOrg).forEach(function(org){
      var pkg = bestByOrg[org];
      if(+pkg.discount > 0) lines.push({desc: pkg.label || (org+' Package Discount'), amt: -(+pkg.discount), type:'discount'});
    });
  }

  // Stalling

  if((entry.haulinQty||0) > 0) lines.push({desc:feeLabel('haulin')+' × '+entry.haulinQty, amt:(f.haulin||0)*entry.haulinQty, type:'stall'});

  if(entry.stall1qty > 0) lines.push({desc:feeLabel('stall1')+' × '+entry.stall1qty, amt:f.stall1*entry.stall1qty, type:'stall'});

  if(entry.stall2qty > 0) lines.push({desc:feeLabel('stall2')+' × '+entry.stall2qty, amt:f.stall2*entry.stall2qty, type:'stall'});

  if(entry.stall3qty > 0) lines.push({desc:feeLabel('stall3')+' × '+entry.stall3qty, amt:f.stall3*entry.stall3qty, type:'stall'});

  if(entry.shavings  > 0) lines.push({desc:feeLabel('shavings')+' × '+entry.shavings, amt:f.shavings*entry.shavings, type:'stall'});

  if(entry.rv1qty    > 0) lines.push({desc:feeLabel('rv1')+' × '+entry.rv1qty, amt:f.rv1*entry.rv1qty, type:'rv'});

  if(entry.rv2qty    > 0) lines.push({desc:feeLabel('rv2')+' × '+entry.rv2qty, amt:f.rv2*entry.rv2qty, type:'rv'});

  if(entry.rvCircuit > 0) lines.push({desc:feeLabel('rvCircuit')+' × '+entry.rvCircuit, amt:f.rvCircuit*entry.rvCircuit, type:'rv'});

  // Late fee captured at import or set on entry
  if((entry.lateFee||0) > 0) lines.push({desc:feeLabel('late'), amt:entry.lateFee, type:'office'});

  // Per-association admin fees — applied based on which orgs the rider entered classes in
  (G.cfg.assocFees||[]).forEach(function(af){
    if(!af.amt || !af.org) return;
    if(isFullScratched(entry.rowIndex)) return;
    var matchClasses = entry.classes.filter(function(cls){
      if(isScratched(clsKey(cls), entry.rowIndex)) return false;
      if(cls.org !== af.org) return false;
      if(af.disciplines && af.disciplines.length){
        var dn = (cls.name||'').toLowerCase();
        return af.disciplines.some(function(d){ return dn.indexOf(d.toLowerCase())>-1; });
      }
      return true;
    });
    if(!matchClasses.length) return;
    if(af.per === 'class'){
      matchClasses.forEach(function(cls){
        lines.push({desc:af.org+' — '+af.desc+' ('+cls.name+')', amt:af.amt, type:'assocfee'});
      });
    } else {
      lines.push({desc:af.org+' — '+af.desc, amt:af.amt, type:'assocfee'});
    }
  });

  // Custom import fee columns — qty captured at import × price set in Finances
  // ── Practice sessions ──
  if(entry.practiceSessions && entry.practiceSessions.length){
    entry.practiceSessions.forEach(function(p){
      lines.push({desc:p.label||'Practice Session', amt:+(p.price||0), type:'extra'});
    });
  }

  // ── Clinics ──
  if(entry.clinics && entry.clinics.length){
    entry.clinics.forEach(function(c){
      lines.push({desc:c.label||'Clinic', amt:+(c.price||0), type:'extra'});
    });
  }

  if(entry.customFees){
    var importSched = (G.cfg.feeSchedule||[]).filter(function(s){ return s.cat==='import'; });
    Object.keys(entry.customFees).forEach(function(name){
      var qty = entry.customFees[name];
      if(!qty) return;
      var sched = importSched.find(function(s){ return s.label===name; });
      var price = sched ? (sched.amt||0) : 0;
      lines.push({desc:name+(qty>1?' × '+qty:''), amt:price*qty, type:'import',
        noPrice: !price  // flag so Checkout can warn that price needs to be set
      });
    });
  }

  return lines;

}

function _rcpLineItems(allLines){
  // Groups lines by type, collapses class list if > 4
  var grouped={};
  allLines.forEach(function(l){
    var t=l.type||'other';
    if(!grouped[t]) grouped[t]={lines:[],total:0};
    grouped[t].lines.push(l); grouped[t].total+=l.amt;
  });
  var html='';
  ['office','membership','extra','stall','rv'].forEach(function(t){
    if(!grouped[t]) return;
    grouped[t].lines.forEach(function(l){
      html+='<div class="rcp-line"><span class="desc">'+esc(l.desc)+'</span><span class="amt">'+fmt$(l.amt)+'</span></div>';
    });
  });
  if(grouped['class']){
    var cls=grouped['class'];
    if(cls.lines.length>4){
      html+='<div class="rcp-line"><span class="desc">Classes ('+cls.lines.length+')</span><span class="amt">'+fmt$(cls.total)+'</span></div>';
    } else {
      cls.lines.forEach(function(l){
        html+='<div class="rcp-line"><span class="desc">'+esc(l.desc)+'</span><span class="amt">'+fmt$(l.amt)+'</span></div>';
      });
    }
  }
  Object.keys(grouped).forEach(function(t){
    if(['office','membership','extra','stall','rv','class'].indexOf(t)>=0) return;
    grouped[t].lines.forEach(function(l){
      html+='<div class="rcp-line"><span class="desc">'+esc(l.desc)+'</span><span class="amt">'+fmt$(l.amt)+'</span></div>';
    });
  });
  return html;
}

function _rcpPaymentSummary(paid, payHistory){
  if(!paid && !payHistory.length) return '';
  var html='';
  if(payHistory&&payHistory.length){
    var byMethod={};
    payHistory.forEach(function(p){
      var lbl=payMethodLabel(p.method)+(p.checkNum?' #'+p.checkNum:'');
      if(!byMethod[lbl]) byMethod[lbl]=0; byMethod[lbl]+=p.amount;
    });
    Object.keys(byMethod).forEach(function(lbl){
      html+='<div class="rcp-payment-line"><span>'+esc(lbl)+'</span><span>'+fmt$(byMethod[lbl])+'</span></div>';
    });
  } else if(paid>0){
    html+='<div class="rcp-payment-line"><span>Paid</span><span>'+fmt$(paid)+'</span></div>';
  }
  return html;
}
