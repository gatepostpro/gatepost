        +'<button class="btn btn-dark" onclick="closeScribeMode()">Close</button></div></div>';
      return;
    }
    if(riderIdx<0) riderIdx=0;
    if(riderIdx>=entries.length) riderIdx=entries.length-1;

    var entry=entries[riderIdx];
    var ri=entry.rowIndex;
    var s=initState(ri);
    var tmpl=getTmpl();
    var tmplName=getTmplName();

    // Clamp maneuver index
    var mvrCount=tmpl?tmpl.maneuvers.length:0;
    if(mvrIdx<0) mvrIdx=0;
    if(mvrCount>0&&mvrIdx>=mvrCount) mvrIdx=mvrCount-1;

    var total=calcTotal(s,tmpl);
    var totalStr=s.isDQ?'DQ':s.isOP?'OP':(total!==null?total.toFixed(1):'—');
    var totalColor=s.isDQ?'#e74c3c':s.isOP?'#e07c00':'var(--accent)';
    var manSum=s.m.reduce(function(a,mi){ return a+mi.score; },0);
    var penSum=s.m.reduce(function(a,mi){ return a+mi.pen; },0);

    // Class dropdown
    var clsOpts=classList.map(function(c){
      return '<option value="'+esc(c.key)+'"'+(c.key===selKey?' selected':'')+'>Class '
        +esc(c.num||'?')+' — '+esc(c.name)+' ('+esc(c.division||'')+')</option>';
    }).join('');

    // Rider progress dots
    var dots=entries.map(function(e,i){
      var done=isDone(e.rowIndex);
      return '<span title="'+esc(e.name)+'" style="width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0;margin:1px;background:'
        +(i===riderIdx?'var(--accent)':(done?'rgba(184,134,42,.55)':'var(--border2)'))+'""></span>';
    }).join('');

    // Template switcher
    var tmplBtns=Object.keys(SCORE_TEMPLATES).map(function(t){
      return '<button class="btn btn-sm '+(t===tmplName?'btn-accent':'btn-dark')+'" '
        +'style="font-size:.68rem;padding:.18rem .4rem" '
        +'onclick="scrSetTmpl(\''+t.replace(/'/g,"\\'")+'\')">'+esc(t)+'</button>';
    }).join('');

    // ── Horizontal maneuver scroll — all maneuvers side by side ──
    var statusCardClass=s.isDQ?' dq-on':s.isOP?' op-on':'';
    var statusBadge=s.isDQ
      ?'<div style="background:#e74c3c;color:#fff;font-size:.6rem;font-weight:800;padding:.1rem .35rem;border-radius:3px;display:inline-block;margin-bottom:.18rem">DQ</div>'
      :s.isOP
      ?'<div style="background:#e07c00;color:#fff;font-size:.6rem;font-weight:800;padding:.1rem .35rem;border-radius:3px;display:inline-block;margin-bottom:.18rem">OP</div>'
      :'';
    var hscrollHtml='';
    if(tmpl){
      hscrollHtml='<div class="scr-hscroll">';
      tmpl.maneuvers.forEach(function(mname,mi){
        var cm=s.m[mi];
        var penVals=tmpl.penValues||[];
        var touched=cm.score!==0||cm.pen>0;
        // 3-col grid: row1 neg [−1½,−1,−½], row2 pos [+½,+1,+1½], row3 zero (full width)
        var negBtns=[[-1.5,'−1½'],[-1,'−1'],[-0.5,'−½']].map(function(p){
          return '<button class="scr-mb3 neg'+(cm.score===p[0]?' sel':'')+'" onclick="scrSetM('+mi+','+p[0]+')">'+p[1]+'</button>';
        }).join('');
        var posBtns=[[0.5,'+½'],[1,'+1'],[1.5,'+1½']].map(function(p){
          return '<button class="scr-mb3 pos'+(cm.score===p[0]?' sel':'')+'" onclick="scrSetM('+mi+','+p[0]+')">'+p[1]+'</button>';
        }).join('');
        var zeroBtn='<button class="scr-mb3 zero'+(cm.score===0?' sel':'')+'" onclick="scrSetM('+mi+',0)">0</button>';
        var penBtns=penVals.map(function(pv){
          return '<button class="scr-padd3" onclick="scrMPenAdd('+mi+','+pv+')">'+(pv===0.5?'½':pv)+' pen</button>';
        }).join('');
        var scoreDisp=cm.score!==0
          ?(cm.score>0?'<span style="color:#2ecc71;font-weight:700">+'+cm.score+'</span>':'<span style="color:#e74c3c;font-weight:700">'+cm.score+'</span>')
          :'<span style="color:var(--muted)">0</span>';
        var penDisp=cm.pen>0?'<span style="color:#e74c3c;font-weight:700;margin-left:.35rem">−'+cm.pen+' pen</span>':'';
        hscrollHtml+='<div class="scr-mcard'+(touched?' touched':'')+statusCardClass+'">'
          +statusBadge
          +'<div class="scr-mc-name">'+esc(mname)+'</div>'
          +'<div class="scr-mc-vals">'+scoreDisp+penDisp+'</div>'
          // Penalties FIRST
          +(penVals.length
            ?'<div class="scr-pen-lbl3">Penalty</div>'
             +'<div class="scr-mc-pbtns">'+penBtns+'</div>'
             +(cm.pen>0?'<button class="scr-pclr" style="margin-bottom:.3rem" onclick="scrMPenClr('+mi+')">✕ clear penalty</button>':'')
            :'')
          // Score grid
          +'<div class="scr-pen-lbl3">Score</div>'
          +'<div class="scr-mc-sgrid">'+negBtns+posBtns+zeroBtn+'</div>'
          +'</div>';
      });
      hscrollHtml+='</div>';
    } else {
      // Unknown discipline — raw score input
      hscrollHtml='<div style="padding:.4rem .65rem">'
        +'<div class="scr-mcard" style="width:auto">'
        +'<div style="font-size:.6rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:.3rem">Final Score</div>'
        +'<input type="number" inputmode="decimal" step="0.001" min="0" max="300" placeholder="70.000" '
        +'value="'+(s.rawScore||'')+'" '
        +'style="width:140px;background:var(--bg);border:2px solid var(--accent);border-radius:8px;'
        +'color:var(--text);padding:.5rem .7rem;font-size:1.2rem;font-weight:700;text-align:center;display:block" '
        +'oninput="scrSetRaw(this.value)">'
        +'</div></div>';
    }

    // NRHA
    var nrhaHtml=(tmpl&&tmpl.hasNRHA)
      ?'<div style="display:flex;align-items:center;gap:.5rem;margin:.4rem 0">'
        +'<span style="font-size:.78rem;flex:1">Natural Ranch Horse Appearance</span>'
        +'<input type="number" step="0.5" min="-5" max="5" placeholder="0" value="'+(s.nrha||'')+'" '
        +'style="width:58px;background:var(--bg);border:1px solid var(--border2);border-radius:5px;'
        +'color:var(--text);padding:.22rem .35rem;text-align:center;font-size:.88rem" oninput="scrSetNRHA(this.value)"></div>'
      :'';

    var commHtml=(tmpl&&tmpl.hasComments)
      ?'<div style="font-size:.6rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:.4rem 0 .2rem">Comments</div>'
        +'<textarea rows="2" placeholder="Comments..." '
        +'style="width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:6px;'
        +'color:var(--text);padding:.3rem .45rem;font-size:.8rem;resize:none" '
        +'oninput="scrSetComments(this.value)">'+esc(s.comments||'')+'</textarea>'
      :'';

    // ── Assemble ───────────────────────────────────────────────
    mr.innerHTML='<div class="scr-wrap"><div class="scr-inner">'
      // Header
      +'<div class="scr-head">'
      +'<button class="scr-rnav" onclick="closeScribeMode()">✕</button>'
      +'<select onchange="scrSelClass(this.value)" style="flex:1;background:var(--card);border:1px solid var(--border2);border-radius:5px;color:var(--text);padding:.26rem .38rem;font-size:.76rem">'+clsOpts+'</select>'
      +'</div>'
      // Rider bar
      +'<div class="scr-rider-bar">'
      +'<button class="scr-rnav" onclick="scrPrevRider()" '+(riderIdx===0?'disabled':'')+'>◀</button>'
      +'<div style="flex:1;min-width:0;text-align:center">'
      +'<div style="font-weight:700;font-size:.87rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'
      +'<span style="color:var(--accent);margin-right:.3rem">#'+(G.backNums[ri]||'—')+'</span>'+esc(entry.name||'')+'</div>'
      +'<div style="font-size:.7rem;color:var(--muted)">'+esc(entry.horse||'')+'</div>'
      +'<div style="display:flex;gap:2px;justify-content:center;margin-top:.12rem;flex-wrap:wrap">'+dots+'</div>'
      +'</div>'
      +'<button class="scr-rnav" onclick="scrNextRider()" '+(riderIdx>=entries.length-1?'disabled':'')+'>▶</button>'
      +'</div>'
      // Total bar
      +'<div class="scr-total-bar">'
      +'<div style="font-size:.68rem;color:var(--muted);line-height:1.4">'
      +'<div>Base 70</div>'
      +(manSum!==0?'<div style="color:'+(manSum>=0?'#2ecc71':'#e74c3c')+'">'+(manSum>=0?'+':'')+manSum.toFixed(1)+'</div>':'')
      +(penSum>0?'<div style="color:#e74c3c">−'+penSum.toFixed(1)+' pen</div>':'')
      +'</div>'
      +'<div class="scr-big" style="color:'+totalColor+'">'+totalStr+'</div>'
      +'<div style="font-size:.66rem;color:var(--muted);text-align:right">Rider '+(riderIdx+1)+'/'+entries.length+'</div>'
      +'</div>'
      // Body
      +'<div class="scr-body" style="padding:.4rem 0">'
      // Template switcher (compact, zero-padded sides)
      +'<div style="display:flex;flex-wrap:wrap;gap:.25rem;padding:0 .65rem .35rem">'+tmplBtns+'</div>'
      // Horizontal maneuver scroll — full bleed so first card starts flush
      +hscrollHtml
      // NRHA + comments (padded)
      +'<div style="padding:0 .65rem">'
      +nrhaHtml+commHtml
      // Status
      +'<div style="display:flex;gap:.35rem;margin-top:.45rem">'
      +'<button class="scr-status-btn'+(s.isOP?' on op':' op')+'" onclick="scrToggleOP()">'+(s.isOP?'✓ ':'')+'Off Pattern</button>'
      +'<button class="scr-status-btn'+(s.isDQ?' on dq':' dq')+'" onclick="scrToggleDQ()">'+(s.isDQ?'✓ ':'')+'Disqualified</button>'
      +'</div>'
      +'</div>'
      +'</div>'
      // Footer
      +'<div class="scr-foot">'
      +'<button class="btn btn-accent" style="flex:1;padding:.55rem;font-size:.9rem;font-weight:700" onclick="scrPost()">✓ Post Score</button>'
      +'</div>'
      +'</div></div>';

    var hs=document.querySelector('.scr-hscroll');
    if(hs) hs.scrollLeft=savedScroll;

    // ── Handlers ───────────────────────────────────────────────
    window.scrSetM=function(mi,v){ initState(ri).m[mi].score=v; render(); };
    window.scrMPenAdd=function(mi,pv){ var st=initState(ri); st.m[mi].pen=Math.round((st.m[mi].pen+pv)*10)/10; render(); };
    window.scrMPenClr=function(mi){ initState(ri).m[mi].pen=0; render(); };
    window.scrToggleOP=function(){ var st=initState(ri); st.isOP=!st.isOP; if(st.isOP)st.isDQ=false; render(); };
    window.scrToggleDQ=function(){ var st=initState(ri); st.isDQ=!st.isDQ; if(st.isDQ)st.isOP=false; render(); };
    window.scrSetNRHA=function(v){ initState(ri).nrha=parseFloat(v)||0; };
    window.scrSetComments=function(v){ initState(ri).comments=v; };
    window.scrSetRaw=function(v){ initState(ri).rawScore=parseFloat(v)||0; };
    window.scrSelClass=function(key){ selKey=key; riderIdx=0; mvrIdx=0; render(); };
    window.scrSetTmpl=function(name){ tmplOverride[selKey]=name; sheetData[selKey]={}; mvrIdx=0; render(); };
    window.scrPrevRider=function(){ if(riderIdx>0){ riderIdx--; mvrIdx=0; render(); } };
    window.scrNextRider=function(){ if(riderIdx<entries.length-1){ riderIdx++; mvrIdx=0; render(); } };
    window.scrPrevMvr=function(){ if(mvrIdx>0){ mvrIdx--; render(); } };
    window.scrNextMvr=function(){ if(mvrIdx<mvrCount-1){ mvrIdx++; render(); } };
    window.scrJumpMvr=function(mi){ mvrIdx=mi; render(); };

    window.scrPost=function(){
      var st=initState(ri);
      var tmplLocal=getTmpl();
      var finalScore=calcTotal(st,tmplLocal);
      if(finalScore===null) finalScore=0;
      var clsRef=getCls();
      G.results=G.results.filter(function(r){
        return !(r.org===clsRef.org&&r.division===clsRef.division
          &&r.discipline===clsRef.name&&r.rider===entry.name);
      });
      G.results.push({
        showName:G.cfg.showName||G.showName||'', org:clsRef.org||'CoWN',
        division:clsRef.division||'', discipline:clsRef.name||'',
        rawClass:(clsRef.num?clsRef.num+' ':'')+clsRef.name,
        entries:entries.length, score:finalScore, place:0,
        horse:entry.horse||'', rider:entry.name||'', riderNum:entry.memberNum||'',
        pts:0, money:0, addedMoney:0, goRound:'',
        isOP:st.isOP||false, isDQ:st.isDQ||false, _manual:true
      });
      saveResultsToStorage();
      var fl=document.createElement('div');
      fl.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);'
        +'background:var(--accent);color:#000;padding:.6rem 1.4rem;border-radius:12px;'
        +'font-family:Oswald;font-size:1.35rem;font-weight:700;z-index:400;pointer-events:none';
      fl.textContent=st.isDQ?'DQ':st.isOP?'OP':finalScore.toFixed(1);
      document.body.appendChild(fl);
      setTimeout(function(){fl.remove();},700);
      if(riderIdx<entries.length-1){ riderIdx++; mvrIdx=0; }
      render();
    };
  }

  window.closeScribeMode=function(){ mr.innerHTML=''; };
  render();
};

// ═══════════════════════ PAGE: TABS ═══════════════════════
function pgTabs(){
  var pg=document.getElementById('page');
  if(!G.entries.length){ pg.innerHTML='<div class="card"><p class="empty-state">No entries loaded.</p></div>'; return; }

  var totalOwed=G.entries.reduce(function(s,e){ return s+tabTotal(e); },0);
  var totalPaid=G.entries.reduce(function(s,e){ return s+amtPaid(e); },0);
  var fullyPaid=G.entries.filter(isFullyPaid).length;

  pg.innerHTML='<div class="stat-grid">'
    +'<div class="stat c-green"><div class="n">'+fmt$(totalOwed)+'</div><div class="l">Total Owed</div></div>'
    +'<div class="stat c-blue"><div class="n">'+fmt$(totalPaid)+'</div><div class="l">Collected</div></div>'
    +'<div class="stat c-red"><div class="n">'+fmt$(totalOwed-totalPaid)+'</div><div class="l">Outstanding</div></div>'
    +'<div class="stat c-gold"><div class="n">'+fullyPaid+'/'+G.entries.length+'</div><div class="l">Paid in Full</div></div>'
    +'</div><div class="card">'
    +'<div class="search-wrap"><span class="search-ico">&#128269;</span><input class="search-box" id="tq" placeholder="Search rider..."></div>'
    +'<div class="pills" id="tpills"></div>'
    +'<div class="tbl-wrap" id="ttbl"></div></div>';

  var tf='All';
  function drawTPills(){
    document.getElementById('tpills').innerHTML=['All','Outstanding','Paid'].map(function(f){
      return '<button class="pill'+(f===tf?' active':'')+'" data-tf="'+f+'">'+f+'</button>';
    }).join('');
  }
  window.setTF=function(f){ tf=f; drawTPills(); drawTabTable(); };
  function drawAndWireTPills(){
    drawTPills();
    wirePillClicks('tpills', function(v){ tf=v; drawAndWireTPills(); drawTabTable(); });
  }
  drawAndWireTPills();

  function drawTabTable(){
    var q=(document.getElementById('tq')||{value:''}).value.trim().toLowerCase();
    // Group by rider
    // Build rider index — keyed by integer so no names ever touch onclick strings
    var byRider={};
    G.entries.forEach(function(e){
      if(!byRider[e.name]) byRider[e.name]=[];
      byRider[e.name].push(e);
    });
    // Store rider list in a stable array so we can reference by index
    G._riderList=Object.keys(byRider).sort();
    var names=G._riderList.filter(function(name){
      var entries=byRider[name];
      var owed=entries.reduce(function(s,e){ return s+tabTotal(e); },0);
      var paid=entries.reduce(function(s,e){ return s+amtPaid(e); },0);
      var bal=owed-paid; var isPaid=bal<=0;
      var fOk=tf==='All'||(tf==='Paid'&&isPaid)||(tf==='Outstanding'&&!isPaid);
      var qOk=!q||name.toLowerCase().indexOf(q)>-1;
      return fOk&&qOk;
    });
    var t='<table><thead><tr><th>Rider</th><th>Horse(s)</th><th>Entries</th><th>Owed</th><th>Paid</th><th>Balance</th><th>Status</th><th></th></tr></thead><tbody>';
    if(!names.length) t+='<tr><td colspan="8" class="empty-state">No entries match</td></tr>';
    names.forEach(function(name){
      var entries=byRider[name];
      var owed=entries.reduce(function(s,e){ return s+tabTotal(e); },0);
      var paid=entries.reduce(function(s,e){ return s+amtPaid(e); },0);
      var bal=owed-paid; var isPaid=bal<=0;
      var horses=[...new Set(entries.map(function(e){ return e.horse; }))].join(', ');
      // Use first rowIndex as a safe key — never inject the name string into onclick
      var refIdx=entries[0].rowIndex;
      t+='<tr>'
        +'<td class="bold">'+esc(name)+'</td>'
        +'<td class="small">'+esc(horses)+'</td>'
        +'<td class="ctr">'+entries.length+'</td>'
        +'<td>'+fmt$(owed)+'</td>'
        +'<td style="color:var(--green)">'+fmt$(paid)+'</td>'
        +'<td class="bold" style="color:'+(isPaid?'var(--green)':'var(--red)')+'">'+fmt$(bal)+'</td>'
        +'<td>'+(isPaid?'<span class="badge b-green">Paid</span>':'<span class="badge b-red">Due</span>')+'</td>'
        +'<td><button class="btn btn-accent btn-sm" onclick="showTabModalByIdx('+refIdx+')">'+esc(isPaid?'Receipt':'Pay')+'</button></td>'
        +'</tr>';
    });
    t+='</tbody></table>';
    document.getElementById('ttbl').innerHTML=t;
  }
  drawTabTable();
  document.getElementById('tq').addEventListener('input',drawTabTable);
}

// ═══════════════════════ PAGE: STALLS ═══════════════════════
function pgStalls(){
  var pg=document.getElementById('page');
  if(!G.entries.length){ pg.innerHTML='<div class="card"><p class="empty-state">No entries loaded.</p></div>'; return; }

  var f=G.cfg.fees;
  var stalled=G.entries.filter(function(e){ return e.stall1qty>0||e.stall2qty>0; });
  var rvEntries=G.entries.filter(function(e){ return e.rv1qty>0||e.rv2qty>0||e.rvCircuit>0; });
  var totalShavings=G.entries.reduce(function(s,e){ return s+e.shavings; },0);
  var stallRev=G.entries.reduce(function(s,e){ return s+e.stall1qty*f.stall1+e.stall2qty*f.stall2+e.shavings*f.shavings; },0);
  var rvRev=G.entries.reduce(function(s,e){ return s+e.rv1qty*f.rv1+e.rv2qty*f.rv2+e.rvCircuit*f.rvCircuit; },0);

  pg.innerHTML='<div class="stat-grid">'
    +'<div class="stat c-gold"><div class="n">'+stalled.length+'</div><div class="l">Stalled Riders</div></div>'
    +'<div class="stat c-blue"><div class="n">'+totalShavings+'</div><div class="l">Bags Shavings</div></div>'
    +'<div class="stat c-purple"><div class="n">'+rvEntries.length+'</div><div class="l">RV Spots</div></div>'
    +'<div class="stat c-green"><div class="n">'+fmt$(stallRev+rvRev)+'</div><div class="l">Housing Revenue</div></div>'
    +'</div>'
    +'<div class="card"><div class="card-title">Stall List</div>'
    +'<div class="tbl-wrap"><table><thead><tr><th>Rider</th><th>Horse</th><th>1-Night</th><th>2-Night</th><th>Shavings</th><th>Arrival</th><th>Notes</th><th>Fees</th></tr></thead><tbody>'
    +(stalled.length ? stalled.map(function(e){
      var fee=e.stall1qty*f.stall1+e.stall2qty*f.stall2+e.shavings*f.shavings;
      return '<tr><td class="bold">'+esc(e.name)+'</td><td>'+esc(e.horse)+'</td>'
        +'<td class="ctr">'+(e.stall1qty||'—')+'</td>'
        +'<td class="ctr">'+(e.stall2qty||'—')+'</td>'
        +'<td class="ctr">'+(e.shavings||'—')+'</td>'
        +'<td class="small">—</td>'
        +'<td class="small" style="max-width:180px;white-space:normal">'+esc((e.stallNote||'').substring(0,80)+(e.stallNote&&e.stallNote.length>80?'…':''))+'</td>'
        +'<td>'+fmt$(fee)+'</td></tr>';
    }).join('') : '<tr><td colspan="8" class="empty-state">No stalling requests</td></tr>')
    +'</tbody></table></div></div>'
    +'<div class="card"><div class="card-title">RV List</div>'
    +'<div class="tbl-wrap"><table><thead><tr><th>Rider</th><th>1-Night</th><th>2-Night</th><th>Circuit</th><th>Fees</th></tr></thead><tbody>'
    +(rvEntries.length ? rvEntries.map(function(e){
      var fee=e.rv1qty*f.rv1+e.rv2qty*f.rv2+e.rvCircuit*f.rvCircuit;
      return '<tr><td class="bold">'+esc(e.name)+'</td>'
        +'<td class="ctr">'+(e.rv1qty||'—')+'</td>'
        +'<td class="ctr">'+(e.rv2qty||'—')+'</td>'
        +'<td class="ctr">'+(e.rvCircuit||'—')+'</td>'
        +'<td>'+fmt$(fee)+'</td></tr>';
    }).join('') : '<tr><td colspan="5" class="empty-state">No RV requests</td></tr>')
    +'</tbody></table></div></div>';
}

function pgResults(){
  var pg=document.getElementById('page');

  if(!G.results||!G.results.length){
    pg.innerHTML='<div class="card">'
      +'<div class="card-title">Import Results</div>'
      +'<div id="res-drop-zone" style="border:2px dashed var(--border2);border-radius:10px;padding:3rem;text-align:center;cursor:pointer;transition:border-color .15s">'
      +'<div style="font-size:2rem;margin-bottom:.5rem">&#128196;</div>'
      +'<div style="font-family:Oswald;color:var(--accent);font-size:1.1rem;margin-bottom:.35rem">Drop SHTX File Here</div>'
      +'<div style="font-size:.82rem;color:var(--muted);margin-bottom:1rem">Funnware .xlsx or tab-delimited .txt export</div>'
      +'<button class="btn btn-accent" id="res-choose-btn">Choose File</button>'
      +'</div>'
      +'<div id="res-import-err" class="err" style="margin-top:.5rem"></div>'
      +'</div>';
    // Create file input outside the DOM tree to avoid display:none issues
    var inp=document.createElement('input');
    inp.type='file'; inp.accept='.xlsx,.xls,.txt,.csv';
    inp.addEventListener('change',function(e){
      var f=e.target.files[0]; if(f) handleResultsFile(f);

    document.getElementById('res-choose-btn').addEventListener('click',function(e){
      e.stopPropagation();
      inp.click();

    document.getElementById('res-drop-zone').addEventListener('click',function(){ inp.click(); });
    setupResultsDrop('res-drop-zone');
    return;
  }

  // ── Show selector (when results file contains multiple shows) ──
  var showNames=[];
  var showNamesFound={};
  G.results.forEach(function(r){ if(r.showName&&!showNamesFound[r.showName]){ showNamesFound[r.showName]=1; showNames.push(r.showName); } });
  showNames.sort();
  if(showNames.length>1 && !_resSelShow) _resSelShow=showNames[0];
  var activeResults = (showNames.length>1 && _resSelShow)
    ? G.results.filter(function(r){ return r.showName===_resSelShow; })
    : G.results;

  // Build org list in canonical order (use global ORG_ORDER constant)
  var orgsFound={};
  activeResults.forEach(function(r){ if(r.org) orgsFound[r.org]=1; });
  var orgs=ORG_ORDER.filter(function(o){ return orgsFound[o]; });
  Object.keys(orgsFound).forEach(function(o){ if(orgs.indexOf(o)<0) orgs.push(o); });

  // Default selections
  if(!_resSelOrg&&orgs.length) _resSelOrg=orgs[0];

  var orgRows=activeResults.filter(function(r){ return r.org===_resSelOrg; });

  // Build division list for selected org using canonical order for that org
  var divsFound={};
  orgRows.forEach(function(r){ if(r.division!==undefined) divsFound[r.division]=1; });
  var divOrderForOrg=DIV_ORDER_BY_ORG[_resSelOrg]||DIV_ORDER_BY_ORG['CoWN'];
  var divs=divOrderForOrg.filter(function(d){ return divsFound[d]; });
  Object.keys(divsFound).forEach(function(d){ if(divs.indexOf(d)<0) divs.push(d); });

  if(!_resSelDiv&&divs.length) _resSelDiv=divs[0];

  var uniqueRiders={};
  activeResults.forEach(function(r){ if(r.rider) uniqueRiders[r.rider]=1; });

  var html='<div class="stat-grid">'
    +'<div class="stat c-gold"><div class="n">'+activeResults.length+'</div><div class="l">Result Rows</div></div>'
    +'<div class="stat c-green"><div class="n">'+Object.keys(uniqueRiders).length+'</div><div class="l">Riders</div></div>'
    +'<div class="stat c-blue"><div class="n">'+orgs.length+'</div><div class="l">Organizations</div></div>'
    +'<div class="stat c-purple"><div class="n">'+divs.length+'</div><div class="l">Divisions</div></div>'
    +'</div>';

  html+='<div class="card">';
  html+='<div class="card-title res-card-head"><span>'+esc(G.resultsFile)+'</span>'
    +'<div class="res-search-row" style="display:flex;gap:.4rem;align-items:center;flex-wrap:wrap">'
    +'<input type="text" placeholder="Search rider or horse..." value="'+esc(_resSearch)+'" '
    +'oninput="_resSearch=this.value;pgResults()" '
    +'style="background:var(--bg);border:1px solid var(--border2);border-radius:6px;color:var(--text);'
    +'padding:.28rem .6rem;font-size:.78rem;width:185px">'
    +'<button class="btn btn-dark btn-sm" id="res-load-sheets-btn" title="Select score sheet PDFs from the same folder">&#128196; Score Sheets</button>'
    +'<button class="btn btn-dark btn-sm" onclick="window.print()">&#128424;</button>'
    +'<button class="btn btn-dark btn-sm" onclick="clearResults()">&#10005;</button>'
    +'</div></div>';

  // ── SHOW SELECTOR (multi-show files only) ──
  if(showNames.length>1){
    html+='<div style="font-size:.68rem;color:var(--muted);margin-bottom:.3rem;letter-spacing:.08em;text-transform:uppercase">Show</div>';
    html+='<div class="sel-row">';
    showNames.forEach(function(s){
      html+='<button class="btn btn-sm '+(s===_resSelShow?'btn-accent':'btn-dark')+'" '
        +'onclick="resSelShow(\''+s.replace(/'/g,"\\'")+'\')">'+esc(s)+'</button>';
    });
    html+='</div><hr style="border-color:var(--border);margin-bottom:.85rem">';
  }

  // ── LEVEL 1: Organization pills ──
  html+='<div style="font-size:.68rem;color:var(--muted);margin-bottom:.3rem;letter-spacing:.08em;text-transform:uppercase">Organization</div>';
  html+='<div class="sel-row">';
  orgs.forEach(function(o){
    html+='<button class="btn btn-sm '+(o===_resSelOrg?'btn-accent':'btn-dark')+'" '
      +'onclick="resSelOrg(\''+o.replace(/'/g,"\\'")+'\')">'
      +esc(o)+'</button>';
  });
  html+='</div>';

  if(_resSelOrg){
    // ── LEVEL 2: Division pills ──
    html+='<div style="font-size:.68rem;color:var(--muted);margin-bottom:.3rem;letter-spacing:.08em;text-transform:uppercase">Division</div>';
    html+='<div class="sel-row">';
    divs.forEach(function(d){
      var rSet={};
      orgRows.filter(function(r){ return r.division===d; }).forEach(function(r){ if(r.rider) rSet[r.rider]=1; });
      html+='<button class="btn btn-sm '+(d===_resSelDiv?'btn-accent':'btn-dark')+'" '
        +'onclick="resSelDiv(\''+d.replace(/'/g,"\\'")+'\')">'+esc(d)
        +' <span style="opacity:.65;font-size:.7rem">('+Object.keys(rSet).length+')</span></button>';
    });
    html+='</div>';
  }

  if(_resSelOrg&&_resSelDiv){
    var divRows=orgRows.filter(function(r){ return r.division===_resSelDiv; });

    // Apply search
    if(_resSearch){
      var sq=_resSearch.toLowerCase();
      divRows=divRows.filter(function(r){
        return (r.rider||'').toLowerCase().indexOf(sq)>=0||(r.horse||'').toLowerCase().indexOf(sq)>=0;
      });
    }

    // ── LEVEL 3: Class pills ──
    // Use canonical discipline order for the selected org
    var discOrderForOrg=(ORG_CLASSES[_resSelOrg]||ORG_CLASSES['CoWN']).disciplines;
    var clsFound={};
    divRows.forEach(function(r){ if(r.discipline) clsFound[r.discipline]=1; });
    var classes=discOrderForOrg.filter(function(c){ return clsFound[c]; });
    Object.keys(clsFound).forEach(function(c){ if(classes.indexOf(c)<0) classes.push(c); });

    if(!_resSelClass&&classes.length) _resSelClass=classes[0];
    if(_resSelClass&&!clsFound[_resSelClass]) _resSelClass=classes[0]||'';

    html+='<div style="font-size:.68rem;color:var(--muted);margin-bottom:.3rem;letter-spacing:.08em;text-transform:uppercase;border-top:1px solid var(--border);padding-top:.65rem">Class</div>';
    html+='<div class="sel-row">';
    classes.forEach(function(c){
      html+='<button class="btn btn-sm '+(c===_resSelClass?'btn-accent':'btn-dark')+'" '
        +'onclick="resSelClass(\''+c.replace(/'/g,"\\'")+'\')">'+esc(c)+'</button>';
    });
    // Computed All Around pill (only if 2+ non-AA disciplines with pts)
    var scoringDiscs=classes.filter(function(c){ return c!=='All Around'&&c!=='VRH All Around'; });
    if(scoringDiscs.length>1){
      html+='<button class="btn btn-sm '+((_resSelClass==='__aa__')?'btn-accent':'btn-dark')+'" '
        +'onclick="resSelClass(\'__aa__\')">&#9733; Points Summary</button>';
    }
    html+='</div>';

    if(_resSelClass==='__aa__'){
      // ══ COMPUTED ALL AROUND / POINTS SUMMARY ══
      var orgCfg=ORG_CLASSES[_resSelOrg]||{};
      var aaMinCls=orgCfg.aaMinClasses||scoringDiscs.length;
      var aaReqGroups=normalizeAaReq(orgCfg.aaRequired||[]);
      var hasEligRules=aaMinCls<scoringDiscs.length||aaReqGroups.length>0;

      // Build per-rider totals
      var aaMap={};
      divRows.filter(function(r){ return r.discipline&&r.discipline!=='All Around'&&r.discipline!=='VRH All Around'; })
        .forEach(function(r){
          if(!r.rider) return;
          if(!aaMap[r.rider]) aaMap[r.rider]={rider:r.rider,horse:r.horse,total:0,byDisc:{},scoreByDisc:{}};
          aaMap[r.rider].total+=(r.pts||0);
          aaMap[r.rider].byDisc[r.discipline]=(aaMap[r.rider].byDisc[r.discipline]||0)+(r.pts||0);
          if(!aaMap[r.rider].scoreByDisc[r.discipline]||(r.score||0)>(aaMap[r.rider].scoreByDisc[r.discipline]||0))
            aaMap[r.rider].scoreByDisc[r.discipline]=r.score||0;
        });

      // Eligibility check
      var allRiders=Object.keys(aaMap).map(function(k){ return aaMap[k]; });
      allRiders.forEach(function(r){
        var shown=Object.keys(r.byDisc);
        var meetsMin=shown.length>=aaMinCls;
        var meetsReq=aaReqGroups.every(function(group){
          return group.some(function(d){ return shown.indexOf(d)>=0; });
        });
        r.eligible=meetsMin&&meetsReq;
      });
      var eligible=allRiders.filter(function(r){ return r.eligible; });
      var ineligible=allRiders.filter(function(r){ return !r.eligible; });

      // Sort eligible by total pts; tiebreak by aaTiebreak score order
      var tb=orgCfg.aaTiebreak||[];
      eligible.sort(function(a,b){
        if(b.total!==a.total) return b.total-a.total;
        for(var ti=0;ti<tb.length;ti++){
          var d=tb[ti];
          var diff=(b.scoreByDisc[d]||0)-(a.scoreByDisc[d]||0);
          if(diff!==0) return diff;
        }
        return 0;
      });

      // Prize money: get added money total, compute per-place from payout table
      var aaMoneyKey=_resSelOrg+'|'+_resSelDiv;
      var aaTotal=(G.cfg.aaMoney&&G.cfg.aaMoney[aaMoneyKey])||G.aaMoney[aaMoneyKey]||0;
      var prizes=calcAaPrizes(aaTotal, eligible.length);

      // ── Prize money config bar ──
      var _amEsc=aaMoneyKey.replace(/'/g,"\\'");
      html+='<div style="display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;margin-bottom:.6rem;padding:.45rem .6rem;background:var(--card-bg);border:1px solid var(--border);border-radius:6px">'
        +'<span style="font-size:.78rem;color:var(--muted)">Added money:</span>';
      if(aaTotal){
        html+='<span style="font-size:.85rem;font-weight:700;color:var(--green)">$'+aaTotal+'</span>'
          +'<span style="font-size:.78rem;color:var(--muted)">→</span>';
        prizes.forEach(function(p,i){
          if(p>0) html+='<span style="font-size:.82rem"><strong>'+(i+1)+(i===0?'st':i===1?'nd':i===2?'rd':'th')+'</strong> $'+p+'</span>';
        });
      } else {
        html+='<span style="font-size:.78rem;color:var(--muted)">none configured</span>';
      }
      html+='<button class="btn btn-dark btn-sm" onclick="editAaMoney(\''+_amEsc+'\')">&#9998; Edit</button>'
        +'</div>';

      // ── Eligibility rules note ──
      if(hasEligRules){
        var reqDesc=aaReqGroups.map(function(g){ return g.join(' or '); }).join('; ');
        html+='<div style="font-size:.75rem;color:var(--muted);margin-bottom:.5rem">'
          +'&#9432; Eligibility: must show in '+aaMinCls+' of '+scoringDiscs.length+' disciplines'
          +(aaReqGroups.length?' — required: '+esc(reqDesc):'')+'</div>';
      }

      // ── AA table ──
      var hasMoney=prizes.some(function(p){ return p>0; });
      html+='<div class="tbl-wrap"><table><thead><tr>'
        +'<th style="width:36px">Rank</th><th>Rider</th><th>Horse</th>';
      scoringDiscs.forEach(function(c){ html+='<th style="text-align:right;font-size:.8rem">'+esc(c)+'</th>'; });
      html+='<th style="text-align:right;background:rgba(212,160,74,.1);color:var(--accent)">Total</th>';
      if(hasMoney) html+='<th style="text-align:right;color:var(--green)">Prize</th>';
      html+='</tr></thead><tbody>';

      // Eligible riders — ranked
      var rank=1;
      eligible.forEach(function(r,i){
        var isTie=i>0&&eligible[i-1].total===r.total&&tb.every(function(d){ return (eligible[i-1].scoreByDisc[d]||0)===(r.scoreByDisc[d]||0); });
        if(!isTie) rank=i+1;
        var plColor=rank===1?'var(--accent)':rank===2?'#aaa':rank===3?'#cd7f32':'var(--text)';
        var prize=prizes[rank-1]||0;
        var rankLabel=isTie?'T-'+rank:String(rank);
        html+='<tr><td style="font-weight:600;color:'+plColor+'">'+rankLabel+'</td>'
          +'<td>'+esc(r.rider)+'</td><td style="color:var(--muted);font-size:.8rem">'+esc(r.horse)+'</td>';
        scoringDiscs.forEach(function(c){
          var pts=r.byDisc[c]||0;
          html+='<td style="text-align:right">'+(pts?pts.toFixed(1):'&mdash;')+'</td>';
        });
        html+='<td style="text-align:right;font-weight:700;color:var(--accent);background:rgba(212,160,74,.06)">'+r.total.toFixed(1)+'</td>';
        if(hasMoney) html+='<td style="text-align:right;color:var(--green)">'+(prize?'$'+prize:'&mdash;')+'</td>';
        html+='</tr>';
      });

      // Ineligible riders grayed out below
      if(ineligible.length){
        ineligible.sort(function(a,b){ return b.total-a.total; });
        html+='<tr><td colspan="'+(3+scoringDiscs.length+(hasMoney?2:1))+'" style="font-size:.72rem;color:var(--muted);padding:.5rem .4rem;border-top:1px solid var(--border)">Not eligible for All Around:</td></tr>';
        ineligible.forEach(function(r){
          html+='<tr style="opacity:.45"><td style="color:var(--muted)">—</td>'
            +'<td>'+esc(r.rider)+'</td><td style="color:var(--muted);font-size:.8rem">'+esc(r.horse)+'</td>';
          scoringDiscs.forEach(function(c){
            var pts=r.byDisc[c]||0;
            html+='<td style="text-align:right">'+(pts?pts.toFixed(1):'&mdash;')+'</td>';
          });
          html+='<td style="text-align:right;color:var(--muted)">'+r.total.toFixed(1)+'</td>';
          if(hasMoney) html+='<td></td>';
          html+='</tr>';
        });
      }
      html+='</tbody></table></div>';

    } else if(_resSelClass){
      // ══ SINGLE CLASS RESULTS ══
      var clsRows=divRows.filter(function(r){ return r.discipline===_resSelClass; });

      function sTh(c,lbl,align){
        var active=_resSortCol===c;
        var sty='cursor:pointer;user-select:none'+(align?';text-align:'+align:'')+(active?';color:var(--accent)':'');
        return '<th style="'+sty+'" onclick="resSort(\''+c+'\')">'
          +lbl+(active?(_resSortDir>0?' &#8679;':' &#8681;'):'')+'</th>';
      }
      clsRows.sort(function(a,b){
        var dir=_resSortDir;
        if(_resSortCol==='rider') return dir*(a.rider||'').localeCompare(b.rider||'');
        if(_resSortCol==='horse') return dir*(a.horse||'').localeCompare(b.horse||'');
        if(_resSortCol==='score') return dir*((a.score||0)-(b.score||0));
        if(_resSortCol==='pts')   return dir*((a.pts||0)-(b.pts||0));
        if(_resSortCol==='money') return dir*((a.money||0)-(b.money||0));
        return dir*((a.place||999)-(b.place||999));
      });

      // ── Verification: recalculate placings & points, compare to Funnware ──
      var fwEntries = clsRows.length>0 ? (clsRows[0].entries||clsRows.length) : clsRows.length;
      var actualRows = clsRows.length;
      var entryMismatch = fwEntries !== actualRows;

      // Calculate placings from score
      var scoredRows = clsRows.filter(function(r){ return r.score&&!(!r.place&&!r.score&&!r.pts); });
      var sortedByScore = scoredRows.slice().sort(function(a,b){ return (b.score||0)-(a.score||0); });
      var calcPlaceMap = {};
      var cRank=1;
      sortedByScore.forEach(function(r,i){
        if(i>0&&sortedByScore[i-1].score===r.score) calcPlaceMap[r.rider+'|'+r.horse]=calcPlaceMap[sortedByScore[i-1].rider+'|'+sortedByScore[i-1].horse];
        else calcPlaceMap[r.rider+'|'+r.horse]=cRank;
        cRank=i+2;
      });

      // Calculate points using the org's points system on calculated placings
      var calcPtsMap = {};
      var orgPtsSys=(ORG_CLASSES[_resSelOrg]||{}).pointsSystem||'entries';
      var byCalcPlace={};
      clsRows.forEach(function(r){
        var isDQ=!r.place&&!r.score&&!r.pts;
        if(isDQ){ calcPtsMap[r.rider+'|'+r.horse]=0; return; }
        var cp=calcPlaceMap[r.rider+'|'+r.horse]||r.place;
        if(!byCalcPlace[cp]) byCalcPlace[cp]=[];
        byCalcPlace[cp].push(r.rider+'|'+r.horse);
      });
      if(orgPtsSys==='entries'){
        // CoWN: 1st=N … last=1, ties split
        Object.keys(byCalcPlace).forEach(function(pl){
          var keys=byCalcPlace[pl]; pl=parseInt(pl);
          var sum=0;
          for(var k=0;k<keys.length;k++) sum+=Math.max(0, actualRows-(pl+k)+1);
          var avg=sum/keys.length;
          keys.forEach(function(k){ calcPtsMap[k]=avg; });
        });
      } else if(orgPtsSys==='aqha'){
        // AQHA: tier=floor(entries/5); 1st=tier … tier-th=1, tier+1=0.5
        var tier=Math.floor(actualRows/5);
        Object.keys(byCalcPlace).forEach(function(pl){
          var keys=byCalcPlace[pl]; pl=parseInt(pl);
          var pts=tier<1?0:(pl<=tier?(tier-pl+1):(pl===tier+1?0.5:0));
          keys.forEach(function(k){ calcPtsMap[k]=pts; });
        });
      } else {
        // none or unknown — no calculated points
        Object.keys(byCalcPlace).forEach(function(pl){
          byCalcPlace[pl].forEach(function(k){ calcPtsMap[k]=0; });
        });
      }

      // Count discrepancies
      // For AQHA orgs: Funnware often exports 0 for pts (AQHA tracks points centrally).
      // So pts mismatch only counts when Funnware actually exported a non-zero value.
      var isAqhaOrg=(orgPtsSys==='aqha');
      var placeErrs=0, ptsErrs=0;
      clsRows.forEach(function(r){
        var isDQ=!r.place&&!r.score&&!r.pts;
        if(isDQ) return;
        var key=r.rider+'|'+r.horse;
        var cp=calcPlaceMap[key];
        var cpts=calcPtsMap[key];
        if(cp&&r.place&&cp!==r.place) placeErrs++;
        if(!isAqhaOrg && cpts!==undefined&&r.pts!==undefined&&Math.abs((cpts||0)-(r.pts||0))>0.05) ptsErrs++;
        // For AQHA: only flag if Funnware exported a non-zero value that doesn't match
        if(isAqhaOrg && r.pts>0 && cpts!==undefined && Math.abs((cpts||0)-(r.pts||0))>0.05) ptsErrs++;
      });
      var hasErrors=entryMismatch||placeErrs>0||ptsErrs>0;
      // Always show calculated pts column for AQHA orgs (as a reference, not just on error)
      var showCalcCols=hasErrors||isAqhaOrg;

      // ── Audit bar ──
      html+='<div style="display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;margin-bottom:.6rem;padding:.5rem .6rem;'
        +'background:'+(hasErrors?'rgba(231,76,60,.08)':'rgba(39,174,96,.07)')+';border-radius:6px;border:1px solid '+(hasErrors?'rgba(231,76,60,.25)':'rgba(39,174,96,.2)')+'">';
      if(hasErrors){
        html+='<span style="font-size:.78rem;font-weight:600;color:var(--red)">&#9888; Verification issues:</span>';
        if(entryMismatch) html+='<span style="font-size:.75rem;color:var(--red)">Funnware says '+fwEntries+' entries, found '+actualRows+' rows</span>';
        if(placeErrs) html+='<span style="font-size:.75rem;color:var(--red)">'+placeErrs+' placing discrepanc'+(placeErrs===1?'y':'ies')+'</span>';
        if(ptsErrs) html+='<span style="font-size:.75rem;color:var(--red)">'+ptsErrs+' points discrepanc'+(ptsErrs===1?'y':'ies')+'</span>';
      } else if(isAqhaOrg){
        html+='<span style="font-size:.78rem;color:var(--green)">&#10003; Placings verified — '+actualRows+' entries</span>'
          +'<span style="font-size:.75rem;color:var(--muted)">AQHA pts calculated (submitted to AQHA separately)</span>';
      } else {
        html+='<span style="font-size:.78rem;color:var(--green)">&#10003; Verified — '+actualRows+' entries, placings and points match</span>';
      }
      html+='</div>';

      // Pre-compute tied places (using Funnware place for display)
      var placeCounts={};
      clsRows.forEach(function(r){ if(r.place) placeCounts[r.place]=(placeCounts[r.place]||0)+1; });
      function rowIsTied(r){ return r.place&&placeCounts[r.place]>1; }
      var tieNotes=Object.keys(placeCounts).filter(function(p){ return placeCounts[p]>1; })
        .map(function(p){ return 'T-'+p; });

      // Score sheet link bar
      var slKey=_resSelOrg+'|'+_resSelDiv+'|'+_resSelClass;
      var slUrl=G.scoreLinks[slKey]||'';
      html+='<div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.6rem;flex-wrap:wrap">';
      if(slUrl){
        html+='<a href="'+esc(slUrl)+'" target="_blank" class="btn btn-dark btn-sm" style="color:var(--accent)">'
          +'&#128196; Score Sheet</a>';
        html+='<button class="btn btn-dark btn-sm" onclick="editScoreLink(\''+slKey.replace(/'/g,"\\'")+'\')">&#9998; Edit</button>';
      } else {
        html+='<button class="btn btn-dark btn-sm" onclick="editScoreLink(\''+slKey.replace(/'/g,"\\'")+'\')">&#128196; + Score Sheet Link</button>';
      }
      if(tieNotes.length){
        html+='<span style="font-size:.72rem;color:var(--muted)">Tied: '+tieNotes.join(', ')+'</span>';
      }
      html+='</div>';

      // ── Results table ──
      // Calc Pl/Pts columns always shown for AQHA orgs; for CoWN shown only on discrepancy
      var calcPtsLabel=isAqhaOrg?'AQHA Pts':'Calc Pts';
      html+='<div class="tbl-wrap"><table><thead><tr>'
        +sTh('place','Pl',null)+sTh('rider','Rider',null)+sTh('horse','Horse',null)
        +sTh('score','Score','right')
        +(showCalcCols?'<th style="text-align:right;color:var(--muted);font-size:.75rem">Calc Pl</th>':'')
        +sTh('pts',isAqhaOrg?'FW Pts':'Pts','right')
        +(showCalcCols?'<th style="text-align:right;color:'+(isAqhaOrg?'var(--accent)':'var(--muted)')+';font-size:.75rem">'+calcPtsLabel+'</th>':'')
        +sTh('money','Money','right')
        +'</tr></thead><tbody>';
      clsRows.forEach(function(r){
        var isDQ=!r.place&&!r.score&&!r.pts;
        var isTied=rowIsTied(r);
        var plColor=r.place===1?'var(--accent)':r.place===2?'#aaa':r.place===3?'#cd7f32':'var(--muted)';
        var plCell;
        if(isDQ){
          plCell='<span style="font-size:.68rem;font-weight:700;background:rgba(231,76,60,.2);color:var(--red);padding:1px 5px;border-radius:3px">DQ</span>';
        } else if(isTied){
          plCell='<span style="font-weight:600;color:'+plColor+'">T-'+r.place+'</span>';
        } else {
          plCell='<span style="font-weight:600;color:'+plColor+'">'+r.place+'</span>';
        }
        var key=r.rider+'|'+r.horse;
        var cp=calcPlaceMap[key];
        var cpts=calcPtsMap[key];
        var plMismatch=!isDQ&&cp&&r.place&&cp!==r.place;
        var ptsMismatch=!isDQ&&cpts!==undefined&&(isAqhaOrg?r.pts>0:true)&&Math.abs((cpts||0)-(r.pts||0))>0.05;
        html+='<tr'+(isDQ?' style="opacity:.55"':'')+(plMismatch||ptsMismatch?' style="background:rgba(231,76,60,.05)"':'')+'>'
          +'<td>'+(plMismatch?'<span style="color:var(--red)" title="Calc: '+cp+'">'+plCell+' &#9888;</span>':plCell)+'</td>'
          +'<td>'+esc(r.rider)+'</td>'
          +'<td style="color:var(--muted);font-size:.8rem">'+esc(r.horse)+'</td>'
          +'<td class="score-cell" data-ridx="'+r._idx+'" style="text-align:right;cursor:pointer" title="Click to edit score">'
          +(!r.score?'&mdash;':r.score.toFixed(3))+'</td>'
          +(showCalcCols?'<td style="text-align:right;color:var(--muted);font-size:.78rem">'+(cp||'&mdash;')+'</td>':'')
          +'<td style="text-align:right;color:'+(ptsMismatch?'var(--red)':'var(--accent)')+'">'+(isDQ?'&mdash;':(r.pts||0).toFixed(1))+'</td>'
          +(showCalcCols?'<td style="text-align:right;color:'+(isAqhaOrg?'var(--accent)':'var(--muted)')+';font-size:.78rem">'+(isDQ?'&mdash;':cpts!==undefined?cpts.toFixed(1):'&mdash;')+'</td>':'')
          +'<td style="text-align:right;color:var(--green)">'+(r.money?'$'+r.money.toFixed(0):'&mdash;')+'</td>'
          +'</tr>';
      });
      html+='</tbody></table></div>';
    } else {
      html+='<div class="empty">No classes found for this division.</div>';
    }
  }

  html+='</div>';
  pg.innerHTML=html;

  // Wire up score sheet multi-file loader
  var sheetsBtn=document.getElementById('res-load-sheets-btn');
  if(sheetsBtn){
    var sheetsInp=document.createElement('input');
    sheetsInp.type='file'; sheetsInp.accept='.pdf'; sheetsInp.multiple=true;
    sheetsInp.addEventListener('change',function(e){
      var files=Array.from(e.target.files);
      var matched=0;
      files.forEach(function(f){
        // Normalize: lowercase, strip extension, replace punctuation/underscores with spaces
        var base=f.name.replace(/\.pdf$/i,'').toLowerCase().replace(/[_\-]+/g,' ').replace(/\s+/g,' ').trim();
        var url=URL.createObjectURL(f);

        // Collect unique org+div+disc combos from activeResults
        var seen={};
        var candidates=[];
        activeResults.forEach(function(r){
          if(!r.org||!r.division||!r.discipline) return;
          var k=r.org+'|'+r.division+'|'+r.discipline;
          if(seen[k]) return; seen[k]=1;
          candidates.push({k:k, org:r.org, div:r.division, disc:r.discipline});
        });

        // Score each candidate. Naming convention examples:
        //   "CoWN Open-.pdf"                    → org + div only
        //   "Fall Fest   CoWN Open Results.pdf" → show + org + div (results PDF)
        //   "Amateur Ranch Riding Jackpot.pdf"  → div + disc only
        var bestScore=0, bestKeys=[];
        candidates.forEach(function(c){
          var orgLow=c.org.toLowerCase().replace(/[^a-z0-9 ]/g,' ');
          var divLow=c.div.toLowerCase().replace(/[^a-z0-9 ]/g,' ');
          var discLow=c.disc.toLowerCase().replace(/[^a-z0-9 ]/g,' ');
          var s=0;
          if(base.indexOf(discLow)>=0) s+=4;
          if(base.indexOf(divLow)>=0) s+=2;
          if(base.indexOf(orgLow)>=0) s+=1;
          if(s>bestScore){ bestScore=s; bestKeys=[c.k]; }
          else if(s===bestScore&&s>0) bestKeys.push(c.k);
        });

        // Accept if we matched at least division (score ≥ 2)
        if(bestScore>=2){
          // If only org+div matched (no discipline, score is 2 or 3):
          //   assign same PDF to ALL disciplines in that org+div
          var keys = bestScore<4
            ? candidates.filter(function(c){
                var divLow=c.div.toLowerCase().replace(/[^a-z0-9 ]/g,' ');
                return base.indexOf(divLow)>=0;
              }).map(function(c){ return c.k; })
            : bestKeys;

          keys.forEach(function(k){ G.scoreLinks[k]=url; });
          if(keys.length) matched++;
        }
      });
      saveResultsToStorage();
      pgResults();
      if(matched<files.length){
        alert('Matched '+matched+' of '+files.length+' PDFs. Use the ✎ Edit button on unmatched classes to link manually.');
      }
    });
    sheetsBtn.addEventListener('click',function(e){ e.stopPropagation(); sheetsInp.click(); });
  }

  // ── Inline score editing ──────────────────────────────────────
  pg.addEventListener('click', function(ev){
    var cell=ev.target.closest('.score-cell');
    if(!cell||cell.querySelector('input')) return;
    var ridx=parseInt(cell.dataset.ridx);
    var row=G.results[ridx];
    if(!row) return;
    var cur=row.score||'';
    var inp=document.createElement('input');
    inp.type='number'; inp.step='0.001'; inp.value=cur||'';
    inp.style.cssText='width:75px;background:var(--bg);border:1px solid var(--accent);border-radius:4px;color:var(--text);padding:2px 5px;font-size:.83rem;text-align:right';
    cell.innerHTML='';
    cell.appendChild(inp);
    inp.focus(); inp.select();
    function commit(){
      var val=parseFloat(inp.value);
      if(!isNaN(val)){ row.score=val; } else { row.score=0; }
      saveResultsToStorage();
      pgResults();
    }
    inp.addEventListener('blur', commit);
    inp.addEventListener('keydown', function(e){
      if(e.key==='Enter') inp.blur();
      if(e.key==='Escape'){ inp.removeEventListener('blur',commit); pgResults(); }
    });
  });
}

window.pushToSeasonHub=async function(){
  var c1=document.getElementById('pub-check1');
  var c2=document.getElementById('pub-check2');
  var c3=document.getElementById('pub-check3');
  if(!c1.checked||!c2.checked||!c3.checked){
    document.getElementById('pub-status').innerHTML='<span style="color:var(--red);font-size:.83rem">Please check all boxes to confirm results are ready.</span>';
    return;
  }
  var btn=document.getElementById('pub-btn');
  btn.disabled=true; btn.textContent='Publishing…';
  document.getElementById('pub-status').innerHTML='<span style="color:var(--muted);font-size:.83rem">Writing to Season Hub…</span>';
  try{
    // Upsert all result rows to season_results table
    var payload=G.results.map(function(r){
      return {
        show_id: G.showId,
        association_id: G.assocId||null,
        show_name: r.showName||G.cfg.showName||'',
        org: r.org, division: r.division, discipline: r.discipline,
        raw_class: r.rawClass||'',
        horse: r.horse, rider: r.rider, owner: r.owner||'',
        score: r.score||null, place: r.place||null,
        pts: r.pts||null, money: r.money||null,
        published_at: new Date().toISOString()
      };
    });
    // Delete existing rows for this show then insert fresh
    await sbFetch('season_results?show_id=eq.'+G.showId,{method:'DELETE'});
    // Insert in batches of 200
    for(var i=0;i<payload.length;i+=200){
      await sbFetch('season_results',{method:'POST',body:JSON.stringify(payload.slice(i,i+200))});
    }
    G.publishedAt=new Date().toISOString();
    document.getElementById('pub-status').innerHTML='<span style="color:var(--green);font-size:.83rem">&#10003; '+G.results.length+' rows published to Season Hub.</span>';
    btn.textContent='&#8679; Re-Publish';
    btn.disabled=false;
  } catch(err){
    document.getElementById('pub-status').innerHTML='<span style="color:var(--red);font-size:.83rem">Error: '+esc(err.message)+'</span>';
    btn.textContent='&#8679; Push to Season Hub';
    btn.disabled=false;
    console.error(err);
  }
};

function setupResMapDrop(){
  var dz=document.getElementById('resmap-dz'), fi=document.getElementById('resmap-fi');
  if(!dz||!fi) return;
  dz.addEventListener('click',function(){ fi.click(); });
  fi.addEventListener('change',function(e){ if(e.target.files[0]) loadResMapFile(e.target.files[0]); });
  dz.addEventListener('dragover',function(e){ e.preventDefault(); dz.classList.add('drag'); });
  dz.addEventListener('dragleave',function(){ dz.classList.remove('drag'); });
  dz.addEventListener('drop',function(e){ e.preventDefault(); dz.classList.remove('drag'); if(e.dataTransfer.files[0]) loadResMapFile(e.dataTransfer.files[0]); });
}

function loadResMapFile(file){
  var ext=(file.name||'').split('.').pop().toLowerCase();
  var reader=new FileReader();
  reader.onerror=function(){ toast('File read error',true); };
  if(ext==='txt'||ext==='csv'){
    reader.onload=function(e){
      var lines=e.target.result.split(/\r?\n/).filter(function(l){ return l.trim(); });
      if(!lines.length){ toast('Empty file',true); return; }
      RES_MAP_HEADERS=lines[0].split('\t');
      buildResMapperUI();
    };
    reader.readAsText(file);
  } else {
    reader.onload=function(e){
      try{
        var wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
        var ws=wb.Sheets[wb.SheetNames[0]];
        // prefer sheet with classdivision column
        for(var si=0;si<wb.SheetNames.length;si++){
          var cws=wb.Sheets[wb.SheetNames[si]];
          var chdr=(XLSX.utils.sheet_to_json(cws,{header:1,defval:''})[0]||[]);
          if(chdr.some(function(h){ return /classdiv/i.test(String(h)); })){ ws=cws; break; }
        }
        RES_MAP_HEADERS=XLSX.utils.sheet_to_json(ws,{header:1,defval:''})[0]||[];
        buildResMapperUI();
      } catch(err){ toast('Error: '+err.message,true); }
    };
    reader.readAsArrayBuffer(file);
  }
}

function buildResMapperUI(){
  RES_ACTIVE_MAP={};
  var autoCount=0;
  var html='<div class="form-row">';
  RES_ROLES.forEach(function(role){
    var found=-1;
    RES_MAP_HEADERS.forEach(function(h,i){
      if(found===-1){
        var hs=String(h||'');
        for(var j=0;j<role.hints.length;j++){
          if(role.hints[j].test(hs)){ found=i; break; }
        }
      }
    });
    // also try normalizeHeader match
    if(found===-1){
      RES_MAP_HEADERS.forEach(function(h,i){
        if(found===-1&&normalizeHeader(String(h||''))===role.id) found=i;
      });
    }
    if(found>-1){ RES_ACTIVE_MAP[found]=role.id; autoCount++; }
    var opts=RES_MAP_HEADERS.map(function(h,i){
      return h!=null?'<option value="'+i+'"'+(i===found?' selected':'')+'>Col '+i+': '+esc(String(h).substring(0,50))+'</option>':'';
    }).join('');
    var autoMark=found>-1?'<span style="color:var(--green);font-size:.68rem"> &#10003; auto</span>':'<span style="color:var(--muted);font-size:.68rem"> not found</span>';
    html+='<div class="form-group"><label>'+esc(role.label)+autoMark+'</label>'
      +'<select onchange="RES_ACTIVE_MAP[this.value]=\''+role.id+'\'" '
      +'style="background:var(--bg);border:1px solid var(--border2);border-radius:5px;color:var(--text);padding:.35rem .5rem;font-size:.78rem">'
      +'<option value="-1">— Not in this file —</option>'+opts+'</select></div>';
  });
  html+='</div>';
  var ac=document.getElementById('resmap-auto-count');
  if(ac) ac.textContent=autoCount+' auto-detected';
  document.getElementById('resmap-fields').innerHTML=html;
  document.getElementById('resmapper-out').classList.remove('hidden');
}

var _orgEdSel = 'CoWN';  // currently selected org in editor

var ORG_CONFIG_VERSION=3; // bump when factory defaults change in a breaking way
function loadOrgConfig(){
  try{
    var saved=localStorage.getItem('gp_org_classes');
    if(saved){
      var parsed=JSON.parse(saved);
      // If saved data predates current version, discard it so new defaults apply
      if((parsed._v||0)<ORG_CONFIG_VERSION){
        localStorage.removeItem('gp_org_classes');
        return;
      }
      // Remove internal version key before merging
      delete parsed._v;
      // Merge saved into ORG_CLASSES (replace each key if present)
      Object.keys(parsed).forEach(function(k){ ORG_CLASSES[k]=parsed[k]; });
      // Rebuild DIV_ORDER_BY_ORG from ORG_CLASSES
      Object.keys(ORG_CLASSES).forEach(function(k){ DIV_ORDER_BY_ORG[k]=ORG_CLASSES[k].divisions; });
      // Rebuild ORG_ORDER
      var savedKeys=Object.keys(parsed);
      savedKeys.forEach(function(k){ if(ORG_ORDER.indexOf(k)<0) ORG_ORDER.push(k); });
    }
  } catch(e){ console.warn('Could not load org config:', e); }
}

function saveOrgConfig(silent){
  try{
    var toSave=JSON.parse(JSON.stringify(ORG_CLASSES));
    toSave._v=ORG_CONFIG_VERSION;
    localStorage.setItem('gp_org_classes', JSON.stringify(toSave));
    Object.keys(ORG_CLASSES).forEach(function(k){ DIV_ORDER_BY_ORG[k]=ORG_CLASSES[k].divisions; });
    if(!silent) toast('Association structure saved.');
  } catch(e){ alert('Save failed: '+e.message); }
}

function resetOrgConfig(){
  if(!confirm('Reset ALL association structure to built-in defaults? This cannot be undone.')) return;
  localStorage.removeItem('gp_org_classes');
  location.reload();
}

function _orgDivSuggestions(sel){
  // Canonical divisions for this org from factory defaults, minus already-added ones
  var cfg=ORG_CLASSES[sel]||{};
  var defaults=(DEFAULT_ORG_CLASSES[sel]||{}).divisions||[];
  // Also collect from all defaults for a broad pool
  var all=[];
  Object.values(DEFAULT_ORG_CLASSES).forEach(function(c){ (c.divisions||[]).forEach(function(d){ if(all.indexOf(d)<0) all.push(d); }); });
  // Prioritise defaults for this org, then others
  var pool=defaults.slice();
  all.forEach(function(d){ if(pool.indexOf(d)<0) pool.push(d); });
  return pool.filter(function(d){ return (cfg.divisions||[]).indexOf(d)<0; });
}
function _orgDiscSuggestions(sel){
  var cfg=ORG_CLASSES[sel]||{};
  var defaults=(DEFAULT_ORG_CLASSES[sel]||{}).disciplines||[];
  var all=[];
  Object.values(DEFAULT_ORG_CLASSES).forEach(function(c){ (c.disciplines||[]).forEach(function(d){ if(all.indexOf(d)<0) all.push(d); }); });
  var pool=defaults.slice();
  all.forEach(function(d){ if(pool.indexOf(d)<0) pool.push(d); });
  return pool.filter(function(d){ return (cfg.disciplines||[]).indexOf(d)<0; });
}

    +'<div style="display:flex;align-items:center;gap:.5rem;font-size:.85rem">'
    +'<span style="color:var(--muted)">Points system:</span>'
    +'<select onchange="orgEdSetPts(\''+esc(sel)+'\',this.value)" style="background:var(--bg);border:1px solid var(--border2);color:var(--text);border-radius:5px;padding:.25rem .4rem;font-size:.8rem">'
    +'<option value="entries"'+(psSel==='entries'?' selected':'')+'>CoWN — entries-based (1st=N … last=1)</option>'
    +'<option value="aqha"'+(psSel==='aqha'?' selected':'')+'>AQHA — entries-based (5=1pt, 10=2pts, 15=3pts…)</option>'
    +'<option value="none"'+(psSel==='none'?' selected':'')+'>None (money event / no season points)</option>'
    +'</select></div>'
    +'</div>'
    +(aaDetail ? '<div style="margin-top:.6rem;padding:.6rem .75rem;background:var(--bg);border:1px solid var(--border);border-radius:6px">'+aaDetail+'</div>' : '')

  // ── Rename + Delete org ──────────────────────────────────────
  var danger='<div style="margin-top:.75rem;padding-top:.75rem;border-top:1px solid var(--border);display:flex;gap:.5rem;flex-wrap:wrap">'
    +'<button class="btn btn-dark btn-sm" onclick="orgEdRenameOrg(\''+esc(sel)+'\')">&#9998; Rename association</button>'
    +(sel!=='CoWN'
      ?'<button class="btn btn-dark btn-sm" style="color:var(--red);border-color:var(--red)" onclick="orgEdRemoveOrg(\''+esc(sel)+'\')">&#10005; Remove '+esc(sel)+'</button>'
      :'')

window.orgEdSelOrg=function(o){ saveOrgConfig(true); _orgEdSel=o; renderOrgEditor(); };

window.orgEdAddOrg=function(){
  var name=prompt('Abbreviation for new org (e.g. NSBA):');
  if(!name||!name.trim()) return;
  name=name.trim().toUpperCase();
  if(ORG_CLASSES[name]){ alert(name+' already exists.'); return; }
  ORG_CLASSES[name]={divisions:['Open'],disciplines:[],allAround:false,aaTiebreak:[],pointsSystem:'entries'};
  DIV_ORDER_BY_ORG[name]=['Open'];
  if(ORG_ORDER.indexOf(name)<0) ORG_ORDER.push(name);
  _orgEdSel=name;
  saveOrgConfig(true); renderOrgEditor();
};

window.orgEdRemoveOrg=function(o){
  if(o==='CoWN'){alert('Cannot remove CoWN.'); return;}
  if(!confirm('Remove org "'+o+'" and all its divisions/disciplines? This only affects Gatepost\'s class structure — no show data is deleted.')) return;
  delete ORG_CLASSES[o];
  delete DIV_ORDER_BY_ORG[o];
  var idx=ORG_ORDER.indexOf(o);
  if(idx>=0) ORG_ORDER.splice(idx,1);
  _orgEdSel='CoWN';
  saveOrgConfig(true); renderOrgEditor();
};

window.orgEdRenameOrg=function(o){
  var newName=prompt('Rename "'+o+'" to:', o);
  if(!newName||!newName.trim()) return;
  newName=newName.trim();
  if(newName===o) return;
  if(ORG_CLASSES[newName]){ alert('"'+newName+'" already exists.'); return; }
  ORG_CLASSES[newName]=ORG_CLASSES[o];
  DIV_ORDER_BY_ORG[newName]=DIV_ORDER_BY_ORG[o];
  delete ORG_CLASSES[o];
  delete DIV_ORDER_BY_ORG[o];
  var idx=ORG_ORDER.indexOf(o);
  if(idx>=0) ORG_ORDER[idx]=newName; else ORG_ORDER.push(newName);
  _orgEdSel=newName;
  saveOrgConfig(true); renderOrgEditor();
};

window.orgEdAddAaReqGroup=function(o,disc){
  if(!disc||!ORG_CLASSES[o]) return;
  if(!ORG_CLASSES[o].aaRequired) ORG_CLASSES[o].aaRequired=[];
  ORG_CLASSES[o].aaRequired=normalizeAaReq(ORG_CLASSES[o].aaRequired);
  ORG_CLASSES[o].aaRequired.push([disc]);
  saveOrgConfig(true); renderOrgEditor();
};
window.orgEdAddAaReqOption=function(o,groupIdx,disc){
  if(!disc||!ORG_CLASSES[o]) return;
  ORG_CLASSES[o].aaRequired=normalizeAaReq(ORG_CLASSES[o].aaRequired||[]);
  var grp=ORG_CLASSES[o].aaRequired[groupIdx];
  if(!grp) return;
  if(grp.indexOf(disc)<0) grp.push(disc);
  saveOrgConfig(true); renderOrgEditor();
};
window.orgEdRemoveAaReqOption=function(o,groupIdx,optIdx){
  if(!ORG_CLASSES[o]) return;
  ORG_CLASSES[o].aaRequired=normalizeAaReq(ORG_CLASSES[o].aaRequired||[]);
  var grp=ORG_CLASSES[o].aaRequired[groupIdx];
  if(!grp) return;
  grp.splice(optIdx,1);
  if(grp.length===0) ORG_CLASSES[o].aaRequired.splice(groupIdx,1);
  saveOrgConfig(true); renderOrgEditor();
};
window.orgEdRemoveAaReqGroup=function(o,groupIdx){
  if(!ORG_CLASSES[o]) return;
  ORG_CLASSES[o].aaRequired=normalizeAaReq(ORG_CLASSES[o].aaRequired||[]);
  ORG_CLASSES[o].aaRequired.splice(groupIdx,1);
  saveOrgConfig(true); renderOrgEditor();
};

window.orgEdAddDiv=function(o){
  var inp=document.getElementById('oed-new-div');
  var val=(inp&&inp.value.trim());
  if(!val) return;
  if(!ORG_CLASSES[o]) return;
  if(ORG_CLASSES[o].divisions.indexOf(val)>=0){alert('"'+val+'" already exists.'); return;}
  ORG_CLASSES[o].divisions.push(val);
  DIV_ORDER_BY_ORG[o]=ORG_CLASSES[o].divisions;
  saveOrgConfig(true); renderOrgEditor();
};

window.orgEdRemoveDiv=function(o,i){
  if(!ORG_CLASSES[o]) return;
  ORG_CLASSES[o].divisions.splice(i,1);
  DIV_ORDER_BY_ORG[o]=ORG_CLASSES[o].divisions;
  saveOrgConfig(true); renderOrgEditor();
};

window.orgEdMoveDiv=function(o,i,dir){
  var arr=ORG_CLASSES[o]&&ORG_CLASSES[o].divisions;
  if(!arr) return;
  var j=i+dir;
  if(j<0||j>=arr.length) return;
  var tmp=arr[i]; arr[i]=arr[j]; arr[j]=tmp;
  DIV_ORDER_BY_ORG[o]=arr;
  saveOrgConfig(true); renderOrgEditor();
};

window.orgEdAddDisc=function(o){
  var inp=document.getElementById('oed-new-disc');
  var val=(inp&&inp.value.trim());
  if(!val) return;
  if(!ORG_CLASSES[o]) return;
  if(ORG_CLASSES[o].disciplines.indexOf(val)>=0){alert('"'+val+'" already exists.'); return;}
  ORG_CLASSES[o].disciplines.push(val);
  if(ORG_CLASSES[o].allAround) ORG_CLASSES[o].aaTiebreak=ORG_CLASSES[o].disciplines.slice();
  saveOrgConfig(true); renderOrgEditor();
};

window.orgEdRemoveDisc=function(o,i){
  if(!ORG_CLASSES[o]) return;
  ORG_CLASSES[o].disciplines.splice(i,1);
  if(ORG_CLASSES[o].allAround) ORG_CLASSES[o].aaTiebreak=ORG_CLASSES[o].disciplines.slice();
  saveOrgConfig(true); renderOrgEditor();
};

window.orgEdMoveDisc=function(o,i,dir){
  var arr=ORG_CLASSES[o]&&ORG_CLASSES[o].disciplines;
  if(!arr) return;
  var j=i+dir;
  if(j<0||j>=arr.length) return;
  var tmp=arr[i]; arr[i]=arr[j]; arr[j]=tmp;
  if(ORG_CLASSES[o].allAround) ORG_CLASSES[o].aaTiebreak=arr.slice();
  saveOrgConfig(true); renderOrgEditor();
};

window.orgEdSetAA=function(o){
  var cb=document.getElementById('oed-aa');
  if(!ORG_CLASSES[o]) return;
  ORG_CLASSES[o].allAround=cb&&cb.checked;
  if(ORG_CLASSES[o].allAround){
    ORG_CLASSES[o].aaTiebreak=ORG_CLASSES[o].disciplines.slice();
    if(!ORG_CLASSES[o].aaMinClasses) ORG_CLASSES[o].aaMinClasses=ORG_CLASSES[o].disciplines.length;
    if(!ORG_CLASSES[o].aaRequired) ORG_CLASSES[o].aaRequired=[];
    else ORG_CLASSES[o].aaRequired=normalizeAaReq(ORG_CLASSES[o].aaRequired);
  } else {
    ORG_CLASSES[o].aaTiebreak=[];
  }
  saveOrgConfig(true); renderOrgEditor();
};

window.orgEdSetPts=function(o,val){
  if(!ORG_CLASSES[o]) return;
  ORG_CLASSES[o].pointsSystem=val;
  saveOrgConfig(true);
};

window.orgEdSetAAMin=function(o,val){
  if(!ORG_CLASSES[o]) return;
  var n=parseInt(val,10);
  if(isNaN(n)||n<1) return;
  ORG_CLASSES[o].aaMinClasses=Math.min(n, (ORG_CLASSES[o].disciplines||[]).length);
  saveOrgConfig(true);
};

  var s=document.getElementById('fs-std'); if(s) s.textContent='$'+base;
  var c=document.getElementById('fs-cow'); if(c) c.textContent='$'+(base+cow);

function addCustomOrg(){

// ── Class config table ──
function renderCfgClassTable(){
  var tbody=document.getElementById('cfg-cls-tbody');
  if(!tbody) return;
  var lbl=document.getElementById('cls-count');
  if(lbl) lbl.textContent=G.cfg.classes.length+' classes';
  if(!G.cfg.classes.length){ tbody.innerHTML='<tr><td colspan="11" class="empty-state">No classes loaded.</td></tr>'; return; }

  var byDiv={};
  G.cfg.classes.forEach(function(c){
    var k=(c.org||'CoWN')+': '+(c.division||'General');
    if(!byDiv[k]) byDiv[k]=[];
    byDiv[k].push(c);
  });

  var html='';
  Object.keys(byDiv).sort().forEach(function(div){
    html+='<tr class="div-hdr"><td colspan="11">'+esc(div)+'</td></tr>';
    byDiv[div].forEach(function(c){
      var total=calcCfgTotal(c);
      html+='<tr data-cid="'+c._id+'">'
        +'<td><input type="text" value="'+escH(c.num)+'" onchange="updCls(\''+c._id+'\',\'num\',this.value)" style="width:58px"></td>'
        +'<td><input type="text" value="'+escH(c.name)+'" onchange="updCls(\''+c._id+'\',\'name\',this.value)"></td>'
        +'<td><input type="text" value="'+escH(c.division||'')+'" onchange="updCls(\''+c._id+'\',\'division\',this.value)"></td>'
        +'<td><select onchange="updCls(\''+c._id+'\',\'org\',this.value)" style="background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:3px;font-size:.78rem;width:100%">'
        +ORG_ORDER.concat(['Other']).map(function(o){ return '<option value="'+o+'"'+(c.org===o?' selected':'')+'>'+o+'</option>'; }).join('')
        +'</select></td>'
        +'<td style="text-align:center"><input type="checkbox"'+(c.isCow?' checked':'')+' onchange="updCls(\''+c._id+'\',\'isCow\',this.checked);refreshCfgRow(\''+c._id+'\')"></td>'
        +'<td>'+feeInp(c._id,'baseFee',c.baseFee,'30')+'</td>'
        +'<td>'+feeInp(c._id,'cowFee',c.cowFee,c.isCow?'15':'n/a',!c.isCow)+'</td>'
        +'<td>'+feeInp(c._id,'jackpot',c.jackpot,'0')+'</td>'
        +'<td>'+feeInp(c._id,'addedMoney',c.addedMoney,'0')+'</td>'
        +'<td style="text-align:center;font-weight:600;color:var(--accent);font-size:.8rem" id="ct-'+c._id+'">'+fmtI(total)+'</td>'
        +'<td><button class="btn btn-red btn-sm" onclick="delCls(\''+c._id+'\')">&#10005;</button></td>'
        +'</tr>';
    });
  });
  tbody.innerHTML=html;
  renderAAPrizeCfg();
}

function renderAAPrizeCfg(){
  var root=document.getElementById('aa-prize-body');
  if(!root) return;
  // Find all orgs with allAround enabled
  var aaOrgs=ORG_ORDER.filter(function(o){ return ORG_CLASSES[o]&&ORG_CLASSES[o].allAround; });
  if(!aaOrgs.length){
    root.innerHTML='<p style="font-size:.83rem;color:var(--muted)">No All Around-enabled orgs. Enable All Around in the Associations tab.</p>';
    return;
  }
  // Get divisions actually present in classes
  var classedDivs={};
  G.cfg.classes.forEach(function(c){
    var o=c.org||'CoWN';
    if(!classedDivs[o]) classedDivs[o]=[];
    if(c.division&&classedDivs[o].indexOf(c.division)<0) classedDivs[o].push(c.division);
  });
  var html='<p style="font-size:.78rem;color:var(--muted);margin-bottom:.75rem">Enter a total added money amount — payout splits automatically based on number of eligible riders (e.g. 4 eligible → 40/30/20/10).</p>';
  aaOrgs.forEach(function(o){
    var divs=classedDivs[o]||(ORG_CLASSES[o].divisions||['Open']);
    divs.forEach(function(div){
      if(!div) return;
      var key=o+'|'+div;
      var total=(G.cfg.aaMoney||{})[key]||0;
      html+='<div style="display:flex;align-items:center;gap:.75rem;margin-bottom:.5rem;padding-bottom:.5rem;border-bottom:1px solid var(--border)">'
        +'<span style="font-size:.85rem;font-weight:600;min-width:160px;color:var(--text)">'+esc(o)+' '+esc(div)+'</span>'
        +'<label style="display:flex;align-items:center;gap:.3rem;font-size:.83rem;color:var(--muted)">Added Money $'
        +'<input type="number" min="0" step="1" value="'+total+'" '
        +'oninput="updAAPrize(\''+key.replace(/'/g,"\\'")+'\',this.value)" '
        +'style="width:6rem;background:var(--bg);border:1px solid var(--border2);color:var(--text);border-radius:4px;padding:.18rem .28rem;font-size:.85rem"></label>'
        +'</div>';
    });
  });
  if(html==='<p style="font-size:.78rem;color:var(--muted);margin-bottom:.75rem">Enter a total added money amount — payout splits automatically based on number of eligible riders (e.g. 4 eligible → 40/30/20/10).</p>') html='<p style="font-size:.83rem;color:var(--muted)">Import entries or add classes first to see divisions here.</p>';
  root.innerHTML=html;
}

window.updAAPrize=function(key,val){
  if(!G.cfg.aaMoney) G.cfg.aaMoney={};
  G.cfg.aaMoney[key]=parseFloat(val)||0;
  if(!G.aaMoney) G.aaMoney={};
  G.aaMoney[key]=G.cfg.aaMoney[key];
};

function feeInp(id,field,val,ph,disabled){
  return '<input type="number" value="'+(val!==null&&val!==undefined?val:'')+'" placeholder="'+ph+'" min="0" step="1"'
    +(disabled?' disabled style="opacity:.35"':'')+' onchange="updCls(\''+id+'\',\''+field+'\',this.value===\'\'?null:parseFloat(this.value));refreshCfgRow(\''+id+'\')">';
}

function calcCfgTotal(c){
  var f=G.cfg.fees;
  var base=c.baseFee!==null&&c.baseFee!==undefined?c.baseFee:f.classBase;
  var cow=c.isCow?(c.cowFee!==null&&c.cowFee!==undefined?c.cowFee:f.cowSurcharge):0;
  var jp=c.jackpot||0;
  return base+cow+jp;
}

function escH(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function updCls(id,field,val){
  var c=G.cfg.classes.find(function(x){ return x._id===id; });
  if(c) c[field]=val;
};
function refreshCfgRow(id){
  var c=G.cfg.classes.find(function(x){ return x._id===id; });
  if(!c) return;
  var el=document.getElementById('ct-'+id);
  if(el) el.textContent=fmtI(calcCfgTotal(c));
  var row=document.querySelector('[data-cid="'+id+'"]');
  if(row){
    var inputs=row.querySelectorAll('input[type=number]');
    if(inputs[1]){ inputs[1].disabled=!c.isCow; inputs[1].style.opacity=c.isCow?'1':'0.35'; inputs[1].placeholder=c.isCow?'15':'n/a'; }
  }
};
function delCls(id){
  G.cfg.classes=G.cfg.classes.filter(function(c){ return c._id!==id; });
  renderCfgClassTable();
};
function filterCfgClasses(q){
  document.querySelectorAll('#cfg-cls-tbody tr:not(.div-hdr)').forEach(function(r){
    r.style.display=(!q||r.textContent.toLowerCase().indexOf(q.toLowerCase())>-1)?'':'none';
  });
};
function addCfgClass(){
  CFG_ROW_ID++;
  G.cfg.classes.push({_id:'cr'+CFG_ROW_ID,num:'',name:'New Class',division:'',org:'CoWN',isCow:false,baseFee:null,cowFee:null,jackpot:null,addedMoney:null});
  renderCfgClassTable();
};
function autofillClassFees(){
  var f=G.cfg.fees;
  G.cfg.classes.forEach(function(c){ c.baseFee=f.classBase; if(c.isCow) c.cowFee=f.cowSurcharge; c.jackpot=f.jackpot||null; });
  renderCfgClassTable();
  toast('Fees applied to all '+G.cfg.classes.length+' classes');
};
function autoDetectCow(){
  var n=0;
  G.cfg.classes.forEach(function(c){
    if(COW_WORDS.some(function(k){ return (c.name||'').toLowerCase().indexOf(k)>-1; })){ c.isCow=true; n++; }
  });
  renderCfgClassTable(); toast('Marked '+n+' cow classes');
};

function setupClassDrop(){
  var dz=document.getElementById('cls-dz'), fi=document.getElementById('cls-fi');
  if(!dz||!fi) return;
  dz.addEventListener('click',function(){ fi.click(); });
  fi.addEventListener('change',function(e){ if(e.target.files[0]) loadCfgClassFile(e.target.files[0]); });
  dz.addEventListener('dragover',function(e){ e.preventDefault(); dz.classList.add('drag'); });
  dz.addEventListener('dragleave',function(){ dz.classList.remove('drag'); });
  dz.addEventListener('drop',function(e){ e.preventDefault(); dz.classList.remove('drag'); if(e.dataTransfer.files[0]) loadCfgClassFile(e.dataTransfer.files[0]); });

function loadCfgClassFile(file){
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
      var headers=raw[0], data=raw.slice(1).filter(function(r){ return r[4]; });
      var classMap={};
      headers.forEach(function(h,i){
        if(!h||!isClassCol(String(h))) return;
        var div=extractDivName(String(h)), org=detectOrg(String(h));
        data.forEach(function(row){
          var val=row[i];
          if(!val||!String(val).trim()) return;
          String(val).split(',').forEach(function(cls){
            cls=cls.replace(/\xa0/g,' ').trim(); if(!cls) return;
            var m=cls.match(/^(\d+)[\s\-–]+(.+)$/);
            if(m){
              var num=m[1].trim();
              if(!classMap[num]){
                CFG_ROW_ID++;
                var isCow=COW_WORDS.some(function(k){ return m[2].toLowerCase().indexOf(k)>-1; });
                classMap[num]={_id:'cr'+CFG_ROW_ID,num:num,name:m[2].trim(),division:div,org:org,isCow:isCow,baseFee:null,cowFee:null,jackpot:null,addedMoney:null};
              }
            }
          });
        });
      });
      var newCls=Object.values(classMap).sort(function(a,b){ return (parseInt(a.num)||999)-(parseInt(b.num)||999); });
      var existing=G.cfg.classes.map(function(c){ return c.num; });
      var added=0;
      newCls.forEach(function(c){ if(existing.indexOf(c.num)===-1){ G.cfg.classes.push(c); added++; } });
      renderCfgClassTable();
      toast('Loaded '+newCls.length+' classes ('+added+' new) from '+file.name);
    } catch(err){ toast('Error: '+err.message,true); console.error(err); }
  };
  reader.readAsArrayBuffer(file);
}

  var reader=new FileReader();

function autoDetectRole(h,roles){
  var hs=String(h||'');
  for(var i=0;i<roles.length;i++){
    for(var j=0;j<roles[i].hints.length;j++){
      if(roles[i].hints[j].test(hs)) return roles[i].id;
    }
  }
  return null;
}

function buildMapperUI(){
  ACTIVE_MAP={};
  var mapped=new Set();
  var coreHTML='<div class="form-row">', housingHTML='<div class="form-row">';
  var autoCount=0;

  CORE_ROLES.forEach(function(role){
    var found=-1;
    MAP_HEADERS.forEach(function(h,i){ if(found===-1&&autoDetectRole(h,[role])===role.id){ found=i; } });
    if(found>-1){ ACTIVE_MAP[found]=role.id; mapped.add(found); autoCount++; }
    coreHTML+=mapSelect(role.id,role.label,found,found>-1);
  });
  coreHTML+='</div>';

  var divHTML='<div style="overflow-x:auto"><table class="cfg-tbl"><thead><tr>'
    +'<th>Column Header</th><th>Role</th><th>Division Name</th><th>Org</th></tr></thead><tbody>';
  MAP_HEADERS.forEach(function(h,i){
    if(!h) return;
    var hs=String(h).replace(/\xa0/g,' ');
    if(isClassCol(hs)||isCowCountCol(hs)){
      mapped.add(i);
      var isCow=isCowCountCol(hs);
      var div=extractDivName(hs), org=detectOrg(hs);
      ACTIVE_MAP[i]=isCow?'cow_count:'+div:'div_classes:'+div;
      divHTML+='<tr><td class="small" style="color:var(--muted)">'+escH(hs.substring(0,60))+'</td>'
        +'<td>'+(isCow?'<span class="badge b-cow">Cow Count</span>':'<span class="badge b-blue">Class Entries</span>')+'</td>'
        +'<td>'+(isCow?'<span class="badge b-gray">—</span>':'<input type="text" value="'+escH(div)+'" onchange="ACTIVE_MAP['+i+']=\'div_classes:\'+this.value" style="background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:3px 7px;font-size:.78rem;width:100%">')+'</td>'
        +'<td><select onchange="ACTIVE_MAP['+i+']=ACTIVE_MAP['+i+'].split(\':\')[0]+\':\'+ACTIVE_MAP['+i+'].split(\':\')[1]+\':org:\'+this.value" style="background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:3px;font-size:.78rem">'
        +ORG_ORDER.concat(['Other']).map(function(o){ return '<option value="'+o+'"'+(o===org?' selected':'')+'>'+o+'</option>'; }).join('')
        +'</select></td></tr>';
    }
  });
  divHTML+='</tbody></table></div>';

  HOUSING_ROLES.forEach(function(role){
    var found=-1;
    MAP_HEADERS.forEach(function(h,i){ if(found===-1&&autoDetectRole(h,[role])===role.id){ found=i; } });
    if(found>-1){ ACTIVE_MAP[found]=role.id; mapped.add(found); autoCount++; }
    housingHTML+=mapSelect(role.id,role.label,found,found>-1);
  });
  housingHTML+='</div>';

  var unmapped=[];
  MAP_HEADERS.forEach(function(h,i){
    if(h&&!mapped.has(i)&&!IGNORE_PAT.some(function(p){ return p.test(String(h)); })) unmapped.push({i:i,h:String(h)});
  });
  var unmappedHTML='';
  if(!unmapped.length){ unmappedHTML='<p style="color:var(--green);font-size:.84rem">&#10003; All columns accounted for.</p>'; }
  else{
    unmappedHTML='<div class="form-row">';
    var otherOpts='<option value="">— Ignore —</option><option value="practice">Practice Session</option><option value="clinic">Clinic Choice</option><option value="jackpot">Jackpot</option><option value="notes">Notes</option>';
    unmapped.forEach(function(col){
      unmappedHTML+='<div class="form-group"><label>Col '+col.i+': '+escH(col.h.substring(0,40))+'</label>'
        +'<select onchange="ACTIVE_MAP['+col.i+']=this.value" style="background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);padding:.35rem .5rem;font-size:.78rem">'+otherOpts+'</select></div>';
    });
    unmappedHTML+='</div>';
  }

  var ac=document.getElementById('map-auto-count');
  if(ac) ac.textContent=autoCount+' auto-detected';
  document.getElementById('map-core').innerHTML=coreHTML;
  document.getElementById('map-divs').innerHTML=divHTML;
  document.getElementById('map-housing').innerHTML=housingHTML;
  document.getElementById('map-unmapped').innerHTML=unmappedHTML;
  document.getElementById('mapper-out').classList.remove('hidden');
}

function mapSelect(roleId,label,detectedIdx,autoDetected){
  var opts=MAP_HEADERS.map(function(h,i){
    return h?'<option value="'+i+'"'+(i===detectedIdx?' selected':'')+'>Col '+i+': '+escH(String(h).substring(0,45))+'</option>':'';
  }).join('');
  return '<div class="form-group"><label>'+label+(autoDetected?' <span style="color:var(--green);font-size:.68rem">&#10003; auto</span>':'<span style="color:var(--red);font-size:.68rem"> not found</span>')+'</label>'
