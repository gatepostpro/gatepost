function scratchClass(rowIdx, classIdx){

  var e=G.entries.find(function(x){ return x.rowIndex===rowIdx; });

  if(!e) return;

  var cls = e.classes[classIdx];

  if(!cls) return;



  var isCow = cls.isCow || COW_WORDS.some(function(k){ return (cls.name||'').toLowerCase().indexOf(k)>-1; });

  var cowFee = isCow ? (G.cfg.fees.cowSurcharge||0) : 0;

  var paid = amtPaid(e) > 0;



  var msg = paid

    ? 'Scratch '+cls.name+'? Since this entry is paid, '+

      (isCow ? 'the cow fee ($'+cowFee+') will NOT be refunded.' : 'a refund will be applied.')

    : 'Scratch '+cls.name+'? No charge since entry is unpaid.';



  if(!confirm(msg)) return;



  e.classes[classIdx].status = 'scratched';



  // If paid and cow class — keep cow fee charged

  // If paid and not cow — reduce total_owed

  if(paid && !isCow){

    var baseFee = cls.feeCharged || G.cfg.fees.classBase || 0;

    G.payments[rowIdx] = Math.max(0, (G.payments[rowIdx]||0));

    // Reduce what they owe by the class base fee

    e.cognitoAmount = Math.max(0, (e.cognitoAmount||0) - baseFee);

    toast('Scratched — refund of '+fmt$(baseFee)+' applied');

  } else {

    toast('Scratched — '+cls.name);

  }



  // Sync to Supabase

  if(cls.ecId){

    sbFetch('entry_classes?id=eq.'+cls.ecId,{method:'PATCH',

      body:JSON.stringify({status:'scratched',scratch_reason:'voluntary',scratched_at:new Date().toISOString()})

    }).catch(function(err){ console.error('Scratch sync failed:', err); });

  }



  if(G._rebuildEntryModal) G._rebuildEntryModal();

};



function addRider(rowIdx){

function saveEntryInfo(rowIdx){
  var e=G.entries.find(function(x){ return x.rowIndex===rowIdx; });
  if(!e) return;

  var newFirst=(document.getElementById('ei-firstname').value||'').trim();
  var newLast =(document.getElementById('ei-lastname').value||'').trim();
  var newName =(newFirst+' '+newLast).trim();
  var oldName=e.name;

  if(newFirst) e.firstName=newFirst;
  if(newLast)  e.lastName=newLast;
  e.name       = newName||e.name;
  e.memberNum  = (document.getElementById('ei-membernum').value||'').trim();
  e.email      = (document.getElementById('ei-email').value||'').trim();
  e.phone      = (document.getElementById('ei-phone').value||'').trim();
  e.address    = (document.getElementById('ei-street').value||'').trim();
  e.city       = (document.getElementById('ei-city').value||'').trim();
  e.state      = (document.getElementById('ei-state').value||'').trim().toUpperCase().slice(0,2);
  e.zip        = (document.getElementById('ei-zip').value||'').trim();
  e.horse      = (document.getElementById('ei-horse').value||'').trim()||e.horse;
  e.horseGender= document.getElementById('ei-horsegender').value;
  e.division   = (document.getElementById('ei-division').value||'').trim();
  e.addedAtShow= document.getElementById('ei-addedatshow').checked;

  // If primary rider name changed, update riders array and class assignments
  if(newName && newName!==oldName){
    if(e.riders){
      e.riders.forEach(function(r){ if(r.name===oldName) r.name=newName; });
    }
    e.classes.forEach(function(c){ if(c.rider===oldName) c.rider=newName; });
  }

  saveEntriesToStorage();
  if(typeof drawEntryTable === 'function') drawEntryTable();
  toast('Entry updated');
  if(G._rebuildEntryModal) G._rebuildEntryModal();
}

window.orgFeeTypeChange=function(rowIdx){

  var sel=document.getElementById('of-type');

  var wrap=document.getElementById('of-custom-wrap');

  var amtEl=document.getElementById('of-amt');

  var isCustom=sel.value==='Custom Fee'||sel.value==='Discount / Credit';

  var isSep=sel.value.indexOf('---')===0;

  if(isSep){ sel.value=sel.options[sel.selectedIndex-1]?sel.options[sel.selectedIndex-1].value:'Office Fee'; }

  wrap.style.display=isCustom?'flex':'none';

  if(sel.value==='Discount / Credit'){ if(parseFloat(amtEl.value)>=0) amtEl.value='-0'; }

  else { autoFillFeeAmt(sel.value); }

function autoFillFeeAmt(feeType){

  var f = G.cfg.fees;

  var amt = 0;

  if(feeType.indexOf('Stall — 1 Night') === 0) amt = f.stall1||40;

  else if(feeType.indexOf('Stall — 2 Nights') === 0) amt = f.stall2||80;

  else if(feeType.indexOf('Stall — 3 Nights') === 0) amt = f.stall3||120;

  else if(feeType.indexOf('Stall — Circuit') === 0) amt = f.stallCircuit||150;

  else if(feeType.indexOf('Shavings') === 0) amt = f.shavings||12;

  else if(feeType.indexOf('RV — 1 Night') === 0) amt = f.rv1||40;

  else if(feeType.indexOf('RV — 2 Nights') === 0) amt = f.rv2||80;

  else if(feeType.indexOf('RV — Circuit') === 0) amt = f.rvCircuit||110;

  else if(feeType.indexOf('Membership — 1 Year') === 0) amt = f.membership1yr||60;

  else if(feeType.indexOf('Membership — 3 Year') === 0) amt = f.membership3yr||150;

  else if(feeType.indexOf('Membership — Lifetime') === 0) amt = f.membershipLife||200;



  else if(feeType.indexOf('Horse License') === 0) amt = f.horseLicense||20;

  var amtEl = document.getElementById('of-amt');

  if(amtEl && amt > 0) amtEl.value = amt;

}



function saveOrgFee(rowIdx){

  var e=G.entries.find(function(x){ return x.rowIndex===rowIdx; });

  if(!e) return;

  var org  = document.getElementById('of-org').value;

  var type = document.getElementById('of-type').value;

  var amt  = parseFloat(document.getElementById('of-amt').value)||0;

  if(type.indexOf('---') === 0){ toast('Please select a fee type', true); return; }

  // For custom/discount, use the free-text description

  var desc = type;

  if(type === 'Custom Fee' || type === 'Discount / Credit'){

    var customEl = document.getElementById('of-custom-desc');

    desc = (customEl&&customEl.value.trim()) || type;

    if(!desc){ toast('Please enter a description', true); return; }

  } else {

    desc = type.split('(')[0].trim();

  }

  if(!e.orgFees) e.orgFees=[];

  // For stall/RV fees, also update the entry quantities for tab calculation

  var f = G.cfg.fees;

  if(type.indexOf('Stall — 1 Night') === 0){ e.stall1qty = (e.stall1qty||0)+1; amt = f.stall1||40; }

  else if(type.indexOf('Stall — 2 Nights') === 0){ e.stall2qty = (e.stall2qty||0)+1; amt = f.stall2||80; }

  else if(type.indexOf('Stall — 3 Nights') === 0){ e.stall1qty = (e.stall1qty||0)+3; amt = f.stall3||120; }

  else if(type.indexOf('Stall — Circuit') === 0){ e.stall1qty = (e.stall1qty||0)+1; amt = f.stallCircuit||150; }

  else if(type.indexOf('Shavings') === 0){ e.shavings = (e.shavings||0)+1; amt = f.shavings||12; }

  else if(type.indexOf('RV — 1 Night') === 0){ e.rv1qty = (e.rv1qty||0)+1; amt = f.rv1||40; }

  else if(type.indexOf('RV — 2 Nights') === 0){ e.rv2qty = (e.rv2qty||0)+1; amt = f.rv2||80; }

  else if(type.indexOf('RV — Circuit') === 0){ e.rvCircuit = (e.rvCircuit||0)+1; amt = f.rvCircuit||110; }

  e.orgFees.push({org:org, desc:desc, amt:amt});

  saveEntriesToCache();

  toast((amt<0?'Discount':'Fee')+' added: '+desc+' '+fmt$(amt));

  closeModal();

  showEntryModal(rowIdx);

};



function removeOrgFee(rowIdx, feeIdx){

function updateSplitPct(rowIdx, splitIdx, val){

function removeSplit(rowIdx, splitIdx){

function addSplitPerson(rowIdx){

  var e=G.entries.find(function(x){ return x.rowIndex===rowIdx; });

  if(!e) return;

  var pct = parseInt((document.getElementById('split-pct')||{value:'50'}).value)||50;

  var name = '';

  var otherRowIdx = null;

  // Try dropdown first

  var sel = document.getElementById('split-rider-sel');

  if(sel && sel.value !== ''){

    otherRowIdx = parseInt(sel.value);

    var refEntry = G.entries.find(function(x){ return x.rowIndex===otherRowIdx; });

    if(refEntry) name = refEntry.name;

  }

  // Fall back to manual text

  if(!name){

    name = (document.getElementById('split-name')||{value:''}).value.trim();

  }

  if(!name){ toast('Select a rider or enter a name', true); return; }



  // Set up splits

  if(!e.stallSplit) e.stallSplit=[{name:e.name, pct:100-pct, rowIndex:rowIdx}];

  if(e.stallSplit.length===1) e.stallSplit[0].pct = 100-pct;

  e.stallSplit.push({name:name, pct:pct, rowIndex:otherRowIdx});



  // Propagate stall share to the other rider's entry

  if(otherRowIdx !== null){

    var otherEntry = G.entries.find(function(x){ return x.rowIndex===otherRowIdx; });

    if(otherEntry){

      var f = G.cfg.fees;

      var stallTotal = e.stall1qty*f.stall1 + e.stall2qty*f.stall2 + e.shavings*f.shavings

        + e.rv1qty*f.rv1 + e.rv2qty*f.rv2 + e.rvCircuit*f.rvCircuit;

      var shareAmt = stallTotal * pct / 100;

      if(!otherEntry.orgFees) otherEntry.orgFees = [];

      // Remove any existing stall share from this horse

      otherEntry.orgFees = otherEntry.orgFees.filter(function(f){ return f.stallShareFrom !== rowIdx; });

      // Add new share

      otherEntry.orgFees.push({

        org:'Stall Share', desc:'Stall share w/ '+esc(e.name)+' ('+pct+'%)',

        amt:shareAmt, stallShareFrom:rowIdx

      });

      toast('Stall share of '+fmt$(shareAmt)+' added to '+name+"'s tab");

    }

  }



  saveEntriesToStorage();

  if(G._rebuildEntryModal) G._rebuildEntryModal();

};







window.addSplitAsGuest=function(myRowIdx){

  var holderSel=document.getElementById('guest-split-holder');

  var itemSel=document.getElementById('guest-split-item');

  var pctInp=document.getElementById('guest-split-pct');

  if(!holderSel||!holderSel.value){ toast('Select a stall holder',true); return; }

  var holderEntry=G.entries.find(function(e){ return e.rowIndex===parseInt(holderSel.value); });

  var myEntry=G.entries.find(function(e){ return e.rowIndex===myRowIdx; });

  if(!holderEntry||!myEntry){ toast('Entry not found',true); return; }

  var itemKey=itemSel?itemSel.value:'s1';

  var pct=parseInt((pctInp&&pctInp.value)||50)||50;

  var f=G.cfg.fees;

  var items={

    s1:{label:'Stall 1-night',qty:holderEntry.stall1qty,unitCost:f.stall1||40},

    s2:{label:'Stall 2-nights',qty:holderEntry.stall2qty,unitCost:f.stall2||80},

    sh:{label:'Shavings',qty:holderEntry.shavings,unitCost:f.shavings||12},

    r1:{label:'RV 1-night',qty:holderEntry.rv1qty,unitCost:f.rv1||40},

    r2:{label:'RV 2-nights',qty:holderEntry.rv2qty,unitCost:f.rv2||80},

    rc:{label:'RV Circuit',qty:holderEntry.rvCircuit,unitCost:f.rvCircuit||110}

  };

  var item=items[itemKey];

  if(!item||!item.qty){ toast('That item has no quantity on the holder\'s entry',true); return; }

  // Update holder's stallSplits

  if(!holderEntry.stallSplits) holderEntry.stallSplits={};

  if(!holderEntry.stallSplits[itemKey]) holderEntry.stallSplits[itemKey]=[{name:holderEntry.name,pct:100}];

  var splits=holderEntry.stallSplits[itemKey];

  var alreadyIn=splits.some(function(s){ return s.name===myEntry.name; });

  if(alreadyIn){ toast(myEntry.name+' is already in this split',true); return; }

  if(splits.length===1) splits[0].pct=100-pct;

  splits.push({name:myEntry.name,pct:pct});

  // Add/update orgFee on my entry

  var splitKey=holderEntry.rowIndex+'_'+itemKey;

  if(!myEntry.orgFees) myEntry.orgFees=[];

  myEntry.orgFees=myEntry.orgFees.filter(function(of){ return of.splitFromKey!==splitKey; });

  var shareAmt=item.qty*item.unitCost*pct/100;

  myEntry.orgFees.push({org:'Stall Split',desc:'Share of '+item.label+' from '+holderEntry.name+'/'+holderEntry.horse,amt:shareAmt,splitFromKey:splitKey});

  saveEntriesToStorage();

  toast('Added '+pct+'% share of '+item.label+' ('+fmt$(shareAmt)+') to tab');

  if(G._rebuildEntryModal) G._rebuildEntryModal();

};



window.removeGuestSplit=function(myRowIdx, splitKey){

  var myEntry=G.entries.find(function(e){ return e.rowIndex===myRowIdx; });

  if(!myEntry) return;

  myEntry.orgFees=(myEntry.orgFees||[]).filter(function(of){ return of.splitFromKey!==splitKey; });

  // Also remove from holder's stallSplits

  var parts=splitKey.split('_');

  var holderRowIdx=parseInt(parts[0]); var itemKey=parts.slice(1).join('_');

  var holder=G.entries.find(function(e){ return e.rowIndex===holderRowIdx; });

  if(holder&&holder.stallSplits&&holder.stallSplits[itemKey]){

    holder.stallSplits[itemKey]=holder.stallSplits[itemKey].filter(function(s){ return s.name!==myEntry.name; });

    if(holder.stallSplits[itemKey].length===1) holder.stallSplits[itemKey][0].pct=100;

  }

  saveEntriesToStorage();

  toast('Split removed');

  if(G._rebuildEntryModal) G._rebuildEntryModal();

};

    +'<div style="display:flex;gap:.4rem;flex-wrap:wrap;align-items:center">'

    +'<option value="cash">Cash</option><option value="check">Check</option>'

    +'<button class="btn btn-green btn-sm" onclick="submitPayment(\''+pkEsc+'\',\''+reopenFn+'\')">Record</button>'

window.submitPayment=function(payKey, reopenFn){

  if(amt<=0){ toast('Enter an amount', true); return; }
  var method=(document.getElementById('pay-method')||{}).value||'cash';
  var checkNum=(document.getElementById('pay-checknum')||{}).value||'';
  var note=(document.getElementById('pay-note')||{}).value||'';
  recordPayment(payKey, amt, method, checkNum, note);
  closeModal();
  if(reopenFn) window[reopenFn]&&window[reopenFn](payKey);

function buildContactLine(e){

  var parts=[];
  if(e.email) parts.push('<a href="mailto:'+esc(e.email)+'" style="color:var(--accent)">'+esc(e.email)+'</a>');
  if(e.phone) parts.push(esc(e.phone));
  var addr=[e.address,e.city,e.state].filter(Boolean).join(', ');
  if(addr) parts.push(esc(addr));
  return parts.length?'<div style="font-size:.78rem;color:var(--muted);margin-bottom:.75rem">'+parts.join(' &middot; ')+'</div>':'';
}

    +'<div class="modal"><h2>&#128281; '+esc(grp.payerName)+'</h2>'

function promptMerge(canonicalHorse, riderNames){
  // Build entryKeys for all unmerged entries for these riders
  var entryKeys=[];
  riderNames.forEach(function(name){
    G.entries.forEach(function(e){
      if(e.name===name&&horsesMatch(e.horse,canonicalHorse)&&!getBillingGroup(e))
        entryKeys.push(entryKey(e));
    });
  });
  if(entryKeys.length<2){ toast('Need at least 2 entries to merge', true); return; }
  var keysJson=JSON.stringify(entryKeys);
  var root=document.getElementById('modal-root');
  root.innerHTML='<div class="modal-bg" id="tm" onclick="if(event.target===this)closeModal()">'
    +'<div class="modal"><h2>Merge Tabs</h2>'

function promptMergeForRider(riderName){

  var matched=shg.find(function(g){ return g.entries.some(function(e){ return e.name===riderName&&!getBillingGroup(e); }); });

  var riders=[];
  matched.entries.forEach(function(e){ if(!getBillingGroup(e)&&riders.indexOf(e.name)<0) riders.push(e.name); });

window.saveSplitHorse=function(canonical, riders){
  var nk=normHorse(canonical);
  riders.forEach(function(name){
    var sel=document.querySelector('.sh-grp-sel[data-rider="'+name+'"]');
    if(!sel) return;
    var grpNum=sel.value||'1';
    // Set horseDistinct for every entry this rider has on this horse
    G.entries.forEach(function(e){
      if(e.name===name&&horsesMatch(e.horse,canonical)){
        G.horseDistinct[entryKey(e)]=nk+'_'+grpNum;
      }
    });
  });
  saveBillingData();
  closeModal(); pgTabs();
};

window.clearHorseSplit=function(canonical){
  var nk=normHorse(canonical);
  G.entries.forEach(function(e){
    if(horsesMatch(e.horse,canonical)){
      var dk=G.horseDistinct[entryKey(e)];
      if(dk&&dk.indexOf(nk+'_')===0) delete G.horseDistinct[entryKey(e)];

  closeModal(); pgTabs();
};

window.confirmMergeGroups=function(groupId){
  var picked=document.querySelector('input[name="mg-pick"]:checked');
  if(!picked){ toast('Select a group to merge with', true); return; }
  var otherId=picked.value;
  var newName=(document.getElementById('mg-name')||{value:''}).value.trim();
  var grpA=G.billingGroups.find(function(g){ return g.id===groupId; });
  var grpB=G.billingGroups.find(function(g){ return g.id===otherId; });
  if(!grpA||!grpB) return;
  // Combine all entry keys (deduplicated)
  var combined=grpA.entryKeys.slice();
  grpB.entryKeys.forEach(function(k){ if(combined.indexOf(k)<0) combined.push(k); });
  // Remove both old groups
  G.billingGroups=G.billingGroups.filter(function(g){ return g.id!==groupId&&g.id!==otherId; });
  // Create merged group
  createBillingGroup(newName||grpA.payerName, combined);
  saveBillingData(); syncBillingGroupsToSupabase();
  closeModal(); pgTabs();
};

function showTabModal(name){

var _aeTab = 'rider';

// Which housing offerings are configured (price > 0 in fee schedule)?
function _aeHousingOfferings(){
  var f = G.cfg.fees || {};
  var sched = G.cfg.feeSchedule || [];
  function label(key, def){ var e=sched.find(function(x){return x.key===key;}); return e?e.label:def; }
  var offers = [];
  if(f.haulin>0)      offers.push({id:'ae-haulin',  field:'haulinQty',  label:label('haulin','Haul-In (per horse)'), price:f.haulin, min:0});
  if(f.stall1>0)      offers.push({id:'ae-stall1',  field:'stall1qty',  label:label('stall1','Stall — Per Night'), price:f.stall1, min:0});
  if(f.stall2>0)      offers.push({id:'ae-stall2',  field:'stall2qty',  label:label('stall2','Stall — Circuit'),   price:f.stall2, min:0});
  if(f.stall3>0)      offers.push({id:'ae-stall3',  field:'stall3qty',  label:label('stall3','Stall — 3 Night'),   price:f.stall3, min:0});
  if(f.shavings>0)    offers.push({id:'ae-shavings',field:'shavings',   label:label('shavings','Shavings (per bag)'),price:f.shavings, min:f.shavingsMin||0});
  if(f.rv1>0)         offers.push({id:'ae-rv1',     field:'rv1qty',     label:label('rv1','RV — Per Night'),       price:f.rv1, min:0});
  if(f.rv2>0)         offers.push({id:'ae-rv2',     field:'rv2qty',     label:label('rv2','RV — 2 Night'),         price:f.rv2, min:0});
  if(f.rvCircuit>0)   offers.push({id:'ae-rvc',     field:'rvCircuit',  label:label('rvCircuit','RV — Full Circuit'), price:f.rvCircuit, min:0});
  return offers;
}

// Which membership fields are needed for this show's orgs?
function _aeMembFields(){
  var orgs = Array.from(new Set((G.cfg.classes||[]).map(function(c){return c.org||'CoWN';})));
  var fields = [];
  var seen = {};
  orgs.forEach(function(org){
    if((org==='CoWN'||org==='WHSR'||org==='Jackpot') && !seen.CoWN){
      fields.push({key:'memberNum', label:'CoWN Member #', placeholder:'CoWN member number'}); seen.CoWN=1;
    }
    if((org==='CoWN'||org==='WHSR') && !seen.SHTX){
      fields.push({key:'memberSHTX', label:'SHTX Member #', placeholder:'SHTX license number'}); seen.SHTX=1;
    }
    if((org==='VRH'||org==='AQHA Ranch'||org==='AQHA RHC') && !seen.AQHA){
      fields.push({key:'memberAQHA', label:'AQHA Member #', placeholder:'AQHA member number'}); seen.AQHA=1;
    }
    if(org==='APHA' && !seen.APHA){
      fields.push({key:'memberAPHA', label:'APHA Member #', placeholder:'APHA member number'}); seen.APHA=1;
    }
    if(org==='ApHC' && !seen.ApHC){
      fields.push({key:'memberApHC', label:'ApHC Member #', placeholder:'ApHC member number'}); seen.ApHC=1;
    }
    if(org==='NRHA' && !seen.NRHA){
      fields.push({key:'memberNRHA', label:'NRHA Member #', placeholder:'NRHA member number'}); seen.NRHA=1;
    }
    if(org==='NRCHA' && !seen.NRCHA){
      fields.push({key:'memberNRCHA', label:'NRCHA Member #', placeholder:'NRCHA member number'}); seen.NRCHA=1;
    }
  });
  if(!fields.length) fields.push({key:'memberNum', label:'Member #', placeholder:'Member number'});
  return fields;
}

function _aeInp(opts){
  // opts: {id, type, placeholder, value, list}
  return '<input type="'+(opts.type||'text')+'" id="'+opts.id+'" '
    +(opts.list?'list="'+opts.list+'" ':'')
    +'placeholder="'+(opts.placeholder||'')+'" value="'+(opts.value||'')+'" '
    +'style="background:var(--bg);border:1px solid var(--border2);border-radius:6px;color:var(--text);'
    +'padding:.42rem .65rem;font-size:.84rem;width:100%;box-sizing:border-box">';
}

function _aeSel(id, opts, val){
  return '<select id="'+id+'" style="background:var(--bg);border:1px solid var(--border2);border-radius:6px;'
    +'color:var(--text);padding:.42rem .65rem;font-size:.84rem;width:100%;box-sizing:border-box">'
    +opts.map(function(o){
      var v=typeof o==='string'?o:o.v, l=typeof o==='string'?o:o.l;
      return '<option value="'+esc(v)+'"'+(v===val?' selected':'')+'>'+esc(l)+'</option>';
    }).join('')+'</select>';
}

function _aeFG(label, input){
  return '<div class="form-group">'+
    '<label style="font-size:.78rem;color:var(--muted);margin-bottom:.25rem;display:block">'+label+'</label>'
    +input+'</div>';
}

function _aeTabBtn(id, label){
  var active = id===_aeTab;
  return '<button id="aebt-'+id+'" onclick="showAeTab(\''+id+'\')" '
    +'style="flex:1;padding:.55rem .4rem;background:transparent;border:none;border-bottom:2px solid '
    +(active?'var(--accent)':'transparent')+';color:'+(active?'var(--accent)':'var(--muted)')
    +';font-family:Oswald;font-size:.8rem;cursor:pointer;white-space:nowrap">'+label+'</button>';
}

function _buildAeRiderTab(){
  var firstNames = Array.from(new Set(G.entries.map(function(e){return e.firstName||(e.name||'').split(/\s+/)[0]||''}).filter(Boolean))).sort();
  var lastNames  = Array.from(new Set(G.entries.map(function(e){return e.lastName||(e.name||'').split(/\s+/).slice(1).join(' ')||''}).filter(Boolean))).sort();
  var html = '<datalist id="ae-fl-list">'+firstNames.map(function(n){return '<option value="'+esc(n)+'">'; }).join('')+'</datalist>'
    +'<datalist id="ae-ll-list">'+lastNames.map(function(n){return '<option value="'+esc(n)+'">'; }).join('')+'</datalist>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:.65rem;margin-bottom:.6rem">'
    +_aeFG('First Name *',    _aeInp({id:'ae-first', placeholder:'First', list:'ae-fl-list'}))
    +_aeFG('Last Name *',     _aeInp({id:'ae-last',  placeholder:'Last',  list:'ae-ll-list'}))
    +_aeFG('Email',           _aeInp({id:'ae-email', type:'email', placeholder:'email@example.com'}))
    +_aeFG('Phone',           _aeInp({id:'ae-phone', placeholder:'(555) 555-5555'}))
    +_aeFG('Address',         _aeInp({id:'ae-addr',  placeholder:'Street address'}))
    +'<div style="display:grid;grid-template-columns:2fr 1fr;gap:.5rem">'
    +_aeFG('City', _aeInp({id:'ae-city', placeholder:'City'}))
    +_aeFG('State', _aeInp({id:'ae-state', placeholder:'TX'}))
    +'</div>'
    +'</div>'
    +'<div style="display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;padding:.5rem;background:var(--card2);border-radius:6px">'
    +'<label style="display:flex;align-items:center;gap:.4rem;cursor:pointer;font-size:.84rem">'
    +'<input type="checkbox" id="ae-youth" onchange="document.getElementById(\'ae-dob-row\').style.display=this.checked?\'block\':\'none\'" style="accent-color:var(--accent)"> Youth Rider</label>'
    +'<div id="ae-dob-row" style="display:none">'
    +_aeFG('Date of Birth', _aeInp({id:'ae-dob', type:'date'}))
    +'</div></div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:.65rem">'
    +_aeFG('Back #', _aeInp({id:'ae-back', type:'number', placeholder:'Back number'}));
  var membFields = _aeMembFields();
  membFields.forEach(function(f){
    html += _aeFG(f.label, _aeInp({id:'ae-mb-'+f.key, placeholder:f.placeholder}));
  });
  html += '</div>';
  return html;
}

function _buildAeHorseTab(){
  var horseNames = Array.from(new Set(G.entries.map(function(e){return e.horse||''}).filter(Boolean))).sort();
  return '<datalist id="ae-hn-list">'+horseNames.map(function(n){return '<option value="'+esc(n)+'">'; }).join('')+'</datalist>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:.65rem;margin-bottom:.6rem">'
    +_aeFG('Horse Name *', _aeInp({id:'ae-horse', placeholder:'Registered or barn name', list:'ae-hn-list'}))
    +_aeFG('Gender', _aeSel('ae-gender', [{v:'',l:'—'},'Gelding','Mare','Stallion'], ''))
    +'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:.65rem;margin-bottom:.6rem">'
    +_aeFG('Reg # (AQHA/breed)', _aeInp({id:'ae-hreg', placeholder:'optional'}))
    +_aeFG('Horse Date of Birth', _aeInp({id:'ae-hdob', type:'date'}))
    +'</div>'
    +(function(){
    var membFields = _aeMembFields();
    var ownerMembs = membFields.map(function(mf){
      return _aeFG('Owner '+mf.label, _aeInp({id:'ae-ow-'+mf.key, placeholder:mf.placeholder}));
    }).join('');
    return '<div style="margin-top:.6rem;padding:.5rem;background:var(--card2);border-radius:6px">'  
      +'<label style="display:flex;align-items:center;gap:.5rem;font-size:.84rem;cursor:pointer">'  
      +'<input type="checkbox" id="ae-diff-owner" onchange="document.getElementById(&quot;ae-owner-fields&quot;).style.display=this.checked?&quot;block&quot;:&quot;none&quot;" style="accent-color:var(--accent)"> Owner is different from rider</label>'
      +'<div id="ae-owner-fields" style="display:none;margin-top:.55rem;display:none">'  
      +_aeFG('Owner Name', _aeInp({id:'ae-howner', placeholder:'Owner full name'}))
      +ownerMembs
      +'</div></div>';
  })();
}

function _buildAeClassesTab(){
  if(!G.cfg.classes.length)
    return '<div class="tip">No classes configured — go to Show Setup → Classes first.</div>';
  // Group by org then division
  var orgs = [];
  var byOrg = {};
  G.cfg.classes.forEach(function(c){
    var org = c.org||'CoWN';
    if(!byOrg[org]){ byOrg[org]={}; orgs.push(org); }
    var div = c.division||'General';
    if(!byOrg[org][div]) byOrg[org][div]=[];
    byOrg[org][div].push(c);
  });
  var html = '';
  orgs.forEach(function(org){
    var divs = byOrg[org];
    html += '<div style="margin-bottom:.85rem">'
      +'<div style="font-family:Oswald;color:var(--accent);font-size:.88rem;margin-bottom:.4rem;letter-spacing:.04em">'+esc(org)+'</div>';
    Object.keys(divs).forEach(function(div){
      html += '<div style="margin-bottom:.5rem">'
        +'<div style="font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.25rem">'+esc(div)+'</div>';
      divs[div].forEach(function(c){
        var isCutting = c.isCow && /cutt/i.test(c.name||'');
        var fee = (c.baseFee||G.cfg.fees.classBase||0) + (isCutting ? (c.cuttingFee||G.cfg.fees.cuttingSurcharge||0) : c.isCow ? (c.cowFee||G.cfg.fees.cowSurcharge||0) : 0);
        html += '<label style="display:flex;align-items:center;gap:.5rem;padding:.28rem .3rem;font-size:.82rem;cursor:pointer;border-radius:4px" '
          +'onmouseover="this.style.background=\'rgba(200,146,42,.07)\'" onmouseout="this.style.background=\'\'">'
          +'<input type="checkbox" data-classid="'+esc(c._id)+'" class="ae-cls-cb" onchange="_aeUpdateReview()" style="accent-color:var(--accent)">'
          +'<span><strong>'+esc(c.num)+'</strong> — '+esc(c.name)
          +(c.isCow?' <span class="badge b-cow">Cow</span>':'')
          +'<span style="color:var(--accent);margin-left:6px">'+fmtI(fee)+'</span></span>'
          +'</label>';
      });
      html += '</div>';
    });
    html += '</div>';
  });
  return html;
}

function _buildAeHousingTab(){
  var html = '';
  var stallPkgs = G.cfg.stallingPackages || [];
  var rvPkgs    = G.cfg.rvPackages       || [];
  var f         = G.cfg.fees || {};
  var hasHaulin   = (f.haulin||0) > 0;
  var hasShavings = (f.shavings||0) > 0;
  var hasFlatStall = (f.stall1||0)+(f.stall2||0)+(f.stall3||0)+(f.stallCircuit||0) > 0;
  var hasFlatRV    = (f.rv1||0)+(f.rv2||0)+(f.rvCircuit||0) > 0;

  if(!stallPkgs.length && !rvPkgs.length && !hasFlatStall && !hasFlatRV && !hasHaulin && !hasShavings)
    return '<div class="tip">No housing fees configured. Set prices in Show Setup → Finances.</div>';

  if(hasHaulin){
    html += '<div class="form-group" style="margin-bottom:.65rem">'
      +'<label style="font-size:.78rem;color:var(--muted);margin-bottom:.25rem;display:block">Haul-In (per horse)'
      +'<span style="color:var(--accent);margin-left:5px">'+fmtI(f.haulin)+' each</span></label>'
      +'<input type="number" id="ae-haulin" value="0" min="0" step="1" onchange="_aeUpdateReview()" '
      +'style="background:var(--bg);border:1px solid var(--border2);border-radius:6px;color:var(--text);'
      +'padding:.42rem .65rem;font-size:.9rem;width:100%;box-sizing:border-box"></div>';
  }

  if(stallPkgs.length){
    html += '<div style="margin-bottom:1rem"><div style="font-family:Oswald;color:var(--accent);font-size:.88rem;margin-bottom:.4rem">Stall Options</div>';
    stallPkgs.forEach(function(p){
      html += '<label style="display:flex;align-items:center;gap:.6rem;padding:.35rem .3rem;font-size:.83rem;cursor:pointer;border-radius:4px" '
        +'onmouseover="this.style.background=\'rgba(200,146,42,.07)\'" onmouseout="this.style.background=\'\'">'
        +'<input type="radio" name="ae-stall-pkg" value="'+esc(p.id||p.label)+'" onchange="_aeUpdateReview()" style="accent-color:var(--accent)">'
        +'<span>'+esc(p.label)+(p.price>0?' — <span style="color:var(--accent)">'+fmtI(+p.price)+'</span>':'')+'</span>'
        +'</label>';
    });
    html += '<label style="display:flex;align-items:center;gap:.6rem;padding:.25rem .3rem;font-size:.8rem;color:var(--muted);cursor:pointer">'
      +'<input type="radio" name="ae-stall-pkg" value="" onchange="_aeUpdateReview()" style="accent-color:var(--accent)"> No stalling</label></div>';
  } else if(hasFlatStall){
    html += '<div style="margin-bottom:1rem"><div style="font-family:Oswald;color:var(--accent);font-size:.88rem;margin-bottom:.4rem">Stalling</div>'
      +'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:.5rem">';
    if(f.stall1>0) html += _aeQtyField('ae-stall1','Stall — Per Night',f.stall1);
    if(f.stall2>0) html += _aeQtyField('ae-stall2','Stall — 2 Nights',f.stall2);
    if(f.stall3>0) html += _aeQtyField('ae-stall3','Stall — 3 Nights',f.stall3);
    if(f.stallCircuit>0) html += _aeQtyField('ae-stallc','Stall — Circuit',f.stallCircuit);
    html += '</div></div>';
  }

  if(hasShavings){
    html += '<div class="form-group" style="margin-bottom:.65rem">'
      +'<label style="font-size:.78rem;color:var(--muted);margin-bottom:.25rem;display:block">Shavings (bags)'
      +'<span style="color:var(--accent);margin-left:5px">'+fmtI(f.shavings)+' each</span></label>'
      +'<input type="number" id="ae-shavings" value="0" min="0" step="1" onchange="_aeUpdateReview()" '
      +'style="background:var(--bg);border:1px solid var(--border2);border-radius:6px;color:var(--text);'
      +'padding:.42rem .65rem;font-size:.9rem;width:100%;box-sizing:border-box"></div>';
  }

  if(rvPkgs.length){
    html += '<div style="margin-bottom:1rem"><div style="font-family:Oswald;color:var(--accent);font-size:.88rem;margin-bottom:.4rem">RV / Hookups</div>';
    rvPkgs.forEach(function(p){
      html += '<label style="display:flex;align-items:center;gap:.6rem;padding:.35rem .3rem;font-size:.83rem;cursor:pointer;border-radius:4px" '
        +'onmouseover="this.style.background=\'rgba(200,146,42,.07)\'" onmouseout="this.style.background=\'\'">'
        +'<input type="radio" name="ae-rv-pkg" value="'+esc(p.id||p.label)+'" onchange="_aeUpdateReview()" style="accent-color:var(--accent)">'
        +'<span>'+esc(p.label)+(p.price>0?' — <span style="color:var(--accent)">'+fmtI(+p.price)+'</span>':'')+'</span>'
        +'</label>';
    });
    html += '<label style="display:flex;align-items:center;gap:.6rem;padding:.25rem .3rem;font-size:.8rem;color:var(--muted);cursor:pointer">'
      +'<input type="radio" name="ae-rv-pkg" value="" onchange="_aeUpdateReview()" style="accent-color:var(--accent)"> No RV</label></div>';
  } else if(hasFlatRV){
    html += '<div style="margin-bottom:1rem"><div style="font-family:Oswald;color:var(--accent);font-size:.88rem;margin-bottom:.4rem">RV / Hookups</div>'
      +'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:.5rem">';
    if(f.rv1>0) html += _aeQtyField('ae-rv1','RV — Per Night',f.rv1);
    if(f.rv2>0) html += _aeQtyField('ae-rv2','RV — 2 Nights',f.rv2);
    if(f.rvCircuit>0) html += _aeQtyField('ae-rvc','RV — Circuit',f.rvCircuit);
    html += '</div></div>';
  }

  html += '<div class="form-group" style="margin-top:.5rem">'
    +'<label style="font-size:.78rem;color:var(--muted);margin-bottom:.25rem;display:block">Stall Group / Label (optional)</label>'
    +'<input type="text" id="ae-stallgroup" placeholder="e.g. barn name or aisle" '
    +'style="background:var(--bg);border:1px solid var(--border2);border-radius:6px;color:var(--text);padding:.42rem .65rem;font-size:.84rem;width:100%;box-sizing:border-box"></div>';

  return html;
}

function _aeQtyField(id, label, price){
  return '<div class="form-group">'
    +'<label style="font-size:.78rem;color:var(--muted);margin-bottom:.25rem;display:block">'+esc(label)
    +'<span style="color:var(--accent);margin-left:5px">'+fmtI(price)+' each</span></label>'
    +'<input type="number" id="'+id+'" value="0" min="0" step="1" onchange="_aeUpdateReview()" '
    +'style="background:var(--bg);border:1px solid var(--border2);border-radius:6px;color:var(--text);'
    +'padding:.42rem .65rem;font-size:.9rem;width:100%;box-sizing:border-box"></div>';
}

  var clins = G.cfg.clinicOptions    || [];
  if(!pracs.length && !clins.length) return '<div class="tip">No extras configured.</div>';
  var inp = 'style="background:var(--bg);border:1px solid var(--border2);border-radius:6px;color:var(--text);padding:.42rem .65rem;font-size:.9rem;width:100%;box-sizing:border-box"';
  if(pracs.length){
    html += '<div style="margin-bottom:1rem"><div style="font-family:Oswald;color:var(--accent);font-size:.88rem;margin-bottom:.4rem">Practice Sessions</div>';
    pracs.forEach(function(p,i){
      var pid = p.id||p.label||('prac'+i);

        +'</label>';
    });

  }
  if(clins.length){
    html += '<div style="margin-bottom:1rem"><div style="font-family:Oswald;color:var(--accent);font-size:.88rem;margin-bottom:.4rem">Clinics</div>';
    clins.forEach(function(c,i){
      var cid = c.id||c.label||('clin'+i);
      html += '<label style="display:flex;align-items:center;gap:.6rem;padding:.3rem .2rem;font-size:.83rem;cursor:pointer">'
        +'<input type="checkbox" class="ae-clin-cb" data-clinid="'+esc(cid)+'" onchange="_aeUpdateReview()" style="accent-color:var(--accent)">'
        +'<span>'+esc(c.label||'Clinic')+(c.price>0?' — <span style="color:var(--accent)">'+fmtI(+c.price)+'</span>':'')+'</span>'
        +'</label>';

  return html;

function _buildAeReviewTab(){
  return '<div id="ae-review-lines" style="min-height:60px"><div style="color:var(--muted);font-size:.84rem">Select classes and housing to see fee summary.</div></div>';
}

function _aeCollectEntry(){
  var f = function(id){ var el=document.getElementById(id); return el?el.value.trim():''; };
  var n = function(id){ var el=document.getElementById(id); return el?parseInt(el.value)||0:0; };
  var first  = f('ae-first');
  var last   = f('ae-last');
  var horse  = f('ae-horse');
  var selectedClasses = [];
  document.querySelectorAll('.ae-cls-cb:checked').forEach(function(cb){
    var cls = G.cfg.classes.find(function(c){ return c._id===cb.dataset.classid; });
    if(cls) selectedClasses.push({
      num:cls.num, name:cls.name, division:cls.division, org:cls.org||'CoWN', isCow:cls.isCow,
      status:'entered',
      feeCharged:(cls.baseFee||G.cfg.fees.classBase||0)+(/cutt/i.test(cls.name||'')&&cls.isCow?(cls.cuttingFee||G.cfg.fees.cuttingSurcharge||0):cls.isCow?(cls.cowFee||G.cfg.fees.cowSurcharge||0):0)
    });
  });
  var stallPkgs = G.cfg.stallingPackages || [];
  var rvPkgs    = G.cfg.rvPackages       || [];
  var stallPkgEl = document.querySelector('input[name="ae-stall-pkg"]:checked');
  var rvPkgEl    = document.querySelector('input[name="ae-rv-pkg"]:checked');
  var housing = {
    stallingPackageId: stallPkgs.length ? (stallPkgEl ? stallPkgEl.value : '') : '',
    rvPackageId:       rvPkgs.length    ? (rvPkgEl    ? rvPkgEl.value    : '') : '',
    haulinQty:    n('ae-haulin'),
    stall1qty:    stallPkgs.length ? 0 : n('ae-stall1'),
    stall2qty:    stallPkgs.length ? 0 : n('ae-stall2'),
    stall3qty:    stallPkgs.length ? 0 : n('ae-stall3'),
    stallCircuit: stallPkgs.length ? 0 : n('ae-stallc'),
    shavings:     n('ae-shavings'),
    rv1qty:       rvPkgs.length ? 0 : n('ae-rv1'),
    rv2qty:       rvPkgs.length ? 0 : n('ae-rv2'),
    rvCircuit:    rvPkgs.length ? 0 : n('ae-rvc'),
    stallingGroup: f('ae-stallgroup')
  };
  var membFields = _aeMembFields();
  var membs = {};
  membFields.forEach(function(mf){ membs[mf.key] = f('ae-mb-'+mf.key); });
  var youthEl = document.getElementById('ae-youth');
  return {
    first:first, last:last,
    email:f('ae-email'), phone:f('ae-phone'),
    address:f('ae-addr'), city:f('ae-city'), state:f('ae-state'),
    isYouth:youthEl&&youthEl.checked, dob:f('ae-dob'),
    back:f('ae-back'),
    horse:horse, horseGender:f('ae-gender'), horseOwner:f('ae-howner'),
    horseRegNum:f('ae-hreg'), horseDob:f('ae-hdob'),
    membs:membs,
    classes:selectedClasses,
    stallingPackageId:housing.stallingPackageId||'',
    rvPackageId:housing.rvPackageId||'',
    haulinQty:housing.haulinQty||0,
    stall1qty:housing.stall1qty||0,
    stall2qty:housing.stall2qty||0,
    stall3qty:housing.stall3qty||0,
    stallCircuit:housing.stallCircuit||0,
    shavings: housing.shavings||0,
    rv1qty:   housing.rv1qty||0,
    rv2qty:   housing.rv2qty||0,
    rvCircuit:housing.rvCircuit||0,
    stallingGroup:housing.stallingGroup||'',
    practiceSessions: (function(){
      var sel=[];
      document.querySelectorAll('.ae-prac-cb:checked').forEach(function(cb){
        var p=(G.cfg.practiceSessions||[]).find(function(x){return (x.id||x.label)===cb.dataset.pracid;});
        if(p) sel.push({id:cb.dataset.pracid, label:p.label, price:+p.price||0});
      });
      return sel;
    })(),
    clinics: (function(){
      var sel=[];
      document.querySelectorAll('.ae-clin-cb:checked').forEach(function(cb){
        var c=(G.cfg.clinicOptions||[]).find(function(x){return (x.id||x.label)===cb.dataset.clinid;});
        if(c) sel.push({id:cb.dataset.clinid, label:c.label, price:+c.price||0});
      });
      return sel;

async function syncManualEntry(entry){

  // Get association — prefer G.assocId, fall back to abbreviation lookup
  var assocId = G.assocId;
  if(!assocId){
    var abbr = (G.cfg && G.cfg.orgAbbrev) || 'CoWN';
    var assocRows = await sbFetch('associations?abbreviation=eq.'+encodeURIComponent(abbr)+'&select=id');
    assocId = assocRows && assocRows[0] ? assocRows[0].id : null;
  }
  if(!assocId) throw new Error('Association not found');

  var firstName = entry.firstName || (entry.name||'').split(' ')[0] || '';
  var lastName  = entry.lastName  || (entry.name||'').split(' ').slice(1).join(' ') || '(unknown)';



  // Find or create member

  var existing = await sbFetch('members?association_id=eq.'+assocId

    +'&first_name=ilike.'+encodeURIComponent(firstName)

    +'&last_name=ilike.'+encodeURIComponent(lastName)+'&select=id');

  var memberId;

  if(existing && existing.length){

    memberId = existing[0].id;

  } else {

    var nm = await sbFetch('members',{method:'POST',

      body:JSON.stringify({association_id:assocId,first_name:firstName,last_name:lastName,

        email:entry.email||null,phone:entry.phone||null})});

    memberId = nm[0].id;

    if(entry.memberNum){

      await sbFetch('member_registrations',{method:'POST',

        body:JSON.stringify({member_id:memberId,org:'CoWN',registration_number:entry.memberNum})});

    }

  }



  // Find or create horse

  var existingH = await sbFetch('horses?registered_name=ilike.'+encodeURIComponent(entry.horse)+'&select=id');

  var horseId;

  if(existingH && existingH.length){

    horseId = existingH[0].id;

  } else {

    var nh = await sbFetch('horses',{method:'POST',

      body:JSON.stringify({registered_name:entry.horse,gender:entry.horseGender||null})});

    horseId = nh[0].id;

    await sbFetch('horse_owners',{method:'POST',

      body:JSON.stringify({horse_id:horseId,member_id:memberId,primary_owner:true})});

  }



  // Create entry

  var newEntry = await sbFetch('entries',{method:'POST',

    body:JSON.stringify({

      show_id:G.showId, member_id:memberId, horse_id:horseId,

      source:entry.source||'manual', status:'active',

      stall_1night:entry.stall1qty||0, stall_2night:entry.stall2qty||0,
      stall_3night:entry.stall3qty||0,

      shavings:entry.shavings||0, rv_1night:entry.rv1qty||0,
      rv_2night:entry.rv2qty||0, rv_circuit:entry.rvCircuit||0,

      total_owed:tabTotal(entry), total_paid:0,

      imported_at:new Date().toISOString()

    })});

  entry.dbId = newEntry[0].id;



  // Create entry_classes

  for(var i=0;i<entry.classes.length;i++){

    var cls = entry.classes[i];

    var sc = await sbFetch('show_classes?show_id=eq.'+G.showId+'&class_number=eq.'+encodeURIComponent(cls.num)+'&select=id');

    if(sc && sc.length){

      await sbFetch('entry_classes',{method:'POST',

        body:JSON.stringify({entry_id:entry.dbId,show_class_id:sc[0].id,

          status:'entered',fee_charged:cls.feeCharged})});

    }

  }

}

async function syncShowClassesToSupabase(){
  if(!G.showId || !G.cfg.classes || !G.cfg.classes.length) return;
  // Replace entire class list for this show atomically: delete then re-insert.
  // show_classes is the source of truth for entry_classes FK lookups.
  await sbDelete('show_classes?show_id=eq.'+G.showId);
  var rows = G.cfg.classes.map(function(c, idx){
    return {
      show_id:      G.showId,
      class_number: String(c.num||''),
      class_name:   c.name||'',
      division:     c.division||'',
      org:          c.org||'CoWN',
      is_cow:       !!c.isCow,
      is_cutting:   !c.isCow && /cutting/i.test(c.name||''),
      is_jackpot:   !!(c.jackpot && c.jackpot > 0),
      base_fee:     c.baseFee||null,
      cow_fee:      c.cowFee||null,
      jackpot_fee:  c.jackpot||null,
      added_money:  c.addedMoney||null,
      run_order:    idx
    };
  });
  // Insert in batches of 50 to stay within request limits
  for(var i=0; i<rows.length; i+=50){
    await sbFetch('show_classes', {method:'POST', body:JSON.stringify(rows.slice(i, i+50))});
  }
}

async function syncEntriesToSupabase(){

  if(!G.showId) return;

  // Ensure show_classes are in Supabase before creating entry_classes (FK dependency)
  try{ await syncShowClassesToSupabase(); } catch(e){ console.warn('Class sync failed:', e); }

  // Get association id — prefer the already-loaded tenant id, fall back to DB lookup
  var assocId = G.assocId || null;
  if(!assocId){
    var abbrev = (G.cfg && G.cfg.orgAbbrev) || 'CoWN';
    var assocRows = await sbFetch('associations?abbreviation=eq.'+encodeURIComponent(abbrev)+'&select=id');
    assocId = assocRows && assocRows[0] ? assocRows[0].id : null;
  }

  if(!assocId) throw new Error('Association not found. Check your association abbreviation in Settings.');



  var synced=0, errors=[];



  for(var i=0; i<G.entries.length; i++){

    var en = G.entries[i];

    try{

      // Split name

      var parts = en.name.trim().split(' ');

      var firstName = parts[0];

      var lastName  = parts.slice(1).join(' ') || '(unknown)';



      // Find or create member

      var memberId;

      var existingMembers = await sbFetch('members?association_id=eq.'+assocId

        +'&first_name=ilike.'+encodeURIComponent(firstName)

        +'&last_name=ilike.'+encodeURIComponent(lastName)+'&select=id');

      if(existingMembers && existingMembers.length){

        memberId = existingMembers[0].id;

      } else {

        var newMember = await sbFetch('members', {

          method:'POST',

          body: JSON.stringify({

            association_id: assocId,

            first_name: firstName, last_name: lastName,

            email: en.email||null, phone: en.phone||null,

            address: en.address||null,

          })

        });

        memberId = newMember[0].id;

        // Save CoWN # as registration

        if(en.memberNum && en.memberNum !== '0'){

          await sbFetch('member_registrations',{method:'POST',

            body:JSON.stringify({member_id:memberId,org:'CoWN',registration_number:en.memberNum})});

        }

      }



      // Find or create horse

      var horseId;

      var existingHorses = await sbFetch('horses?registered_name=ilike.'

        +encodeURIComponent(en.horse)+'&select=id');

      if(existingHorses && existingHorses.length){

        horseId = existingHorses[0].id;

      } else {

        var newHorse = await sbFetch('horses',{method:'POST',

          body:JSON.stringify({

            registered_name: en.horse,

            gender: en.horseGender||null,

          })});

        horseId = newHorse[0].id;

        // Link owner

        await sbFetch('horse_owners',{method:'POST',

          body:JSON.stringify({horse_id:horseId,member_id:memberId,primary_owner:true})});

      }



      // Upsert entry

      var entryPayload = {

        show_id: G.showId, member_id: memberId, horse_id: horseId,

        source: en.source||'cognito_import', status: 'active',

        stall_1night: en.stall1qty||0, stall_2night: en.stall2qty||0,
        stall_3night: en.stall3qty||0,

        shavings: en.shavings||0, rv_1night: en.rv1qty||0,

        rv_2night: en.rv2qty||0, rv_circuit: en.rvCircuit||0,

        stall_note: en.stallNote||null,

        needs_membership: en.needsMembership||null,

        total_owed: tabTotal(en),

        total_paid: G.payments[en.rowIndex]||0,

        cognito_ref: String(en.entryNum||''),

        imported_at: new Date().toISOString(),

      };



      // Check if entry already exists for this show+member+horse

      var existingEntry = await sbFetch('entries?show_id=eq.'+G.showId

        +'&member_id=eq.'+memberId+'&horse_id=eq.'+horseId+'&select=id');

      var dbEntryId;

      if(existingEntry && existingEntry.length){

        dbEntryId = existingEntry[0].id;

        await sbFetch('entries?id=eq.'+dbEntryId,{method:'PATCH',body:JSON.stringify(entryPayload)});

      } else {

        var newEntry = await sbFetch('entries',{method:'POST',body:JSON.stringify(entryPayload)});

        if(!newEntry || !newEntry[0]) throw new Error('Failed to create entry for '+en.name);

        dbEntryId = newEntry[0].id;

      }

      // Store dbId on in-memory entry

      G.entries[i].dbId = dbEntryId;



      // Upsert entry_classes

      for(var j=0; j<en.classes.length; j++){

        var cls = en.classes[j];

        // Find the show_class

        var showClasses = await sbFetch('show_classes?show_id=eq.'+G.showId

          +'&class_number=eq.'+encodeURIComponent(cls.num)+'&select=id,base_fee,cow_fee,is_cow');

        if(showClasses && showClasses.length){

          var sc = showClasses[0];

          var fee = (parseFloat(sc.base_fee)||0) + (sc.is_cow ? (parseFloat(sc.cow_fee)||0) : 0);

          // Check if entry_class exists

          var existingEC = await sbFetch('entry_classes?entry_id=eq.'+dbEntryId

            +'&show_class_id=eq.'+sc.id+'&select=id');

          if(!existingEC || !existingEC.length){

            await sbFetch('entry_classes',{method:'POST',

              body:JSON.stringify({entry_id:dbEntryId,show_class_id:sc.id,

                status:'entered',fee_charged:fee})});

          }

        }

      }

      synced++;

    } catch(err){

      errors.push(en.name+': '+err.message);

      console.error('Sync error for', en.name, err);

    }

  }



  if(errors.length) console.warn('Sync errors:', errors);

  return {synced, errors};

}



window.deleteEntry = async function(rowIdx){
  var e = G.entries.find(function(x){ return x.rowIndex===rowIdx; });
  if(!e){ e = G.entries[rowIdx]; }
  if(!e){ toast('Entry not found', true); return; }
  var label = (e.name||'Unknown') + (e.horse?' / '+e.horse:'');
  if(!confirm('Delete entry for "'+label+'"?\n\nThis removes them from local cache and the database.')) return;
  closeModal();
  try{
    if(e.dbId){
      await sbDelete('entry_classes?entry_id=eq.'+e.dbId);
      await sbDelete('entries?id=eq.'+e.dbId);
    }
    G.entries = G.entries.filter(function(x){ return x.rowIndex!==rowIdx; });
    delete G.payments[rowIdx];
    saveEntriesToStorage();
    toast('Entry deleted: '+label);
    showPage('entries');
  } catch(err){
    alert('Delete failed: '+err.message);
    console.error(err);
  }
};

window.clearAllEntries = async function(){

  if(!confirm('Delete ALL entries for this show from local cache AND the database? This cannot be undone.')) return;

  // Clear localStorage
  localStorage.removeItem('gp_entries_'+G.showId);
  localStorage.removeItem('gp_payments_'+G.showId);
  localStorage.removeItem('gp_backnums_'+G.showId);

  // Clear in-memory state
  G.entries=[]; G.payments={}; G.backNums={};

  // Delete from Supabase: entry_classes first (FK constraint), then entries
  try{
    var existing = await sbFetch('entries?show_id=eq.'+G.showId+'&select=id');
    if(existing && existing.length){
      var ids=existing.map(function(e){return e.id;});
      await sbDelete('entry_classes?entry_id=in.('+ids.join(',')+')');
      await sbDelete('entries?show_id=eq.'+G.showId);
      // Verify — re-query to confirm entries are gone
      var remaining = await sbFetch('entries?show_id=eq.'+G.showId+'&select=id');
      if(remaining && remaining.length){
        alert('Warning: '+remaining.length+' entries still exist in the database after delete attempt.\n\n'
          +'This usually means the Supabase "entries" table is missing a DELETE policy for the anon role.\n\n'
          +'Go to Supabase → Table Editor → entries → RLS Policies and add a DELETE policy, '
          +'or disable RLS on this table for local use.');
      } else {
        toast('All entries cleared from database and local cache.');
      }
    } else {
      toast('Local cache cleared. No entries found in database.');
    }
  } catch(err){
    alert('Local cache cleared, but database delete failed: '+err.message);
    console.error(err);
  }

  showPage('entries');
};

// DELETE helper — uses return=minimal + count header so RLS failures surface as errors
async function sbDelete(path){
  var res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    method: 'DELETE',
    headers: {
      'apikey': SUPABASE_ANON,
      'Authorization': 'Bearer ' + SUPABASE_ANON,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal,count=exact'
    }
  });
  if(!res.ok){ var e=await res.text(); throw new Error(e); }
  var ct = res.headers.get('content-range');
  // content-range for DELETE looks like "*/3" — extract count
  if(ct){ var m=ct.match(/\*\/(\d+)/); if(m) return parseInt(m[1]); }
  return null;
}

async function sbFetch(path, opts){

  var res = await fetch(SUPABASE_URL + '/rest/v1/' + path, Object.assign({

    headers: {

      'apikey': SUPABASE_ANON,

      'Authorization': 'Bearer ' + SUPABASE_ANON,

      'Content-Type': 'application/json',

      'Prefer': 'return=representation'

    }

  }, opts || {}));

  if(!res.ok){ var e=await res.text(); throw new Error(e); }

  var text = await res.text();

  return text ? JSON.parse(text) : null;

}

    method:'POST',

    body: JSON.stringify({entry_id:entryId, amount:amount, method:'manual', status:'completed'})

  });

  // Update total_paid on entry

  await sbFetch('entries?id=eq.'+entryId, {

    method:'PATCH',

    body: JSON.stringify({total_paid: amount})

  });

}



async function dbSaveShowClasses(showId, classes){

  // Delete existing, reinsert

  await sbFetch('show_classes?show_id=eq.'+showId, {method:'DELETE'});

  if(!classes.length) return;

  var rows = classes.map(function(c){

    return {

      show_id:      showId,

      class_number: c.num || '',

      class_name:   c.name || '',

      division:     c.division || '',

      org:          c.org || 'CoWN',

      is_cow:       !!c.isCow,

      is_jackpot:   !!(c.jackpot),

      base_fee:     c.baseFee || null,

      cow_fee:      c.cowFee || null,

      jackpot_fee:  c.jackpot || 0,

      added_money:  c.addedMoney || 0,

    };

  });

  return await sbFetch('show_classes', {

    method:'POST',

    body: JSON.stringify(rows)

  });

}



// ═══════════════════════ BOOT ═══════════════════════

async function boot(){

  // Expose G globally for debugging

  window.G = G;

  window.buildTabLines = buildTabLines;

  window.tabTotal = tabTotal;

  window.saveEntriesToCache = saveEntriesToCache;



  // Load any saved association structure customizations

  loadOrgConfig();



  // Load saved local config

  try{ var saved=localStorage.getItem('gatepost_cfg'); if(saved) G.cfg=JSON.parse(saved); } catch(e){}



  // Get show ID from URL — if missing, go back to index

  var params = new URLSearchParams(window.location.search);

  var showId = params.get('show');

  if(!showId){

    window.location.href = 'index.html';

    return;

  }



  // Show loading state in sidebar

  document.getElementById('show-pill').innerHTML =

    '<div class="sp-name" style="color:var(--muted)">Loading...</div>'

    +'<div class="sp-meta">Connecting to database</div>';



  try{

    // Step 1: Load show record

    var showRows = await sbFetch('shows?id=eq.'+showId+'&select=*');

    var show = showRows && showRows[0];

    if(!show) throw new Error('Show not found: ' + showId);



    G.showId   = showId;

    G.showName = show.name;

    G.showData = show;



    // Populate G.cfg from show data

    G.cfg.showName   = show.name         || G.cfg.showName;

    G.cfg.showDate   = show.show_date    || G.cfg.showDate;

    G.cfg.location   = show.location     || G.cfg.location;

    G.cfg.showStatus     = show.status         || '';
    G.cfg.entryDeadline  = show.entry_deadline || '';

    G.cfg.showId     = showId;

    if(show.fee_config){
      Object.keys(show.fee_config).forEach(function(k){
        if(k==='_schedule'){
          var saved = show.fee_config[k];
          if(saved && Array.isArray(saved)){
            // backfill cat from defaults for any entry missing it
            saved.forEach(function(f){
              if(!f.cat && f.key){
                var def = DEFAULT_FEE_SCHEDULE.find(function(d){ return d.key===f.key; });
                if(def) f.cat = def.cat;
              }
              if(!f.cat) f.cat = 'custom';
            });
          }
          G.cfg.feeSchedule = saved;
          return;
        }
        if(k==='_extraFees')       { G.cfg.extraFees        = show.fee_config[k]||[]; return; }
        if(k==='_assocFees')       { G.cfg.assocFees        = show.fee_config[k]||[]; return; }
        if(k==='_classPkgs')       { G.cfg.classPkgs        = show.fee_config[k]||[]; return; }
        if(k==='_practiceSessions'){ G.cfg.practiceSessions = show.fee_config[k]||[]; return; }
        if(k==='_clinicOptions')   { G.cfg.clinicOptions    = show.fee_config[k]||[]; return; }
        if(k==='_stallingPackages'){ G.cfg.stallingPackages = show.fee_config[k]||[]; return; }
        if(k==='_rvPackages')       { G.cfg.rvPackages       = show.fee_config[k]||[]; return; }
        if(k==='_selectedOrgs')     { G.cfg.selectedOrgs     = show.fee_config[k]||[]; return; }
        if(show.fee_config[k]!==null&&show.fee_config[k]!==undefined) G.cfg.fees[k]=show.fee_config[k];
      });
    }



    // Update sidebar

    document.getElementById('show-pill').innerHTML =

      '<div class="sp-name">'+esc(show.name)+'</div>'

      +'<div class="sp-meta">'+(show.show_date||'')+(show.location?' &middot; '+show.location:'')+'</div>';



    // Step 2: Load show classes

    var dbClasses = await sbFetch('show_classes?show_id=eq.'+showId+'&order=class_number&select=*');

    if(dbClasses && dbClasses.length){

      G.cfg.classes = dbClasses.map(function(c,i){

        return { _id:'db'+i, num:c.class_number, name:c.class_name,

          division:c.division, org:c.org, isCow:c.is_cow,

          baseFee:c.base_fee, cowFee:c.cow_fee,

          jackpot:c.jackpot_fee, addedMoney:c.added_money };

      });

    }



    // Step 3: Try localStorage first (fastest, most reliable)

    G.entries = [];

    G.payments = {};

    G.backNums = {};

    try{

      var cached = localStorage.getItem('gp_entries_'+showId);

      if(cached){

        G.entries = JSON.parse(cached);

        var cachedPay = localStorage.getItem('gp_payments_'+showId);

        var cachedBN  = localStorage.getItem('gp_backnums_'+showId);

        if(cachedPay) G.payments = JSON.parse(cachedPay);

        if(cachedBN)  G.backNums = JSON.parse(cachedBN);

        var cachedCO=localStorage.getItem('gp_classorder_'+showId);

        var cachedSc=localStorage.getItem('gp_scratches_'+showId);

        var cachedFS=localStorage.getItem('gp_fullscratches_'+showId);

        if(cachedCO) G.classOrder=JSON.parse(cachedCO);

        if(cachedSc) G.scratches=JSON.parse(cachedSc);

        if(cachedFS) G.fullScratches=JSON.parse(cachedFS);

        var cachedBG=localStorage.getItem('gp_billinggroups_'+showId);
        var cachedHA=localStorage.getItem('gp_horsealiases_'+showId);
        var cachedHD=localStorage.getItem('gp_horsedistinct_'+showId);
        var cachedPH=localStorage.getItem('gp_payhistory_'+showId);
        if(cachedBG) G.billingGroups=JSON.parse(cachedBG);
        if(cachedHA) G.horseAliases=JSON.parse(cachedHA);
        if(cachedHD) G.horseDistinct=JSON.parse(cachedHD);
        if(cachedPH) G.paymentHistory=JSON.parse(cachedPH);

        toast('Loaded '+G.entries.length+' entries from cache');

      }

    } catch(ex){ console.warn('Cache load failed:', ex); }



    try{

      var cachedRes=localStorage.getItem('gp_results_'+showId);

      if(cachedRes){ G.results=JSON.parse(cachedRes); G.results.forEach(function(r,i){ if(r._idx===undefined) r._idx=i; }); G.resultsFile=localStorage.getItem('gp_resultsfile_'+showId)||''; }

      var cachedLinks=localStorage.getItem('gp_scorelinks_'+showId);

      if(cachedLinks) G.scoreLinks=JSON.parse(cachedLinks);

      var cachedAA=localStorage.getItem('gp_aamoney_'+showId);

      if(cachedAA) G.aaMoney=JSON.parse(cachedAA);

      var cachedScratch=localStorage.getItem('gp_scratch_'+showId);

      if(cachedScratch) G.scratchpad=JSON.parse(cachedScratch);

    } catch(ex){ console.warn('Results cache load failed:', ex); }



    // Step 3b: Only load from DB if cache was empty

    if(G.entries.length){

      console.log('Using cached entries:', G.entries.length);

    }

    var dbEntries = G.entries.length ? [] : await sbFetch('entries?show_id=eq.'+showId+'&select=*');

    if(dbEntries && dbEntries.length){

      for(var i=0; i<dbEntries.length; i++){

        var e = dbEntries[i];



        // Load member

        var memberRows = e.member_id

          ? await sbFetch('members?id=eq.'+e.member_id+'&select=id,first_name,last_name,email,phone')

          : [];

        var member = memberRows && memberRows[0] ? memberRows[0] : {};



        // Load horse

        var horseRows = e.horse_id

          ? await sbFetch('horses?id=eq.'+e.horse_id+'&select=id,registered_name,barn_name,gender')

          : [];

        var horse = horseRows && horseRows[0] ? horseRows[0] : {};



        // Load entry classes

        var ecRows = await sbFetch('entry_classes?entry_id=eq.'+e.id

          +'&select=id,status,show_class_id,fee_charged,show_classes(class_number,class_name,division,org)');

        var entryClasses = (ecRows||[]).filter(function(ec){ return ec.status !== 'scratched'; }).map(function(ec){

          var sc = ec.show_classes || {};

          return { num:sc.class_number||'', name:sc.class_name||'',

            division:sc.division||'', org:sc.org||'CoWN', ecId:ec.id };

        });



        // Load payments

        var payRows = await sbFetch('payments?entry_id=eq.'+e.id+'&select=amount');

        var paid = (payRows||[]).reduce(function(s,p){ return s+(parseFloat(p.amount)||0); },0);



        G.payments[i] = paid;

        G.backNums[i] = e.back_number || '';



        // Derive division from first class

        var derivedDiv = entryClasses.length ? (entryClasses[0].division||'') : '';



        // Skip if already loaded from cache

        if(G.entries.find(function(x){ return x.dbId===e.id; })) continue;



        G.entries.push({

          rowIndex: G.entries.length, dbId: e.id,

          name:     (member.first_name||'Unknown')+' '+(member.last_name||''),

          horse:    horse.registered_name || horse.barn_name || 'Unknown Horse',

          horseGender: horse.gender || '',

          email:    member.email || '',

          phone:    member.phone || '',

          memberNum:'',

          division: derivedDiv,

          assocRaw: '',

          classes:  entryClasses,

          stall1qty: e.stall_1night||0, stall2qty:e.stall_2night||0, stall3qty:e.stall_3night||0,

          shavings:  e.shavings||0,

          rv1qty:    e.rv_1night||0, rv2qty:e.rv_2night||0, rvCircuit:e.rv_circuit||0,

          stallNote: e.stall_note||'',

          needsMembership: e.needs_membership||'',

          cognitoAmount: parseFloat(e.total_owed)||0,

          isPaid: paid >= (parseFloat(e.total_owed)||0),

        });

      }

      toast('Loaded '+G.entries.length+' entries');

      loadBillingDataFromSupabase(showId);

    }







    // Only show entries if we have valid ones with names

    var validEntries = G.entries.filter(function(e){ return e.name && e.name !== 'Unknown Unknown'; });

    if(validEntries.length !== G.entries.length){

      console.warn('Some entries have missing data - filtering', G.entries.length - validEntries.length, 'bad entries');

      G.entries = validEntries;

      // Re-index rowIndex

      G.entries.forEach(function(e, i){ e.rowIndex = i; });

    }

    var isNewShow = G.cfg.showStatus==='setup' && !G.cfg.classes.length;
    if(isNewShow){ openWizard(); } else { showPage(G.entries.length ? 'entries' : 'setup'); }



  } catch(err){

    console.error('Boot error:', err);

    document.getElementById('show-pill').innerHTML =

      '<div class="sp-name" style="color:var(--red)">Error loading show</div>'

      +'<div class="sp-meta">'+esc(err.message)+'</div>';

    // Still show the app — just without data

    showPage('setup');

  }

}



// Patch saveConfig to also save classes to Supabase

var _origSaveConfig = saveConfig;

saveConfig = function(){

  _origSaveConfig();

  if(G.showId && G.cfg.classes.length){

    dbSaveShowClasses(G.showId, G.cfg.classes)

      .then(function(){ toast('Classes saved to database'); })

      .catch(function(e){ toast('Error saving classes: '+e.message, true); });

  }

};



boot();

function openWizard(){
  showPage('wizard');
}

function closeWizard(){
  showPage('setup');
}


// ── Theme toggle ──
function applyTheme(theme){
  document.documentElement.setAttribute('data-theme', theme);
  var btn = document.getElementById('theme-toggle');
  if(btn) btn.innerHTML = theme==='light' ? '&#9790;' : '&#9788;';
  try{ localStorage.setItem('gatepost_theme', theme); } catch(e){}
}
function toggleTheme(){
  applyTheme(document.documentElement.getAttribute('data-theme')==='light' ? 'dark' : 'light');
}
(function(){
  var saved=''; try{ saved=localStorage.getItem('gatepost_theme')||''; }catch(e){}
  applyTheme(saved==='light'?'light':'dark');
})();



</script>
