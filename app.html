<style>
:root{
  --bg:#0f1923;--card:#1a2733;--card2:#1e2f3d;--accent:#D4A04A;--accent2:#b8863a;
  --green:#27ae60;--red:#e74c3c;--blue:#2980b9;--purple:#8e44ad;
  --text:#e8dcc8;--muted:#8a9aad;--border:#2a3a4a;--border2:#354a5e
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Source Sans 3',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-logo{padding:1.25rem 1rem 1rem;border-bottom:1px solid var(--border)}
.sidebar-logo h1{font-family:'Oswald',sans-serif;font-size:1.4rem;font-weight:700;color:var(--accent);letter-spacing:.05em}
.sidebar-logo span{display:block;font-size:.7rem;color:var(--muted);letter-spacing:.1em;margin-top:2px}
.show-pill{margin:.75rem;background:var(--card2);border:1px solid var(--border2);border-radius:8px;padding:.6rem .75rem;font-size:.78rem}
.show-pill .sp-name{font-family:'Oswald',sans-serif;color:var(--accent);font-size:.9rem}
.show-pill .sp-meta{color:var(--muted);margin-top:2px}
.nav{flex:1;padding:.5rem 0;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:.6rem;padding:.55rem 1rem;cursor:pointer;color:var(--muted);font-size:.85rem;border-left:3px solid transparent;transition:all .15s}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,.04)}
.nav-item.active{color:var(--accent);border-left-color:var(--accent);background:rgba(212,160,74,.08)}
.nav-item .ico{width:16px;text-align:center;font-size:13px;flex-shrink:0}
.nav-section{padding:.75rem 1rem .25rem;font-size:.65rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.sidebar-footer{padding:.75rem;border-top:1px solid var(--border);font-size:.72rem;color:var(--muted)}
.content{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:.6rem 1.25rem;display:flex;align-items:center;gap:1rem;flex-shrink:0}
.topbar-title{font-family:'Oswald',sans-serif;font-size:1.1rem;color:var(--accent)}
.topbar-right{margin-left:auto;display:flex;gap:.5rem;align-items:center}
.page{padding:1.25rem;flex:1}
/* cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1.1rem 1.25rem;margin-bottom:1rem}
.card-title{font-family:'Oswald',sans-serif;color:var(--accent);font-size:1.05rem;margin-bottom:.85rem;display:flex;align-items:center;justify-content:space-between;gap:.5rem}
.card-title small{font-size:.73rem;color:var(--muted);font-family:'Source Sans 3',sans-serif;font-weight:400}
/* stats */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:.75rem;margin-bottom:1rem}
.stat{background:var(--card2);border:1px solid var(--border2);border-radius:8px;padding:.75rem;text-align:center}
.stat .n{font-family:'Oswald',sans-serif;font-size:1.9rem;font-weight:700}
.stat .l{font-size:.72rem;color:var(--muted);margin-top:2px}
.c-gold .n{color:var(--accent)}.c-green .n{color:var(--green)}.c-blue .n{color:var(--blue)}.c-red .n{color:var(--red)}.c-purple .n{color:var(--purple)}
/* table */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.83rem}
th{text-align:left;padding:.45rem .6rem;border-bottom:2px solid var(--accent);color:var(--accent);font-family:'Oswald',sans-serif;white-space:nowrap}
td{padding:.45rem .6rem;border-bottom:1px solid var(--border);vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.025)}
.ctr{text-align:center}
.bold{font-weight:600}
.small{font-size:.75rem;color:var(--muted)}
/* badges */
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.68rem;font-weight:600;white-space:nowrap}
.b-gold{background:rgba(212,160,74,.15);color:var(--accent)}
.b-green{background:rgba(39,174,96,.15);color:#2ecc71}
.b-red{background:rgba(231,76,60,.15);color:#e74c3c}
.b-blue{background:rgba(41,128,185,.15);color:#5dade2}
.b-purple{background:rgba(142,68,173,.15);color:#a569bd}
.b-gray{background:rgba(138,154,173,.1);color:var(--muted)}
.b-cow{background:rgba(184,134,58,.2);color:#d4943a;border:1px solid rgba(184,134,58,.3)}
/* buttons */
.btn{display:inline-flex;align-items:center;gap:.35rem;padding:.4rem .85rem;border:none;border-radius:6px;cursor:pointer;font-size:.8rem;font-weight:600;font-family:'Source Sans 3',sans-serif;transition:all .15s;white-space:nowrap}
.btn-accent{background:var(--accent);color:#1a1a1a}.btn-accent:hover{background:var(--accent2)}
.btn-dark{background:var(--card2);color:var(--text);border:1px solid var(--border2)}.btn-dark:hover{border-color:var(--accent);color:var(--accent)}
.btn-green{background:var(--green);color:#fff}
.btn-red{background:rgba(231,76,60,.12);color:var(--red);border:1px solid rgba(231,76,60,.25)}
.btn-sm{padding:.25rem .55rem;font-size:.75rem}
.btn:disabled{opacity:.4;cursor:default}
.btn-row{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center;margin-bottom:.75rem}
/* search/filters */
.search-wrap{position:relative;margin-bottom:.75rem}
.search-ico{position:absolute;left:.7rem;top:50%;transform:translateY(-50%);color:var(--muted)}
.search-box{width:100%;padding:.55rem .6rem .55rem 2.1rem;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-size:.85rem}
.search-box:focus{outline:none;border-color:var(--accent)}
.pills{display:flex;gap:.35rem;flex-wrap:wrap;margin-bottom:.75rem}
.pill{background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:.2rem .65rem;font-size:.75rem;cursor:pointer;color:var(--muted);transition:all .15s}
.pill:hover{color:var(--text)}.pill.active{border-color:var(--accent);color:var(--accent);background:rgba(212,160,74,.1)}
/* drop zone */
.drop-zone{border:2px dashed var(--border2);border-radius:10px;padding:2.5rem;text-align:center;cursor:pointer;transition:all .2s;background:var(--card2)}
.drop-zone:hover,.drop-zone.drag{border-color:var(--accent);background:rgba(212,160,74,.04)}
.drop-zone .dz-ico{font-size:2rem;margin-bottom:.6rem;color:var(--muted)}
.drop-zone h3{font-family:'Oswald',sans-serif;color:var(--accent);font-size:1.1rem;margin-bottom:.3rem}
.drop-zone p{color:var(--muted);font-size:.82rem}
/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal{background:var(--card);border:1px solid var(--border2);border-radius:12px;padding:1.5rem;max-width:640px;width:100%;max-height:90vh;overflow-y:auto}
.modal h2{font-family:'Oswald',sans-serif;color:var(--accent);font-size:1.3rem;margin-bottom:1rem}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem .75rem;font-size:.85rem;margin-bottom:1rem}
.modal-grid .lbl{color:var(--muted);font-size:.73rem}
.modal-grid .val{font-weight:600;margin-top:1px}
/* tab row in modal */
.tab-row{display:flex;gap:.2rem;border-bottom:1px solid var(--border);margin-bottom:1rem}
.tab-btn{background:none;border:none;color:var(--muted);padding:.5rem .85rem;cursor:pointer;font-size:.82rem;font-family:'Oswald',sans-serif;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab-btn:hover{color:var(--text)}.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-panel{display:none}.tab-panel.active{display:block}
/* payment */
.tab-line{display:flex;justify-content:space-between;align-items:center;padding:.4rem 0;border-bottom:1px solid var(--border);font-size:.85rem}
.tab-line:last-child{border:none}
.tab-total{display:flex;justify-content:space-between;padding:.75rem 0 .25rem;font-weight:600;font-size:1rem;border-top:2px solid var(--border2);margin-top:.5rem}
.pay-status{display:flex;align-items:center;gap:.75rem;padding:.75rem;background:var(--card2);border-radius:8px;margin-top:.75rem}
/* settings */
.stab-row{display:flex;align-items:center;gap:.2rem;border-bottom:1px solid var(--border);margin-bottom:1.25rem;flex-wrap:wrap}
.stab{background:none;border:none;color:var(--muted);padding:.5rem .9rem;cursor:pointer;font-size:.82rem;font-family:'Oswald',sans-serif;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.stab:hover{color:var(--text)}.stab.active{color:var(--accent);border-bottom-color:var(--accent)}
.stab-group-label{font-size:.62rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;padding:0 .5rem 0 .25rem;white-space:nowrap;align-self:center;margin-bottom:-1px}
.stab-group-sep{margin-left:.5rem;padding-left:.75rem;border-left:1px solid var(--border)}
.ssec{display:none}.ssec.active{display:block}
.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:.75rem;margin-bottom:.75rem}
.form-group{display:flex;flex-direction:column;gap:.3rem}
.form-group label{font-size:.74rem;color:var(--muted)}
.form-group input,.form-group select{background:var(--bg);border:1px solid var(--border2);border-radius:6px;color:var(--text);padding:.42rem .65rem;font-size:.84rem;font-family:'Source Sans 3',sans-serif;transition:border-color .15s}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--accent)}
.form-group select option{background:var(--card)}
.pfx{position:relative}.pfx span{position:absolute;left:.55rem;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.82rem;pointer-events:none}.pfx input{padding-left:1.3rem;max-width:120px}
.tip{font-size:.71rem;color:var(--muted);margin-top:.2rem}
/* fee strip */
.fee-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:.5rem;margin:.75rem 0 .25rem}
.fee-chip{background:var(--card2);border:1px solid var(--border2);border-radius:6px;padding:.5rem .75rem}
.fee-chip .fc-l{font-size:.7rem;color:var(--muted)}
.fee-chip .fc-v{font-family:'Oswald',sans-serif;color:var(--accent);font-size:1rem;margin-top:1px}
/* class config table */
.cfg-tbl{width:100%;border-collapse:collapse;font-size:.81rem}
.cfg-tbl th{text-align:left;padding:.4rem .5rem;border-bottom:2px solid var(--accent);color:var(--accent);font-family:'Oswald',sans-serif;font-size:.78rem;white-space:nowrap}
.cfg-tbl td{padding:.28rem .4rem;border-bottom:1px solid var(--border);vertical-align:middle}
.cfg-tbl tr:hover td{background:rgba(255,255,255,.02)}
.cfg-tbl input[type=text],.cfg-tbl input[type=number]{background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:.28rem .45rem;font-size:.8rem;width:100%;transition:border-color .15s}
.cfg-tbl input:focus{outline:none;border-color:var(--accent)}
.cfg-tbl input[type=checkbox]{width:15px;height:15px;accent-color:var(--accent);cursor:pointer}
.cfg-tbl .div-hdr td{background:rgba(212,160,74,.07);font-family:'Oswald',sans-serif;color:var(--muted);font-size:.78rem;letter-spacing:.04em;padding:.32rem .5rem}
/* mapper */
.map-row{background:var(--card2);border:1px solid var(--border2);border-radius:6px;padding:.6rem .75rem;margin-bottom:.4rem}
.map-row label{font-size:.74rem;color:var(--muted);display:block;margin-bottom:.3rem}
.map-row select{background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:.3rem .5rem;font-size:.78rem;width:100%}
/* toast */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--green);color:#fff;padding:.6rem 1.1rem;border-radius:8px;font-size:.85rem;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.empty-state{color:var(--muted);text-align:center;padding:2.5rem;font-size:.9rem}
.hidden{display:none!important}
/* selector rows in results (org/div/class) — scroll on mobile */
.sel-row{display:flex;flex-wrap:wrap;gap:.35rem;margin-bottom:.85rem}
@media(max-width:768px){
  .sel-row{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}
  .sel-row .btn{white-space:nowrap;flex-shrink:0}
  /* results card header: stack search below title on phone */
  .res-card-head{flex-direction:column;align-items:flex-start;gap:.5rem}
  .res-card-head .res-search-row{width:100%}
  .res-card-head .res-search-row input{width:100%!important}
}
/* entry card (mobile) */
.entry-card{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:.75rem;margin-bottom:.5rem;cursor:pointer;transition:border-color .15s}
.entry-card:active{border-color:var(--accent)}
/* assoc tag */
.assoc-tag{display:inline-block;padding:1px 7px;border-radius:4px;font-size:.68rem;font-weight:600;margin:1px}
.at-cown{background:rgba(212,160,74,.15);color:var(--accent)}
.at-aqha{background:rgba(41,128,185,.15);color:#5dade2}
.at-apha{background:rgba(142,68,173,.15);color:#a569bd}
.at-other{background:rgba(138,154,173,.1);color:var(--muted)}
/* ── MOBILE NAV OVERLAY ── */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:150}
.sidebar-overlay.open{display:block}
.hamburger{display:none;background:none;border:none;color:var(--text);font-size:1.35rem;cursor:pointer;padding:.3rem .4rem;line-height:1;margin-right:.25rem}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  /* Layout: stack sidebar as overlay instead of side-by-side */
  .shell{flex-direction:column;height:auto;min-height:100vh;overflow:visible}
  .sidebar{
    position:fixed;top:0;left:0;bottom:0;z-index:160;
    width:260px;transform:translateX(-100%);transition:transform .22s ease;
  }
  .sidebar.open{transform:translateX(0)}
  .content{flex:1;overflow-y:visible}
  .topbar{position:sticky;top:0;z-index:100}
  .page{padding:.85rem;padding-bottom:5rem}
  .hamburger{display:block}

  /* Cards */
  .card{padding:.85rem 1rem}
  .card-title{font-size:.97rem}

  /* Stat grid: 2 columns on phone */
  .stat-grid{grid-template-columns:1fr 1fr}
  .stat .n{font-size:1.5rem}

  /* Tables: horizontal scroll, larger tap rows */
  td,th{padding:.5rem .5rem}
  .tbl-wrap{-webkit-overflow-scrolling:touch}

  /* Buttons: bigger tap targets */
  .btn{padding:.5rem 1rem;font-size:.85rem}
  .btn-sm{padding:.38rem .65rem;font-size:.8rem}

  /* Form rows: single column */
  .form-row{grid-template-columns:1fr}

  /* Settings tabs: horizontal scroll, no wrap */
  .stab-row{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px}
  .stab-row::-webkit-scrollbar{height:3px}
  .stab-row::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
  .stab{white-space:nowrap;padding:.5rem .75rem}
  .stab-group-label{white-space:nowrap}

  /* Pills: scroll horizontally */
  .pills{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}
  .pill{white-space:nowrap;padding:.3rem .85rem;font-size:.8rem}

  /* Modals: full width */
  .modal{max-width:100%;border-radius:0;min-height:50vh}
  .modal-bg{padding:0;align-items:flex-end}

  /* Drop zones: smaller on mobile (file drop doesn't work on iOS anyway) */
  .drop-zone{padding:1.5rem 1rem}
  .drop-zone h3{font-size:.95rem}

  /* Fee strip: 2 columns */
  .fee-strip{grid-template-columns:1fr 1fr}

  /* Topbar: tighter */
  .topbar{padding:.5rem .85rem}
  .topbar-title{font-size:1rem}

  /* Toast: full-width bottom */
  .toast{left:.75rem;right:.75rem;text-align:center;bottom:1rem}

  /* Show pill in sidebar: slightly larger text */
  .show-pill .sp-name{font-size:1rem}

  /* Cfg table: allow scroll */
  .cfg-tbl{font-size:.8rem}

  /* Hide sidebar footer on mobile (space) */
  .sidebar-footer{display:none}
}

@media(max-width:480px){
  .stat-grid{grid-template-columns:1fr 1fr}
  .page{padding:.65rem;padding-bottom:5rem}
  .card{padding:.75rem .85rem}
  .modal-grid{grid-template-columns:1fr}
}

/* go sheet styles */
.go-sheet-row{display:flex;align-items:center;gap:.3rem;padding:.3rem .4rem;border-bottom:1px solid var(--border);transition:background .1s}
.go-sheet-row:last-child{border-bottom:none}
.go-sheet-row.dragging{opacity:.4}
.go-sheet-row.drag-over{border-top:2px solid var(--accent)}
.go-sheet-row.scratched{opacity:.45}
.go-sheet-row.scratched .gs-name{text-decoration:line-through;color:var(--muted)}
.go-sheet-row.full-scratched{opacity:.3}
.go-sheet-row.full-scratched .gs-name{text-decoration:line-through;color:var(--red)}
.drag-handle{cursor:grab;color:var(--muted);font-size:.9rem;padding:.1rem .25rem;flex-shrink:0;touch-action:none}
.drag-handle:active{cursor:grabbing}
.gs-backnum{width:44px;text-align:center;font-weight:700;color:var(--accent);flex-shrink:0;font-size:.9rem}
.gs-name{flex:1;font-size:.85rem;min-width:0}
.gs-horse{flex:1;font-size:.8rem;color:var(--muted);min-width:0}
.gs-membernum{width:70px;font-size:.75rem;color:var(--muted);flex-shrink:0}
.gs-actions{display:flex;gap:.2rem;flex-shrink:0}

@media print{
  .sidebar,.topbar,.btn-row,.pills,.search-wrap,.no-print{display:none!important}
  .content{overflow:visible}.page{padding:0}
  body{background:#fff;color:#000}
  .card{border:1px solid #ccc;background:#fff}
  th{background:#f0f0f0;color:#000}td{border-bottom:1px solid #ddd}
  /* class sheet print: one per page */
  .go-sheet-page{page-break-after:always;break-after:page;padding:1.5rem;border:none}
  .go-sheet-page:last-child{page-break-after:avoid;break-after:avoid}
  .go-sheet-row.scratched,.go-sheet-row.full-scratched{display:none}
  .gs-actions,.drag-handle,.no-print{display:none!important}
  .go-sheet-print-cols th,.go-sheet-print-cols td{border:1px solid #ccc}
}
</style>

<script>

// ═══════════════════════ GLOBAL STATE ═══════════════════════
// aaRequired normalizer: upgrades flat string arrays to array-of-arrays (OR groups)
function normalizeAaReq(req){
  if(!req||!req.length) return [];
  if(typeof req[0]==='string') return req.map(function(d){ return [d]; });
  return req;
}

var G = {
  entries: [],
  showName: '',
  payments: {},      // rowIndex -> amount paid

// Detect columns that hold class entry text (e.g. "91-Cow, 92-Reining")
function isClassCol(h){ return /classes and class|class.*#|division.*class/i.test(String(h||'')); }
function isCowCountCol(h){ return /cows?\s*$/i.test(String(h||'').trim()); }

function extractDivName(h){
  return String(h||'')
    .replace(/COWN\s*/ig,'').replace(/CoWN\s*/ig,'')
    .replace(/Classes and Class #s/ig,'').replace(/Classes and Class Numbers/ig,'')
    .replace(/Collegiate\s*/ig,'Collegiate ')
    .replace(/\s+/g,' ').replace(/\xa0/g,' ').trim();
}

function detectOrg(h){
  var s = String(h||'').toLowerCase();
  if(/vrh|versatility/.test(s)) return 'VRH';
  if(/rhc|ranch\s*heritage/.test(s)) return 'AQHA RHC';
  if(/aqha\s*ranch|ranch\s*riding|ranch\s*trail|working\s*western/.test(s)) return 'AQHA Ranch';
  if(/aqha/.test(s)) return 'AQHA Ranch'; // generic AQHA → AQHA Ranch
  if(/apha/.test(s)) return 'APHA';
  if(/nhsra|whsr|high\s*school/.test(s)) return 'WHSR';
  if(/cown|cow\s*n/i.test(s)) return 'CoWN';
  if(/jackpot/.test(s)) return 'Jackpot';
  return 'CoWN'; // default to CoWN (most common at these shows)
}

function assocTags(raw){
  var s = String(raw||'');
  var out = '';
  if(/cown/i.test(s)) out += '<span class="assoc-tag at-cown">CoWN</span>';
  if(/aqha/i.test(s)) out += '<span class="assoc-tag at-aqha">AQHA</span>';
  if(/apha/i.test(s)) out += '<span class="assoc-tag at-apha">APHA</span>';
  if(!out && s.trim()) out = '<span class="assoc-tag at-other">'+esc(s.substring(0,20))+'</span>';
  return out || '<span class="badge b-gray">—</span>';
}

function parseCognito(wb){
  var ws = wb.Sheets[wb.SheetNames[0]];
  var raw = XLSX.utils.sheet_to_json(ws,{header:1,defval:null,cellDates:true});
  var headers = raw[0];
  // Sanity-check: Cognito exports have "Entry #" or "Rider" in early columns
  // SHTX/Funnware files have "Show", "ClassDivision" etc — reject them here
  var headerStr = (headers||[]).slice(0,10).map(function(h){ return String(h||'').toLowerCase(); }).join('|');
  if(headerStr.indexOf('classdivision')>-1 || headerStr.indexOf('placecode')>-1){
    throw new Error('This looks like a Funnware/SHTX results file, not a Cognito entry form export. Use the Results tab to import it.');
  }
  var rows = raw.slice(1).filter(function(r){ return r[4]; });

  // Build column role map from headers
  var classCols = []; // {colIdx, divName, org, isCowCount}
  headers.forEach(function(h,i){
    if(!h) return;
    if(isClassCol(String(h))){ classCols.push({i:i, div:extractDivName(String(h)), org:detectOrg(String(h)), isCow:false}); }
    else if(isCowCountCol(String(h))){ classCols.push({i:i, div:extractDivName(String(h)), org:detectOrg(String(h)), isCow:true}); }
  });

  return rows.map(function(r,idx){
    var orderStr = String(r[3]||'');
    var amtM = orderStr.match(/\$([\d,]+\.?\d*)/);
    var amount = amtM ? parseFloat(amtM[1].replace(/,/g,'')) : 0;
    var isPaid = orderStr.toLowerCase().indexOf('unpaid') === -1;

    var classes = [];
    classCols.forEach(function(cc){
      if(cc.isCow) return; // skip count cols for class list
      var val = r[cc.i];
      if(!val || !String(val).trim()) return;
      String(val).split(',').forEach(function(cls){
        cls = cls.replace(/\xa0/g,' ').trim();
        if(!cls) return;
        var m = cls.match(/^(\d+)[\s\-–]+(.+)$/);
        classes.push({
          num: m ? m[1].trim() : '',
          name: m ? m[2].trim() : cls,
          division: cc.div,
          org: cc.org,
          raw: cls
        });
      });
    });

    // Parse associations shown
    var assocRaw = String(r[13]||'');

    // Stalling: col55=qty 1-night, col57=qty 2-night, col59=shavings bags
    // RV: col62=qty 1-night, col64=qty 2-night, col66=circuit qty
    var stall1qty = (typeof r[55]==='number' && r[55]>0) ? r[55] : 0;
    var stall2qty = (typeof r[57]==='number' && r[57]>0) ? r[57] : 0;
    var shavings  = (typeof r[59]==='number' && r[59]>0) ? r[59] : 0;
    var rv1qty    = (typeof r[62]==='number' && r[62]>0) ? r[62] : 0;
    var rv2qty    = (typeof r[64]==='number' && r[64]>0) ? r[64] : 0;
    var rvCircuit = (typeof r[66]==='number' && r[66]>0) ? r[66] : 0;
    var stallNote = r[53] ? String(r[53]) : '';

    return {
      rowIndex:idx, entryNum:r[0], submitted:r[2],
      name:String(r[4]||'').trim(),
      address:String(r[5]||'').trim(),
      phone:String(r[6]||'').trim(),
      email:String(r[7]||'').trim(),
      dob:r[8],
      horse:String(r[9]||'').trim(),
      horseGender:String(r[10]||'').trim(),
      horseOwner:String(r[11]||'').trim(),
      horseDob:r[12],
      assocRaw:assocRaw,
      hasMembership:String(r[14]||'').trim(),
      memberNum:String(r[15]||'').replace(/\xa0/g,'').trim(),
      needsMembership:String(r[16]||'').trim(),
      division:String(r[17]||'').trim(),
      classes:classes,
      stall1qty:stall1qty, stall2qty:stall2qty, shavings:shavings,
      rv1qty:rv1qty, rv2qty:rv2qty, rvCircuit:rvCircuit, stallNote:stallNote,
      cognitoAmount:amount, isPaid:isPaid, orderStr:orderStr
    };
  });
}

function normalizeHeader(h){ return (h||'').toLowerCase().replace(/[^a-z0-9]/g,''); }

// Convert ALL CAPS string to Title Case: "SS ROLL OF THE DICE" → "Ss Roll Of The Dice"
// Preserves mixed-case strings that are already clean
function toTitleCase(s){
  if(!s) return s;
  // Only convert if ALL CAPS (all letters are uppercase)
  var letters = s.replace(/[^a-zA-Z]/g,'');
  if(letters && letters === letters.toUpperCase()){
    return s.replace(/\w\S*/g, function(w){ return w.charAt(0).toUpperCase()+w.slice(1).toLowerCase(); });
  }
  return s;
}

// Normalize a person name from any SHTX format:
//   "HALL,KELLY" → "Kelly Hall"  (Last,First flip)
//   "TRACY S DILL" → "Tracy Dill"  (ALL CAPS + middle initial removal)
function normalizePersonName(s){
  if(!s) return s;
  s = s.trim();
  // "LAST,FIRST" or "LAST, FIRST" → "FIRST LAST"
  var commaM = s.match(/^([^,]+),\s*(.+)$/);
  if(commaM) s = commaM[2].trim() + ' ' + commaM[1].trim();
  s = toTitleCase(s);
  // Remove middle initial: "Tracy S Dill" → "Tracy Dill"
  s = s.replace(/^(\S+)\s+[A-Z]\.?\s+(\S.*)$/, '$1 $2').trim();
  return s;
}

// ── AQHA points calculator ────────────────────────────────────
// AQHA scale: tier = floor(entries/5); 1st=tier, 2nd=tier-1 … down to 1pt, next=0.5pt
// Fewer than 5 entries = no points awarded
function calcAqhaPoints(rows, entries){
  if(!entries||entries<1) entries=rows.length;
  var tier=Math.floor(entries/5);
  rows.forEach(function(r,i){
    if(r.isDQ||!r.place){ rows[i]._pts=0; return; }
    var p=r.place;
    if(tier<1){ rows[i]._pts=0; return; }
    if(p<=tier) rows[i]._pts=tier-p+1;
    else if(p===tier+1) rows[i]._pts=0.5;
    else rows[i]._pts=0;
  });
  return rows;
}

// ── CoWN points calculator ────────────────────────────────────
// entries = total horses in the class
// rows = [{place, score, isDQ}, ...] for the class
// Returns array of {place, pts} in same order as input rows
function calcCownPoints(rows, entries){
  if(!entries||entries<1) entries=rows.length;
  // Group by place to find ties
  var byPlace={};
  rows.forEach(function(r,i){
    if(r.isDQ||!r.place){ rows[i]._pts=0; return; }
    if(!byPlace[r.place]) byPlace[r.place]=[];
    byPlace[r.place].push(i);
  });
  Object.keys(byPlace).forEach(function(pl){
    var idxs=byPlace[pl];
    pl=parseInt(pl);
    // Sum points for all tied positions
    var sum=0;
    for(var k=0;k<idxs.length;k++){
      var pos=pl+k;  // consecutive places occupied
      var pts=Math.max(0, entries-pos+1);
      sum+=pts;
    }
    var avg=sum/idxs.length;
    idxs.forEach(function(i){ rows[i]._pts=avg; });
  });
  return rows;
}

// Recalculate placings from scores (higher score = better place)
// Returns rows sorted and stamped with _calcPlace
function calcPlacingsFromScores(rows){
  var scored=rows.filter(function(r){ return r.score&&!r.isDQ; });
  var dqd=rows.filter(function(r){ return r.isDQ||!r.score; });
  scored.sort(function(a,b){ return (b.score||0)-(a.score||0); });
  var rank=1;
  scored.forEach(function(r,i){
    if(i>0&&scored[i-1].score===r.score) r._calcPlace=scored[i-1]._calcPlace;
    else r._calcPlace=rank;
    rank=i+2;
  });
  dqd.forEach(function(r){ r._calcPlace=null; });
  return scored.concat(dqd);
}

// Parse Funnware ClassDivision compound string → {org, division, discipline}
// Handles three distinct export formats:
//   1. Standard: "Collegiate Ltd Non Pro Trail", "Non Pro All Around"
//   2. GJHSA space-padded: " PLEASURE  OPEN  " (discipline + 2+ spaces + division)
//   3. GJHSA concatenated: "PLEASUREOPEN", "WORKING COWOPEN" (discipline prefix directly joined)
function parseClassDivStr(raw){
  if(!raw||!raw.trim()) return {org:'CoWN',division:'Open',discipline:''};
  var s=raw.trim();

  // ── GJHSA all-caps format (formats 2 & 3) ──────────────────────────────
  // Detect by: string equals its own toUpperCase AND contains letters
  if(s === s.toUpperCase() && /[A-Z]/.test(s)){
    function gjNormDiv(d){
      // Normalize "JR." periods and extra spaces, then look up canonical name
      var clean=d.replace(/\bJR\.\s*/gi,'Jr ').replace(/\s+/g,' ').trim();
      var key=clean.toLowerCase();
      return SHTX_DIV[key]||(clean?clean.charAt(0).toUpperCase()+clean.slice(1).toLowerCase():'Open');
    }
    // Format 2: two or more spaces separate discipline from division
    var spM=s.match(/^(WORKING\s+COW|PLEASURE|REINING|TRAIL)\s{2,}(.+?)\s*$/);
    if(spM){
      var spDisc=spM[1]==='WORKING COW'?'Working Cow':spM[1].charAt(0)+spM[1].slice(1).toLowerCase();
      return {org:'CoWN', division:gjNormDiv(spM[2]), discipline:spDisc};
    }
    // Format 3: discipline prefix directly concatenated (or single space) with division
    var gjPfx=[['WORKING COW','Working Cow'],['PLEASURE','Pleasure'],['REINING','Reining'],['TRAIL','Trail']];
    for(var ci=0;ci<gjPfx.length;ci++){
      var pfx=gjPfx[ci][0];
      if(s.startsWith(pfx) && s.length>pfx.length){
        return {org:'CoWN', division:gjNormDiv(s.slice(pfx.length).trim()), discipline:gjPfx[ci][1]};
      }
    }
    // All-caps but no discipline prefix — fall through to standard parsing with s as-is
  }

  // ── Standard parsing ───────────────────────────────────────────────────
  // Normalize abbreviations and common misspellings before org detection
  var n=s
    .replace(/\bAmatuer\b/gi,'Amateur')
    .replace(/\bAmt\b/g,'Amateur')
    .replace(/\bJR\.\s*/g,'Jr ')
    .replace(/\s+/g,' ').trim();

  var org, rest, forcedDiv=null;

  if(/^VRH\b/i.test(s)){
    org='VRH'; rest=n.replace(/^VRH\s*/i,'').trim();
  } else if(/\bversatility\s+ranch\s+horse\b/i.test(s)){
    org='VRH'; rest=n.replace(/\bVersatility\s+Ranch\s+Horse\b/gi,'').replace(/\s+/g,' ').trim();
  } else if(/\bversatility\b/i.test(s)){
    org='VRH'; rest=n.replace(/\bVersatility\b/gi,'').replace(/\s+/g,' ').trim();
  } else if(/^AQHA\s+RHC\b/i.test(s)){
    org='AQHA RHC'; rest=n.replace(/^AQHA\s+RHC\s*/i,'').trim();
  } else if(/\branch\s+heritage\b/i.test(s)){
    org='AQHA RHC'; rest=n.replace(/\bAQHA\s+Ranch\s+Heritage\s+Challenge\b/gi,'')
                          .replace(/\bRanch\s+Heritage\b/gi,'').replace(/\s+/g,' ').trim();
  } else if(/^AQHA\s+Ranch\b/i.test(s)){
    // Must check "AQHA Ranch" before generic "AQHA" — otherwise "Ranch" stays in rest and breaks division lookup
    org='AQHA Ranch'; rest=n.replace(/^AQHA\s+Ranch\s*/i,'').trim();
  } else if(/^AQHA\b/i.test(s)){
    org='AQHA Ranch'; rest=n.replace(/^AQHA\s*/i,'').trim();
  } else if(/^apha/i.test(s)){
    org='APHA'; rest=n.replace(/^apha\s*/i,'').trim();
  } else if(/\bWHSR\b|wyoming\s+high\s+school|wyo\s+hs\b/i.test(s)){
    org='WHSR'; rest=n.replace(/\b(?:WHSR|Wyoming\s+High\s+School\s+Rodeo|Wyo\s+HS)\b/gi,'').replace(/\s+/g,' ').trim();
    forcedDiv='';
  } else if(/^collegiate\b/i.test(s)){
    // Collegiate divisions belong to CoWN — "Collegiate Non-Pro Trail"
    org='CoWN'; rest=n;  // leave "Collegiate Non-Pro" in rest for div lookup
  } else if(/^(?:level\s+1|l1)\b/i.test(s)){
    org='CoWN'; forcedDiv='L1 Novice';
    rest=n.replace(/^(?:level\s+1|l1)\s*(?:novice?)?\s*/i,'').trim();
  } else if(/jackpot/i.test(s)){
    org='Jackpot'; rest=n.replace(/\s*jackpot\s*/gi,' ').replace(/\s+/g,' ').trim();
  } else if(/\bopen\s+schooling\b/i.test(s)){
    // "Open Schooling Trail" — strip the whole "Open Schooling" phrase, keep discipline
    org='CoWN'; forcedDiv='Open Schooling';
    rest=n.replace(/\bopen\s+schooling\b/gi,'').replace(/\s+/g,' ').trim();
  } else if(/^schooling\b/i.test(s)){
    org='CoWN'; forcedDiv='Open Schooling';
    rest=n.replace(/^schooling\s*/i,'').trim();
  } else {
    org='CoWN'; rest=n;
  }

  // Extract discipline from end of rest string
  var disc='', divPart=rest;
  for(var i=0;i<SHTX_DISCS.length;i++){
    var m=rest.match(SHTX_DISCS[i][0]);
    if(m){ disc=SHTX_DISCS[i][1]; divPart=rest.slice(0,m.index).trim(); break; }
  }

  // Canonicalize division
  var div=forcedDiv!==null ? forcedDiv : (SHTX_DIV[divPart.toLowerCase()]||(divPart||'Open'));

  // ── Secondary org inference (when no explicit prefix was found) ─────────
  // Uses three signals in priority order:
  //   1. Discipline is unique to one non-CoWN org (Ranch Trail → AQHA Ranch)
  //   2. Division name belongs only to one org (Amateur → VRH/AQHA; Novice Amateur → APHA)
  //   3. "Ranch" keyword anywhere → AQHA Ranch (if discipline confirms it)
  if(org==='CoWN'){
    var cownDiscs=ORG_CLASSES.CoWN.disciplines; // ['Cow Work','Reining','Trail','Pleasure']

    // Signal 1: discipline not in CoWN → find the right org
    if(disc && cownDiscs.indexOf(disc)<0){
      // AQHA Ranch disciplines are all prefixed "Ranch..." or "Working Western Rail"
      if(ORG_CLASSES['AQHA Ranch'].disciplines.indexOf(disc)>=0){
        org='AQHA Ranch';
      } else if(disc==='Cutting'||disc==='Conformation'||disc==='VRH All Around'){
        org='VRH';
      } else if(disc==='Cow Horse'){
        org='APHA';
      } else {
        // Generic scan
        var orgKeys=Object.keys(ORG_CLASSES);
        for(var oi=0;oi<orgKeys.length;oi++){
          if(orgKeys[oi]==='CoWN'||orgKeys[oi]==='Jackpot') continue;
          if(ORG_CLASSES[orgKeys[oi]].disciplines.indexOf(disc)>=0){ org=orgKeys[oi]; break; }
        }
      }
    }

    // Signal 2: division name that doesn't exist in CoWN
    if(org==='CoWN'){
      var cownDivs=DIV_ORDER_BY_ORG.CoWN;
      if(cownDivs.indexOf(div)<0 && div){
        // "Amateur","LTD Am","Rookie Am","LTD Youth","Rookie Youth" → VRH or AQHA Ranch
        var vrhAqhaDivs=['Amateur','LTD Am','Rookie Am','LTD Youth','Rookie Youth'];
        if(vrhAqhaDivs.indexOf(div)>=0){
          // AQHA Ranch if discipline is a Ranch discipline, otherwise VRH
          org=ORG_CLASSES['AQHA Ranch'].disciplines.indexOf(disc)>=0 ? 'AQHA Ranch' : 'VRH';
        } else if(div==='Novice Amateur'||div==='Jr Horse'){
          org='APHA';
        }
      }
    }

    // Signal 3: "Ranch" as a standalone keyword in the raw string (not already handled)
    if(org==='CoWN' && /\branch\b/i.test(s) && disc && cownDiscs.indexOf(disc)<0){
      org='AQHA Ranch';
    }

    // If org changed, re-canonicalize division against the new org's known divisions
    if(org!=='CoWN'){
      var newDivList=DIV_ORDER_BY_ORG[org]||[];
      var remapped=SHTX_DIV[divPart.toLowerCase()];
      if(remapped && newDivList.indexOf(remapped)>=0) div=remapped;
      else if(newDivList.indexOf(div)<0 && newDivList.length) div=newDivList[0];
    }
  }

  return {org:org, division:div, discipline:disc||rest};
}

function parseSTHXRows(rawRows, headerOverride){
  if(!rawRows||!rawRows.length) return [];
  var headerMap={};
  // headerOverride: {normalizedRole → original header key} from saved resColMap
  if(headerOverride && Object.keys(headerOverride).length){
    Object.keys(headerOverride).forEach(function(role){ headerMap[role]=headerOverride[role]; });
  }
  // Auto-detection fills in anything not covered by the override
  Object.keys(rawRows[0]).forEach(function(k){
    var n=normalizeHeader(k);
    if(!headerMap[n]) headerMap[n]=k;
  });
  return rawRows.map(function(row){
    function col(n){ var k=headerMap[n]; var v=k!=null?row[k]:''; return (v===null||v===undefined)?'':String(v); }
    var parsed=parseClassDivStr(col('classdivision'));
    var discOverride=(col('classage')||'').trim();
    var horse=toTitleCase((col('horse')||'').trim());
    var rider=normalizePersonName((col('rider')||'').trim());
    var owner=normalizePersonName((col('owner')||'').trim());
    return {
      showName:   (col('show')||'').trim(),
      org:        parsed.org,
      division:   parsed.division,
      discipline: discOverride||parsed.discipline,
      rawClass:   (col('classdivision')||'').trim(),
      entries:    parseInt(col('entries'),10)||0,
      addedMoney: parseFloat(col('addedmoney'))||0,
      horse:      horse,
      rider:      rider,
      riderNum:   (col('ridershtxno')||'').trim(),
      owner:      owner,
      goRound:    (col('goround')||'').trim(),
      score:      parseFloat(col('score'))||0,
      place:      parseInt(col('place'),10)||0,
      pts:        parseFloat(col('shtxpts'))||0,
      money:      parseFloat(col('money'))||0
    };
  }).filter(function(r){ return r.horse||r.rider; });
}

// Standard payout percentages by number of paid places
// Each row: [pct1, pct2, pct3, pct4, pct5] (sum=100, trailing zeros omitted)
var AA_PAYOUT_TABLE = [
  [],                           // 0 eligible
  [100],                        // 1
  [60,40],                      // 2
  [50,30,20],                   // 3
  [40,30,20,10],                // 4
  [35,25,20,12,8]               // 5+
];
function calcAaPrizes(total, eligibleCount){
  if(!total||!eligibleCount) return [0,0,0,0,0];
  var n=Math.min(eligibleCount,5);
  var pcts=AA_PAYOUT_TABLE[n]||AA_PAYOUT_TABLE[5];
  return [0,0,0,0,0].map(function(_,i){ return i<pcts.length ? Math.round(total*pcts[i]/100) : 0; });
}

// Build headerOverride from saved resColMap: {normalizedRole → originalKey}
function buildResHeaderOverride(rawHeaders){
  var resColMap=G.cfg.resColMap||{};
  if(!Object.keys(resColMap).length) return null;
  var override={};
  Object.keys(resColMap).forEach(function(colIdx){
    var role=resColMap[colIdx];
    var origKey=rawHeaders[parseInt(colIdx,10)];
    if(origKey!=null) override[role]=origKey;
  });
  return Object.keys(override).length ? override : null;
}

async function loadResultsFile(file){
  return new Promise(function(resolve,reject){
    var ext=(file.name||'').split('.').pop().toLowerCase();
    var reader=new FileReader();
    reader.onerror=function(){ reject(new Error('File read failed')); };
    if(ext==='txt'||ext==='csv'){
      reader.onload=function(e){
        try{
          var lines=e.target.result.split(/\r?\n/).filter(function(l){ return l.trim(); });
          if(!lines.length){ reject(new Error('Empty file')); return; }
          var headers=lines[0].split('\t');
          var rows=[];
          for(var i=1;i<lines.length;i++){
            var cells=lines[i].split('\t'), obj={};
            headers.forEach(function(h,j){ obj[h]=cells[j]||''; });
            rows.push(obj);
          }
          var override=buildResHeaderOverride(headers);
          G.results=parseSTHXRows(rows, override);
          G.results.forEach(function(r,i){ r._idx=i; });
          G.resultsFile=file.name;
          _resSelOrg=''; _resSelDiv=''; _resSelClass=''; _resSearch=''; _resSortCol='place'; _resSortDir=1; _resSelShow='';
          saveResultsToStorage(); resolve(G.results.length);
        } catch(ex){ reject(ex); }
      };
      reader.readAsText(file);
    } else {
      reader.onload=function(e){
        try{
          var wb=XLSX.read(e.target.result,{type:'array'});
          var ws=null, rawHeaders=[];
          for(var si=0;si<wb.SheetNames.length;si++){
            var cws=wb.Sheets[wb.SheetNames[si]];
            var chdr=(XLSX.utils.sheet_to_json(cws,{header:1,defval:''})[0]||[]);
            if(chdr.some(function(h){ return normalizeHeader(String(h))==='classdivision'; })){ ws=cws; rawHeaders=chdr; break; }
          }
          if(!ws){ ws=wb.Sheets[wb.SheetNames[0]]; rawHeaders=XLSX.utils.sheet_to_json(ws,{header:1,defval:''})[0]||[]; }
          var rows=XLSX.utils.sheet_to_json(ws,{defval:''});
          var override=buildResHeaderOverride(rawHeaders);
          G.results=parseSTHXRows(rows, override);
          G.results.forEach(function(r,i){ r._idx=i; });
          G.resultsFile=file.name;
          _resSelOrg=''; _resSelDiv=''; _resSelClass=''; _resSearch=''; _resSortCol='place'; _resSortDir=1; _resSelShow='';
          saveResultsToStorage(); resolve(G.results.length);
        } catch(ex){ reject(ex); }
      };
      reader.readAsArrayBuffer(file);
    }
  });
}

function buildTabLines(entry){
  var f = G.cfg.fees;
  var lines = [];

  // Office fee
  if(f.office > 0) lines.push({desc:'Office fee', amt:f.office, type:'office'});

  // Per-org fees (manually added)
  if(entry.orgFees && entry.orgFees.length){
    entry.orgFees.forEach(function(of){
      lines.push({desc:of.org+' — '+of.desc, amt:of.amt, type:'office'});
    });
  }

  // Membership
  var m = (entry.needsMembership||'').toLowerCase();
  if(m.indexOf('1 year') > -1 || m === '1yr') lines.push({desc:'Membership — 1 Year', amt:f.membership1yr, type:'membership'});
  else if(m.indexOf('3 year') > -1 || m === '3yr') lines.push({desc:'Membership — 3 Year', amt:f.membership3yr, type:'membership'});
  else if(m.indexOf('life') > -1) lines.push({desc:'Membership — Lifetime', amt:f.membershipLife, type:'membership'});
  else if(m.indexOf('day') > -1) lines.push({desc:'Day License', amt:f.dayLicense, type:'membership'});

  // Classes — look up per-class config fee if available
  entry.classes.forEach(function(cls){
    var cfgCls = G.cfg.classes.find(function(c){ return c.num === cls.num; });
    var base = (cfgCls && cfgCls.baseFee !== null) ? cfgCls.baseFee : f.classBase;
    var isCow = cfgCls ? cfgCls.isCow : COW_WORDS.some(function(k){ return (cls.name||'').toLowerCase().indexOf(k)>-1; });
    var cowFee = isCow ? ((cfgCls && cfgCls.cowFee !== null) ? cfgCls.cowFee : f.cowSurcharge) : 0;
    var jp = (cfgCls && cfgCls.jackpot) ? cfgCls.jackpot : 0;
    var desc = 'Class '+(cls.num||'?')+' \u2014 '+cls.name;
    if(cls.org && cls.org !== 'CoWN') desc += ' ['+cls.org+']';
    lines.push({desc:desc, amt:base+cowFee+jp, type:'class', isCow:isCow});
  });

  // Stalling
  if(entry.stall1qty > 0) lines.push({desc:'Stall \u2014 1 night \xd7 '+entry.stall1qty, amt:f.stall1*entry.stall1qty, type:'stall'});
  if(entry.stall2qty > 0) lines.push({desc:'Stall \u2014 2 nights \xd7 '+entry.stall2qty, amt:f.stall2*entry.stall2qty, type:'stall'});
  if(entry.shavings  > 0) lines.push({desc:'Shavings \u2014 '+entry.shavings+' bags', amt:f.shavings*entry.shavings, type:'stall'});
  if(entry.rv1qty    > 0) lines.push({desc:'RV \u2014 1 night \xd7 '+entry.rv1qty, amt:f.rv1*entry.rv1qty, type:'rv'});
  if(entry.rv2qty    > 0) lines.push({desc:'RV \u2014 2 nights \xd7 '+entry.rv2qty, amt:f.rv2*entry.rv2qty, type:'rv'});
  if(entry.rvCircuit > 0) lines.push({desc:'RV \u2014 Circuit \xd7 '+entry.rvCircuit, amt:f.rvCircuit*entry.rvCircuit, type:'rv'});

  return lines;
}

function tabTotal(entry){ return buildTabLines(entry).reduce(function(s,l){ return s+l.amt; },0); }
function amtPaid(entry){ return G.payments[entry.rowIndex] || 0; }
function tabBalance(entry){ return tabTotal(entry) - amtPaid(entry); }
function isFullyPaid(entry){ return tabBalance(entry) <= 0; }

  function drawPills(){

    }).join('');

  function drawAndWirePills(){

          +'</div>'
          +'<div style="display:flex;flex-wrap:wrap;gap:.3rem;align-items:center">'

      list.forEach(function(e){

          +'<td class="ctr bold" style="width:50px">'

          +'</td>'
          +'<td><div class="bold">'+esc(e.name)+'</div><div class="small">'+esc(e.memberNum||'No # on file')+'</div></td>'
          +'<td><div>'+esc(e.horse)+'</div><div class="small">'+esc(e.horseGender)+'</div></td>'
          +'<td>'+assocTags(e.assocRaw)+'</td>'

          +'<td class="bold">'+fmt$(tabTotal(e))+'</td>'

    drawEntryTable();
  });

  document.getElementById('et').addEventListener('click', function(ev){
    var btn = ev.target.closest('.gp-view-btn');
    if(btn){ showEntryModal(parseInt(btn.dataset.rowidx)); return; }
    // Don't open modal if tapping the back# input
    if(ev.target.tagName==='INPUT') return;
    var card = ev.target.closest('.entry-card');
    if(card) showEntryModal(parseInt(card.dataset.rowidx));
  });
}

function wireImportDZ(){
  var dz=document.getElementById('dz'), fi=document.getElementById('fi');
  if(!dz||!fi) return;
  function loadFile(file){
    var stat=document.getElementById('imp-status');
    if(stat) stat.innerHTML='<span style="color:var(--muted)">Reading...</span>';
    var reader=new FileReader();
    reader.onload=function(e){
      try{
        var wb=XLSX.read(new Uint8Array(e.target.result),{type:'array',cellDates:true});
        G.entries=parseCognito(wb);
        G.payments={}; G.backNums={};
        G.entries.forEach(function(en){ G.payments[en.rowIndex]=en.isPaid?tabTotal(en):0; });
        var spn=document.getElementById('pill-name'), spm=document.getElementById('pill-meta');
        if(spn) spn.textContent=G.showName||file.name.replace(/\.xlsx?$/i,'');
        if(spm) spm.textContent=G.entries.length+' entries';
        try{
          localStorage.setItem('gp_entries_'+G.showId, JSON.stringify(G.entries));
          localStorage.setItem('gp_payments_'+G.showId, JSON.stringify(G.payments));
          localStorage.setItem('gp_backnums_'+G.showId, JSON.stringify(G.backNums));
        } catch(ex){}
        if(!G.cfg.classes.length){
          var classMap={};
          G.entries.forEach(function(en){
            en.classes.forEach(function(cls){
              if(cls.num && !classMap[cls.num]){
                var isCow=COW_WORDS.some(function(k){ return (cls.name||'').toLowerCase().indexOf(k)>-1; });
                CFG_ROW_ID++;
                classMap[cls.num]={_id:'cr'+CFG_ROW_ID,num:cls.num,name:cls.name,
                  division:cls.division,org:cls.org||'CoWN',isCow:isCow,
                  baseFee:null,cowFee:null,jackpot:null,addedMoney:null};
              }
            });
          });
          G.cfg.classes=Object.values(classMap).sort(function(a,b){ return (parseInt(a.num)||999)-(parseInt(b.num)||999); });
        }
        if(G.showId){
          var st2=document.getElementById('imp-status');
          if(st2) st2.innerHTML='<span style="color:var(--muted)">Saving to database...</span>';
          syncEntriesToSupabase().then(function(){
            var el=document.getElementById('imp-status');
            if(el) el.innerHTML='<span style="color:var(--green)">&#10003; '+G.entries.length+' entries saved.</span>';
            setTimeout(function(){ showPage('entries'); },700);
          }).catch(function(err){
            var el=document.getElementById('imp-status');
            if(el) el.innerHTML='<span style="color:var(--accent)">Loaded locally. Sync failed: '+esc(err.message)+'</span>';
            setTimeout(function(){ showPage('entries'); },1200);
          });
        } else {
          var el=document.getElementById('imp-status');
          if(el) el.innerHTML='<span style="color:var(--green)">&#10003; '+G.entries.length+' entries loaded.</span>';
          setTimeout(function(){ showPage('entries'); },700);
        }
      } catch(err){
        var el=document.getElementById('imp-status');
        if(el) el.innerHTML='<span style="color:var(--red)">Error: '+esc(err.message)+'</span>';
        console.error(err);
      }
    };
    reader.readAsArrayBuffer(file);
  }
  dz.addEventListener('click',function(e){ if(e.target!==fi) fi.click(); });
  fi.addEventListener('change',function(e){ if(e.target.files[0]) loadFile(e.target.files[0]); });
  dz.addEventListener('dragover',function(e){ e.preventDefault(); dz.classList.add('drag'); });
  dz.addEventListener('dragleave',function(){ dz.classList.remove('drag'); });
  dz.addEventListener('drop',function(e){ e.preventDefault(); dz.classList.remove('drag'); if(e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });
}

// ═══════════════════════ PAGE: CLASS LISTS ═══════════════════════
// ── Class sheet helpers ───────────────────────────────────────
function clsKey(cls){ return (cls.num||'')+'|'+(cls.name||''); }

function getClassOrder(key, entries){
  if(G.classOrder[key]&&G.classOrder[key].length){
    // Restore order, add any new entries not yet in the order
    var existing=G.classOrder[key];
    var inOrder=new Set(existing);
    var extras=entries.filter(function(e){ return !inOrder.has(e.rowIndex); }).map(function(e){ return e.rowIndex; });
    return existing.concat(extras);
  }
  // Default: sort by back number, then name
  return entries.slice().sort(function(a,b){
    var ba=parseInt(G.backNums[a.rowIndex])||9999, bb=parseInt(G.backNums[b.rowIndex])||9999;
    if(ba!==bb) return ba-bb;
    return (a.name||'').localeCompare(b.name||'');
  }).map(function(e){ return e.rowIndex; });
}

function isScratched(classKey, rowIndex){
  return (G.scratches[classKey]||[]).indexOf(rowIndex)>=0;
}
function isFullScratched(rowIndex){
  return (G.fullScratches||[]).indexOf(rowIndex)>=0;
}

window.clsScratch=function(classKey, rowIndex){
  if(!G.scratches[classKey]) G.scratches[classKey]=[];
  var idx=G.scratches[classKey].indexOf(rowIndex);
  if(idx>=0) G.scratches[classKey].splice(idx,1);
  else G.scratches[classKey].push(rowIndex);
  saveEntriesToStorage(); pgClasses();
};
window.clsFullScratch=function(rowIndex){
  if(!G.fullScratches) G.fullScratches=[];
  var idx=G.fullScratches.indexOf(rowIndex);
  if(idx>=0) G.fullScratches.splice(idx,1);
  else G.fullScratches.push(rowIndex);
  saveEntriesToStorage(); pgClasses();
};
window.clsMoveUp=function(classKey, rowIndex){
  var order=G.classOrder[classKey];
  if(!order) return;
  var i=order.indexOf(rowIndex);
  if(i>0){ var t=order[i-1]; order[i-1]=order[i]; order[i]=t; }
  saveEntriesToStorage(); pgClasses();
};
window.clsMoveDown=function(classKey, rowIndex){
  var order=G.classOrder[classKey];
  if(!order) return;
  var i=order.indexOf(rowIndex);
  if(i<order.length-1){ var t=order[i+1]; order[i+1]=order[i]; order[i]=t; }
  saveEntriesToStorage(); pgClasses();
};

var _dragSrcKey='', _dragSrcIdx=-1;
window.clsDragStart=function(classKey, rowIndex, ev){
  _dragSrcKey=classKey; _dragSrcIdx=rowIndex;
  ev.dataTransfer.effectAllowed='move';
  ev.currentTarget.classList.add('dragging');
};
window.clsDragEnd=function(ev){
  ev.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.drag-over').forEach(function(el){ el.classList.remove('drag-over'); });
};
window.clsDragOver=function(ev){ ev.preventDefault(); ev.currentTarget.classList.add('drag-over'); };
window.clsDragLeave=function(ev){ ev.currentTarget.classList.remove('drag-over'); };
window.clsDrop=function(classKey, rowIndex, ev){
  ev.preventDefault();
  ev.currentTarget.classList.remove('drag-over');
  if(_dragSrcKey!==classKey||_dragSrcIdx===rowIndex) return;
  var order=G.classOrder[classKey];
  if(!order) return;
  var from=order.indexOf(_dragSrcIdx), to=order.indexOf(rowIndex);
  if(from<0||to<0) return;
  order.splice(from,1); order.splice(to,0,_dragSrcIdx);
  saveEntriesToStorage(); pgClasses();
};

function pgClasses(){
  var pg=document.getElementById('page');
  if(!G.entries.length){
    pg.innerHTML='<div class="card"><p class="empty-state">No entries loaded. <a href="#" onclick="showPage(\'entries\');return false" style="color:var(--accent)">Import entries first &rarr;</a></p></div>';
    return;
  }

  // Build class map
  var classMap={};
  G.entries.forEach(function(e){
    e.classes.forEach(function(cls){
      var key=clsKey(cls);
      if(!classMap[key]) classMap[key]={num:cls.num,name:cls.name,division:cls.division,org:cls.org,key:key,allEntries:[]};
      classMap[key].allEntries.push(e);
    });
  });

  var sorted=Object.values(classMap).sort(function(a,b){ return (parseInt(a.num)||999)-(parseInt(b.num)||999); });

  // Build running orders
  sorted.forEach(function(cls){
    if(!G.classOrder[cls.key]||!G.classOrder[cls.key].length){
      G.classOrder[cls.key]=getClassOrder(cls.key, cls.allEntries);
    }
  });

  var orgs=Array.from(new Set(sorted.map(function(c){ return c.org||'CoWN'; }))).sort();
  var activeOrg='All';

  pg.innerHTML='<div class="btn-row no-print">'
    +'<button class="btn btn-accent btn-sm" onclick="printGoSheets()">&#128424; Print Go Sheets</button>'
    +'<button class="btn btn-dark btn-sm" onclick="openScribeMode()" style="margin-left:auto">&#9999;&#65039; Scribe View</button>'
    +'</div>'
    +'<div class="pills no-print" id="org-pills"></div>'
    +'<div id="cl-content"></div>';

  function drawOrgPills(){
    document.getElementById('org-pills').innerHTML=(['All'].concat(orgs)).map(function(o){
      return '<button class="pill'+(o===activeOrg?' active':'')+'" data-org="'+esc(o)+'">'+esc(o)+'</button>';
    }).join('');
  }
  function drawAndWireOrgPills(){
    drawOrgPills();
    wirePillClicks('org-pills', function(v){ activeOrg=v; drawAndWireOrgPills(); drawClassLists(); });
  }
  drawAndWireOrgPills();

  function drawClassLists(){
    var list=sorted.filter(function(c){ return activeOrg==='All'||(c.org||'CoWN')===activeOrg; });
    var html=list.map(function(cls){
      var key=cls.key;
      var order=G.classOrder[key]||[];
      var entryMap={};
      cls.allEntries.forEach(function(e){ entryMap[e.rowIndex]=e; });
      var orderedEntries=order.map(function(ri){ return entryMap[ri]; }).filter(Boolean);
      var activeCount=orderedEntries.filter(function(e){ return !isFullScratched(e.rowIndex)&&!isScratched(key,e.rowIndex); }).length;
      var scratchCount=orderedEntries.filter(function(e){ return isFullScratched(e.rowIndex)||isScratched(key,e.rowIndex); }).length;

      var rows=orderedEntries.map(function(e,i){
        var ri=e.rowIndex;
        var fullS=isFullScratched(ri), clsS=isScratched(key,ri);
        var rowCls='go-sheet-row'+(fullS?' full-scratched':clsS?' scratched':'');
        var keyEsc=key.replace(/'/g,"\\'");
        return '<div class="'+rowCls+'" draggable="true" '
          +'ondragstart="clsDragStart(\''+keyEsc+'\','+ri+',event)" '
          +'ondragend="clsDragEnd(event)" '
          +'ondragover="clsDragOver(event)" '
          +'ondragleave="clsDragLeave(event)" '
          +'ondrop="clsDrop(\''+keyEsc+'\','+ri+',event)">'
          +'<span class="drag-handle no-print">&#8597;</span>'
          +'<div class="no-print" style="display:flex;gap:.15rem;flex-shrink:0">'
          +'<button class="btn btn-dark btn-sm" style="padding:.15rem .3rem;font-size:.7rem" onclick="clsMoveUp(\''+keyEsc+'\','+ri+')" title="Move up">&#8679;</button>'
          +'<button class="btn btn-dark btn-sm" style="padding:.15rem .3rem;font-size:.7rem" onclick="clsMoveDown(\''+keyEsc+'\','+ri+')" title="Move down">&#8681;</button>'
          +'</div>'
          +'<span class="gs-backnum">'+(G.backNums[ri]||'—')+'</span>'
          +'<span class="gs-name">'+esc(e.name)+'</span>'
          +'<span class="gs-horse">'+esc(e.horse)+'</span>'
          +'<span class="gs-membernum no-print">'+esc(e.memberNum||'—')+'</span>'
          +'<div class="gs-actions no-print">'
          +(fullS
            ?'<button class="btn btn-sm" style="background:rgba(231,76,60,.15);color:var(--red);padding:.15rem .4rem;font-size:.72rem" onclick="clsFullScratch('+ri+')" title="Un-scratch from show">&#10227; Unscratch</button>'
            :(clsS
              ?'<button class="btn btn-sm" style="background:rgba(231,76,60,.15);color:var(--red);padding:.15rem .4rem;font-size:.72rem" onclick="clsScratch(\''+keyEsc+'\','+ri+')" title="Un-scratch from class">&#10227; Unscratch</button>'
              :'<button class="btn btn-dark btn-sm" style="padding:.15rem .4rem;font-size:.72rem" onclick="clsScratch(\''+keyEsc+'\','+ri+')" title="Scratch from this class">&#10007; Scratch</button>'
               +'<button class="btn btn-dark btn-sm" style="padding:.15rem .4rem;font-size:.72rem;color:var(--red)" onclick="clsFullScratch('+ri+')" title="Scratch from whole show">&#10007;&#10007; Full</button>'
            ))
          +'</div>'
          +'</div>';
      }).join('');

      return '<div class="card" style="margin-bottom:1rem">'
        +'<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.4rem;margin-bottom:.65rem">'
        +'<div><span style="font-family:Oswald;font-size:1.05rem;color:var(--accent)">Class '+esc(cls.num)+' &mdash; '+esc(cls.name)+'</span>'
        +' '+divBadge(cls.division)
        +(cls.org&&cls.org!=='CoWN'?'<span class="badge b-blue" style="margin-left:4px">'+esc(cls.org)+'</span>':'')
        +'</div>'
        +'<div style="display:flex;gap:.4rem;align-items:center;flex-wrap:wrap">'
        +'<span class="badge b-blue">'+activeCount+' going'+(scratchCount?' &middot; '+scratchCount+' scratched':'')+'</span>'
        +'<button class="btn btn-dark btn-sm no-print" onclick="openScoreEntry(\''+key.replace(/'/g,"\\'")+'\')">&#9998; Scores</button>'
        +'<button class="btn btn-dark btn-sm no-print" onclick="printGoSheets(\''+key.replace(/'/g,"\\'")+'\')">&#128424;</button>'
        +'</div>'
        +'</div>'
        +'<div id="rows-'+key.replace(/[^a-zA-Z0-9]/g,'_')+'">'+rows+'</div>'
        +'</div>';
    }).join('');

    document.getElementById('cl-content').innerHTML=html||'<p class="empty-state">No classes found.</p>';
  }
  drawClassLists();
}

window.printGoSheets=function(onlyKey){
  var classMap={};
  G.entries.forEach(function(e){
    e.classes.forEach(function(cls){
      var key=clsKey(cls);
      if(!classMap[key]) classMap[key]={num:cls.num,name:cls.name,division:cls.division,org:cls.org,key:key,allEntries:[]};
      classMap[key].allEntries.push(e);
    });
  });
  var sorted=Object.values(classMap).sort(function(a,b){ return (parseInt(a.num)||999)-(parseInt(b.num)||999); });
  if(onlyKey) sorted=sorted.filter(function(c){ return c.key===onlyKey; });
  var showName=G.cfg.showName||G.showName||'Show';
  var showDate=G.cfg.showDate||'';

  var win=window.open('','_blank');
  var pages=sorted.map(function(cls){
    var key=cls.key;
    var order=G.classOrder[key]||[];
    var entryMap={};
    cls.allEntries.forEach(function(e){ entryMap[e.rowIndex]=e; });
    var orderedEntries=order.map(function(ri){ return entryMap[ri]; }).filter(Boolean)
      .filter(function(e){ return !isFullScratched(e.rowIndex)&&!isScratched(key,e.rowIndex); });

    var rows=orderedEntries.map(function(e,i){
      return '<tr><td style="text-align:center;font-weight:700">'+(i+1)+'</td>'
        +'<td style="text-align:center;font-weight:700;color:#b8862a">'+(G.backNums[e.rowIndex]||'')+'</td>'
        +'<td>'+esc(e.name)+'</td><td>'+esc(e.horse)+'</td>'
        +'<td>'+esc(e.memberNum||'')+'</td>'
        +'<td style="width:70px"></td><td style="width:70px"></td>'
        +'</tr>';
    }).join('');

    return '<div style="page-break-after:always;padding:1.5rem 2rem;font-family:Arial,sans-serif">'

// ─── Score Entry ────────────────────────────────────────────
// Build the list of active (non-scratched) entries for a class key in go-sheet order
function getGoEntries(key){
  var entryMap={};
  G.entries.forEach(function(e){
    e.classes.forEach(function(cls){
      if(clsKey(cls)===key) entryMap[e.rowIndex]=e;
    });
  });
  var order=G.classOrder[key]||Object.keys(entryMap).map(Number);
  return order.map(function(ri){ return entryMap[ri]; }).filter(function(e){
    return e&&!isFullScratched(e.rowIndex)&&!isScratched(key,e.rowIndex);
  });
}

// Pull existing manually-entered (or imported) scores for a class
function getExistingScores(cls){
  var map={};
  (G.results||[]).forEach(function(r){
    if(r.org===cls.org && r.division===cls.division && r.discipline===cls.name){
      map[r.rider]={score:r.score, place:r.place};
    }
  });
  return map;
}

// Compute placements from an array of {rowIndex, score} — handles ties
function computePlacements(scored){
  var sorted=scored.slice().sort(function(a,b){ return (b.score||0)-(a.score||0); });
  var place=1;
  for(var i=0;i<sorted.length;){
    var s=sorted[i].score||0;
    var j=i;
    while(j<sorted.length&&(sorted[j].score||0)===s) j++;
    for(var k=i;k<j;k++) sorted[k].place=(s>0)?place:0;
    if(s>0) place=j+1;
    i=j;
  }
  var pm={};
  sorted.forEach(function(x){ pm[x.rowIndex]=x.place; });
  return pm;
}

// Save a set of {rowIndex, score, place} into G.results for a class
function commitScores(cls, entries, scores){
  // Remove existing rows for this class
  var keep=[];
  (G.results||[]).forEach(function(r){
    if(!(r.org===cls.org && r.division===cls.division && r.discipline===cls.name)) keep.push(r);
  });
  var total=entries.length;
  entries.forEach(function(e){
    var sc=scores[e.rowIndex]||{score:0,place:0};
    if(!sc.score) return; // skip blank
    keep.push({
      showName: G.cfg.showName||G.showName||'',
      org:      cls.org||'CoWN',
      division: cls.division||'',
      discipline: cls.name||'',
      rawClass: (cls.num?cls.num+' ':'')+cls.name,
      entries:  total,
      score:    sc.score,
      place:    sc.place,
      horse:    e.horse||'',
      rider:    e.name||'',
      riderNum: e.memberNum||'',
      pts:      0,
      money:    0,
      addedMoney:0,
      goRound:  '',
      _manual:  true
    });
  });
  G.results=keep;
  saveResultsToStorage();
}

// Secretary score-entry modal
window.openScoreEntry=function(key){
  var cls=null;
  G.entries.forEach(function(e){
    e.classes.forEach(function(c){ if(clsKey(c)===key&&!cls) cls=c; });
  });
  if(!cls) return;

  var entries=getGoEntries(key);
  var existingScores=getExistingScores(cls);
  var mr=document.getElementById('modal-root');

  function renderModal(scoreState){
    var rows=entries.map(function(e,i){
      var rider=e.name||'';
      var ex=existingScores[rider]||{};
      var cur=scoreState[e.rowIndex];
      var val=(cur!==undefined)?cur:(ex.score||'');
      var hasScore=cur!==undefined?(cur>0):(ex.score>0);
      return '<div class="score-entry-row" style="display:flex;align-items:center;gap:.5rem;padding:.4rem .2rem;border-bottom:1px solid var(--border)">'
        +'<span style="width:36px;text-align:center;font-weight:700;color:var(--accent);font-size:.9rem">'+(G.backNums[e.rowIndex]||'—')+'</span>'
        +'<div style="flex:1;min-width:0">'

        +'<div style="font-size:.75rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(e.horse||'')+'</div>'
        +'</div>'
        +'<input type="number" step="0.001" min="0" max="300" placeholder="—" value="'+esc(String(val))+'" '
        +'data-ri="'+e.rowIndex+'" '
        +'style="width:80px;background:var(--bg);border:1px solid var(--border2);border-radius:6px;color:var(--text);'
        +'padding:.3rem .4rem;font-size:.95rem;text-align:right'+(hasScore?';border-color:var(--accent)':'')+'" '
        +'oninput="scoreEntryInput('+e.rowIndex+',this.value)">'
        +'</div>';
    }).join('');

    mr.innerHTML='<div class="modal-bg" id="se-modal-bg" onclick="if(event.target===this)closeModal()">'
      +'<div class="modal" style="max-width:520px">'
      +'<h2>&#9998; '+esc(cls.num?'Class '+cls.num+' — ':'')+esc(cls.name)+'</h2>'
      +'<div style="font-size:.8rem;color:var(--muted);margin-bottom:1rem">'+esc(cls.division||'')+(cls.org&&cls.org!=='CoWN'?' &middot; '+esc(cls.org):'')+'</div>'
      +'<div style="max-height:55vh;overflow-y:auto">'+rows+'</div>'
      +'<div style="display:flex;gap:.5rem;margin-top:1rem;flex-wrap:wrap">'
      +'<button class="btn btn-dark btn-sm" onclick="scoreEntryAutoPlace()">&#8645; Auto-Place from Scores</button>'
      +'<button class="btn btn-accent" style="margin-left:auto" onclick="scoreEntrySave(\''+key.replace(/'/g,"\\'")+'\')">&#10003; Save Scores</button>'
      +'<button class="btn btn-dark" onclick="closeModal()">Cancel</button>'
      +'</div>'
      +'</div>'
      +'</div>';
  }

  // Score state accumulator (rowIndex -> score value)
  window._seState={};
  window._seCls=cls;
  window._seEntries=entries;
  window._seKey=key;

  // Pre-populate from existing
  entries.forEach(function(e){
    var ex=existingScores[e.name||''];
    if(ex&&ex.score) window._seState[e.rowIndex]=ex.score;
  });

  renderModal(window._seState);

  window.scoreEntryInput=function(ri, val){
    var v=parseFloat(val);
    window._seState[ri]=isNaN(v)?0:v;
    // Update border color live
    var inp=document.querySelector('input[data-ri="'+ri+'"]');
    if(inp) inp.style.borderColor=(v>0)?'var(--accent)':'var(--border2)';
  };

  window.scoreEntryAutoPlace=function(){
    var scored=entries.map(function(e){
      return {rowIndex:e.rowIndex, score:window._seState[e.rowIndex]||0};
    });
    var pm=computePlacements(scored);
    window._sePlaces=pm;
    // Show places next to inputs
    entries.forEach(function(e){
      var p=pm[e.rowIndex]||0;
      var inp=document.querySelector('input[data-ri="'+e.rowIndex+'"]');
      if(!inp) return;
      var row=inp.closest('.score-entry-row');
      var lbl=row.querySelector('.place-lbl');
      if(!lbl){ lbl=document.createElement('span'); lbl.className='place-lbl';
        lbl.style.cssText='width:28px;text-align:center;font-size:.82rem;font-weight:700;color:var(--accent)';
        row.appendChild(lbl);
      }
      lbl.textContent=p?ordinal(p):'DQ';
    });
  };

  window.scoreEntrySave=function(key){
    var scored=entries.map(function(e){
      return {rowIndex:e.rowIndex, score:window._seState[e.rowIndex]||0};
    });
    var pm=window._sePlaces||computePlacements(scored);
    var scoresFull={};
    entries.forEach(function(e){
      scoresFull[e.rowIndex]={score:window._seState[e.rowIndex]||0, place:pm[e.rowIndex]||0};
    });
    commitScores(cls, entries, scoresFull);
    closeModal();
    // Flash confirmation
    var notice=document.createElement('div');
    notice.textContent='Scores saved for '+cls.name+' ('+cls.division+')';
    notice.style.cssText='position:fixed;bottom:1.2rem;right:1.2rem;background:var(--accent);color:#000;'
      +'padding:.5rem 1rem;border-radius:8px;font-weight:700;font-size:.85rem;z-index:300';
    document.body.appendChild(notice);
    setTimeout(function(){ notice.remove(); },2500);
  };
};

function ordinal(n){
  var s=['th','st','nd','rd'],v=n%100;
  return n+(s[(v-20)%10]||s[v]||s[0]);
}

function getTemplateForDisc(name){
  if(!name) return null;
  if(SCORE_TEMPLATES[name]) return name;
  var n=name.toLowerCase();
  if(n.indexOf('novice')>=0&&n.indexOf('cow')>=0) return 'Novice Cow Work';
  if(n.indexOf('bdbd')>=0) return 'BDBD Cow Work';
  if(n.indexOf('cow')>=0) return 'Cow Work';
  if(n.indexOf('rein')>=0) return 'Reining';
  if(n.indexOf('trail')>=0) return 'Trail';
  if(n.indexOf('pleasure')>=0) return 'Pleasure';
  return null;
}

  function getCls(){ return classMap[selKey]; }
  function getTmplName(){ return tmplOverride[selKey]||getTemplateForDisc(getCls().name); }
  function getTmpl(){ var n=getTmplName(); return n?SCORE_TEMPLATES[n]:null; }

  // Every discipline uses per-maneuver {score, pen}
  function initState(ri){
    var tmpl=getTmpl();
    if(!sheetData[selKey]) sheetData[selKey]={};
    if(!sheetData[selKey][ri]){
      sheetData[selKey][ri]={
        m: tmpl?tmpl.maneuvers.map(function(){ return {score:0,pen:0}; }):[],
        isOP:false, isDQ:false, nrha:0, comments:'', rawScore:0
      };
    }
    return sheetData[selKey][ri];
  }

  function calcTotal(s, tmpl){
    if(s.isDQ) return 0;
    if(s.isOP) return null;
    if(!tmpl) return s.rawScore||0;
    var ms=s.m.reduce(function(a,mi){ return a+mi.score; },0);
    var ps=s.m.reduce(function(a,mi){ return a+mi.pen; },0);
    return Math.round((70+ms-ps)*1000)/1000;
  }

  function isDone(ri){
    if(!sheetData[selKey]||!sheetData[selKey][ri]) return false;
    var s=sheetData[selKey][ri];
    return s.isDQ||s.isOP||s.rawScore>0||s.m.some(function(mi){ return mi.score!==0||mi.pen>0; });
  }

    var savedScroll=(document.querySelector('.scr-hscroll')||{scrollLeft:0}).scrollLeft;
    var cls=getCls();
    var entries=getGoEntries(selKey);
    if(!entries.length){
