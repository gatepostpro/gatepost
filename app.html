    var stallLines = lines.filter(function(l){ return l.type==='stall'||l.type==='rv'; });
    if(stallLines.length){
      feesHTML += '<div style="font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:.6rem 0 .25rem">Stalling & RV</div>';
      stallLines.forEach(function(l){ feesHTML += '<div class="tab-line"><span>'+esc(l.desc)+'</span><span>'+fmt$(l.amt)+'</span></div>'; });
    }

    feesHTML += '<div class="tab-total"><span>Total</span><span>'+fmt$(total)+'</span></div>'
      +'<div class="pay-status">'
      +'<div style="flex:1"><div class="small">Paid</div><div class="bold" style="color:var(--green)">'+fmt$(paid)+'</div></div>'
      +'<div style="flex:1"><div class="small">Balance</div><div class="bold" style="color:'+(bal<=0?'var(--green)':'var(--red)')+'">'+fmt$(bal)+'</div></div>'
      +'<div>'+(bal>0
        ?'<button class="btn btn-green btn-sm" onclick="markPaid('+rowIdx+','+total+')">Mark Paid</button>'
        :'<span class="badge b-green">&#10003; Paid</span>')
      +'</div></div>';

    // Stall split tab content
    // Build list of individual housing items that can be split
    var f = G.cfg.fees;
    var housingItems = [];
    if(entry.stall1qty > 0) housingItems.push({key:'s1', label:'Stall 1-night', qty:entry.stall1qty, unitCost:f.stall1||40});
    if(entry.stall2qty > 0) housingItems.push({key:'s2', label:'Stall 2-nights', qty:entry.stall2qty, unitCost:f.stall2||80});
    if(entry.shavings  > 0) housingItems.push({key:'sh', label:'Shavings', qty:entry.shavings, unitCost:f.shavings||12});
    if(entry.rv1qty    > 0) housingItems.push({key:'r1', label:'RV 1-night', qty:entry.rv1qty, unitCost:f.rv1||40});
    if(entry.rv2qty    > 0) housingItems.push({key:'r2', label:'RV 2-nights', qty:entry.rv2qty, unitCost:f.rv2||80});
    if(entry.rvCircuit > 0) housingItems.push({key:'rc', label:'RV Circuit', qty:entry.rvCircuit, unitCost:f.rvCircuit||110});
    // Also check org fees for manually added stalls
    (entry.orgFees||[]).forEach(function(of, oi){
      if(of.desc && (of.desc.toLowerCase().indexOf('stall')>-1 || of.desc.toLowerCase().indexOf('rv')>-1)){
        housingItems.push({key:'org'+oi, label:of.desc, qty:1, unitCost:of.amt});
      }
    });

    var stallSplitHTML = '';
    if(!housingItems.length){
      stallSplitHTML = '<div class="empty-state" style="padding:1.5rem;text-align:center">'
        +'<div style="color:var(--muted);font-size:.85rem">No stalling or RV on this entry.</div>'
        +'<div style="font-size:.78rem;color:var(--muted);margin-top:.5rem">Add stalls via the Fees &amp; Tab tab using "+ Add Fee"</div>'
        +'</div>';
    } else {
      // Initialize splits per housing item if not set
      if(!entry.stallSplits) entry.stallSplits = {};

      // Rider dropdown options
      var riderOpts = '<option value="">— Select from entries —</option>'
        + G.entries.filter(function(en){ return en.rowIndex!==rowIdx; }).map(function(en){
          return '<option value="'+en.rowIndex+'">'+esc(en.name)+' / '+esc(en.horse)+'</option>';
        }).join('');

      // Build one split block per housing item
      housingItems.forEach(function(item){
        var itemTotal = item.qty * item.unitCost;

        // Initialize this item's splits
        if(!entry.stallSplits[item.key]){
          entry.stallSplits[item.key] = [{name:entry.name, pct:100}];
        }
        var splits = entry.stallSplits[item.key];
        var totalPct = splits.reduce(function(s,x){ return s+x.pct; },0);
        var pctOk = totalPct === 100;

        stallSplitHTML += '<div style="background:var(--card2);border:1px solid var(--border2);border-radius:8px;padding:.85rem;margin-bottom:.75rem">';
        stallSplitHTML += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem">'
          +'<div><span style="font-family:Oswald;color:var(--accent);font-size:.9rem">'+esc(item.label)+'</span>'
          +(item.qty>1?' <span class="badge b-gray">x'+item.qty+'</span>':'')+'</div>'
          +'<span style="font-weight:600;color:var(--accent)">'+fmt$(itemTotal)+'</span>'
          +'</div>';

        // Split rows for this item
        splits.forEach(function(s, si){
          var amt = itemTotal * s.pct / 100;
          stallSplitHTML += '<div style="display:flex;align-items:center;gap:.5rem;padding:.35rem 0;border-bottom:1px solid var(--border)">'
            +'<div style="flex:1"><div class="bold" style="font-size:.83rem">'+esc(s.name)+'</div>'
            +'<div class="small" style="color:var(--green)">'+fmt$(amt)+'</div></div>'
            +'<input type="number" value="'+s.pct+'" min="1" max="100" '
            +'data-itemkey="'+esc(item.key)+'" data-si="'+si+'" data-rowidx="'+rowIdx+'" '
            +'class="split-pct-inp" '
            +'style="width:55px;background:var(--bg);border:1px solid var(--border2);border-radius:4px;color:var(--text);padding:3px 5px;font-size:.82rem;text-align:center">'
            +'<span style="font-size:.75rem;color:var(--muted)">%</span>'
            +(splits.length>1
              ? '<button class="btn btn-red btn-sm split-remove-btn" data-itemkey="'+esc(item.key)+'" data-si="'+si+'" data-rowidx="'+rowIdx+'">&#10005;</button>'
              : '')
            +'</div>';
        });

        stallSplitHTML += '<div style="font-size:.73rem;margin:.3rem 0 .5rem;color:'+(pctOk?'var(--green)':'var(--red)')+'">'
          +(pctOk?'&#10003; Balanced':'Total: '+totalPct+'% — must equal 100%')
          +'</div>';

        // Add person to this item's split
        stallSplitHTML += '<div style="display:grid;grid-template-columns:1fr 60px auto;gap:.4rem;align-items:flex-end">'
          +'<select class="split-add-sel" data-itemkey="'+esc(item.key)+'" data-rowidx="'+rowIdx+'" '
          +'style="background:var(--bg);border:1px solid var(--border2);border-radius:5px;color:var(--text);padding:.3rem .5rem;font-size:.78rem">'
          +riderOpts+'</select>'
          +'<input type="number" class="split-add-pct" data-itemkey="'+esc(item.key)+'" value="50" min="1" max="99" '
          +'style="background:var(--bg);border:1px solid var(--border2);border-radius:5px;color:var(--text);padding:.3rem .4rem;font-size:.78rem;text-align:center">'
          +'<button class="btn btn-accent btn-sm split-add-btn" data-itemkey="'+esc(item.key)+'" data-rowidx="'+rowIdx+'">Add</button>'
          +'</div>';

        stallSplitHTML += '</div>';
      });
    }

    // Build full modal
    var html = '<div class="modal-bg" id="em" onclick="if(event.target===this)closeModal()">'
      +'<div class="modal" style="max-width:680px">'
      +'<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1rem">'
      +'<div><h2 style="margin-bottom:2px">'+esc(entry.horse||'Unknown Horse')+'</h2>'
      +'<div class="small">'+esc(entry.name)+'</div></div>'
      +'<button class="btn btn-dark btn-sm" onclick="closeModal()">Close</button>'
      +'</div>'
      // Tab buttons
      +'<div class="tab-row">'
      +'<button class="tab-btn active gp-modal-tab" data-tab="classes">Classes</button>'
      +'<button class="tab-btn gp-modal-tab" data-tab="riders">Riders</button>'
      +'<button class="tab-btn gp-modal-tab" data-tab="fees">Fees &amp; Tab</button>'
      +'<button class="tab-btn gp-modal-tab" data-tab="stall">Stall Split</button>'
      +'</div>'
      // Tab panels
      +'<div id="mpanel-classes">'+classHTML+'</div>'
      +'<div id="mpanel-riders" style="display:none">'+riderHTML+'</div>'
      +'<div id="mpanel-fees" style="display:none">'+feesHTML+'</div>'
      +'<div id="mpanel-stall" style="display:none">'+stallSplitHTML+'</div>'
      +'</div></div>';

    root.innerHTML = html;

    // Wire tab buttons
    root.querySelectorAll('.gp-modal-tab').forEach(function(btn){
      btn.addEventListener('click', function(){ switchModalTab(btn.dataset.tab); });
    });

    // Wire stall split percentage inputs
    root.querySelectorAll('.split-pct-inp').forEach(function(inp){
      inp.addEventListener('change', function(){
        var e2 = G.entries.find(function(x){ return x.rowIndex===parseInt(inp.dataset.rowidx); });
        if(!e2||!e2.stallSplits) return;
        e2.stallSplits[inp.dataset.itemkey][parseInt(inp.dataset.si)].pct = parseInt(inp.value)||0;
        saveEntriesToCache();
        if(G._rebuildEntryModal) G._rebuildEntryModal();
      });
    });

    // Wire stall split remove buttons
    root.querySelectorAll('.split-remove-btn').forEach(function(btn){
      btn.addEventListener('click', function(){
        var e2 = G.entries.find(function(x){ return x.rowIndex===parseInt(btn.dataset.rowidx); });
        if(!e2||!e2.stallSplits) return;
        e2.stallSplits[btn.dataset.itemkey].splice(parseInt(btn.dataset.si), 1);
        saveEntriesToCache();
        if(G._rebuildEntryModal) G._rebuildEntryModal();
      });
    });

    // Wire stall split add buttons
    root.querySelectorAll('.split-add-btn').forEach(function(btn){
      btn.addEventListener('click', function(){
        var e2 = G.entries.find(function(x){ return x.rowIndex===parseInt(btn.dataset.rowidx); });
        if(!e2) return;
        if(!e2.stallSplits) e2.stallSplits = {};
        var key = btn.dataset.itemkey;
        if(!e2.stallSplits[key]) e2.stallSplits[key] = [{name:e2.name, pct:100}];

        // Get selected rider
        var sel = btn.closest('div').querySelector('.split-add-sel');
        var pctInp = btn.closest('div').querySelector('.split-add-pct');
        var pct = parseInt((pctInp&&pctInp.value)||50)||50;
        var name = '';
        if(sel && sel.value !== ''){
          var ref = G.entries.find(function(x){ return x.rowIndex===parseInt(sel.value); });
          if(ref) name = ref.name;
        }
        if(!name){ toast('Select a rider to split with', true); return; }

        // Reduce primary pct to make room
        var splits = e2.stallSplits[key];
        if(splits.length === 1) splits[0].pct = 100 - pct;
        splits.push({name:name, pct:pct});

        // Apply charge to other rider's tab
        var otherEntry = G.entries.find(function(x){ return x.name===name; });
        if(otherEntry){
          if(!otherEntry.orgFees) otherEntry.orgFees = [];
          otherEntry.orgFees = otherEntry.orgFees.filter(function(of){ return of.splitFromKey !== (e2.rowIndex+'_'+key); });
          var housingItem = null;
          var f = G.cfg.fees;
          var items = [];
          if(e2.stall1qty>0) items.push({key:'s1',label:'Stall 1-night',qty:e2.stall1qty,unitCost:f.stall1||40});
          if(e2.stall2qty>0) items.push({key:'s2',label:'Stall 2-nights',qty:e2.stall2qty,unitCost:f.stall2||80});
          if(e2.shavings>0)  items.push({key:'sh',label:'Shavings',qty:e2.shavings,unitCost:f.shavings||12});
          if(e2.rv1qty>0)    items.push({key:'r1',label:'RV 1-night',qty:e2.rv1qty,unitCost:f.rv1||40});
          if(e2.rv2qty>0)    items.push({key:'r2',label:'RV 2-nights',qty:e2.rv2qty,unitCost:f.rv2||80});
          if(e2.rvCircuit>0) items.push({key:'rc',label:'RV Circuit',qty:e2.rvCircuit,unitCost:f.rvCircuit||110});
          housingItem = items.find(function(x){ return x.key===key; });
          if(housingItem){
            var shareAmt = housingItem.qty * housingItem.unitCost * pct / 100;
            otherEntry.orgFees.push({
              org:'Stall Split', desc:'Share of '+housingItem.label+' from '+e2.name+'/'+e2.horse,
              amt:shareAmt, splitFromKey:e2.rowIndex+'_'+key
            });
          }
        }

        saveEntriesToCache();
        if(G._rebuildEntryModal) G._rebuildEntryModal();
      });
    });
  }

  rebuild();
  G._rebuildEntryModal = rebuild;
}

function switchModalTab(tab){
  var tabs = ['classes','riders','fees','stall'];
  tabs.forEach(function(t){
    var btn = document.getElementById('tbtn-'+t);
    var panel = document.getElementById('mpanel-'+t);
    if(btn) btn.classList.toggle('active', t===tab);
    if(panel) panel.style.display = t===tab ? 'block' : 'none';
  });
}


// ── BUILD STALL LINE ITEMS ──
function buildStallLines(e){
  var f=G.cfg.fees;
  var lines=[];
  if(e.stall1qty>0) lines.push({desc:'Stall 1-night ×'+e.stall1qty, amt:f.stall1*e.stall1qty, type:'stall'});
  if(e.stall2qty>0) lines.push({desc:'Stall 2-nights ×'+e.stall2qty, amt:f.stall2*e.stall2qty, type:'stall'});
  if(e.shavings>0)  lines.push({desc:'Shavings ×'+e.shavings+' bags', amt:f.shavings*e.shavings, type:'stall'});
  if(e.rv1qty>0)    lines.push({desc:'RV 1-night ×'+e.rv1qty, amt:f.rv1*e.rv1qty, type:'rv'});
  if(e.rv2qty>0)    lines.push({desc:'RV 2-nights ×'+e.rv2qty, amt:f.rv2*e.rv2qty, type:'rv'});
  if(e.rvCircuit>0) lines.push({desc:'RV Circuit', amt:f.rvCircuit*e.rvCircuit, type:'rv'});
  return lines;
}

// ── BUILD ORG FEE ROWS ──
function buildOrgFeeRows(e){
  var fees = e.orgFees || [];
  if(!fees.length) return '<div class="small" style="color:var(--muted);padding:.35rem 0">No association fees added yet.</div>';
  return fees.map(function(f,fi){
    return '<div class="tab-line">'
      +'<span><span class="badge b-blue" style="margin-right:6px">'+esc(f.org)+'</span>'+esc(f.desc)+'</span>'
      +'<span style="display:flex;align-items:center;gap:.5rem">'+fmt$(f.amt)
      +'<button class="btn btn-red btn-sm" onclick="removeOrgFee('+e.rowIndex+','+fi+')">&#10005;</button>'
      +'</span></div>';
  }).join('');
}

// ── STALL SPLIT UI ──
function buildStallSplitUI(e, rowIdx){
  var f=G.cfg.fees;

  // Build stall items with individual costs
  var stallItems = [];
  if(e.stall1qty>0) stallItems.push({key:'stall1',label:'Stall 1-night x'+e.stall1qty, total:e.stall1qty*f.stall1});
  if(e.stall2qty>0) stallItems.push({key:'stall2',label:'Stall 2-nights x'+e.stall2qty, total:e.stall2qty*f.stall2});
  if(e.shavings>0)  stallItems.push({key:'shavings',label:'Shavings x'+e.shavings, total:e.shavings*f.shavings});
  if(e.rv1qty>0)    stallItems.push({key:'rv1',label:'RV 1-night x'+e.rv1qty, total:e.rv1qty*f.rv1});
  if(e.rv2qty>0)    stallItems.push({key:'rv2',label:'RV 2-nights x'+e.rv2qty, total:e.rv2qty*f.rv2});
  if(e.rvCircuit>0) stallItems.push({key:'rvc',label:'RV Circuit', total:e.rvCircuit*f.rvCircuit});

  if(!stallItems.length){
    return '<div class="empty-state">No stalling or RV on this entry to split.</div>';
  }

  var stallTotal = stallItems.reduce(function(s,x){ return s+x.total; },0);
  var splits = e.stallSplit || [];
  if(!splits.length) splits = [{name:e.name, pct:100, rowIndex:rowIdx}];
  e.stallSplit = splits;

  // Build rider dropdown options from all entries
  var riderOpts = '<option value="">— Select rider —</option>'
    + G.entries.filter(function(en){ return en.rowIndex !== rowIdx; }).map(function(en){
        return '<option value="'+en.rowIndex+'">'+esc(en.name)+' / '+esc(en.horse)+'</option>';
      }).join('');

  var splitRows = splits.map(function(s,si){
    var amt = stallTotal * s.pct/100;
    return '<div style="display:flex;align-items:center;gap:.5rem;padding:.45rem 0;border-bottom:1px solid var(--border)">'
      +'<div style="flex:1">'
      +'<div class="bold" style="font-size:.84rem">'+esc(s.name)+'</div>'
      +'<div class="small" style="color:var(--green)">'+fmt$(amt)+'</div>'
      +'</div>'
      +'<input type="number" value="'+s.pct+'" min="1" max="100" '
      +'style="width:60px;background:var(--bg);border:1px solid var(--border2);border-radius:4px;color:var(--text);padding:3px 6px;font-size:.82rem" '
      +'onchange="updateSplitPct('+rowIdx+','+si+',this.value)">'
      +'<span style="font-size:.75rem;color:var(--muted)">%</span>'
      +(splits.length>1?'<button class="btn btn-red btn-sm" onclick="removeSplit('+rowIdx+','+si+')">&#10005;</button>':'')
      +'</div>';
  }).join('');

  var totalPct = splits.reduce(function(s,x){ return s+x.pct; },0);
  var pctOk = totalPct === 100;

  // Stall item checkboxes
  var itemChecks = stallItems.map(function(item){
    return '<label style="display:flex;align-items:center;gap:.5rem;font-size:.82rem;padding:.2rem 0;cursor:pointer">'
      +'<input type="checkbox" checked data-stallkey="'+item.key+'" style="accent-color:var(--accent)">'
      +'<span>'+esc(item.label)+'</span>'
      +'<span style="color:var(--accent);margin-left:auto">'+fmt$(item.total)+'</span>'
      +'</label>';
  }).join('');

  return '<div style="margin-bottom:.75rem">'
    +'<div style="font-family:Oswald;color:var(--muted);font-size:.85rem;margin-bottom:.5rem">What to split</div>'
    +'<div style="background:var(--card2);border:1px solid var(--border2);border-radius:8px;padding:.7rem;margin-bottom:.75rem">'
    +itemChecks
    +'<div style="border-top:1px solid var(--border);margin-top:.4rem;padding-top:.4rem;display:flex;justify-content:space-between;font-size:.82rem">'
    +'<span style="color:var(--muted)">Total to split</span><strong style="color:var(--accent)">'+fmt$(stallTotal)+'</strong>'
    +'</div></div>'
    +'<div style="font-family:Oswald;color:var(--muted);font-size:.85rem;margin-bottom:.5rem">Split between</div>'
    +splitRows
    +'<div style="font-size:.75rem;margin-top:.35rem;color:'+(pctOk?'var(--green)':'var(--red)')+'">Total: '+totalPct+'% '+(pctOk?'&#10003; Balanced':'&#8734; Must equal 100%')+'</div>'
    +'</div>'
    +'<div style="background:var(--card2);border:1px solid var(--border2);border-radius:8px;padding:.75rem">'
    +'<div style="font-size:.78rem;color:var(--muted);margin-bottom:.5rem">Add another rider to split with</div>'
    +'<div style="display:grid;grid-template-columns:1fr auto auto;gap:.5rem;align-items:flex-end">'
    +'<div class="form-group"><label>Select from entries</label>'
    +'<select id="split-rider-sel" style="background:var(--bg);border:1px solid var(--border2);border-radius:5px;color:var(--text);padding:.38rem .6rem;font-size:.82rem;width:100%">'+riderOpts+'</select></div>'
    +'<div class="form-group"><label>%</label>'
    +'<input type="number" id="split-pct" value="50" min="1" max="99" style="width:65px;background:var(--bg);border:1px solid var(--border2);border-radius:5px;color:var(--text);padding:.38rem .6rem;font-size:.82rem"></div>'
    +'<button class="btn btn-accent btn-sm" style="margin-bottom:1px" onclick="addSplitPerson('+rowIdx+')">Add</button>'
    +'</div>'
    +'<div style="font-size:.75rem;color:var(--muted);margin-top:.4rem">Or enter a name manually:</div>'
    +'<div style="display:grid;grid-template-columns:1fr auto auto;gap:.5rem;align-items:flex-end;margin-top:.4rem">'
    +'<div class="form-group"><label>Name</label>'
    +'<input type="text" id="split-name" placeholder="e.g. Jane Smith" style="background:var(--bg);border:1px solid var(--border2);border-radius:5px;color:var(--text);padding:.38rem .6rem;font-size:.82rem;width:100%"></div>'
    +'<div style="width:65px"></div><div style="width:60px"></div>'
    +'</div></div>';
}

// ── ADD CLASS PICKER ──
function showAddClassPicker(rowIdx){
  var e=G.entries.find(function(x){ return x.rowIndex===rowIdx; });
  if(!e) return;

  // Get classes not already entered
  var enteredNums = e.classes.filter(function(c){ return c.status!=='scratched'; }).map(function(c){ return c.num; });
  var available = G.cfg.classes.filter(function(c){ return enteredNums.indexOf(c.num)===-1; });

  var root=document.getElementById('modal-root');
  var html='<div class="modal-bg" id="add-class-modal" onclick="if(event.target===this){closeModal();showEntryModal('+rowIdx+')}">'
    +'<div class="modal" style="max-width:500px">'
    +'<h2>Add Class</h2>'
    +'<input type="text" id="class-picker-q" placeholder="Search classes..." oninput="filterClassPicker(this.value)" '
    +'style="width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:6px;color:var(--text);padding:.45rem .65rem;font-size:.85rem;margin-bottom:.75rem">'
    +'<div id="class-picker-list" style="max-height:320px;overflow-y:auto">'
    +renderClassPickerList(available, rowIdx)
    +'</div>'
    +'<div class="btn-row" style="margin-top:.75rem">'
    +'<button class="btn btn-dark" onclick="closeModal();showEntryModal('+rowIdx+')">Cancel</button>'
    +'</div></div></div>';
  root.innerHTML=html;
  G._addClassRowIdx = rowIdx;
  wireClassPicker();
}

function renderClassPickerList(classes, rowIdx){
  if(!classes.length) return '<div class="empty-state">No more classes available</div>';

  // Group by org then division
  var grouped = {};
  classes.forEach(function(c){
    var org = c.org||'CoWN';
    var div = c.division||'General';
    var key = org+'||'+div;
    if(!grouped[key]) grouped[key]={org:org, div:div, classes:[]};
    grouped[key].classes.push(c);
  });

  // Sort groups: CoWN first, then alphabetical by org+division
  var keys = Object.keys(grouped).sort(function(a,b){
    var aOrg = grouped[a].org, bOrg = grouped[b].org;
    if(aOrg==='CoWN' && bOrg!=='CoWN') return -1;
    if(bOrg==='CoWN' && aOrg!=='CoWN') return 1;
    return a.localeCompare(b);
  });

  return keys.map(function(key){
    var group = grouped[key];
    var orgBadge = group.org!=='CoWN'
      ? '<span class="badge b-blue" style="margin-left:6px;font-size:.65rem">'+esc(group.org)+'</span>'
      : '';
    var header = '<div style="background:rgba(212,160,74,.08);padding:.3rem .5rem;font-family:Oswald;font-size:.8rem;color:var(--accent);letter-spacing:.04em;border-bottom:1px solid var(--border)">'
      +esc(group.div)+orgBadge+'</div>';

function filterClassPicker(q){
  var rowIdx = G._addClassRowIdx;
  var e=G.entries.find(function(x){ return x.rowIndex===rowIdx; });
  if(!e) return;
  var enteredNums = e.classes.filter(function(c){ return c.status!=='scratched'; }).map(function(c){ return c.num; });
  var available = G.cfg.classes.filter(function(c){ return enteredNums.indexOf(c.num)===-1; });
  if(q) available = available.filter(function(c){
    return (c.name||'').toLowerCase().indexOf(q.toLowerCase())>-1

function scratchClass(rowIdx, classIdx){
  var e=G.entries.find(function(x){ return x.rowIndex===rowIdx; });
  if(!e) return;
  var cls = e.classes[classIdx];
  if(!cls) return;

  var isCow = cls.isCow || COW_WORDS.some(function(k){ return (cls.name||'').toLowerCase().indexOf(k)>-1; });
  var cowFee = isCow ? (G.cfg.fees.cowSurcharge||0) : 0;
  var paid = amtPaid(e) > 0;

  var msg = paid
    ? 'Scratch '+cls.name+'? Since this entry is paid, '+
      (isCow ? 'the cow fee ($'+cowFee+') will NOT be refunded.' : 'a refund will be applied.')
    : 'Scratch '+cls.name+'? No charge since entry is unpaid.';

  if(!confirm(msg)) return;

  e.classes[classIdx].status = 'scratched';

  // If paid and cow class — keep cow fee charged
  // If paid and not cow — reduce total_owed
  if(paid && !isCow){
    var baseFee = cls.feeCharged || G.cfg.fees.classBase || 0;
    G.payments[rowIdx] = Math.max(0, (G.payments[rowIdx]||0));
    // Reduce what they owe by the class base fee
    e.cognitoAmount = Math.max(0, (e.cognitoAmount||0) - baseFee);
    toast('Scratched — refund of '+fmt$(baseFee)+' applied');
  } else {
    toast('Scratched — '+cls.name);
  }

  // Sync to Supabase
  if(cls.ecId){
    sbFetch('entry_classes?id=eq.'+cls.ecId,{method:'PATCH',
      body:JSON.stringify({status:'scratched',scratch_reason:'voluntary',scratched_at:new Date().toISOString()})
    }).catch(function(err){ console.error('Scratch sync failed:', err); });
  }

  if(G._rebuildEntryModal) G._rebuildEntryModal();
};

function saveOrgFee(rowIdx){

  var org  = document.getElementById('of-org').value;

  if(desc.indexOf('---') === 0){ toast('Please select a fee type', true); return; }
  if(!e.orgFees) e.orgFees=[];
  // For stall/RV fees, also update the entry quantities for tab calculation
  var f = G.cfg.fees;
  if(desc.indexOf('Stall — 1 Night') === 0){ e.stall1qty = (e.stall1qty||0)+1; amt = f.stall1||40; }
  else if(desc.indexOf('Stall — 2 Nights') === 0){ e.stall2qty = (e.stall2qty||0)+1; amt = f.stall2||80; }
  else if(desc.indexOf('Stall — 3 Nights') === 0){ e.stall1qty = (e.stall1qty||0)+3; amt = f.stall3||120; }
  else if(desc.indexOf('Stall — Circuit') === 0){ e.stall1qty = (e.stall1qty||0)+1; amt = f.stallCircuit||150; }
  else if(desc.indexOf('Shavings') === 0){ e.shavings = (e.shavings||0)+1; amt = f.shavings||12; }
  else if(desc.indexOf('RV — 1 Night') === 0){ e.rv1qty = (e.rv1qty||0)+1; amt = f.rv1||40; }
  else if(desc.indexOf('RV — 2 Nights') === 0){ e.rv2qty = (e.rv2qty||0)+1; amt = f.rv2||80; }
  else if(desc.indexOf('RV — Circuit') === 0){ e.rvCircuit = (e.rvCircuit||0)+1; amt = f.rvCircuit||110; }

function addSplitPerson(rowIdx){
  var e=G.entries.find(function(x){ return x.rowIndex===rowIdx; });
  if(!e) return;
  var pct = parseInt((document.getElementById('split-pct')||{value:'50'}).value)||50;
  var name = '';
  var otherRowIdx = null;
  // Try dropdown first
  var sel = document.getElementById('split-rider-sel');
  if(sel && sel.value !== ''){
    otherRowIdx = parseInt(sel.value);
    var refEntry = G.entries.find(function(x){ return x.rowIndex===otherRowIdx; });
    if(refEntry) name = refEntry.name;
  }
  // Fall back to manual text
  if(!name){
    name = (document.getElementById('split-name')||{value:''}).value.trim();
  }
  if(!name){ toast('Select a rider or enter a name', true); return; }

  // Set up splits
  if(!e.stallSplit) e.stallSplit=[{name:e.name, pct:100-pct, rowIndex:rowIdx}];
  if(e.stallSplit.length===1) e.stallSplit[0].pct = 100-pct;
  e.stallSplit.push({name:name, pct:pct, rowIndex:otherRowIdx});

  // Propagate stall share to the other rider's entry
  if(otherRowIdx !== null){
    var otherEntry = G.entries.find(function(x){ return x.rowIndex===otherRowIdx; });
    if(otherEntry){
      var f = G.cfg.fees;
      var stallTotal = e.stall1qty*f.stall1 + e.stall2qty*f.stall2 + e.shavings*f.shavings
        + e.rv1qty*f.rv1 + e.rv2qty*f.rv2 + e.rvCircuit*f.rvCircuit;
      var shareAmt = stallTotal * pct / 100;
      if(!otherEntry.orgFees) otherEntry.orgFees = [];
      // Remove any existing stall share from this horse
      otherEntry.orgFees = otherEntry.orgFees.filter(function(f){ return f.stallShareFrom !== rowIdx; });
      // Add new share
      otherEntry.orgFees.push({
        org:'Stall Share', desc:'Stall share w/ '+esc(e.name)+' ('+pct+'%)',
        amt:shareAmt, stallShareFrom:rowIdx
      });
      toast('Stall share of '+fmt$(shareAmt)+' added to '+name+"'s tab");
    }
  }

  saveEntriesToStorage();
  if(G._rebuildEntryModal) G._rebuildEntryModal();
};

function saveManualEntry(){
  var first  = (document.getElementById('ae-first')||{value:''}).value.trim();
  var last   = (document.getElementById('ae-last')||{value:''}).value.trim();
  var horse  = (document.getElementById('ae-horse')||{value:''}).value.trim();
  var email  = (document.getElementById('ae-email')||{value:''}).value.trim();
  var phone  = (document.getElementById('ae-phone')||{value:''}).value.trim();
  var cown   = (document.getElementById('ae-cown')||{value:''}).value.trim();
  var back   = (document.getElementById('ae-back')||{value:''}).value.trim();
  var gender = (document.getElementById('ae-gender')||{value:''}).value;
  var stall1 = parseInt((document.getElementById('ae-stall1')||{value:'0'}).value)||0;
  var stall2 = parseInt((document.getElementById('ae-stall2')||{value:'0'}).value)||0;
  var shavings=parseInt((document.getElementById('ae-shavings')||{value:'0'}).value)||0;
  var rv     = parseInt((document.getElementById('ae-rv')||{value:'0'}).value)||0;
  var errEl  = document.getElementById('ae-err');

  if(!first||!last){ errEl.textContent='Rider first and last name required'; return; }
  if(!horse){ errEl.textContent='Horse name required'; return; }

  // Get selected classes
  var selectedClasses = [];
  document.querySelectorAll('#add-entry-modal input[type=checkbox]:checked').forEach(function(cb){
    var cls = G.cfg.classes.find(function(c){ return c._id===cb.dataset.classid; });
    if(cls) selectedClasses.push({
      num:cls.num, name:cls.name, division:cls.division,
      org:cls.org||'CoWN', isCow:cls.isCow,
      status:'entered',
      feeCharged:(cls.baseFee||G.cfg.fees.classBase||0)+(cls.isCow?(cls.cowFee||G.cfg.fees.cowSurcharge||0):0)
    });
  });

  // Derive division from first class
  var division = selectedClasses.length ? selectedClasses[0].division : '';

  // Create in-memory entry
  var rowIndex = G.entries.length;
  var entry = {
    rowIndex:rowIndex, dbId:null,
    name:first+' '+last, horse:horse,
    horseGender:gender, email:email, phone:phone,
    memberNum:cown, division:division, assocRaw:'CoWN',
    classes:selectedClasses,
    stall1qty:stall1, stall2qty:stall2, shavings:shavings,
    rv1qty:rv, rv2qty:0, rvCircuit:0, stallNote:'',
    needsMembership:'', cognitoAmount:0, isPaid:false,
    source:'manual'
  };
  G.entries.push(entry);
  G.payments[rowIndex] = 0;
  G.backNums[rowIndex] = back;

  // Sync to Supabase if show is loaded
  if(G.showId){
    syncManualEntry(entry).then(function(){
      toast('Entry added: '+first+' '+last+' on '+horse);
    }).catch(function(err){
      toast('Added locally. DB sync failed: '+err.message, true);
    });
  } else {
    toast('Entry added: '+first+' '+last+' on '+horse);
  }

  closeModal();
  showPage('entries');
}

async function syncManualEntry(entry){
  // Get association
  var assocRows = await sbFetch('associations?abbreviation=eq.CoWN&select=id');
  var assocId = assocRows && assocRows[0] ? assocRows[0].id : null;
  if(!assocId) throw new Error('Association not found');

  var parts = entry.name.split(' ');
  var firstName = parts[0], lastName = parts.slice(1).join(' ')||'(unknown)';

  // Find or create member
  var existing = await sbFetch('members?association_id=eq.'+assocId
    +'&first_name=ilike.'+encodeURIComponent(firstName)
    +'&last_name=ilike.'+encodeURIComponent(lastName)+'&select=id');
  var memberId;
  if(existing && existing.length){
    memberId = existing[0].id;
  } else {
    var nm = await sbFetch('members',{method:'POST',
      body:JSON.stringify({association_id:assocId,first_name:firstName,last_name:lastName,
        email:entry.email||null,phone:entry.phone||null})});
    memberId = nm[0].id;
    if(entry.memberNum){
      await sbFetch('member_registrations',{method:'POST',
        body:JSON.stringify({member_id:memberId,org:'CoWN',registration_number:entry.memberNum})});
    }
  }

  // Find or create horse
  var existingH = await sbFetch('horses?registered_name=ilike.'+encodeURIComponent(entry.horse)+'&select=id');
  var horseId;
  if(existingH && existingH.length){
    horseId = existingH[0].id;
  } else {
    var nh = await sbFetch('horses',{method:'POST',
      body:JSON.stringify({registered_name:entry.horse,gender:entry.horseGender||null})});
    horseId = nh[0].id;
    await sbFetch('horse_owners',{method:'POST',
      body:JSON.stringify({horse_id:horseId,member_id:memberId,primary_owner:true})});
  }

  // Create entry
  var newEntry = await sbFetch('entries',{method:'POST',
    body:JSON.stringify({
      show_id:G.showId, member_id:memberId, horse_id:horseId,
      source:'manual', status:'active',
      stall_1night:entry.stall1qty, stall_2night:entry.stall2qty,
      shavings:entry.shavings, rv_1night:entry.rv1qty,
      total_owed:tabTotal(entry), total_paid:0,
      imported_at:new Date().toISOString()
    })});
  entry.dbId = newEntry[0].id;

  // Create entry_classes
  for(var i=0;i<entry.classes.length;i++){
    var cls = entry.classes[i];
    var sc = await sbFetch('show_classes?show_id=eq.'+G.showId+'&class_number=eq.'+encodeURIComponent(cls.num)+'&select=id');
    if(sc && sc.length){
      await sbFetch('entry_classes',{method:'POST',
        body:JSON.stringify({entry_id:entry.dbId,show_class_id:sc[0].id,
          status:'entered',fee_charged:cls.feeCharged})});
    }
  }
}

async function syncEntriesToSupabase(){
  if(!G.showId) return;

  // Get association id
  var assocRows = await sbFetch('associations?abbreviation=eq.CoWN&select=id');
  var assocId = assocRows && assocRows[0] ? assocRows[0].id : null;
  if(!assocId) throw new Error('Association not found in database');

  var synced=0, errors=[];

  for(var i=0; i<G.entries.length; i++){
    var en = G.entries[i];
    try{
      // Split name
      var parts = en.name.trim().split(' ');
      var firstName = parts[0];
      var lastName  = parts.slice(1).join(' ') || '(unknown)';

      // Find or create member
      var memberId;
      var existingMembers = await sbFetch('members?association_id=eq.'+assocId
        +'&first_name=ilike.'+encodeURIComponent(firstName)
        +'&last_name=ilike.'+encodeURIComponent(lastName)+'&select=id');
      if(existingMembers && existingMembers.length){
        memberId = existingMembers[0].id;
      } else {
        var newMember = await sbFetch('members', {
          method:'POST',
          body: JSON.stringify({
            association_id: assocId,
            first_name: firstName, last_name: lastName,
            email: en.email||null, phone: en.phone||null,
            address: en.address||null,
          })
        });
        memberId = newMember[0].id;
        // Save CoWN # as registration
        if(en.memberNum && en.memberNum !== '0'){
          await sbFetch('member_registrations',{method:'POST',
            body:JSON.stringify({member_id:memberId,org:'CoWN',registration_number:en.memberNum})});
        }
      }

      // Find or create horse
      var horseId;
      var existingHorses = await sbFetch('horses?registered_name=ilike.'
        +encodeURIComponent(en.horse)+'&select=id');
      if(existingHorses && existingHorses.length){
        horseId = existingHorses[0].id;
      } else {
        var newHorse = await sbFetch('horses',{method:'POST',
          body:JSON.stringify({
            registered_name: en.horse,
            gender: en.horseGender||null,
          })});
        horseId = newHorse[0].id;
        // Link owner
        await sbFetch('horse_owners',{method:'POST',
          body:JSON.stringify({horse_id:horseId,member_id:memberId,primary_owner:true})});
      }

      // Upsert entry
      var entryPayload = {
        show_id: G.showId, member_id: memberId, horse_id: horseId,
        source: 'cognito_import', status: 'active',
        stall_1night: en.stall1qty||0, stall_2night: en.stall2qty||0,
        shavings: en.shavings||0, rv_1night: en.rv1qty||0,
        rv_2night: en.rv2qty||0, rv_circuit: en.rvCircuit||0,
        stall_note: en.stallNote||null,
        needs_membership: en.needsMembership||null,
        total_owed: tabTotal(en),
        total_paid: G.payments[en.rowIndex]||0,
        cognito_ref: String(en.entryNum||''),
        imported_at: new Date().toISOString(),
      };

      // Check if entry already exists for this show+member+horse
      var existingEntry = await sbFetch('entries?show_id=eq.'+G.showId
        +'&member_id=eq.'+memberId+'&horse_id=eq.'+horseId+'&select=id');
      var dbEntryId;
      if(existingEntry && existingEntry.length){
        dbEntryId = existingEntry[0].id;
        await sbFetch('entries?id=eq.'+dbEntryId,{method:'PATCH',body:JSON.stringify(entryPayload)});
      } else {
        var newEntry = await sbFetch('entries',{method:'POST',body:JSON.stringify(entryPayload)});
        if(!newEntry || !newEntry[0]) throw new Error('Failed to create entry for '+en.name);
        dbEntryId = newEntry[0].id;
      }
      // Store dbId on in-memory entry
      G.entries[i].dbId = dbEntryId;

      // Upsert entry_classes
      for(var j=0; j<en.classes.length; j++){
        var cls = en.classes[j];
        // Find the show_class
        var showClasses = await sbFetch('show_classes?show_id=eq.'+G.showId
          +'&class_number=eq.'+encodeURIComponent(cls.num)+'&select=id,base_fee,cow_fee,is_cow');
        if(showClasses && showClasses.length){
          var sc = showClasses[0];
          var fee = (parseFloat(sc.base_fee)||0) + (sc.is_cow ? (parseFloat(sc.cow_fee)||0) : 0);
          // Check if entry_class exists
          var existingEC = await sbFetch('entry_classes?entry_id=eq.'+dbEntryId
            +'&show_class_id=eq.'+sc.id+'&select=id');
          if(!existingEC || !existingEC.length){
            await sbFetch('entry_classes',{method:'POST',
              body:JSON.stringify({entry_id:dbEntryId,show_class_id:sc.id,
                status:'entered',fee_charged:fee})});
          }
        }
      }
      synced++;
    } catch(err){
      errors.push(en.name+': '+err.message);
      console.error('Sync error for', en.name, err);
    }
  }

  if(errors.length) console.warn('Sync errors:', errors);
  return {synced, errors};
}

window.clearAllEntries = async function(){
  if(!confirm('Delete ALL entries for this show from local cache AND the database? This cannot be undone.')) return;
  // Clear localStorage
  localStorage.removeItem('gp_entries_'+G.showId);
  localStorage.removeItem('gp_payments_'+G.showId);
  localStorage.removeItem('gp_backnums_'+G.showId);
  // Clear in-memory state
  G.entries=[]; G.payments={}; G.backNums={};
  // Delete from Supabase: entry_classes first (FK constraint), then entries
  try{
    // Get all entry IDs for this show
    var existing = await sbFetch('entries?show_id=eq.'+G.showId+'&select=id');
    if(existing && existing.length){
      // Delete entry_classes for each entry
      for(var i=0;i<existing.length;i++){
        await sbFetch('entry_classes?entry_id=eq.'+existing[i].id,{method:'DELETE'});
      }
      // Delete entries
      await sbFetch('entries?show_id=eq.'+G.showId,{method:'DELETE'});
    }
    alert('All entries cleared. Re-import the correct Cognito export file.');
  } catch(err){
    alert('Local cache cleared. Database delete failed: '+err.message+'\nYou may need to clear entries from Supabase manually.');
    console.error(err);
  }
  showPage('entries');
};

async function boot(){
  // Expose G globally for debugging
  window.G = G;
  window.buildTabLines = buildTabLines;
  window.tabTotal = tabTotal;
  window.saveEntriesToCache = saveEntriesToCache;

  // Load any saved association structure customizations
  loadOrgConfig();

  // Load saved local config
  try{ var saved=localStorage.getItem('gatepost_cfg'); if(saved) G.cfg=JSON.parse(saved); } catch(e){}

  // Get show ID from URL — if missing, go back to index
  var params = new URLSearchParams(window.location.search);
  var showId = params.get('show');
  if(!showId){
    window.location.href = 'index.html';
    return;
  }

  // Show loading state in sidebar
  document.getElementById('show-pill').innerHTML =
    '<div class="sp-name" style="color:var(--muted)">Loading...</div>'
    +'<div class="sp-meta">Connecting to database</div>';

  try{
    // Step 1: Load show record
    var showRows = await sbFetch('shows?id=eq.'+showId+'&select=*');
    var show = showRows && showRows[0];
    if(!show) throw new Error('Show not found: ' + showId);

    G.showId   = showId;
    G.showName = show.name;
    G.showData = show;

    // Populate G.cfg from show data
    G.cfg.showName   = show.name         || G.cfg.showName;
    G.cfg.showDate   = show.show_date    || G.cfg.showDate;
    G.cfg.location   = show.location     || G.cfg.location;
    G.cfg.showStatus = show.status       || '';
    G.cfg.showId     = showId;
    if(show.fee_config && Object.keys(show.fee_config).length){
      G.cfg.fees = Object.assign({}, G.cfg.fees, show.fee_config);
    }

    // Update sidebar
    document.getElementById('show-pill').innerHTML =
      '<div class="sp-name">'+esc(show.name)+'</div>'
      +'<div class="sp-meta">'+(show.show_date||'')+(show.location?' &middot; '+show.location:'')+'</div>';

    // Step 2: Load show classes
    var dbClasses = await sbFetch('show_classes?show_id=eq.'+showId+'&order=class_number&select=*');
    if(dbClasses && dbClasses.length){
      G.cfg.classes = dbClasses.map(function(c,i){
        return { _id:'db'+i, num:c.class_number, name:c.class_name,
          division:c.division, org:c.org, isCow:c.is_cow,
          baseFee:c.base_fee, cowFee:c.cow_fee,
          jackpot:c.jackpot_fee, addedMoney:c.added_money };
      });
    }

    // Step 3: Try localStorage first (fastest, most reliable)
    G.entries = [];
    G.payments = {};
    G.backNums = {};
    try{
      var cached = localStorage.getItem('gp_entries_'+showId);
      if(cached){
        G.entries = JSON.parse(cached);
        var cachedPay = localStorage.getItem('gp_payments_'+showId);
        var cachedBN  = localStorage.getItem('gp_backnums_'+showId);
        if(cachedPay) G.payments = JSON.parse(cachedPay);
        if(cachedBN)  G.backNums = JSON.parse(cachedBN);
        var cachedCO=localStorage.getItem('gp_classorder_'+showId);
        var cachedSc=localStorage.getItem('gp_scratches_'+showId);
        var cachedFS=localStorage.getItem('gp_fullscratches_'+showId);
        if(cachedCO) G.classOrder=JSON.parse(cachedCO);
        if(cachedSc) G.scratches=JSON.parse(cachedSc);
        if(cachedFS) G.fullScratches=JSON.parse(cachedFS);
        toast('Loaded '+G.entries.length+' entries from cache');
      }
    } catch(ex){ console.warn('Cache load failed:', ex); }

    try{
      var cachedRes=localStorage.getItem('gp_results_'+showId);
      if(cachedRes){ G.results=JSON.parse(cachedRes); G.results.forEach(function(r,i){ if(r._idx===undefined) r._idx=i; }); G.resultsFile=localStorage.getItem('gp_resultsfile_'+showId)||''; }
      var cachedLinks=localStorage.getItem('gp_scorelinks_'+showId);
      if(cachedLinks) G.scoreLinks=JSON.parse(cachedLinks);
      var cachedAA=localStorage.getItem('gp_aamoney_'+showId);
      if(cachedAA) G.aaMoney=JSON.parse(cachedAA);
    } catch(ex){ console.warn('Results cache load failed:', ex); }

    // Step 3b: Only load from DB if cache was empty
    if(G.entries.length){
      console.log('Using cached entries:', G.entries.length);
    }
    var dbEntries = G.entries.length ? [] : await sbFetch('entries?show_id=eq.'+showId+'&select=*');
    if(dbEntries && dbEntries.length){
      for(var i=0; i<dbEntries.length; i++){
        var e = dbEntries[i];

        // Load member
        var memberRows = e.member_id
          ? await sbFetch('members?id=eq.'+e.member_id+'&select=id,first_name,last_name,email,phone')
          : [];
        var member = memberRows && memberRows[0] ? memberRows[0] : {};

        // Load horse
        var horseRows = e.horse_id
          ? await sbFetch('horses?id=eq.'+e.horse_id+'&select=id,registered_name,barn_name,gender')
          : [];
        var horse = horseRows && horseRows[0] ? horseRows[0] : {};

        // Load entry classes
        var ecRows = await sbFetch('entry_classes?entry_id=eq.'+e.id
          +'&select=id,status,show_class_id,fee_charged,show_classes(class_number,class_name,division,org)');
        var entryClasses = (ecRows||[]).filter(function(ec){ return ec.status !== 'scratched'; }).map(function(ec){
          var sc = ec.show_classes || {};
          return { num:sc.class_number||'', name:sc.class_name||'',
            division:sc.division||'', org:sc.org||'CoWN', ecId:ec.id };
        });

        // Load payments
        var payRows = await sbFetch('payments?entry_id=eq.'+e.id+'&select=amount');
        var paid = (payRows||[]).reduce(function(s,p){ return s+(parseFloat(p.amount)||0); },0);

        G.payments[i] = paid;
        G.backNums[i] = e.back_number || '';

        // Derive division from first class
        var derivedDiv = entryClasses.length ? (entryClasses[0].division||'') : '';

        // Skip if already loaded from cache
        if(G.entries.find(function(x){ return x.dbId===e.id; })) continue;

        G.entries.push({
          rowIndex: G.entries.length, dbId: e.id,
          name:     (member.first_name||'Unknown')+' '+(member.last_name||''),
          horse:    horse.registered_name || horse.barn_name || 'Unknown Horse',
          horseGender: horse.gender || '',
          email:    member.email || '',
          phone:    member.phone || '',
          memberNum:'',
          division: derivedDiv,
          assocRaw: '',
          classes:  entryClasses,
          stall1qty: e.stall_1night||0, stall2qty:e.stall_2night||0,
          shavings:  e.shavings||0,
          rv1qty:    e.rv_1night||0, rv2qty:e.rv_2night||0, rvCircuit:e.rv_circuit||0,
          stallNote: e.stall_note||'',
          needsMembership: e.needs_membership||'',
          cognitoAmount: parseFloat(e.total_owed)||0,
          isPaid: paid >= (parseFloat(e.total_owed)||0),
        });
      }
      toast('Loaded '+G.entries.length+' entries');
    }



    // Only show entries if we have valid ones with names
    var validEntries = G.entries.filter(function(e){ return e.name && e.name !== 'Unknown Unknown'; });
    if(validEntries.length !== G.entries.length){
      console.warn('Some entries have missing data - filtering', G.entries.length - validEntries.length, 'bad entries');
      G.entries = validEntries;
      // Re-index rowIndex
      G.entries.forEach(function(e, i){ e.rowIndex = i; });
    }
    showPage(G.entries.length ? 'entries' : 'setup');

  } catch(err){
    console.error('Boot error:', err);
    document.getElementById('show-pill').innerHTML =
      '<div class="sp-name" style="color:var(--red)">Error loading show</div>'
      +'<div class="sp-meta">'+esc(err.message)+'</div>';
    // Still show the app — just without data
    showPage('setup');
  }
}

// Patch saveConfig to also save classes to Supabase
var _origSaveConfig = saveConfig;
saveConfig = function(){
  _origSaveConfig();
  if(G.showId && G.cfg.classes.length){
    dbSaveShowClasses(G.showId, G.cfg.classes)
      .then(function(){ toast('Classes saved to database'); })
      .catch(function(e){ toast('Error saving classes: '+e.message, true); });
  }
};

boot();

</script>
</body>
</html>
