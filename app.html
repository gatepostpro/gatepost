<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gatepost — Show Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#0f1923;--card:#1a2733;--card2:#1e2f3d;--accent:#D4A04A;--accent2:#b8863a;
  --green:#27ae60;--red:#e74c3c;--blue:#2980b9;--purple:#8e44ad;
  --text:#e8dcc8;--muted:#8a9aad;--border:#2a3a4a;--border2:#354a5e
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Source Sans 3',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-logo{padding:1.25rem 1rem 1rem;border-bottom:1px solid var(--border)}
.sidebar-logo h1{font-family:'Oswald',sans-serif;font-size:1.4rem;font-weight:700;color:var(--accent);letter-spacing:.05em}
.sidebar-logo span{display:block;font-size:.7rem;color:var(--muted);letter-spacing:.1em;margin-top:2px}
.show-pill{margin:.75rem;background:var(--card2);border:1px solid var(--border2);border-radius:8px;padding:.6rem .75rem;font-size:.78rem}
.show-pill .sp-name{font-family:'Oswald',sans-serif;color:var(--accent);font-size:.9rem}
.show-pill .sp-meta{color:var(--muted);margin-top:2px}
.nav{flex:1;padding:.5rem 0;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:.6rem;padding:.55rem 1rem;cursor:pointer;color:var(--muted);font-size:.85rem;border-left:3px solid transparent;transition:all .15s}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,.04)}
.nav-item.active{color:var(--accent);border-left-color:var(--accent);background:rgba(212,160,74,.08)}
.nav-item .ico{width:16px;text-align:center;font-size:13px;flex-shrink:0}
.nav-section{padding:.75rem 1rem .25rem;font-size:.65rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.sidebar-footer{padding:.75rem;border-top:1px solid var(--border);font-size:.72rem;color:var(--muted)}
.content{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:.6rem 1.25rem;display:flex;align-items:center;gap:1rem;flex-shrink:0}
.topbar-title{font-family:'Oswald',sans-serif;font-size:1.1rem;color:var(--accent)}
.topbar-right{margin-left:auto;display:flex;gap:.5rem;align-items:center}
.page{padding:1.25rem;flex:1}
/* cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1.1rem 1.25rem;margin-bottom:1rem}
.card-title{font-family:'Oswald',sans-serif;color:var(--accent);font-size:1.05rem;margin-bottom:.85rem;display:flex;align-items:center;justify-content:space-between;gap:.5rem}
.card-title small{font-size:.73rem;color:var(--muted);font-family:'Source Sans 3',sans-serif;font-weight:400}
/* stats */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:.75rem;margin-bottom:1rem}
.stat{background:var(--card2);border:1px solid var(--border2);border-radius:8px;padding:.75rem;text-align:center}
.stat .n{font-family:'Oswald',sans-serif;font-size:1.9rem;font-weight:700}
.stat .l{font-size:.72rem;color:var(--muted);margin-top:2px}
.c-gold .n{color:var(--accent)}.c-green .n{color:var(--green)}.c-blue .n{color:var(--blue)}.c-red .n{color:var(--red)}.c-purple .n{color:var(--purple)}
/* table */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.83rem}
th{text-align:left;padding:.45rem .6rem;border-bottom:2px solid var(--accent);color:var(--accent);font-family:'Oswald',sans-serif;white-space:nowrap}
td{padding:.45rem .6rem;border-bottom:1px solid var(--border);vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.025)}
.ctr{text-align:center}
.bold{font-weight:600}
.small{font-size:.75rem;color:var(--muted)}
/* badges */
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.68rem;font-weight:600;white-space:nowrap}
.b-gold{background:rgba(212,160,74,.15);color:var(--accent)}
.b-green{background:rgba(39,174,96,.15);color:#2ecc71}
.b-red{background:rgba(231,76,60,.15);color:#e74c3c}
.b-blue{background:rgba(41,128,185,.15);color:#5dade2}
.b-purple{background:rgba(142,68,173,.15);color:#a569bd}
.b-gray{background:rgba(138,154,173,.1);color:var(--muted)}
.b-cow{background:rgba(184,134,58,.2);color:#d4943a;border:1px solid rgba(184,134,58,.3)}
/* buttons */
.btn{display:inline-flex;align-items:center;gap:.35rem;padding:.4rem .85rem;border:none;border-radius:6px;cursor:pointer;font-size:.8rem;font-weight:600;font-family:'Source Sans 3',sans-serif;transition:all .15s;white-space:nowrap}
.btn-accent{background:var(--accent);color:#1a1a1a}.btn-accent:hover{background:var(--accent2)}
.btn-dark{background:var(--card2);color:var(--text);border:1px solid var(--border2)}.btn-dark:hover{border-color:var(--accent);color:var(--accent)}
.btn-green{background:var(--green);color:#fff}
.btn-red{background:rgba(231,76,60,.12);color:var(--red);border:1px solid rgba(231,76,60,.25)}
.btn-sm{padding:.25rem .55rem;font-size:.75rem}
.btn:disabled{opacity:.4;cursor:default}
.btn-row{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center;margin-bottom:.75rem}
/* search/filters */
.search-wrap{position:relative;margin-bottom:.75rem}
.search-ico{position:absolute;left:.7rem;top:50%;transform:translateY(-50%);color:var(--muted)}
.search-box{width:100%;padding:.55rem .6rem .55rem 2.1rem;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-size:.85rem}
.search-box:focus{outline:none;border-color:var(--accent)}
.pills{display:flex;gap:.35rem;flex-wrap:wrap;margin-bottom:.75rem}
.pill{background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:.2rem .65rem;font-size:.75rem;cursor:pointer;color:var(--muted);transition:all .15s}
.pill:hover{color:var(--text)}.pill.active{border-color:var(--accent);color:var(--accent);background:rgba(212,160,74,.1)}
/* drop zone */
.drop-zone{border:2px dashed var(--border2);border-radius:10px;padding:2.5rem;text-align:center;cursor:pointer;transition:all .2s;background:var(--card2)}
.drop-zone:hover,.drop-zone.drag{border-color:var(--accent);background:rgba(212,160,74,.04)}
.drop-zone .dz-ico{font-size:2rem;margin-bottom:.6rem;color:var(--muted)}
.drop-zone h3{font-family:'Oswald',sans-serif;color:var(--accent);font-size:1.1rem;margin-bottom:.3rem}
.drop-zone p{color:var(--muted);font-size:.82rem}
/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal{background:var(--card);border:1px solid var(--border2);border-radius:12px;padding:1.5rem;max-width:640px;width:100%;max-height:90vh;overflow-y:auto}
.modal h2{font-family:'Oswald',sans-serif;color:var(--accent);font-size:1.3rem;margin-bottom:1rem}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem .75rem;font-size:.85rem;margin-bottom:1rem}
.modal-grid .lbl{color:var(--muted);font-size:.73rem}
.modal-grid .val{font-weight:600;margin-top:1px}
/* tab row in modal */
.tab-row{display:flex;gap:.2rem;border-bottom:1px solid var(--border);margin-bottom:1rem}
.tab-btn{background:none;border:none;color:var(--muted);padding:.5rem .85rem;cursor:pointer;font-size:.82rem;font-family:'Oswald',sans-serif;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab-btn:hover{color:var(--text)}.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-panel{display:none}.tab-panel.active{display:block}
/* payment */
.tab-line{display:flex;justify-content:space-between;align-items:center;padding:.4rem 0;border-bottom:1px solid var(--border);font-size:.85rem}
.tab-line:last-child{border:none}
.tab-total{display:flex;justify-content:space-between;padding:.75rem 0 .25rem;font-weight:600;font-size:1rem;border-top:2px solid var(--border2);margin-top:.5rem}
.pay-status{display:flex;align-items:center;gap:.75rem;padding:.75rem;background:var(--card2);border-radius:8px;margin-top:.75rem}
/* settings */
.stab-row{display:flex;gap:.2rem;border-bottom:1px solid var(--border);margin-bottom:1.25rem}
.stab{background:none;border:none;color:var(--muted);padding:.5rem .9rem;cursor:pointer;font-size:.82rem;font-family:'Oswald',sans-serif;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.stab:hover{color:var(--text)}.stab.active{color:var(--accent);border-bottom-color:var(--accent)}
.ssec{display:none}.ssec.active{display:block}
.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:.75rem;margin-bottom:.75rem}
.form-group{display:flex;flex-direction:column;gap:.3rem}
.form-group label{font-size:.74rem;color:var(--muted)}
.form-group input,.form-group select{background:var(--bg);border:1px solid var(--border2);border-radius:6px;color:var(--text);padding:.42rem .65rem;font-size:.84rem;font-family:'Source Sans 3',sans-serif;transition:border-color .15s}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--accent)}
.form-group select option{background:var(--card)}
.pfx{position:relative}.pfx span{position:absolute;left:.55rem;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.82rem;pointer-events:none}.pfx input{padding-left:1.3rem;max-width:120px}
.tip{font-size:.71rem;color:var(--muted);margin-top:.2rem}
/* fee strip */
.fee-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:.5rem;margin:.75rem 0 .25rem}
.fee-chip{background:var(--card2);border:1px solid var(--border2);border-radius:6px;padding:.5rem .75rem}
.fee-chip .fc-l{font-size:.7rem;color:var(--muted)}
.fee-chip .fc-v{font-family:'Oswald',sans-serif;color:var(--accent);font-size:1rem;margin-top:1px}
/* class config table */
.cfg-tbl{width:100%;border-collapse:collapse;font-size:.81rem}
.cfg-tbl th{text-align:left;padding:.4rem .5rem;border-bottom:2px solid var(--accent);color:var(--accent);font-family:'Oswald',sans-serif;font-size:.78rem;white-space:nowrap}
.cfg-tbl td{padding:.28rem .4rem;border-bottom:1px solid var(--border);vertical-align:middle}
.cfg-tbl tr:hover td{background:rgba(255,255,255,.02)}
.cfg-tbl input[type=text],.cfg-tbl input[type=number]{background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:.28rem .45rem;font-size:.8rem;width:100%;transition:border-color .15s}
.cfg-tbl input:focus{outline:none;border-color:var(--accent)}
.cfg-tbl input[type=checkbox]{width:15px;height:15px;accent-color:var(--accent);cursor:pointer}
.cfg-tbl .div-hdr td{background:rgba(212,160,74,.07);font-family:'Oswald',sans-serif;color:var(--muted);font-size:.78rem;letter-spacing:.04em;padding:.32rem .5rem}
/* mapper */
.map-row{background:var(--card2);border:1px solid var(--border2);border-radius:6px;padding:.6rem .75rem;margin-bottom:.4rem}
.map-row label{font-size:.74rem;color:var(--muted);display:block;margin-bottom:.3rem}
.map-row select{background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:.3rem .5rem;font-size:.78rem;width:100%}
/* toast */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--green);color:#fff;padding:.6rem 1.1rem;border-radius:8px;font-size:.85rem;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.empty-state{color:var(--muted);text-align:center;padding:2.5rem;font-size:.9rem}
.hidden{display:none!important}
/* assoc tag */
.assoc-tag{display:inline-block;padding:1px 7px;border-radius:4px;font-size:.68rem;font-weight:600;margin:1px}
.at-cown{background:rgba(212,160,74,.15);color:var(--accent)}
.at-aqha{background:rgba(41,128,185,.15);color:#5dade2}
.at-apha{background:rgba(142,68,173,.15);color:#a569bd}
.at-other{background:rgba(138,154,173,.1);color:var(--muted)}
@media print{
  .sidebar,.topbar,.btn-row,.pills,.search-wrap,.no-print{display:none!important}
  .content{overflow:visible}.page{padding:0}
  body{background:#fff;color:#000}
  .card{border:1px solid #ccc;break-inside:avoid;background:#fff}
  th{background:#f0f0f0;color:#000}td{border-bottom:1px solid #ddd}
}
</style>
</head>
<body>
<div class="shell">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-logo"><h1>GATEPOST</h1><span>SHOW MANAGEMENT</span></div>
    <div class="show-pill" id="show-pill">
      <div class="sp-name">No show loaded</div>
      <div class="sp-meta">Import a Cognito file to begin</div>
    </div>
    <nav class="nav">
      <div class="nav-section">Show Day</div>
      <div class="nav-item active" data-page="import"><span class="ico">&#8679;</span> Import Entries</div>
      <div class="nav-item" data-page="entries"><span class="ico">&#9776;</span> All Entries</div>
      <div class="nav-item" data-page="classes"><span class="ico">&#127891;</span> Class Lists</div>
      <div class="nav-item" data-page="tabs"><span class="ico">&#36;</span> Tabs &amp; Payments</div>
      <div class="nav-item" data-page="stalls"><span class="ico">&#127968;</span> Stalls &amp; RV</div>
      <div class="nav-section">Results</div>
      <div class="nav-item" data-page="results"><span class="ico">&#127942;</span> Enter Results</div>
      <div class="nav-item" data-page="points"><span class="ico">&#9733;</span> Points</div>
      <div class="nav-section">Configuration</div>
      <div class="nav-item" data-page="settings"><span class="ico">&#9881;</span> Show Management</div>
    </nav>
    <div class="sidebar-footer">Gatepost v0.2 &mdash; CoWN Edition</div>
  </div>

  <!-- CONTENT -->
  <div class="content">
    <div class="topbar">
      <span class="topbar-title" id="page-title">Import Entries</span>
      <div class="topbar-right" id="topbar-right"></div>
    </div>
    <div class="page" id="page"></div>
  </div>
</div>
<div id="modal-root"></div>
<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
