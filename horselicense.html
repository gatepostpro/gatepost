<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CoWN Horse License Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#1a1a2e;--card:#16213e;--accent:#D4A04A;--green:#27ae60;--red:#e74c3c;
  --blue:#2980b9;--text:#e0e0e0;--muted:#888;--border:#2a2a4a
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Source Sans 3',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.hdr{background:var(--card);border-bottom:2px solid var(--accent);padding:.75rem 1.5rem;text-align:center}
.hdr-logo{height:48px}
.hdr span{display:block;font-family:'Oswald',sans-serif;font-size:.85rem;color:var(--accent);letter-spacing:.08em;margin-top:.15rem}
.tabs{display:flex;gap:.25rem;background:var(--card);padding:.25rem .5rem;border-bottom:1px solid var(--border);overflow-x:auto}
.tab{background:none;border:none;color:var(--muted);padding:.5rem .75rem;cursor:pointer;font-size:.8rem;font-family:'Oswald',sans-serif;white-space:nowrap;border-radius:4px}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);background:rgba(212,160,74,.1)}
.main{max-width:1100px;margin:0 auto;padding:1rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:1.25rem;margin-bottom:1rem}
.card-hdr h2{font-family:'Oswald',sans-serif;color:var(--accent);font-size:1.3rem;margin-bottom:.25rem}
.card-hdr p{color:var(--muted);font-size:.85rem}
.search-wrap{position:relative;margin:.75rem 0}
.search-icon{position:absolute;left:.75rem;top:50%;transform:translateY(-50%);color:var(--muted)}
.search-box{width:100%;padding:.6rem .6rem .6rem 2.2rem;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-size:.9rem}
.search-box:focus{outline:none;border-color:var(--accent)}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:.75rem;margin:.75rem 0}
.stat{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:.75rem;text-align:center}
.stat .num{font-family:'Oswald',sans-serif;font-size:1.8rem;font-weight:700}
.stat .lbl{font-size:.75rem;color:var(--muted);margin-top:.15rem}
.gold-stat .num{color:var(--accent)}
.green-stat .num{color:var(--green)}
.blue-stat .num{color:var(--blue)}
.total-stat .num{color:var(--text)}
table{width:100%;border-collapse:collapse;font-size:.85rem}
th{text-align:left;padding:.5rem;border-bottom:2px solid var(--accent);color:var(--accent);font-family:'Oswald',sans-serif;cursor:pointer;white-space:nowrap}
td{padding:.5rem;border-bottom:1px solid var(--border)}
.ctr{text-align:center}
.bold{font-weight:600}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.7rem;font-weight:600}
.badge-year{background:rgba(212,160,74,.15);color:var(--accent)}
.badge-send{background:rgba(39,174,96,.2);color:#2ecc71;border:1px solid #2ecc71}
.badge-sent{background:rgba(39,174,96,.1);color:var(--green)}
.badge-none{background:rgba(136,136,136,.1);color:var(--muted)}
.btn{display:inline-block;padding:.4rem .8rem;border:none;border-radius:6px;cursor:pointer;font-size:.8rem;font-weight:600;font-family:'Source Sans 3',sans-serif}
.btn-accent{background:var(--accent);color:#1a1a1a}
.btn-dark{background:var(--bg);color:var(--text);border:1px solid var(--border)}
.btn-green{background:var(--green);color:#fff}
.btn-blue{background:var(--blue);color:#fff}
.btn-sm{padding:.25rem .5rem;font-size:.75rem}
.btn:disabled{opacity:.5;cursor:default}
.btn-row{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.75rem}
.pills{display:flex;gap:.25rem;flex-wrap:wrap}
.pill{background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:.25rem .6rem;font-size:.75rem;cursor:pointer;color:var(--muted)}
.pill.active{border-color:var(--accent);color:var(--accent);background:rgba(212,160,74,.1)}
.empty{color:var(--muted);text-align:center;padding:2rem}
.hidden{display:none!important}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.5rem;max-width:580px;width:100%;max-height:90vh;overflow-y:auto}
#pwd-gate{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center}
#pwd-gate div{background:var(--card);padding:2rem;border-radius:12px;text-align:center}
#pwd-input{padding:.5rem;margin:.5rem 0;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);text-align:center}
.email-chip{display:inline-block;background:rgba(41,128,185,.15);color:#5dade2;border:1px solid rgba(41,128,185,.3);border-radius:4px;padding:2px 7px;font-size:.75rem;font-family:monospace;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:middle}
@media print{
  body{background:#fff;color:#000}
  .license-card{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
.setup-step{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:1rem;margin-bottom:.75rem}
.setup-step h4{font-family:'Oswald',sans-serif;color:var(--accent);margin-bottom:.4rem}
.setup-step p,.setup-step li{font-size:.85rem;color:var(--muted);line-height:1.6}
.setup-step ul{margin-left:1.2rem}
.setup-step code{background:rgba(212,160,74,.1);color:var(--accent);padding:1px 6px;border-radius:4px;font-size:.8rem}
</style>
</head>
<body>

  <img id="hdr-logo" class="hdr-logo" alt="CoWN">
  <span>HORSE LICENSE HUB</span>
</div>

<div id="pwd-gate" class="hidden">
  <div>
    <p style="font-family:Oswald;color:var(--accent)">Admin Access</p>
    <input type="password" id="pwd-input" placeholder="Enter password">
    <br><button class="btn btn-accent" id="pwd-btn">Unlock</button>
    <button class="btn btn-dark" id="pwd-cancel" style="margin-left:.5rem">Cancel</button>
  </div>
</div>

<div class="main">

  <div id="licenses-view" class="hidden"></div>
  <div id="setup-view"  class="hidden"></div>
  <div id="settings-view" class="hidden"></div>
</div>
<div id="modal-root"></div>

  proxyUrl: "https://script.google.com/macros/s/AKfycbzwTmJwxmPFdCnvKtovw1Lp9p6iDbFtfpEhR8IN74cXrPypny3xHUNfS6TM04Q92vn9Hw/exec",

var S = { view: "loading", horses: [], adminUnlocked: false, pendingView: null };

function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function currentYear(){ return new Date().getFullYear(); }
function parseSentStatus(raw){
  var s = String(raw||"").trim().toLowerCase();
  if(s === "send") return "send";
  if(s.indexOf("sent") === 0) return "sent";
  return "";
}
function sentBadge(h){
  if(h.sentStatus === "send") return "<span class='badge badge-send'>&#9993; Send</span>";
  if(h.sentStatus === "sent") return "<span class='badge badge-sent'>&#10003; Sent</span>";
  return "<span class='badge badge-none'>—</span>";
}

function parseHorseJSON(data){
  var raw = data.horses || [];
  raw.forEach(function(h){ h.sentStatus = parseSentStatus(h.sentRaw || h.sentStatus || ""); });
  return raw.sort(function(a,b){ return (a.owner||"").localeCompare(b.owner||"") || (a.horse||"").localeCompare(b.horse||""); });
}
function parseHorseXLSX(wb){
  var horses = [];
  var shName = wb.SheetNames.find(function(n){ return n.toLowerCase().indexOf("horse")>-1||n.toLowerCase().indexOf("license")>-1; }) || wb.SheetNames[0];
  var raw = XLSX.utils.sheet_to_json(wb.Sheets[shName], {defval:null});
  for(var i=0;i<raw.length;i++){
    var row=raw[i], lk={};
    Object.keys(row).forEach(function(k){ lk[k.toLowerCase().trim()]=row[k]; });
    var horse=String(lk["horse"]||lk["horse name"]||"").trim();
    var owner=String(lk["owner"]||lk["owner name"]||"").trim();
    if(!horse&&!owner) continue;
    var rawSent=String(lk["emailed"]||lk["sent"]||"").trim();
    horses.push({
      horse:horse, owner:owner,
      horseNum:String(lk["cown horse number"]||lk["cown horse #"]||lk["horse number"]||lk["horse #"]||"").trim(),
      ownerCownNum:"", ownerEmail:String(lk["email"]||lk["recipient"]||"").trim(),
      rider:String(lk["rider"]||lk["rider name"]||"").trim(),
      riderCownNum:"", riderEmail:"",
      year:parseInt(lk["year"]||lk["license year"]||lk["yr"]||0)||currentYear(),
      licNum:String(lk["license #"]||lk["license number"]||lk["lic #"]||"").trim(),
      sentStatus:parseSentStatus(rawSent), sentRaw:rawSent, rowIndex:i,
      ownerFound:true, riderFound:true
    });
  }
  return horses.sort(function(a,b){ return (a.owner||"").localeCompare(b.owner||"")||(a.horse||"").localeCompare(b.horse||""); });
}

function renderTabs(){
  var tabs=[{id:"lookup",l:"Horse Lookup"}];
  if(S.adminUnlocked) tabs.push({id:"dashboard",l:"Dashboard"},{id:"licenses",l:"Licenses"},{id:"settings",l:"Settings"});
  var h=tabs.map(function(t){ return "<button class='tab"+(S.view===t.id?" active":"")+"' data-view='"+t.id+"'>"+t.l+"</button>"; }).join("");
  if(!S.adminUnlocked) h+="<button class='tab' id='admin-unlock-btn' style='margin-left:auto;color:var(--muted)'>Admin</button>";
  document.getElementById("tabs").innerHTML=h;
  document.querySelectorAll(".tab").forEach(function(b){ if(b.dataset.view) b.addEventListener("click",function(){ showView(b.dataset.view); }); });
  var u=document.getElementById("admin-unlock-btn");
  if(u) u.addEventListener("click",function(){ S.pendingView="dashboard"; document.getElementById("pwd-gate").classList.remove("hidden"); document.getElementById("pwd-input").focus(); });
}
function showView(v){
  var needsPwd=["dashboard","licenses","settings"];
  if(needsPwd.indexOf(v)>-1&&!S.adminUnlocked){ S.pendingView=v; document.getElementById("pwd-gate").classList.remove("hidden"); document.getElementById("pwd-input").focus(); return; }
  S.view=v;
  ["loading","lookup","dashboard","licenses","settings"].forEach(function(id){ document.getElementById(id+"-view").classList.toggle("hidden",id!==v); });
  renderTabs();
  if(v==="lookup") renderLookup();
  if(v==="dashboard") renderDashboard();
  if(v==="licenses") renderLicenses();
  if(v==="settings") renderSettings();
}
document.getElementById("pwd-btn").addEventListener("click",function(){
  if(document.getElementById("pwd-input").value===CONFIG.password){
    S.adminUnlocked=true; document.getElementById("pwd-gate").classList.add("hidden"); document.getElementById("pwd-input").value="";
    showView(S.pendingView||"dashboard");
  } else { alert("Wrong password"); }
});
document.getElementById("pwd-cancel").addEventListener("click",function(){ document.getElementById("pwd-gate").classList.add("hidden"); document.getElementById("pwd-input").value=""; });
document.getElementById("pwd-input").addEventListener("keydown",function(e){ if(e.key==="Enter") document.getElementById("pwd-btn").click(); });

// ===== LOOKUP — public users can view & print their own card =====
function renderLookup(){
  var el=document.getElementById("lookup-view");
  el.innerHTML="<div class='card'><div class='card-hdr'><h2>Horse License Lookup</h2><p>Search by horse, owner, rider, or year — then view or print your card</p></div>"
    +"<div class='search-wrap'><span class='search-icon'>&#128269;</span><input class='search-box' id='lookup-q' placeholder='Enter horse, owner, rider, or year...'></div>"
    +"<div id='lookup-results'></div></div>";
  document.getElementById("lookup-q").addEventListener("input",function(){
    var q=this.value.trim().toLowerCase();
    var res=document.getElementById("lookup-results");
    if(q.length<2){ res.innerHTML=""; return; }
    var matches=S.horses.filter(function(h){
      return (h.horse||"").toLowerCase().indexOf(q)>-1
          ||(h.owner||"").toLowerCase().indexOf(q)>-1
          ||(h.rider||"").toLowerCase().indexOf(q)>-1
          ||String(h.horseNum||"").toLowerCase().indexOf(q)>-1
          ||String(h.year||"").indexOf(q)>-1;
    });
    if(!matches.length){ res.innerHTML="<p class='empty'>No licenses found</p>"; return; }
    var t="<table><thead><tr><th>Horse</th><th>Owner</th><th>Rider</th><th>Year</th><th></th></tr></thead><tbody>";
    matches.slice(0,25).forEach(function(h){
      var rd=h.rider||h.owner;

// ===== EMAIL =====
function sendLicenseEmail(rowIdx,btn){
  var horse=S.horses.find(function(h){ return h.rowIndex===rowIdx; });
  if(!horse){ alert("License not found"); return; }
  if(!horse.riderEmail){ alert("No email address found for this rider."); return; }
  var orig=btn.textContent; btn.textContent="Sending..."; btn.disabled=true;
  fetch(CONFIG.proxyUrl+"?action=sendLicense&rowIdx="+rowIdx+"&ts="+Date.now())
    .then(function(r){ return r.json(); })
    .then(function(data){
      if(data.success){ btn.textContent="Sent!"; btn.classList.add("btn-green"); horse.sentStatus="sent"; horse.sentRaw="sent";
        setTimeout(function(){ btn.textContent=orig; btn.disabled=false; btn.classList.remove("btn-green"); },3000);
      } else { btn.textContent="Failed"; alert("Error: "+(data.error||"Unknown")); setTimeout(function(){ btn.textContent=orig; btn.disabled=false; },2000); }
    })
    .catch(function(e){ btn.textContent="Error"; alert("Network error: "+e.message); setTimeout(function(){ btn.textContent=orig; btn.disabled=false; },2000); });
}
function sendBatchLicenses(rowIdxs,btn){
  var orig=btn.textContent, total=rowIdxs.length, sent=0, failed=0, failedNames=[];
  btn.disabled=true;
  function sendNext(i){
    if(i>=total){
      btn.textContent="Done! Sent "+sent+"/"+total;
      if(failed>0) alert(failed+" failed:\n"+failedNames.join("\n"));
      setTimeout(function(){ btn.textContent=orig; btn.disabled=false; },4000); return;
    }
    var idx=rowIdxs[i];
    var horse=S.horses.find(function(h){ return h.rowIndex===idx; });
    btn.textContent="Sending "+(i+1)+"/"+total+(horse?" — "+horse.horse:"")+"...";
    fetch(CONFIG.proxyUrl+"?action=sendLicense&rowIdx="+idx+"&ts="+Date.now())
      .then(function(r){ return r.json(); })
      .then(function(data){
        if(data.success){ sent++; if(horse){ horse.sentStatus="sent"; horse.sentRaw="sent"; } }
        else { failed++; failedNames.push((horse?horse.horse:"#"+idx)+": "+(data.error||"error")); }
        setTimeout(function(){ sendNext(i+1); },800);
      })
      .catch(function(e){ failed++; failedNames.push((horse?horse.horse:"#"+idx)+": network error"); setTimeout(function(){ sendNext(i+1); },800); });
  }
  sendNext(0);
}

// ===== LOAD =====
function autoLoad(){
  showView("loading");
  fetch(CONFIG.proxyUrl+"?type="+CONFIG.sheetType+"&ts="+Date.now())
    .then(function(r){ if(!r.ok) throw new Error("HTTP "+r.status); return r.json(); })
    .then(function(data){
      if(!data||!data.horses) throw new Error("Bad response from proxy");
      S.horses=parseHorseJSON(data); showView("lookup");
    })
    .catch(function(e){
      document.getElementById("loading-view").innerHTML="<div class='card'><p class='empty' style='color:var(--red)'>Could not load: "+esc(e.message)+"</p>"
        +"<div class='btn-row' style='justify-content:center;margin-top:1rem'><button class='btn btn-accent' onclick='autoLoad()'>Retry</button>"
        +"<label class='btn btn-dark' style='cursor:pointer'>Upload File<input type='file' accept='.xlsx,.xls,.csv' id='fuf' style='display:none'></label></div></div>";
      var fu=document.getElementById("fuf");
      if(fu) fu.addEventListener("change",function(e){ var file=e.target.files[0]; if(!file) return; var r=new FileReader(); r.onload=function(ev){ S.horses=parseHorseXLSX(XLSX.read(new Uint8Array(ev.target.result),{type:"array"})); showView("lookup"); }; r.readAsArrayBuffer(file); });
    });
}
