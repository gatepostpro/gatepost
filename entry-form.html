<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Show Entry — Thorofare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #090f0b;
      --card: #0e1a10;
      --card2: #132015;
      --border: #1e2e20;
      --border2: #2a3f2d;
      --text: #d4e8d0;
      --text2: #8faa90;
      --accent: #c8922a;
      --accent2: #e0a830;
      --red: #c44;
      --green: #4a9;
      --input-bg: #0a1a0c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

    /* ── Header ── */
    #app-header {
      background: var(--card); border-bottom: 1px solid var(--border);
      padding: 12px 20px; display: flex; align-items: center; gap: 12px;
    }
    .logo { font-family: Oswald, sans-serif; font-size: 1.3rem; color: var(--accent); letter-spacing: 1px; }
    #header-show-name { font-size: 0.85rem; color: var(--text2); }

    /* ── Progress ── */
    #progress-bar { background: var(--card); border-bottom: 1px solid var(--border); padding: 12px 20px; display: none; }
    .progress-steps { display: flex; gap: 4px; }
    .ps { height: 4px; flex: 1; background: var(--border2); border-radius: 2px; transition: background 0.2s; }
    .ps.done   { background: var(--accent); }
    .ps.active { background: var(--accent2); }
    .progress-label { margin-top: 6px; font-size: 0.75rem; color: var(--text2); }

    /* ── Main content ── */
    #main { max-width: 600px; margin: 0 auto; padding: 20px 16px 100px; }

    /* ── Cards ── */
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 16px; }
    .step-title { font-family: Oswald, sans-serif; font-size: 1.4rem; color: var(--accent); margin-bottom: 4px; letter-spacing: 0.5px; }
    .step-sub   { font-size: 0.85rem; color: var(--text2); margin-bottom: 20px; line-height: 1.5; }

    /* ── Forms ── */
    .form-row { margin-bottom: 16px; }
    .form-row label { display: block; font-size: 0.8rem; color: var(--text2); margin-bottom: 4px; }
    .form-row input, .form-row select {
      width: 100%; background: var(--input-bg); border: 1px solid var(--border2); color: var(--text);
      padding: 10px 12px; border-radius: 6px; font-size: 0.95rem; font-family: inherit; appearance: none;
    }
    .form-row input:focus, .form-row select:focus { outline: none; border-color: var(--accent); }
    .form-row.half    { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-row.thirds  { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 12px; }
    .form-row input.err, .form-row select.err { border-color: var(--red); }
    .req { color: var(--red); }

    /* ── Checkboxes ── */
    .check-row { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; cursor: pointer; }
    .check-row input[type=checkbox] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--accent); flex-shrink: 0; margin-top: 2px; }
    .check-row label { cursor: pointer; font-size: 0.9rem; line-height: 1.4; }

    /* ── Class cards ── */
    .class-org-section { margin-bottom: 20px; }
    .class-org-label { font-family: Oswald, sans-serif; font-size: 1rem; color: var(--accent); margin-bottom: 8px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
    .class-div-label  { font-size: 0.78rem; color: var(--text2); margin: 12px 0 5px; text-transform: uppercase; letter-spacing: 0.6px; }
    .class-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; background: var(--card2); border: 1px solid var(--border);
      border-radius: 6px; margin-bottom: 6px; cursor: pointer; transition: border-color 0.15s;
    }
    .class-item:hover { border-color: var(--border2); }
    .class-item.selected { border-color: var(--accent); background: #162518; }
    .class-item input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--accent); flex-shrink: 0; cursor: pointer; }
    .class-item-name { flex: 1; font-size: 0.9rem; line-height: 1.3; }
    .class-item-num  { font-size: 0.75rem; color: var(--text2); margin-bottom: 2px; }
    .class-item-fee  { font-size: 0.85rem; color: var(--accent); white-space: nowrap; }

    /* ── Membership toggles ── */
    .memb-toggle { background: var(--card2); border: 1px solid var(--border2); color: var(--text2); border-radius: 5px; padding: .3rem .7rem; font-size: .85rem; cursor: pointer; transition: border-color .12s, color .12s; }
    .memb-toggle:hover { border-color: var(--accent); color: var(--fg); }
    .memb-toggle.active { border-color: var(--accent); color: var(--accent); background: #162518; }

    /* ── Stall/RV qty rows ── */
    .qty-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .qty-row:last-of-type { border-bottom: none; }
    .qty-label { flex: 1; }
    .qty-label-name { font-size: 0.9rem; }
    .qty-label-fee  { font-size: 0.8rem; color: var(--text2); margin-top: 1px; }
    .qty-ctrl { display: flex; align-items: center; gap: 10px; }
    .qty-btn {
      width: 30px; height: 30px; background: var(--card2); border: 1px solid var(--border2);
      color: var(--text); border-radius: 5px; font-size: 1.2rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center; line-height: 1;
    }
    .qty-btn:hover { border-color: var(--accent); color: var(--accent); }
    .qty-val { min-width: 28px; text-align: center; font-size: 0.95rem; font-family: Oswald, sans-serif; }

    /* ── Summary ── */
    .sum-line { display: flex; justify-content: space-between; align-items: baseline; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.9rem; gap: 8px; }
    .sum-line .sum-note { font-size: 0.78rem; color: var(--text2); }
    .sum-line.total { font-family: Oswald, sans-serif; font-size: 1.15rem; color: var(--accent); padding-top: 12px; border-bottom: none; }
    .pay-notice {
      background: #162518; border: 1px solid var(--border2); border-left: 3px solid var(--accent);
      padding: 12px 16px; border-radius: 6px; font-size: 0.85rem; color: var(--text2); margin: 16px 0; line-height: 1.6;
    }
    .show-info-row { display: flex; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
    .show-info-row:last-child { border-bottom: none; }
    .show-info-label { color: var(--text2); width: 80px; flex-shrink: 0; font-size: 0.82rem; padding-top: 1px; }

    /* ── Fixed nav bar ── */
    #nav-bar {
      position: fixed; bottom: 0; left: 0; right: 0; display: none;
      background: var(--card); border-top: 1px solid var(--border);
      padding: 12px 20px; justify-content: space-between; align-items: center;
    }
    .nav-btn { padding: 10px 24px; border-radius: 6px; font-size: 0.9rem; font-family: inherit; cursor: pointer; border: none; }
    .nav-btn.back { background: transparent; border: 1px solid var(--border2); color: var(--text2); }
    .nav-btn.back:hover { border-color: var(--accent); color: var(--accent); }
    .nav-btn.fwd  { background: var(--accent); color: #111; font-weight: 600; font-family: Oswald, sans-serif; letter-spacing: 0.5px; }
    .nav-btn.fwd:hover { background: var(--accent2); }
    .nav-btn:disabled { opacity: 0.45; cursor: default; pointer-events: none; }

    /* ── Loading ── */
    #loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 16px; color: var(--text2); }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error / Success ── */
    #error-screen, #success-screen {
      display: none; flex-direction: column; align-items: center; justify-content: center;
      min-height: 60vh; gap: 14px; text-align: center; padding: 20px;
    }
    .big-icon { font-size: 3rem; line-height: 1; }
    #error-screen h2, #success-screen h2 { font-family: Oswald, sans-serif; font-size: 1.8rem; color: var(--accent); }
    #error-screen p, #success-screen p { color: var(--text2); max-width: 380px; line-height: 1.6; }
    .ref-code {
      font-family: monospace; background: var(--card); padding: 10px 20px;
      border-radius: 6px; font-size: 1.3rem; color: var(--accent2);
      border: 1px solid var(--border2); letter-spacing: 2px;
    }

    /* ── Step error toast ── */
    #step-err {
      background: #2a1010; border: 1px solid var(--red); border-radius: 6px;
      padding: 10px 14px; font-size: 0.85rem; color: #e88; margin-bottom: 12px; display: none;
    }

    /* ── Entry overview ─────────────────────────────────────────── */
    .entry-horse-card { background:var(--card); border:1px solid var(--border2); border-radius:8px; margin-bottom:12px; overflow:hidden; }
    .horse-card-hdr { display:flex; align-items:center; gap:8px; padding:10px 14px; background:var(--card2); border-bottom:1px solid var(--border); }
    .horse-card-name { font-family:Oswald,sans-serif; font-size:1rem; color:var(--accent); flex:1; }
    .horse-card-detail { font-size:.8rem; color:var(--text2); }
    .horse-card-remove { background:none; border:none; color:var(--text2); cursor:pointer; font-size:.9rem; padding:2px 6px; border-radius:4px; }
    .horse-card-remove:hover { color:var(--red); background:rgba(204,68,68,.12); }
    .rider-row { display:flex; align-items:center; gap:10px; padding:9px 14px; border-bottom:1px solid var(--border); }
    .rider-row-info { flex:1; min-width:0; }
    .rider-row-name { font-size:.88rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .rider-row-role { font-size:.78rem; color:var(--text2); font-weight:400; }
    .rider-row-classes { font-size:.75rem; color:var(--text2); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .rider-row-actions { display:flex; align-items:center; gap:8px; flex-shrink:0; }
    .bill-to-label { display:flex; align-items:center; gap:4px; font-size:.78rem; color:var(--text2); cursor:pointer; white-space:nowrap; }
    .bill-to-label input[type=checkbox] { accent-color:var(--accent); width:14px; height:14px; cursor:pointer; }
    .rider-remove-btn { background:none; border:none; color:var(--text2); cursor:pointer; font-size:.82rem; padding:2px 5px; border-radius:4px; }
    .rider-remove-btn:hover { color:var(--red); background:rgba(204,68,68,.12); }
    .add-rider-btn { display:block; width:100%; padding:10px 14px; background:rgba(200,146,42,.08); border:none; border-top:1px solid var(--border); color:var(--accent); font-size:.85rem; font-weight:600; cursor:pointer; text-align:left; font-family:inherit; border-radius:0 0 8px 8px; }
    .add-rider-btn:hover { background:rgba(200,146,42,.18); }
    .add-horse-btn { display:block; width:100%; padding:13px 16px; background:rgba(200,146,42,.07); border:2px dashed var(--accent); color:var(--accent); font-size:.9rem; font-weight:600; cursor:pointer; border-radius:8px; text-align:center; font-family:inherit; margin-bottom:16px; transition:background .15s; }
    .add-horse-btn:hover { background:rgba(200,146,42,.18); }
    .pick-rider-row { display:block; width:100%; padding:.9rem 1rem; background:var(--card2); border:1px solid var(--border2); border-radius:8px; color:var(--text); font-family:inherit; font-size:.92rem; cursor:pointer; text-align:left; margin-bottom:.5rem; transition:border-color .15s,background .15s; }
    .pick-rider-row:hover { border-color:var(--accent); background:rgba(200,146,42,.07); }
    .pick-rider-name { font-weight:600; }
    .pick-rider-meta { font-size:.78rem; color:var(--text2); margin-top:.2rem; }
    .overview-continue { width:100%; padding:13px; background:var(--accent); color:#111; font-weight:600; font-family:Oswald,sans-serif; letter-spacing:.5px; border:none; border-radius:6px; font-size:.95rem; cursor:pointer; }
    .overview-continue:hover { background:var(--accent2); }

    @media (max-width: 480px) {
      .form-row.half   { grid-template-columns: 1fr; }
      .form-row.thirds { grid-template-columns: 1fr 1fr; }
      .memb-grid       { grid-template-columns: 1fr; }
      .nav-btn { padding: 10px 16px; }
    }
  </style>
</head>
<body>

<div id="app-header">
  <div class="logo">THOROFARE</div>
  <div id="header-show-name">Loading…</div>
</div>

<div id="progress-bar">
  <div class="progress-steps" id="progress-steps"></div>
  <div class="progress-label"  id="progress-label"></div>
</div>

<div id="main">
  <div id="loading">
    <div class="spinner"></div>
    <div>Loading show information…</div>
  </div>

  <div id="error-screen">
    <div class="big-icon">🚫</div>
    <h2 id="err-title">Not Available</h2>
    <p  id="err-msg">This entry form is not currently active.</p>
  </div>

  <div id="step-err"></div>
  <div id="wizard" style="display:none"></div>

  <div id="success-screen">
    <div class="big-icon">✓</div>
    <h2>Entry Submitted</h2>
    <p id="success-msg"></p>
    <div class="ref-code" id="success-ref"></div>
    <p style="margin-top:4px;font-size:0.8rem;color:var(--text2)">Save this confirmation number for your records.</p>
  </div>
</div>

<div id="nav-bar">
  <button class="nav-btn back" id="btn-back" onclick="navBack()">← Back</button>
  <button class="nav-btn fwd"  id="btn-next" onclick="navNext()">Continue →</button>
</div>

<script>
'use strict';
// ── Supabase config ───────────────────────────────────────────────────────────
var SB_URL  = 'https://tpurkcxtkvwpywxnuzwe.supabase.co';
var SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRwdXJrY3h0a3Z3cHl3eG51endlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MDUwMzYsImV4cCI6MjA5MjI4MTAzNn0.j1fPBjBsbIoXXosM96YtywdGiVVLWnd-YrXZ1634alU';

// ── App state ─────────────────────────────────────────────────────────────────
var SHOW      = null;
var CLASSES   = [];
var FEE       = {};
var isPreview = false;

// Wizard navigation
var CUR_STEP              = 'welcome';
var CURR_HORSE_IDX        = 0;
var CURR_RIDER_IDX        = 0;
var IS_ADDING_TO_EXISTING = false;
var _cameFromPickRider    = false; // true when user chose "New person" from the pick-rider step

// Submission — horses[] each with riders[]; shared stalling at top level
var SUBMISSION = {
  horses: [],
  haulinQty: 0, stall1qty: 0, stall2qty: 0, stall3qty: 0,
  shavings: 0, rv1qty: 0, rv2qty: 0, rvCircuit: 0,
  stallingGroup: '', stallingArrival: '', stallingDeparture: '',
  rvArrival: '', rvDeparture: '', stallingPackageId: '', rvPackageId: '',
  clinicChoice: '', practiceSessions: [],
  waiverAgreed: false
};

function newHorse() {
  return { horseName:'', horseGender:'', horseOwner:'', horseRegNum:'', horseDob:'',
           ownerDiffFromRider:false, ownerBillTo:false, riders:[] };
}
function newRider() {
  return { riderFirst:'', riderLast:'', email:'', phone:'',
           address1:'', city:'', state:'', zip:'',
           isYouth:false, dob:'',
           selectedClassIds:[], selectedOrgs:[],
           memberships:{}, memberStatus:{}, ownerMembs:{},
           billTo:true };
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmt$(n){ return '$'+(+n).toFixed(2); }
function fmtDate(d) {
  if(!d) return '';
  var p = d.split('-');
  if(p.length !== 3) return d;
  var mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return mo[parseInt(p[1])-1]+' '+parseInt(p[2])+', '+p[0];
}

function currHorse(){ return SUBMISSION.horses[CURR_HORSE_IDX]; }
function currRider(){ var h = currHorse(); return h ? h.riders[CURR_RIDER_IDX] : null; }

function getAvailOrgs() {
  return (FEE._selectedOrgs||[]).filter(function(o){ return CLASSES.some(function(c){ return (c.org||'General')===o; }); });
}
function getSelectedClasses(rider) {
  var r = rider || currRider() || {};
  return CLASSES.filter(function(c){ return (r.selectedClassIds||[]).indexOf(c.id) >= 0; });
}
function getSelectedOrgs(rider) {
  var seen = {}, orgs = [];
  getSelectedClasses(rider).forEach(function(c){ var o = c.org||'General'; if(!seen[o]){ seen[o]=true; orgs.push(o); } });
  return orgs;
}
function getExistingNamedRiders() {
  // Returns all named rider slots in SUBMISSION, excluding the current one being filled
  var riders = [];
  SUBMISSION.horses.forEach(function(horse, hi) {
    horse.riders.forEach(function(rider, ri) {
      if(hi === CURR_HORSE_IDX && ri === CURR_RIDER_IDX) return;
      var name = ((rider.riderFirst||'')+' '+(rider.riderLast||'')).trim();
      if(name) riders.push({hi:hi, ri:ri, name:name, rider:rider});
    });
  });
  return riders;
}

async function sbGet(path) {
  var r = await fetch(SB_URL+'/rest/v1/'+path, { headers:{'apikey':SB_ANON,'Authorization':'Bearer '+SB_ANON} });
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbPost(table, body) {
  var r = await fetch(SB_URL+'/rest/v1/'+table, {
    method:'POST',
    headers:{'apikey':SB_ANON,'Authorization':'Bearer '+SB_ANON,'Content-Type':'application/json','Prefer':'return=representation'},
    body: JSON.stringify(body)
  });
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}

function hasStalling() {
  return (FEE._stallingPackages||[]).some(function(p){ return +p.price>0; })
      || (FEE._rvPackages||[]).some(function(p){ return +p.price>0; })
      || (FEE.stall1||0)>0 || (FEE.stall2||0)>0 || (FEE.stall3||0)>0
      || (FEE.rv1||0)>0    || (FEE.rv2||0)>0    || (FEE.rvCircuit||0)>0
      || (FEE.haulin||0)>0;
}
function hasPractice() {
  return (Array.isArray(FEE._practiceSessions) && FEE._practiceSessions.length>0)
      || (Array.isArray(FEE._clinicOptions)     && FEE._clinicOptions.length>0);
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  var params = new URLSearchParams(location.search);
  var showId = params.get('show');
  isPreview  = params.get('preview') === '1';
  if(!showId) return showError('No Show Specified','This link is missing a show ID. Contact the show secretary for the correct entry link.');
  try {
    var shows = await sbGet('shows?id=eq.'+showId+'&select=*');
    if(!shows||!shows.length) return showError('Show Not Found','This entry form link is not valid. Contact the show secretary.');
    SHOW = shows[0];
    if(!isPreview){
      if(SHOW.status==='setup')          return showError('Entries Not Open Yet','Online entries for '+SHOW.name+' are not open yet. Check back soon.');
      if(SHOW.status==='entries_closed') return showError('Entries Closed','The entry deadline has passed for '+SHOW.name+'.');
      if(SHOW.status==='running')        return showError('Show In Progress',SHOW.name+' is currently in progress. Online entries are closed.');
      if(SHOW.status==='complete')       return showError('Show Complete',SHOW.name+' has already taken place.');
      if(SHOW.entry_deadline){
        var deadline = new Date(SHOW.entry_deadline+'T23:59:59');
        if(new Date()>deadline) return showError('Entries Closed','The entry deadline for '+SHOW.name+' was '+fmtDate(SHOW.entry_deadline)+'. Online entries are now closed.');
      }
    }
    CLASSES = await sbGet('show_classes?show_id=eq.'+showId+'&order=run_order.asc');
    FEE = SHOW.fee_config || {};
    document.getElementById('header-show-name').textContent = SHOW.name;
    document.title = SHOW.name+' — Entry Form';
    if(isPreview){
      var banner = document.createElement('div');
      banner.style.cssText = 'background:#2a1a08;border-bottom:2px solid #c8922a;padding:8px 20px;font-size:.82rem;color:#e0a830;text-align:center';
      banner.textContent = '⚠ SECRETARY PREVIEW — submissions are disabled in preview mode';
      document.body.insertBefore(banner, document.body.firstChild);
    }
    // Seed first horse + rider
    var h = newHorse(); var r = newRider();
    h.riders.push(r); SUBMISSION.horses.push(h);
    CURR_HORSE_IDX = 0; CURR_RIDER_IDX = 0;
    startWizard();
  } catch(e) {
    showError('Unable to Load','There was a problem loading this entry form. Please try again or contact the show secretary.');
    console.error(e);
  }
}

function showError(title, msg) {
  document.getElementById('loading').style.display = 'none';
  var scr = document.getElementById('error-screen');
  scr.style.display = 'flex';
  document.getElementById('err-title').textContent = title;
  document.getElementById('err-msg').textContent   = msg;
}

// ── Wizard framework ──────────────────────────────────────────────────────────
// Steps: welcome | horse | rider | orgs | classes | memberships | overview | stalling | practice | summary
// overview has its own Continue button; Back/Next nav bar hidden on that step.

var STEP_PHASE = { welcome:0, horse:0, rider:0, orgs:0, classes:0, memberships:0, overview:0, stalling:1, practice:1, summary:2 };
var STEP_LABEL = { welcome:'Show Information', horse:'Horse', rider:'Rider', orgs:'Associations', classes:'Classes', memberships:'Member Numbers', overview:'Your Entries', stalling:'Stalling & RV', practice:'Practice & Clinics', summary:'Review & Submit' };

function startWizard() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('wizard').style.display  = '';
  document.getElementById('progress-bar').style.display = '';
  document.getElementById('nav-bar').style.display = 'flex';
  goTo('welcome');
}

function updateProgress() {
  var phase = STEP_PHASE[CUR_STEP] || 0;
  var phases = ['Your Entries'];
  if(hasStalling()||hasPractice()) phases.push('Stalling');
  phases.push('Summary');
  document.getElementById('progress-steps').innerHTML = phases.map(function(lbl,i){
    var cls = i<phase ? 'done' : i===phase ? 'active' : '';
    return '<div class="ps '+cls+'" title="'+esc(lbl)+'"></div>';
  }).join('');
  var lbl = STEP_LABEL[CUR_STEP] || CUR_STEP;
  if(CUR_STEP==='horse'||CUR_STEP==='rider'||CUR_STEP==='orgs'||CUR_STEP==='classes'||CUR_STEP==='memberships'){
    var h = currHorse();
    if(h && h.horseName) lbl += ' — '+h.horseName;
    if(SUBMISSION.horses.length>1) lbl += ' (horse '+(CURR_HORSE_IDX+1)+' of '+SUBMISSION.horses.length+')';
  }
  document.getElementById('progress-label').textContent = lbl;
}

function getNextStep(step) {
  if(step==='welcome')     return 'horse';
  if(step==='horse')       return getExistingNamedRiders().length > 0 ? 'pickrider' : 'rider';
  if(step==='pickrider')   return 'rider'; // fallback; normally handled by pick/new buttons
  if(step==='rider')       return getAvailOrgs().length>1 ? 'orgs' : 'classes';
  if(step==='orgs')        return 'classes';
  if(step==='classes')     return 'memberships';
  if(step==='memberships') return 'overview';
  if(step==='overview')    return hasStalling() ? 'stalling' : hasPractice() ? 'practice' : 'summary';
  if(step==='stalling')    return hasPractice() ? 'practice' : 'summary';
  if(step==='practice')    return 'summary';
  return null;
}
function getPrevStep(step) {
  if(step==='welcome')     return null;
  if(step==='horse')       return getExistingNamedRiders().length > 0 ? 'overview' : null;
  if(step==='pickrider')   return IS_ADDING_TO_EXISTING ? 'overview' : 'horse';
  if(step==='rider')       return _cameFromPickRider ? 'pickrider' : (IS_ADDING_TO_EXISTING ? 'overview' : 'horse');
  if(step==='orgs')        return 'rider';
  if(step==='classes')     return getAvailOrgs().length>1 ? 'orgs' : 'rider';
  if(step==='memberships') return 'classes';
  if(step==='overview')    return 'memberships';
  if(step==='stalling')    return 'overview';
  if(step==='practice')    return hasStalling() ? 'stalling' : 'overview';
  if(step==='summary')     return hasPractice() ? 'practice' : hasStalling() ? 'stalling' : 'overview';
  return null;
}

function goTo(step) {
  _saveCurrentStep();
  clearStepErr();
  CUR_STEP = step;
  updateProgress();
  var wrap = document.getElementById('wizard');
  wrap.innerHTML = '';
  var renders = { welcome:renderWelcome, horse:renderHorse, pickrider:renderPickRider, rider:renderRider, orgs:renderOrgFilter, classes:renderClasses, memberships:renderMemberships, overview:renderOverview, stalling:renderStalling, practice:renderPractice, summary:renderSummary };
  if(renders[step]) renders[step](wrap);
  // Nav bar
  var nextBtn = document.getElementById('btn-next');
  var backBtn = document.getElementById('btn-back');
  nextBtn.style.display = '';
  nextBtn.textContent   = step==='summary' ? 'Submit Entry' : 'Continue →';
  nextBtn.disabled      = false;
  backBtn.style.visibility = getPrevStep(step) ? 'visible' : 'hidden';
  window.scrollTo(0,0);
}

function _saveCurrentStep() {
  if(CUR_STEP==='horse')       saveHorse();
  if(CUR_STEP==='rider')       saveRider();
  if(CUR_STEP==='memberships') saveMemberships();
  if(CUR_STEP==='stalling')    saveStalling();
  if(CUR_STEP==='practice')    savePractice();
}

function navBack() {
  clearStepErr();
  // Backing out of pickrider while adding a rider: remove the empty slot we reserved
  if(CUR_STEP === 'pickrider' && IS_ADDING_TO_EXISTING) {
    var horse = SUBMISSION.horses[CURR_HORSE_IDX];
    if(horse) {
      var r = horse.riders[CURR_RIDER_IDX];
      if(r && !r.riderFirst && !r.riderLast) horse.riders.splice(CURR_RIDER_IDX, 1);
    }
    goTo('overview');
    return;
  }
  var prev = getPrevStep(CUR_STEP);
  if(prev) goTo(prev);
}
function navNext() {
  clearStepErr();
  if(!validateStep()) return;
  if(CUR_STEP==='summary'){ submitEntry(); return; }
  var next = getNextStep(CUR_STEP);
  if(next) goTo(next);
}

function showStepErr(msg) {
  var el = document.getElementById('step-err');
  el.textContent = msg; el.style.display = '';
  window.scrollTo({top: 0, behavior: 'smooth'});
}
function clearStepErr(){ document.getElementById('step-err').style.display='none'; }

// ── Validation ────────────────────────────────────────────────────────────────
function validateStep() {
  if(CUR_STEP==='horse')   return validateHorse();
  if(CUR_STEP==='rider')   return validateRider();
  if(CUR_STEP==='classes') return validateClasses();
  if(CUR_STEP==='summary') return validateSummary();
  return true;
}
function requireField(id) {
  var el = document.getElementById(id);
  if(!el) return true;
  var ok = el.value.trim()!=='';
  el.classList.toggle('err',!ok);
  return ok;
}
function validateHorse() {
  var ok = ['f-horseName','f-horseGender'].map(requireField).every(Boolean);
  if(!ok) showStepErr('Please fill in all required fields.');
  return ok;
}
function validateRider() {
  var ok = ['f-riderFirst','f-riderLast','f-email','f-phone'].map(requireField).every(Boolean);
  var r = currRider();
  if(r && r.isYouth) ok = requireField('f-dob') && ok;
  if(!ok) showStepErr('Please fill in all required fields.');
  return ok;
}
function validateClasses() {
  var r = currRider();
  if(!r||r.selectedClassIds.length===0){ showStepErr('Please select at least one class.'); return false; }
  return true;
}
function validateSummary() {
  var cb = document.getElementById('f-waiver');
  if(cb) SUBMISSION.waiverAgreed = cb.checked;
  if(!SUBMISSION.waiverAgreed){
    showStepErr('Please read and agree to the waiver at the bottom of this page before submitting.');
    if(cb) { cb.closest('.card').scrollIntoView({behavior:'smooth', block:'center'}); }
    return false;
  }
  return true;
}

// ── Step: Classes ─────────────────────────────────────────────────────────────
function getClassFee(c) {
  var base = c.base_fee  != null ? +c.base_fee  : +(FEE.classBase      || 0);
  var cow  = c.is_cow     ? (c.cow_fee != null ? +c.cow_fee : +(FEE.cowSurcharge   || 0)) : 0;
  var cut  = c.is_cutting ? +(FEE.cuttingSurcharge || 0) : 0;
  var jpot = c.is_jackpot ? +(c.jackpot_fee || 0) : 0;
  return base + cow + cut + jpot;
}

function toggleClass(id) {
  var r = currRider(); if(!r) return;
  var idx = r.selectedClassIds.indexOf(id);
  if(idx >= 0) r.selectedClassIds.splice(idx, 1);
  else r.selectedClassIds.push(id);
  renderClasses(document.getElementById('wizard'));
}

function renderOrgFilter(wrap) {
  var r = currRider() || {};
  var availOrgs = getAvailOrgs();
  var selected = (r.selectedOrgs && r.selectedOrgs.length > 0) ? r.selectedOrgs : availOrgs.slice();

  var html = '<div class="card">';
  html += '<div class="step-title">Associations</div>';
  html += '<div class="step-sub">Choose which associations you want to enter. This narrows the class list to just what is relevant for you.</div>';
  availOrgs.forEach(function(org) {
    var checked = selected.indexOf(org) >= 0;
    html += '<div class="class-item' + (checked ? ' selected' : '') + '" onclick="toggleOrgFilter(\'' + esc(org) + '\')" style="margin-bottom:6px">';
    html += '<input type="checkbox" ' + (checked ? 'checked' : '') + ' onclick="event.stopPropagation();toggleOrgFilter(\'' + esc(org) + '\')">'; 
    html += '<span style="font-weight:600;font-size:1rem">' + esc(org) + '</span>';
    var cnt = CLASSES.filter(function(c){ return (c.org||'General')===org; }).length;
    html += '<span style="margin-left:auto;font-size:.82rem;color:var(--text2)">' + cnt + ' class' + (cnt===1?'':'es') + '</span>';
    html += '</div>';
  });
  html += '<div style="margin-top:12px;font-size:.82rem;color:var(--text2)">Select all associations that apply. You can choose specific classes on the next step.</div>';
  html += '</div>';
  wrap.innerHTML = html;
}

window.toggleOrgFilter = function(org) {
  var r = currRider(); if(!r) return;
  if(!r.selectedOrgs) r.selectedOrgs = getAvailOrgs().slice();
  var idx = r.selectedOrgs.indexOf(org);
  if(idx >= 0) {
    if(r.selectedOrgs.length > 1) r.selectedOrgs.splice(idx, 1);
  } else {
    r.selectedOrgs.push(org);
  }
  renderOrgFilter(document.getElementById('wizard'));
};

function renderClasses(wrap) {
  var r = currRider() || {};
  var h = currHorse() || {};
  var orgs = [];
  var byOrg = {};
  var orgFilter = (r.selectedOrgs && r.selectedOrgs.length > 0) ? r.selectedOrgs : null;
  CLASSES.forEach(function(c) {
    var org = c.org || 'General';
    if(orgFilter && orgFilter.indexOf(org) === -1) return; // skip unselected orgs
    var div = c.division || 'Open';
    if(!byOrg[org]) { byOrg[org] = {}; orgs.push(org); }
    if(!byOrg[org][div]) byOrg[org][div] = [];
    byOrg[org][div].push(c);
  });

  var html = '<div class="card">';
  html += '<div class="step-title">Class Selection</div>';
  if(h.horseName) html += '<div class="step-sub">Classes for <strong>'+esc(h.horseName)+'</strong></div>';
  else html += '<div class="step-sub">Select the classes you\'d like to enter. Fees shown per class.</div>';

  if(CLASSES.length === 0) {
    html += '<div style="color:var(--text2);font-size:0.9rem;padding:4px 0">No classes are configured for this show yet. Contact the show secretary.</div>';
  } else {
    orgs.forEach(function(org) {
      var divs = Object.keys(byOrg[org]);
      html += '<div class="class-org-section"><div class="class-org-label">'+esc(org)+'</div>';
      divs.forEach(function(div) {
        if(divs.length > 1 || div !== 'Open') {
          html += '<div class="class-div-label">'+esc(div)+'</div>';
        }
        byOrg[org][div].forEach(function(c) {
          var fee = getClassFee(c);
          var sel = (r.selectedClassIds||[]).indexOf(c.id) >= 0;
          html += '<div class="class-item'+(sel?' selected':'')+'" onclick="toggleClass(\''+c.id+'\')">';
          html += '<input type="checkbox" '+(sel?'checked':'')+' onclick="event.stopPropagation();toggleClass(\''+c.id+'\')">';
          html += '<div class="class-item-name">';
          if(c.class_number) html += '<div class="class-item-num">Class '+esc(c.class_number)+'</div>';
          html += esc(c.class_name);
          if(c.is_cow)     html += ' <span style="font-size:0.75rem;color:var(--text2)">(cow)</span>';
          if(c.is_jackpot) html += ' <span style="font-size:0.75rem;color:var(--accent2)">(jackpot)</span>';
          html += '</div>';
          html += '<div class="class-item-fee">'+(fee > 0 ? fmt$(fee) : '')+'</div>';
          html += '</div>';
        });
      });
      html += '</div>';
    });
  }
  html += '</div>';

  // Office fee note
  var oFee = +(FEE.officeFee || FEE.officeEntry || 0);
  if(oFee > 0) {
    html += '<div style="font-size:0.82rem;color:var(--text2);padding:0 4px">Note: An office/entry fee of '+fmt$(oFee)+' applies per entry in addition to class fees.</div>';
  }

  wrap.innerHTML = html;
}

// ── Step: Memberships ─────────────────────────────────────────────────────────
// Maps class org → the membership org actually needed.
// VRH/AQHA Ranch/AQHA RHC all use the same AQHA membership.
// CoWN membership covers SHTX — never ask for both.
var ORG_MEMBERSHIP_MAP = {
  'CoWN': 'CoWN', 'SHTX': 'SHTX',
  'AQHA': 'AQHA', 'AQHA Ranch': 'AQHA', 'AQHA RHC': 'AQHA', 'VRH': 'AQHA',
  'APHA': 'APHA', 'ApHC': 'ApHC', 'NRHA': 'NRHA', 'NRCHA': 'NRCHA',
  'WHSR': 'WHSR'
};

function getMembFields(rider) {
  var r = rider || currRider();
  var seen = {};
  var membOrgs = [];
  getSelectedOrgs(r).forEach(function(org) {
    var m = ORG_MEMBERSHIP_MAP[org] || org;
    if(!seen[m]) { seen[m] = true; membOrgs.push(m); }
  });
  // CoWN membership covers SHTX — drop SHTX if CoWN is present
  if(seen['CoWN']) membOrgs = membOrgs.filter(function(o){ return o !== 'SHTX'; });
  return membOrgs.map(function(o){ return {org: o, label: o+' Member #'}; });
}

function _getMembOptions(org) {
  // Returns [{key, label, amt}] for a specific org, using org-specific schedule keys first, then globals.
  var sched = FEE._schedule || [];
  var baseKeys = ['dayLicense','membership1yr','membership3yr','membershipLife'];
  var labels = {dayLicense:'Day License', membership1yr:'1-Year Membership', membership3yr:'3-Year Membership', membershipLife:'Lifetime Membership'};
  var opts = [];
  baseKeys.forEach(function(k) {
    var orgKey = org ? k + '_' + org : null;
    var entry = (orgKey && sched.find(function(s){ return s.key === orgKey; }))
             || sched.find(function(s){ return s.key === k; });
    var amt = entry ? +entry.amt : +(FEE[orgKey]||FEE[k]||0);
    if(amt > 0) {
      var buyKey = k === 'dayLicense' ? 'buy_day' : 'buy_' + k.replace('membership','').toLowerCase();
      opts.push({key: buyKey, label: labels[k], amt: amt});
    }
  });
  return opts.filter(function(o,i,a){ return a.findIndex(function(x){ return x.key===o.key; })===i; });
}

function renderMemberships(wrap) {
  var r = currRider() || {};
  var h = currHorse() || {};
  var fields = getMembFields(r);

  var html = '<div class="card">';
  html += '<div class="step-title">Memberships</div>';
  if(h.horseName) html += '<div class="step-sub">Membership status for <strong>'+esc(r.riderFirst||'this rider')+'</strong> on <strong>'+esc(h.horseName)+'</strong></div>';
  else html += '<div class="step-sub">Most organizations require active membership to participate. Select your status for each organization below.</div>';

  if(fields.length === 0) {
    html += '<div style="color:var(--text2);font-size:0.9rem;padding:8px 0">No membership requirements for the selected classes.</div>';
  } else {
    fields.forEach(function(f) {
      var status = (r.memberStatus||{})[f.org] || '';
      html += '<div style="background:var(--card2);border:1px solid var(--border2);border-radius:8px;padding:.85rem 1rem;margin-bottom:.75rem">';
      html += '<div style="font-family:Oswald,sans-serif;color:var(--accent);font-size:.95rem;margin-bottom:.5rem">'+esc(f.org)+'</div>';
      html += '<div style="display:flex;gap:.5rem;margin-bottom:.5rem;flex-wrap:wrap">';
      html += '<button type="button" class="memb-toggle'+(status==='current'?' active':'')+'" onclick="setMembStatus(\''+esc(f.org)+'\',\'current\')">Current Member</button>';
      html += '<button type="button" class="memb-toggle'+(status&&status!=='current'?' active':'')+'" onclick="setMembStatus(\''+esc(f.org)+'\',\'notmember\')">Not a Member</button>';
      html += '</div>';
      if(status === 'current') {
        var val = (r.memberships||{})[f.org] || '';
        var safeId = 'memb-'+f.org.replace(/[^a-zA-Z0-9]/g,'_');
        html += '<div class="form-row" style="margin-bottom:0"><label>'+esc(f.org)+' Member #</label>';
        html += '<input id="'+safeId+'" data-org="'+esc(f.org)+'" value="'+esc(val)+'" placeholder="Member number">';
        html += '</div>';
      } else if(status && status !== 'current') {
        var membOpts = _getMembOptions(f.org);
        if(membOpts.length > 0) {
          html += '<div style="font-size:.82rem;color:var(--text2);margin-bottom:.35rem">Add membership now:</div>';
          html += '<div style="display:flex;gap:.4rem;flex-wrap:wrap">';
          membOpts.forEach(function(opt){
            var buyKey = 'buy_'+f.org+'_'+opt.key;
            var isSel = (r.memberStatus||{})[f.org] === buyKey;
            html += '<button type="button" class="memb-toggle'+(isSel?' active':'')+'" onclick="setMembStatus(\''+esc(f.org)+'\',\''+esc(buyKey)+'\')" style="font-size:.8rem">'+esc(opt.label)+' — '+fmt$(opt.amt)+'</button>';
          });
          html += '</div>';
          html += '<div style="font-size:.75rem;color:var(--text2);margin-top:.3rem">Or you can obtain/renew membership at check-in.</div>';
        } else {
          html += '<div style="font-size:.78rem;color:var(--text2)">Membership can be obtained at check-in with the secretary.</div>';
        }
      }
      html += '</div>';
    });
    if(h.ownerDiffFromRider && h.horseOwner) {
      html += '<div style="background:var(--card2);border:1px solid var(--border2);border-radius:8px;padding:.85rem 1rem;margin-bottom:.75rem">';
      html += '<div style="font-family:Oswald,sans-serif;color:var(--accent);font-size:.95rem;margin-bottom:.5rem">Owner Member Numbers</div>';
      html += '<div style="font-size:.8rem;color:var(--text2);margin-bottom:.5rem">Enter membership numbers for the horse owner where they differ from the rider.</div>';
      fields.forEach(function(f) {
        var val = (r.ownerMembs||{})[f.org] || '';
        html += '<div class="form-row" style="margin-bottom:.4rem"><label>Owner '+esc(f.org)+' Member #</label>';
        html += '<input data-ownerorg="'+esc(f.org)+'" value="'+esc(val)+'" placeholder="optional" oninput="var rc=currRider();if(rc){rc.ownerMembs=rc.ownerMembs||{};rc.ownerMembs[\''+esc(f.org)+'\']=this.value;}">';
        html += '</div>';
      });
      html += '</div>';
    }
  }
  html += '</div>';
  wrap.innerHTML = html;
}

window.setMembStatus = function(org, status) {
  var r = currRider(); if(!r) return;
  if(!r.memberStatus) r.memberStatus = {};
  r.memberStatus[org] = status;
  if(status !== 'current' && r.memberships) delete r.memberships[org];
  renderMemberships(document.getElementById('wizard'));
};

function saveMemberships() {
  var r = currRider(); if(!r) return;
  if(!r.memberships) r.memberships = {};
  document.querySelectorAll('[data-org]').forEach(function(el) {
    var org = el.getAttribute('data-org');
    var val = el.value.trim();
    if(val) r.memberships[org] = val;
    else delete r.memberships[org];
  });
}

// ── Step: Pick Rider ─────────────────────────────────────────────────────────
function renderPickRider(wrap) {
  var existing = getExistingNamedRiders();
  var html = '<div class="card"><div class="step-title">Who is riding?</div>';
  html += '<div class="step-sub">Select someone already on this entry, or add a new person.</div></div>';
  if(existing.length > 0) {
    existing.forEach(function(p) {
      var clsCount = (p.rider.selectedClassIds||[]).length;
      html += '<button type="button" class="pick-rider-row" onclick="pickExistingRider('+p.hi+','+p.ri+')">';
      html += '<div class="pick-rider-name">'+esc(p.name)+'</div>';
      if(clsCount) html += '<div class="pick-rider-meta">'+clsCount+' class'+(clsCount!==1?'es':'')+'  already entered — classes will be selected separately for this horse</div>';
      html += '</button>';
    });
  }
  html += '<button type="button" class="add-horse-btn" style="margin-top:.5rem" onclick="pickNewRider()">+ New person</button>';
  wrap.innerHTML = html;
  // Hide Next — selection is via the buttons
  document.getElementById('btn-next').style.display = 'none';
}
window.pickExistingRider = function(hi, ri) {
  var src = SUBMISSION.horses[hi].riders[ri];
  var dst = SUBMISSION.horses[CURR_HORSE_IDX].riders[CURR_RIDER_IDX];
  // Copy contact + membership — classes stay empty (new horse, new class selection)
  dst.riderFirst = src.riderFirst; dst.riderLast = src.riderLast;
  dst.email = src.email; dst.phone = src.phone;
  dst.address1 = src.address1; dst.city = src.city; dst.state = src.state; dst.zip = src.zip;
  dst.isYouth = src.isYouth; dst.dob = src.dob;
  dst.memberships = JSON.parse(JSON.stringify(src.memberships||{}));
  dst.memberStatus = JSON.parse(JSON.stringify(src.memberStatus||{}));
  dst.billTo = false; // existing billing contact already set
  _cameFromPickRider = false;
  goTo(getAvailOrgs().length > 1 ? 'orgs' : 'classes');
};
window.pickNewRider = function() {
  _cameFromPickRider = true;
  goTo('rider');
};

// ── Step: Overview ────────────────────────────────────────────────────────────
function renderOverview(wrap) {
  try { _renderOverview(wrap); }
  catch(err) { wrap.innerHTML = '<div class="card" style="color:var(--red)">Overview error: '+esc(err.message||String(err))+'</div>'; console.error('renderOverview error', err); }
}
function _renderOverview(wrap) {
  var html = '<div class="card"><div class="step-title">Your Entries</div>';
  html += '<div class="step-sub">Review horses and riders. Add more or continue when ready.</div></div>';

  SUBMISSION.horses.forEach(function(horse, hi) {
    html += '<div class="entry-horse-card">';
    html += '<div class="horse-card-hdr">';
    html += '<div class="horse-card-name">'+(horse.horseName ? esc(horse.horseName) : '<em style="color:var(--text2)">Unnamed horse</em>')+'</div>';
    if(horse.horseGender) html += '<div class="horse-card-detail">'+esc(horse.horseGender)+'</div>';
    html += '<button class="horse-card-remove" onclick="editHorse('+hi+')" title="Edit horse" style="font-size:.78rem;padding:2px 7px">Edit</button>';
    if(SUBMISSION.horses.length > 1) {
      html += '<button class="horse-card-remove" onclick="removeHorse('+hi+')" title="Remove horse">&#215;</button>';
    }
    html += '</div>';

    horse.riders.forEach(function(rider, ri) {
      var name = (rider.riderFirst||'') + (rider.riderFirst&&rider.riderLast?' ':'') + (rider.riderLast||'');
      var selCls = getSelectedClasses(rider);
      var clsSummary = selCls.length === 0 ? 'No classes selected' : selCls.map(function(c){ return (c.class_number?c.class_number+' ':'')+c.class_name; }).join(', ');
      html += '<div class="rider-row">';
      html += '<div class="rider-row-info">';
      html += '<div class="rider-row-name">'+(name||'<em style="font-weight:400;color:var(--text2)">Unnamed rider</em>')+(rider.isYouth?' <span class="rider-row-role">· Youth</span>':'')+'</div>';
      html += '<div class="rider-row-classes">'+esc(clsSummary)+'</div>';
      html += '</div>';
      html += '<div class="rider-row-actions">';
      html += '<label class="bill-to-label" title="Send invoice to this person"><input type="checkbox" '+(rider.billTo!==false?'checked':'')+' onchange="toggleBillTo('+hi+','+ri+',this.checked)"> Invoice</label>';
      html += '<button class="rider-remove-btn" onclick="editRider('+hi+','+ri+')" title="Edit">Edit</button>';
      if(horse.riders.length > 1) {
        html += '<button class="rider-remove-btn" onclick="removeRider('+hi+','+ri+')" title="Remove rider">&#215;</button>';
      }
      html += '</div></div>';
    });

    if(horse.ownerDiffFromRider && horse.horseOwner) {
      html += '<div class="rider-row" style="background:rgba(200,146,42,.05)">';
      html += '<div class="rider-row-info"><div class="rider-row-name">'+esc(horse.horseOwner)+' <span class="rider-row-role">· Owner</span></div></div>';
      html += '<div class="rider-row-actions">';
      html += '<label class="bill-to-label" title="Send invoice to this person"><input type="checkbox" '+(horse.ownerBillTo?'checked':'')+' onchange="toggleOwnerBillTo('+hi+',this.checked)"> Invoice</label>';
      html += '</div></div>';
    }

    html += '<button class="add-rider-btn" onclick="addRiderToHorse('+hi+')">+ Add another rider to this horse</button>';
    html += '</div>';
  });

  html += '<button class="add-horse-btn" onclick="addAnotherHorse()">+ Add another horse</button>';
  wrap.innerHTML = html;
}

window.editHorse = function(hi) {
  CURR_HORSE_IDX = hi; CURR_RIDER_IDX = 0; IS_ADDING_TO_EXISTING = true; goTo('horse');
};
window.editRider = function(hi, ri) {
  CURR_HORSE_IDX = hi; CURR_RIDER_IDX = ri; IS_ADDING_TO_EXISTING = true; goTo('rider');
};
window.addAnotherHorse = function() {
  var h = newHorse(); var r = newRider();
  r.billTo = false; // first rider already holds bill-to
  h.riders.push(r); SUBMISSION.horses.push(h);
  CURR_HORSE_IDX = SUBMISSION.horses.length - 1; CURR_RIDER_IDX = 0;
  IS_ADDING_TO_EXISTING = false; _cameFromPickRider = false; goTo('horse');
};
window.addRiderToHorse = function(hi) {
  CURR_HORSE_IDX = hi;
  var r = newRider();
  r.billTo = false; // only one bill-to allowed
  SUBMISSION.horses[hi].riders.push(r);
  CURR_RIDER_IDX = SUBMISSION.horses[hi].riders.length - 1;
  IS_ADDING_TO_EXISTING = true; _cameFromPickRider = false;
  // Show picker if there are already named riders they could reuse
  var existing = getExistingNamedRiders();
  goTo(existing.length > 0 ? 'pickrider' : 'rider');
};
window.removeHorse = function(hi) {
  if(SUBMISSION.horses.length <= 1) return;
  SUBMISSION.horses.splice(hi, 1);
  if(CURR_HORSE_IDX >= SUBMISSION.horses.length) CURR_HORSE_IDX = SUBMISSION.horses.length - 1;
  renderOverview(document.getElementById('wizard'));
};
window.removeRider = function(hi, ri) {
  var horse = SUBMISSION.horses[hi];
  if(!horse || horse.riders.length <= 1) return;
  horse.riders.splice(ri, 1);
  renderOverview(document.getElementById('wizard'));
};
window.toggleBillTo = function(hi, ri, checked) {
  if(checked) {
    // Clear all others — only one bill-to at a time
    SUBMISSION.horses.forEach(function(h){ h.riders.forEach(function(r){ r.billTo = false; }); h.ownerBillTo = false; });
    SUBMISSION.horses[hi].riders[ri].billTo = true;
  } else {
    SUBMISSION.horses[hi].riders[ri].billTo = false;
  }
  _renderOverview(document.getElementById('wizard'));
};
window.toggleOwnerBillTo = function(hi, checked) {
  if(checked) {
    SUBMISSION.horses.forEach(function(h){ h.riders.forEach(function(r){ r.billTo = false; }); h.ownerBillTo = false; });
    SUBMISSION.horses[hi].ownerBillTo = true;
  } else {
    SUBMISSION.horses[hi].ownerBillTo = false;
  }
  _renderOverview(document.getElementById('wizard'));
};

// ── Step: Stalling ────────────────────────────────────────────────────────────
function feeLabelEF(key, fallback) {
  var sched = FEE._schedule;
  if(Array.isArray(sched)){
    var e = sched.find(function(f){ return f.key===key; });
    if(e && e.label) return e.label;
  }
  return fallback;
}

function qtyRow(feeKey, subKey, label) {
  var price = FEE[feeKey] || 0;
  var val   = SUBMISSION[subKey] || 0;
  return '<div class="qty-row">'
    +'<div class="qty-label"><div class="qty-label-name">'+esc(label)+'</div>'
    +'<div class="qty-label-fee">'+fmt$(price)+' each</div></div>'
    +'<div class="qty-ctrl">'
    +'<button class="qty-btn" onclick="changeQty(\''+subKey+'\',-1)" type="button">&#8722;</button>'
    +'<div class="qty-val" id="qty-'+subKey+'">'+val+'</div>'
    +'<button class="qty-btn" onclick="changeQty(\''+subKey+'\',1)"  type="button">&#43;</button>'
    +'</div></div>';
}

function changeQty(subKey, delta) {
  SUBMISSION[subKey] = Math.max(0, (SUBMISSION[subKey] || 0) + delta);
  var el = document.getElementById('qty-'+subKey);
  if(el) el.textContent = SUBMISSION[subKey];
}

function renderStalling(wrap) {
  var f = FEE;
  var stallPkgs = (f._stallingPackages || []).filter(function(p){ return +p.price > 0; });
  var rvPkgs    = (f._rvPackages       || []).filter(function(p){ return +p.price > 0; });
  var usePkgs   = stallPkgs.length > 0;
  var useRvPkgs = rvPkgs.length > 0;
  var hasOldStalls = (f.stall1||0) > 0 || (f.stall2||0) > 0 || (f.stall3||0) > 0 || (f.shavings||0) > 0;
  var hasOldRV     = (f.rv1||0)    > 0 || (f.rv2||0)    > 0 || (f.rvCircuit||0) > 0;

  function pkgCard(pkgList, selectedId, idPrefix, sectionLabel) {
    var h = '<div style="margin-bottom:10px"><label style="font-weight:600;color:var(--text)">' + sectionLabel + '</label></div>';
    pkgList.forEach(function(pkg) {
      var sel = selectedId === pkg.id;
      h += '<div class="class-item' + (sel ? ' selected' : '') + '" style="margin-bottom:8px;cursor:pointer" onclick="selectStallingPkg(\'' + idPrefix + '\',\'' + esc(pkg.id) + '\'' + (sel ? ',true' : '') + ')">';
      h += '<input type="radio" name="' + idPrefix + 'Pkg" style="margin-right:8px"' + (sel ? ' checked' : '') + '>';
      h += '<span style="font-weight:600">' + esc(pkg.label) + '</span>';
      h += '<span style="margin-left:auto;color:var(--accent);font-weight:600">$' + (+pkg.price).toFixed(2) + '</span>';
      h += '</div>';
      if(sel && pkg.trackDates) {
        var arrVal = idPrefix === 'stall' ? SUBMISSION.stallingArrival : SUBMISSION.rvArrival;
        var depVal = idPrefix === 'stall' ? SUBMISSION.stallingDeparture : SUBMISSION.rvDeparture;
        h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;padding-left:12px">';
        h += '<div class="form-row" style="margin:0"><label>Arrival</label><input id="f-' + idPrefix + 'Arrival" type="date" value="' + esc(arrVal) + '"></div>';
        h += '<div class="form-row" style="margin:0"><label>Departure</label><input id="f-' + idPrefix + 'Dep" type="date" value="' + esc(depVal) + '"></div>';
        h += '</div>';
      }
    });
    h += '<div style="margin-bottom:12px"><a href="#" style="font-size:.82rem;color:var(--text2)" onclick="selectStallingPkg(\'' + idPrefix + '\',null,true);return false">No stalling needed</a></div>';
    return h;
  }

  var html = '<div class="card">';
  html += '<div class="step-title">Stalling &amp; RV</div>';
  html += '<div class="step-sub">Reserve stalls and RV spots. Leave blank if not needed.</div>';

  if((f.haulin||0) > 0) html += qtyRow('haulin', 'haulinQty', feeLabelEF('haulin', 'Haul-In (per horse)'));

  if(usePkgs) {
    html += pkgCard(stallPkgs, SUBMISSION.stallingPackageId, 'stall', 'Stall Package');
  } else if(hasOldStalls) {
    if((f.stall1||0)   > 0) html += qtyRow('stall1',   'stall1qty', feeLabelEF('stall1',   'Stall — Per Night'));
    if((f.stall2||0)   > 0) html += qtyRow('stall2',   'stall2qty', feeLabelEF('stall2',   'Stall — Circuit'));
    if((f.stall3||0)   > 0) html += qtyRow('stall3',   'stall3qty', feeLabelEF('stall3',   'Stall — 3 Night'));
    if((f.shavings||0) > 0) html += qtyRow('shavings', 'shavings',  feeLabelEF('shavings', 'Shavings (per bag)'));
    html += '<div class="form-row" style="margin-top:12px"><label>Stall Arrival Date <span style="color:var(--text2)">(optional)</span></label>';
    html += '<input id="f-stallArrival" type="date" value="' + esc(SUBMISSION.stallingArrival) + '"></div>';
  }

  if(useRvPkgs) {
    if(usePkgs || hasOldStalls) html += '<div style="border-top:1px solid var(--border);margin:12px 0"></div>';
    html += pkgCard(rvPkgs, SUBMISSION.rvPackageId, 'rv', 'RV Package');
  } else if(hasOldRV) {
    if(usePkgs || hasOldStalls) html += '<div style="border-top:1px solid var(--border);margin:12px 0"></div>';
    if((f.rv1||0)       > 0) html += qtyRow('rv1',       'rv1qty',    feeLabelEF('rv1',       'RV — Per Night'));
    if((f.rv2||0)       > 0) html += qtyRow('rv2',       'rv2qty',    feeLabelEF('rv2',       'RV — 2 Night'));
    if((f.rvCircuit||0) > 0) html += qtyRow('rvCircuit', 'rvCircuit', feeLabelEF('rvCircuit', 'RV — Circuit'));
    html += '<div class="form-row" style="margin-top:12px"><label>RV Arrival Date <span style="color:var(--text2)">(optional)</span></label>';
    html += '<input id="f-rvArrival" type="date" value="' + esc(SUBMISSION.rvArrival) + '"></div>';
  }

  html += '<div style="margin-top:16px"><div class="form-row">';
  html += '<label>Stall Group Name <span style="color:var(--text2)">(optional — helps secretary organize stalls)</span></label>';
  html += '<input id="f-stallingGroup" value="' + esc(SUBMISSION.stallingGroup) + '" placeholder="e.g. Smith Ranch">';
  html += '</div></div>';
  html += '</div>';
  wrap.innerHTML = html;
}

function saveStalling() {
  var g = function(id){ var el = document.getElementById(id); return el ? el.value.trim() : ''; };
  SUBMISSION.stallingGroup     = g('f-stallingGroup');
  SUBMISSION.stallingArrival   = g('f-stallArrival');
  SUBMISSION.stallingDeparture = g('f-stallDep');
  SUBMISSION.rvArrival         = g('f-rvArrival');
  SUBMISSION.rvDeparture       = g('f-rvDep');
}
window.selectStallingPkg = function(prefix, id, rerender) {
  if(prefix === 'stall') SUBMISSION.stallingPackageId = (!id || SUBMISSION.stallingPackageId === id) ? '' : id;
  else SUBMISSION.rvPackageId = (!id || SUBMISSION.rvPackageId === id) ? '' : id;
  if(rerender) renderStalling(document.getElementById('wizard'));
};

      var cap = c.capacity ? parseInt(c.capacity) : null;

      html += '<div class="class-item-name">'+esc(c.label)+(c.datetime ? '<div style="font-size:.75rem;color:var(--text2)">'+esc(c.datetime)+'</div>' : '')+'</div>';
      html += '<div style="text-align:right">';
      html += '<div class="class-item-fee">'+priceStr+'</div>';
      if(cap) html += '<div style="font-size:.7rem;color:var(--text2)">'+cap+' spots</div>';
      html += '</div></div>';
    });
    html += '<div style="font-size:.78rem;color:var(--text2);margin-top:6px"><a href="#" onclick="selectClinic(\'\');return false" style="color:var(--text2)">Clear clinic selection</a></div>';
  }

  html += '</div>';
  wrap.innerHTML = html;

window.togglePracticeSession = function(id) {

// ── Fee helpers ───────────────────────────────────────────────────────────────
function buildRiderFeeLines(horse, rider) {
  var lines = [];
  var f = FEE;
  var selCls = getSelectedClasses(rider);

  var oFee = +(f.officeFee || f.officeEntry || 0);
  if(oFee > 0) lines.push({desc: 'Office / Entry Fee', amt: oFee});

  selCls.forEach(function(c) {
    var fee = getClassFee(c);
    var name = (c.class_number ? 'Class '+c.class_number+' — ' : '')+c.class_name;
    lines.push({desc: name, amt: fee});
  });

  // Package discounts — best qualifying package per org
  var pkgs = f._classPkgs || [];
  if(pkgs.length > 0) {
    var orgCnt = {};
    selCls.forEach(function(c){ var o = c.org||'General'; orgCnt[o] = (orgCnt[o]||0)+1; });
    var bestByOrg = {};
    pkgs.forEach(function(pkg) {
      if((orgCnt[pkg.org]||0) >= pkg.minClasses) {
        if(!bestByOrg[pkg.org] || pkg.minClasses > bestByOrg[pkg.org].minClasses) bestByOrg[pkg.org] = pkg;
      }
    });
    Object.keys(bestByOrg).forEach(function(org) {
      var pkg = bestByOrg[org];
      if(+pkg.discount > 0) lines.push({desc: pkg.label || (org+' Package Discount'), amt: -(+pkg.discount)});
    });
  }

  // Membership purchases
  Object.keys(rider.memberStatus||{}).forEach(function(org) {
    var status = (rider.memberStatus||{})[org];
    if(!status || status === 'current' || status === 'notmember') return;
    var parts = status.split('_buy_');
    var buyType = parts.length > 1 ? 'buy_'+parts[parts.length-1] : null;
    if(!buyType) return;
    var membOpts = _getMembOptions(org);
    var opt = membOpts.find(function(o){ return o.key === buyType; });
    if(opt && opt.amt > 0) lines.push({desc: org+' '+opt.label, amt: opt.amt});
  });

  // Late fee
  var lateFeeAmt = +(f.lateFee || 0);
  if(lateFeeAmt > 0 && SHOW && SHOW.entry_deadline) {
    var deadline = new Date(SHOW.entry_deadline + 'T23:59:59');
    if(new Date() > deadline) lines.push({desc: feeLabelEF('lateFee','Late Entry Fee'), amt: lateFeeAmt});
  }
  return lines;
}

function buildStallingFeeLines() {
  var lines = [];
  var f = FEE;
  var stallPkgs = (f._stallingPackages||[]);
  var rvPkgs    = (f._rvPackages||[]);

  if((SUBMISSION.haulinQty||0) > 0 && (f.haulin||0) > 0)
    lines.push({desc: feeLabelEF('haulin','Haul-In')+' × '+SUBMISSION.haulinQty, amt: SUBMISSION.haulinQty * f.haulin});

  if(stallPkgs.length > 0) {
    var sp = SUBMISSION.stallingPackageId && stallPkgs.find(function(p){ return p.id === SUBMISSION.stallingPackageId; });
    if(sp) lines.push({desc: sp.label, amt: +sp.price});
  } else {
    if((SUBMISSION.stall1qty||0) > 0 && (f.stall1||0) > 0) lines.push({desc: feeLabelEF('stall1','Stall — Per Night')+' × '+SUBMISSION.stall1qty, amt: SUBMISSION.stall1qty * f.stall1});
    if((SUBMISSION.stall2qty||0) > 0 && (f.stall2||0) > 0) lines.push({desc: feeLabelEF('stall2','Stall — Circuit')+' × '+SUBMISSION.stall2qty, amt: SUBMISSION.stall2qty * f.stall2});
    if((SUBMISSION.stall3qty||0) > 0 && (f.stall3||0) > 0) lines.push({desc: feeLabelEF('stall3','Stall — 3 Night')+' × '+SUBMISSION.stall3qty, amt: SUBMISSION.stall3qty * f.stall3});
    if((SUBMISSION.shavings||0)  > 0 && (f.shavings||0) > 0) lines.push({desc: feeLabelEF('shavings','Shavings')+' × '+SUBMISSION.shavings, amt: SUBMISSION.shavings * f.shavings});
  }
  if(rvPkgs.length > 0) {
    var rp = SUBMISSION.rvPackageId && rvPkgs.find(function(p){ return p.id === SUBMISSION.rvPackageId; });
    if(rp) lines.push({desc: rp.label, amt: +rp.price});
  } else {
    if((SUBMISSION.rv1qty||0)    > 0 && (f.rv1||0)       > 0) lines.push({desc: feeLabelEF('rv1','RV — Per Night')+' × '+SUBMISSION.rv1qty, amt: SUBMISSION.rv1qty * f.rv1});
    if((SUBMISSION.rv2qty||0)    > 0 && (f.rv2||0)       > 0) lines.push({desc: feeLabelEF('rv2','RV — 2 Night')+' × '+SUBMISSION.rv2qty, amt: SUBMISSION.rv2qty * f.rv2});
    if((SUBMISSION.rvCircuit||0) > 0 && (f.rvCircuit||0) > 0) lines.push({desc: feeLabelEF('rvCircuit','RV — Circuit')+' × '+SUBMISSION.rvCircuit, amt: SUBMISSION.rvCircuit * f.rvCircuit});
  }
  (f._practiceSessions||[]).forEach(function(s){
    if(SUBMISSION.practiceSessions.indexOf(s.id) >= 0 && +s.price > 0) lines.push({desc: s.label, amt: +s.price});
  });
  if(SUBMISSION.clinicChoice) {
    var clin = (f._clinicOptions||[]).find(function(c){ return c.id === SUBMISSION.clinicChoice; });
    if(clin && +clin.price > 0) lines.push({desc: clin.label, amt: +clin.price});
  }
  return lines;
}

// ── Step: Summary ─────────────────────────────────────────────────────────────
function renderSummary(wrap) {
  var stallLines = buildStallingFeeLines();
  var grandTotal = 0;
  var html = '<div class="card"><div class="step-title">Review &amp; Submit</div>';
  html += '<div class="step-sub">Confirm your entry details. Payment is due at the show.</div></div>';

  SUBMISSION.horses.forEach(function(horse, hi) {
    horse.riders.forEach(function(rider, ri) {
      if(rider.billTo === false) return;
      var name = (rider.riderFirst||'')+(rider.riderFirst&&rider.riderLast?' ':'')+( rider.riderLast||'');
      var selCls = getSelectedClasses(rider);
      var riderLines = buildRiderFeeLines(horse, rider);
      var riderTotal = riderLines.reduce(function(s,l){ return s+(l.amt||0); }, 0);
      grandTotal += riderTotal;
      html += '<div class="card">';
      html += '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px">';
      html += '<div style="font-family:Oswald,sans-serif;color:var(--accent);font-size:1.05rem">'+esc(name||'Rider')+'</div>';
      html += '<div style="font-size:.8rem;color:var(--text2)">on '+esc(horse.horseName||'horse')+'</div></div>';
      if(selCls.length > 0) {
        html += '<div style="font-size:.75rem;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px">Classes</div>';
        html += '<div style="margin-bottom:10px">';
        selCls.forEach(function(c){
          html += '<div style="font-size:.85rem;padding:3px 0;border-bottom:1px solid var(--border)">';
          html += (c.class_number?'<span style="color:var(--text2)">'+esc(c.class_number)+'</span> — ':'')+esc(c.class_name);
          html += '</div>';
        });
        html += '</div>';
      }
      riderLines.forEach(function(l){
        html += '<div class="sum-line"><span>'+esc(l.desc)+'</span><span>'+(l.amt>=0?fmt$(l.amt):'−'+fmt$(-l.amt))+'</span></div>';
      });
      html += '<div class="sum-line total" style="font-size:1rem"><span>Subtotal</span><span>'+fmt$(riderTotal)+'</span></div>';
      html += '</div>';
    });
  });

  if(stallLines.length > 0) {
    var stallTotal = stallLines.reduce(function(s,l){ return s+(l.amt||0); }, 0);
    grandTotal += stallTotal;
    html += '<div class="card">';
    html += '<div style="font-family:Oswald,sans-serif;color:var(--accent);font-size:1.05rem;margin-bottom:8px">Stalling &amp; RV</div>';
    stallLines.forEach(function(l){ html += '<div class="sum-line"><span>'+esc(l.desc)+'</span><span>'+fmt$(l.amt)+'</span></div>'; });
    html += '<div class="sum-line total" style="font-size:1rem"><span>Subtotal</span><span>'+fmt$(stallTotal)+'</span></div>';
    html += '</div>';
  }

  html += '<div class="card" style="border-color:var(--accent)">';
  html += '<div class="sum-line total"><span>Est. Total Due at Show</span><span>'+fmt$(grandTotal)+'</span></div>';
  html += '<div style="font-size:.8rem;color:var(--text2);margin-top:6px">Nothing is charged online — payment due at check-in.</div>';
  html += '</div>';

  html += '<div class="pay-notice">Your confirmation number will be shown after you submit. Bring it to check-in along with payment.</div>';

  html += '<div class="card"><div class="check-row">';
  html += '<input type="checkbox" id="f-waiver" '+(SUBMISSION.waiverAgreed?'checked':'')+' onchange="SUBMISSION.waiverAgreed=this.checked">';
  html += '<label for="f-waiver">I agree to abide by all association rules and regulations, and I release show management, the hosting facility, and all officials from liability for any accident, injury, or loss that may occur during this event. I certify that the information provided is accurate.</label>';
  html += '</div></div>';
  wrap.innerHTML = html;
}

// ── Submit ────────────────────────────────────────────────────────────────────
async function submitEntry() {
  if(isPreview){ showStepErr('This is a preview — submissions are disabled.'); return; }
  if(!SUBMISSION.waiverAgreed) { showStepErr('Please agree to the waiver to submit your entry.'); return; }

  var btn = document.getElementById('btn-next');
  btn.disabled = true; btn.textContent = 'Submitting…';

  var entries = [];
  SUBMISSION.horses.forEach(function(horse) {
    horse.riders.forEach(function(rider) {
      var selCls = getSelectedClasses(rider);
      entries.push({
        riderNameFirst: rider.riderFirst,   riderNameLast: rider.riderLast,
        email:          rider.email,         phone:         rider.phone,
        address1:       rider.address1||null, city:         rider.city||null,
        state:          rider.state||null,    zip:          rider.zip||null,
        isYouth:        rider.isYouth||false, dob:          rider.dob||null,
        billTo:         rider.billTo !== false,
        horseName:      horse.horseName,      horseGender:  horse.horseGender,
        horseOwner:     horse.ownerDiffFromRider ? (horse.horseOwner||null) : null,
        ownerDiffFromRider: horse.ownerDiffFromRider||false,
        ownerBillTo:    horse.ownerBillTo||false,
        ownerMembs:     rider.ownerMembs||{},
        horseRegNum:    horse.horseRegNum||null, horseDob: horse.horseDob||null,
        memberships:    rider.memberships||{},   memberStatus: rider.memberStatus||{},
        classes: selCls.map(function(c){
          return {showClassId:c.id, classNum:c.class_number, className:c.class_name,
                  division:c.division, org:c.org, isCow:c.is_cow, isJackpot:c.is_jackpot, fee:getClassFee(c)};
        })
      });
    });
  });

  var stallLines = buildStallingFeeLines();
  var riderTotal = 0;
  SUBMISSION.horses.forEach(function(horse){ horse.riders.forEach(function(rider){
    if(rider.billTo !== false) riderTotal += buildRiderFeeLines(horse, rider).reduce(function(s,l){ return s+(l.amt||0); }, 0);
  }); });
  var total = riderTotal + stallLines.reduce(function(s,l){ return s+(l.amt||0); }, 0);

  var data = {
    entries: entries,
    haulinQty:         SUBMISSION.haulinQty||0,   stall1qty:  SUBMISSION.stall1qty||0,
    stall2qty:         SUBMISSION.stall2qty||0,   stall3qty:  SUBMISSION.stall3qty||0,
    shavings:          SUBMISSION.shavings||0,    rv1qty:     SUBMISSION.rv1qty||0,
    rv2qty:            SUBMISSION.rv2qty||0,       rvCircuit:  SUBMISSION.rvCircuit||0,
    stallingPackageId: SUBMISSION.stallingPackageId||null,
    rvPackageId:       SUBMISSION.rvPackageId||null,
    stallingArrival:   SUBMISSION.stallingArrival||null,   stallingDeparture: SUBMISSION.stallingDeparture||null,
    rvArrival:         SUBMISSION.rvArrival||null,         rvDeparture:       SUBMISSION.rvDeparture||null,
    stallingGroup:     SUBMISSION.stallingGroup||null,
    practiceSessions:  SUBMISSION.practiceSessions.length ? SUBMISSION.practiceSessions : null,
    clinicChoice:      SUBMISSION.clinicChoice||null,
    source: 'online', paymentStatus: 'unpaid',
    estimatedTotal: Math.round(total * 100) / 100,
    waiverAgreed: true, waiverSignedAt: new Date().toISOString()
  };

  try {
    var result = await sbPost('online_submissions', {show_id: SHOW.id, submission_data: data, status: 'pending'});
    var refId = (result && result[0] && result[0].id) ? result[0].id.substring(0,8).toUpperCase() : 'SUBMITTED';
    showSuccess(refId, data, total);
  } catch(e) {
    btn.disabled = false; btn.textContent = 'Submit Entry';
    showStepErr('Submission failed — please try again. If the problem continues, contact the show secretary directly.');
    console.error('Submission error:', e);
  }
}

function showSuccess(refId, data, total) {
  document.getElementById('wizard').style.display       = 'none';
  document.getElementById('progress-bar').style.display = 'none';
  document.getElementById('nav-bar').style.display      = 'none';
  document.getElementById('step-err').style.display     = 'none';
  var scr = document.getElementById('success-screen');
  scr.style.display = 'flex';
  document.getElementById('success-ref').textContent = refId;
  var entryCount = data.entries ? data.entries.length : 1;
  var first = data.entries ? data.entries[0] : data;
  var msg = entryCount === 1
    ? 'Entry for '+first.riderNameFirst+' '+first.riderNameLast+' on '+first.horseName+' has been received.'
    : entryCount+' entries have been received.';
  msg += ' An estimated '+fmt$(total)+' is due at the show.';
  document.getElementById('success-msg').textContent = msg;
  window.scrollTo(0, 0);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
init();
</script>
