<style>

.btn-accent{background:var(--accent);color:#1a1a1a}.btn-accent:hover{background:var(--accent2)}

.pill:hover{color:var(--text)}.pill.active{border-color:var(--accent);color:var(--accent);background:rgba(212,160,74,.1)}
.loading-msg{text-align:center;padding:3rem;color:var(--muted)}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-right:.5rem;vertical-align:middle}

<script>
var SUPABASE_URL='https://tpurkcxtkvwpywxnuzwe.supabase.co';
var SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRwdXJrY3h0a3Z3cHl3eG51endlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDMyMzQwMjIsImV4cCI6MjA1ODgxMDAyMn0.ZS8DkLKbcKL_D_hO3Af8VxFEYQGpZ-rdSHVXSVWRYUM';

async function sbFetch(path, opts){
  opts=opts||{};
  var headers=Object.assign({'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},opts.headers||{});
  var r=await fetch(SUPABASE_URL+'/rest/v1/'+path,Object.assign({},opts,{headers:headers}));
  if(!r.ok){var t=await r.text();throw new Error(r.status+': '+t);}
  if(r.status===204||r.headers.get('content-length')==='0') return null;
  return r.json();
}

// ── State ────────────────────────────────────────────────────
var S = {
  rows: [],         // all season_results rows
  shows: [],        // unique show names
  year: new Date().getFullYear(),
  drop: 2,
  minShows: 1,
  selDiv: '',
  selDisc: ''
};

// ── Canonical orders ─────────────────────────────────────────
var DIV_ORDER=['Open','Open Jr Horse','Non-Pro','Non-Pro Jr Horse','Non-Pro Boxing',
  'Ltd Non-Pro','Youth','Novice Youth','Novice','Intermediate','Level 1 Novice',
  'Amateur','Ltd Amateur','Ltd Youth','Rookie Amateur','Rookie Youth','High School'];
var DISC_ORDER=['Reining','Trail','Working Cow','Working Cow Horse','Pleasure','Ranch Pleasure',
  'Ranch Reining','Ranch Riding','Ranch Trail','Ranch Cow Work','Ranch Cutting',
  'Ranch Conformation','All Around','VRH All Around','Working Ranch Horse','Cutting'];

// ── Bootstrap ────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', function(){
  // Year selector: current year back 3
  var yr=document.getElementById('cfg-year');
  var curYr=new Date().getFullYear();
  for(var y=curYr;y>=curYr-3;y--){
    var o=document.createElement('option');
    o.value=y; o.textContent=y+'–'+(y+1)+' Season';
    if(y===curYr) o.selected=true;
    yr.appendChild(o);
  }
  yr.addEventListener('change',function(){ S.year=parseInt(this.value); loadData(); });
  document.getElementById('cfg-drop').addEventListener('change',function(){ S.drop=parseInt(this.value); render(); });
  document.getElementById('cfg-min').addEventListener('change',function(){ S.minShows=parseInt(this.value); render(); });
  loadData();
});

async function loadData(){
  document.getElementById('page').innerHTML='<div class="loading-msg"><span class="spinner"></span>Loading…</div>';
  try{
    // Fetch all season_results rows
    var data=await sbFetch('season_results?order=show_name.asc&select=*',{headers:{'Prefer':'return=representation'}});
    S.rows=data||[];

    // Extract unique show names for the year (approximate by matching S.year in show_name or published_at)
    var showSet={};
    S.rows.forEach(function(r){ if(r.show_name) showSet[r.show_name]=1; });
    S.shows=Object.keys(showSet).sort();

    S.selDiv=''; S.selDisc='';
    render();
  } catch(err){
    document.getElementById('page').innerHTML='<div class="card"><p class="empty">Error loading data: '+esc(err.message)+'</p></div>';
  }
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function render(){
  var pg=document.getElementById('page');
  if(!S.rows.length){
    pg.innerHTML='<div class="card"><div class="empty">No season results yet.<br><br>'
      +'Push results from the Show Management app to populate standings.</div></div>';
    return;
  }

  // ── Stats ────────────────────────────────────────────────────
  var riders={}; S.rows.forEach(function(r){ if(r.rider) riders[r.rider]=1; });
  var html='<div class="stat-grid">'
    +'<div class="stat c-gold"><div class="n">'+S.shows.length+'</div><div class="l">Shows</div></div>'
    +'<div class="stat c-blue"><div class="n">'+Object.keys(riders).length+'</div><div class="l">Riders</div></div>'
    +'<div class="stat c-green"><div class="n">'+S.rows.length+'</div><div class="l">Result Rows</div></div>'
    +'<div class="stat c-purple"><div class="n">'+S.drop+'</div><div class="l">Drop Shows</div></div>'
    +'</div>';

  // ── Division pills ───────────────────────────────────────────
  var divsFound={};
  S.rows.forEach(function(r){ if(r.division) divsFound[r.division]=1; });
  var divs=DIV_ORDER.filter(function(d){ return divsFound[d]; });
  Object.keys(divsFound).forEach(function(d){ if(divs.indexOf(d)<0) divs.push(d); });
  if(!S.selDiv&&divs.length) S.selDiv=divs[0];

  html+='<div class="card">';
  html+='<div style="font-size:.68rem;color:var(--muted);margin-bottom:.3rem;letter-spacing:.08em;text-transform:uppercase">Division</div>';
  html+='<div class="pills no-print">';
  divs.forEach(function(d){
    html+='<button class="pill'+(d===S.selDiv?' active':'')+'" onclick="selDiv(\''+d.replace(/'/g,"\\'")+'\')">'+esc(d)+'</button>';
  });
  html+='</div>';

  if(S.selDiv){
    var divRows=S.rows.filter(function(r){ return r.division===S.selDiv; });

    // ── Discipline pills ─────────────────────────────────────────
    var discsFound={};
    divRows.forEach(function(r){ if(r.discipline) discsFound[r.discipline]=1; });
    var discs=DISC_ORDER.filter(function(c){ return discsFound[c]; });
    Object.keys(discsFound).forEach(function(c){ if(discs.indexOf(c)<0) discs.push(c); });
    // Remove All Around from pill list (it's computed)
    var mainDiscs=discs.filter(function(c){ return c!=='All Around'&&c!=='VRH All Around'; });
    if(!S.selDisc&&mainDiscs.length) S.selDisc=mainDiscs[0];
    if(S.selDisc&&!discsFound[S.selDisc]) S.selDisc=mainDiscs[0]||'';

    html+='<div style="font-size:.68rem;color:var(--muted);margin-bottom:.3rem;margin-top:.65rem;letter-spacing:.08em;text-transform:uppercase">Class</div>';
    html+='<div class="pills no-print">';
    mainDiscs.forEach(function(c){
      html+='<button class="pill'+(c===S.selDisc?' active':'')+'" onclick="selDisc(\''+c.replace(/'/g,"\\'")+'\')">'+esc(c)+'</button>';
    });
    if(mainDiscs.length>1){
      html+='<button class="pill'+(S.selDisc==='__aa__'?' active':'')+'" onclick="selDisc(\'__aa__\')">&#9733; All Around</button>';
    }
    html+='</div>';

    // ── Standings table ─────────────────────────────────────────
    if(S.selDisc==='__aa__'){
      html+=renderAllAround(divRows, mainDiscs);
    } else if(S.selDisc){
      html+=renderStandings(divRows.filter(function(r){ return r.discipline===S.selDisc; }));
    }
  }

  html+='</div>';
  pg.innerHTML=html;
}

function renderStandings(rows){
  // Group by rider
  var riderMap={};
  rows.forEach(function(r){
    if(!r.rider) return;
    if(!riderMap[r.rider]) riderMap[r.rider]={rider:r.rider,horse:r.horse||'',shows:{}};
    var m=riderMap[r.rider];
    // Store pts per show (rider may appear multiple times in same show — take best)
    var cur=m.shows[r.show_name]||{pts:0,place:999};
    var pts=parseFloat(r.pts)||0;
    var pl=parseInt(r.place)||999;
    if(pts>cur.pts||pl<cur.place){
      m.shows[r.show_name]={pts:pts,place:pl};
    }
    // Update horse to most recent non-empty
    if(r.horse) m.horse=r.horse;
  });

  var riders=Object.values(riderMap);
  if(!riders.length) return '<div class="empty">No results for this class.</div>';

  // Apply drop-show logic
  riders.forEach(function(m){
    var showList=Object.keys(m.shows).sort();
    m.showCount=showList.length;
    m.showPts=showList.map(function(s){ return {show:s,pts:m.shows[s].pts}; });
    // Sort ascending by pts — lowest get dropped
    var sorted=m.showPts.slice().sort(function(a,b){ return a.pts-b.pts; });
    var dropN=Math.min(S.drop, Math.max(0, sorted.length-1)); // don't drop all
    var droppedShows={};
    sorted.slice(0,dropN).forEach(function(sp){ droppedShows[sp.show]=1; });
    m.dropped=droppedShows;
    m.total=m.showPts.reduce(function(s,sp){ return s+(droppedShows[sp.show]?0:sp.pts); },0);
  });

  // Filter by min shows
  riders=riders.filter(function(m){ return m.showCount>=S.minShows; });
  if(!riders.length) return '<div class="empty">No riders meet the minimum show requirement.</div>';

  // Sort by total desc
  riders.sort(function(a,b){ return b.total-a.total; });

  // Assign ranks (handle ties)
  var rank=1;
  riders.forEach(function(m,i){
    if(i>0&&riders[i-1].total===m.total) m.rank=riders[i-1].rank;
    else{ m.rank=rank; }
    rank=i+2;
  });

  // Build column list: all unique shows, sorted
  var showSet={};
  riders.forEach(function(m){ Object.keys(m.shows).forEach(function(s){ showSet[s]=1; }); });
  var shows=Object.keys(showSet).sort();

  var html='<div style="font-size:.72rem;color:var(--muted);margin-bottom:.4rem">';
  html+=S.shows.length+' shows total &mdash; dropping '+S.drop+' lowest per rider &mdash; '+riders.length+' riders</div>';
  html+='<div class="tbl-wrap"><table><thead><tr>';
  html+='<th style="width:36px">Rank</th><th>Rider</th><th>Horse</th>';
  shows.forEach(function(s){
    html+='<th class="show-col" title="'+esc(s)+'">'+esc(abbreviateShow(s))+'</th>';
  });
  html+='<th style="text-align:right;background:rgba(212,160,74,.1);color:var(--accent)">Total</th>';
  html+='</tr></thead><tbody>';

  riders.forEach(function(m,i){
    var rc=m.rank===1?'rank-gold':m.rank===2?'rank-silver':m.rank===3?'rank-bronze':'';
    html+='<tr>';
    html+='<td class="ctr bold '+rc+'">'+m.rank+'</td>';
    html+='<td class="bold">'+esc(m.rider)+'</td>';
    html+='<td class="small">'+esc(m.horse)+'</td>';
    shows.forEach(function(s){
      var sp=m.shows[s];
      if(!sp){ html+='<td class="show-col" style="color:var(--muted)">&mdash;</td>'; return; }
      var isDrop=m.dropped[s];
      html+='<td class="show-col'+(isDrop?' b-drop':'')+'">'+sp.pts.toFixed(1)+(isDrop?' &#9660;':'')+'</td>';
    });
    html+='<td style="text-align:right;font-weight:700;color:var(--accent);background:rgba(212,160,74,.06)">'+m.total.toFixed(1)+'</td>';
    html+='</tr>';
  });
  html+='</tbody></table></div>';
  return html;
}

function renderAllAround(divRows, discs){
  // Build rider map across all disciplines
  var riderMap={};
  discs.forEach(function(disc){
    var discRows=divRows.filter(function(r){ return r.discipline===disc; });
    discRows.forEach(function(r){
      if(!r.rider) return;
      if(!riderMap[r.rider]) riderMap[r.rider]={rider:r.rider,horse:r.horse||'',byDisc:{}};
      var m=riderMap[r.rider];
      if(!m.byDisc[disc]) m.byDisc[disc]={};
      var pts=parseFloat(r.pts)||0;
      var cur=m.byDisc[disc][r.show_name]||0;
      if(pts>cur) m.byDisc[disc][r.show_name]=pts;
      if(r.horse) m.horse=r.horse;
    });
  });

  var riders=Object.values(riderMap);
  // Apply drop per discipline, then sum
  riders.forEach(function(m){
    m.total=0;
    m.totalShows=0;
    discs.forEach(function(disc){
      var showMap=m.byDisc[disc]||{};
      var showPts=Object.keys(showMap).map(function(s){ return showMap[s]; }).sort(function(a,b){ return a-b; });
      var dropN=Math.min(S.drop, Math.max(0,showPts.length-1));
      var sum=showPts.slice(dropN).reduce(function(s,p){ return s+p; },0);
      m.total+=sum;
      if(showPts.length) m.totalShows=Math.max(m.totalShows, showPts.length);
    });
  });

  riders=riders.filter(function(m){ return m.totalShows>=S.minShows; });
  if(!riders.length) return '<div class="empty">No all-around data.</div>';

  riders.sort(function(a,b){ return b.total-a.total; });
  var rank=1;
  riders.forEach(function(m,i){
    if(i>0&&riders[i-1].total===m.total) m.rank=riders[i-1].rank;
    else m.rank=rank;
    rank=i+2;
  });

  var html='<div class="tbl-wrap"><table><thead><tr>';
  html+='<th style="width:36px">Rank</th><th>Rider</th><th>Horse</th>';
  discs.forEach(function(c){ html+='<th style="text-align:right;font-size:.8rem">'+esc(c)+'</th>'; });
  html+='<th style="text-align:right;background:rgba(212,160,74,.1);color:var(--accent)">Total</th>';
  html+='</tr></thead><tbody>';
  riders.forEach(function(m){
    var rc=m.rank===1?'rank-gold':m.rank===2?'rank-silver':m.rank===3?'rank-bronze':'';
    html+='<tr>';
    html+='<td class="ctr bold '+rc+'">'+m.rank+'</td>';
    html+='<td class="bold">'+esc(m.rider)+'</td>';
    html+='<td class="small">'+esc(m.horse)+'</td>';
    discs.forEach(function(c){
      var showMap=m.byDisc[c]||{};
      var sum=Object.values(showMap).reduce(function(s,p){return s+p;},0);
      html+='<td style="text-align:right">'+(sum?sum.toFixed(1):'&mdash;')+'</td>';
    });
    html+='<td style="text-align:right;font-weight:700;color:var(--accent);background:rgba(212,160,74,.06)">'+m.total.toFixed(1)+'</td>';
    html+='</tr>';
  });
  html+='</tbody></table></div>';
  return html;
}

function abbreviateShow(name){
  // Shorten show name for column header
  return name.replace(/\b(Fall|Spring|Summer|Winter|Fest|Show|Classic|Open)\b/gi,function(m){ return m.slice(0,2); })
             .replace(/\s+/g,' ').trim().slice(0,12);
}
